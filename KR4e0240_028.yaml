body:
  text: 倪文貞奏疏卷七明倪元璐撰求治大謀疏奏為冒承巨任洊被溫文敬述聖明求治之大謀以定微臣司計之成算事伏念臣本迂疏文墨儒緩佐樞未效驟躋地卿聞命之晨心顔俱戰旋䝉召對天語春溫嘉臣志念忠誠才猷敏練諸所論奏井井有條以此知臣又諭以帝王用才致治原只恃一二人如周之四友漢之三傑即高皇帝所用文臣亦不過劉宋數人耳今擢用户部實圖力致太平臣時驚愧陳奏大意謂兵食大計安危所關民窮盜起治平何日而諸臣報國宜見功能臣受恩最深日圖得當臣誠至陋然亦嘗在皇上之前言兵說餉豈可但騁虛論不求實功再四躊躇誠無辭理惟所未安者祖制戶部毋用浙人成法變更非為細故尚求聖衷深慮裁度止停時又䝉諭溫切大略以祖制之不可更者原不敢變今用人為急只得通融且成憲浸失非止一端事關特簡不須固遜臣時復啓奏再四而聖意逾堅又䝉聖諭煌煌大略云餉不清則兵不强兵不强則民不安朕意所求一以安民為主臣奏皇上之言及此誠宗社之福也因䝉俯咨經畫臣冒昧奏陳三說一曰實做一曰大做一曰正做實做者期與兵部通盤合算先凖餉以權兵因凖兵以權餉被寇之區餉多虧折敗軍之壘兵亦銷亡彼此相權則數清而用足所謂實做也大做者小生小節無益於數求其一舉而即可得數十百萬又必有利於國無害於民者鋭意講求必圖有濟此所謂大做也正做者以皇上堯舜之仁心孔孟之正學而責治平於司農又選擇儒臣講官為之諸所設施豈可出於掊斂權宜之陋䇿臣必將以仁義為根本苟政有厲民者臣必為民請命凡皇上所命蠲必蠲命賑必賑臣必不敢以時詘强爭總奉皇上安民一言以大昭聖學於天下此所謂正做也維時臣敷奏未終即䝉褒諭此言甚是真根本之謀學問之道臣因知皇上用臣司計蓋將以行其道也已臣又奏請得參兵部之謀而皇上即諭以已誡樞臣同心合體又奏請選擇司官而皇上即諭以司官得人則奸蠧俱絶許得推舉優遷又奏臣性緩駑不務生産今司計事亦惟執要大端去弊已甚若纎嗇銖兩臣之所不能苛求細疵臣之所不欲云云而皇上即諭以用卿正須持大瑣屑豈所宜為臣於是又知皇上之道大而術尊也臣始被召誠懷驚畏入對而出中心坦然蓋皇上教之已至臣今一奉明訓以太平為決策安民為主計同心為良圖臣即才智出諸臣之下而必以皇上所期一二人事業厚自期許主張既定天下事豈有難為者哉又臣五日之間三承召對仰見皇上軫惻民命愛惜人才燭照隱微處分大事真天地不可為大日月不可喻明至道𤣥符應機合節臣心驚喜以為太平立見臣猶春蟲適乘陽氣耳臣蒞事方三日先謹敘述所承諭㫖以明臣司計奉行本謀所在更需一月清釐見端另當逐一條陳恭請進止臣不勝惶悚待命之至崇禎十六年五月十八日具題奉㫖飭備强兵亟須裕餉其根本尤重安民卿以儒臣特簡司計正宜講求大道體朕節用愛人至意前面諭已明覽奏具徵任事知道了該部知道司餉兼銜疏題為特重司餉一差請更舊轍事頃䝉召對面奏前事奉諭許行謹具本申請蓋臣部司官外差之最重且大者莫如各邊糧儲如寧逺山海大同昌平密雲薊州永平易州宣府代州甘固延綏寧夏等差察臣部舊條皆在中差之列今臣欲改作大差必妙選清廉才智實心能任之人為之其說何也夫往制餉臣司餉兵臣司兵故兩部必相爭兩部必不得互謀其事今自户兵合一之論斷自睿謨其長如此其屬可知樞臣用其屬為臣部釐餉臣部豈得不用其屬為樞部清兵臣用餉司欲用之清兵耳如臣之議請凡各邊糧儲皆兼兵部職方一銜敕書增加綜核軍務數語凡邊伍虛實餉司必知之餉司亦必得而問之矣而此一餉司者潔清無欲則邊人必服轉饋應時則邊人必樂而且得實行兵部之事或閲操頒犒以示鼓舞或就營面給以杜侵漁三軍之歸命餉司甚於主帥其主帥必不能挾其下以相撓持夫清兵者將之憂而兵之喜也故或謂清釐太過懼生意外之變者皆瞽說耳遴擇才品臣之大任必期得人本部不足即取之兵部總為合一即亦可以兵曺兼戶屬之銜其報滿之期舊例本三年近改一年今酌其平請以三年為正其賞罰之格每年能清兵一之五者照兵部徑升京堂十之二三者改授科道無所清釐者停其升考不職者分别重輕處治其甚者臣與之同罰竊謂如此則餉可無匱而於兵事必有濟伏候聖裁崇禎十六年五月二十三日具題奉㫖各邊餉司允屬重寄奏內改差兼銜等項依議行如果清釐著效准與優擢爾部仍加意遴簡有不職的著分别處治奏奪欽此慎察司餉疏題為選差已奉新㫖前題特須更議事該臣疏為特重司餉一差請更舊轍事恭奉聖㫖允行皇上用臣之專使臣得慎用其屬如此也蓋臣意以計曺最重者內惟三餉外則糧儲而今欲責司餉以清兵事體尤異臣昨具疏隨察各鎮糧儲目前報滿議代經前部臣傅淑訓具題得㫖者寧逺則張三傑密雲則何敦季具題未得㫖者易州則王六如其咨吏部未具題者宣府則任逺大同則郭維藩凡此數員皆臣初識未經察信前部臣精明詳慎定不失人然而今昨不同昨用之司餉又一才也今用之清兵又一才也以一郎官之權而望以兼釐兵餉其才豈易得者乎非清不足服衆非察不足發奸而事關軍旅何術以使督撫同心將領受命士卒歸誠辦此三者即其人才幹有餘臣度求之本部必不足不得已而將取之兵曺又不得已而將取之刑工二部議始自臣即應自臣報其成事臣生死係此敢存慢易為此冒昧專請聖裁凡目前所定餉差無論己未具題得㫖俱須臣再三察核保任得過或仍或換具疏覆請然後可得而定也其現在差上瓜期不逺者姑聽循舊例一年報滿以慿另遴其差出未久而才不堪副者立與掣回新差交代諸如此議自臣為之必有怨者怨必謗生然臣既矢誠天日誓捐此軀為國家宣力盡忠即謗怨亦何足恤乎臣曽面奏皇上云臣見寇禍所屠戮士大夫如犬豕草芥每有數百年世家大族一旦蕩為灰塵今日竭誠報國豈為朝廷特自保其身家耳爾時恭奉聖諭云有國然後有家臣祇承惕息於是欲不顧謗禍為身家之計伏祈聖鑒施行崇禎十六年五月二十九日具題奉㫖兵餉兼核必須料理得人覽奏知道了卿既自矢公明何必瞻顧這餉司即慎加察擇來用欽此薦舉襄計疏題為特舉用世通才恭請召對酌用以襄計務事該臣欽承聖諭教之持大握簡然以庸才當受事之始不得不從委細見端故臣半月以來頗覺勞煩夫天下大計宜必得竒士共謀之謀集而大簡之道在握矣自臣入署三日即下教諸司使各條所見有主事董飬和投臣劄子內稱使職言其所明不過條二三事止耳有安慶府學生員今保舉考中知縣蔣臣者博學名通究心世事二十餘年即問之可知百事其人方以謁選入都固可延而致之也臣聞此言若賞臣從文章議論之間知蔣臣久特未嘗得見之不意其適至輦下明旦臣警戒衣冠訪之客邸時蔣臣尚臥臣俟之良久乃出初與微言漸及天下大事兵食機要並皆應聲明辨㸃痛不浮臣不覺自失越二日再往見之益復得所未聞自臣再往蔣臣始一來見臣既目成心折又數日以入賀告獻遍諗於朝諸臣殊多知之者尚書范景文馮元飈撫臣史可法等並言其人真用世才又其為人端直家貧事母孝臣以為有士如此宜告皇上皇上一日召蔣臣以布衣入對中左門叩所藴蓄或誠可用幸以賜臣任為戶部司務官生節之道臣與謀之必當有異臣猶鳥也惟資羽翼耳不勝惶悚待命之至崇禎十六年六月初四日具題奉㫖據奏蔣臣究心兵食堪襄計務著吏部察議具覆召對候㫖行并餉裁餉疏題為乞并三餉為一餉以清餉源事臣觀天下之道逐乎繁多則精神必敝聰明必窮奸宄日生愆謬日見物皆然餉為甚夫餉一而已今三分之曰邊曰新曰練其始以次而加因時取義雖章今制勿沒前名不圖積久為之遂成弊害其在有司催徵者名色紛岐款項參錯奸胥因之游移影溷舞弄千端官非甚察即墮雲霧民即甚黠亦投鬼蜮所以奸貪得志㑹計不清其在臣部則亦猶然一營而分𨽻三司一兵而兼食三餉所司各執其一不相參稽偶互為通即得紊溷使臣日握算子而求之不如胥吏之笑嘻飲酒而舞其毫端也以臣愚見合之樞臣所商請必以簡馭繁合三為一自今十六年七月初一日始布告天下凡徵民糧悉去邊餉新餉練餉雜餉之名止開正賦兵餉二則凡田一畝分别上中下正賦若干兵餉若干正賦一項萬世永經兵餉則俟事平以漸減編賜復敕各州縣刻為易知一單家諭戶曉其在臣部惟區天下省鎮為三仍以司官三員據所派𨽻省鎮分司出入亦總曰兵餉而已如此則頭緒犁然奸弊何由而作乎治餉之道無他使吏胥不得制餉則餉必治使治餉者之精神不敝於簿書則吏胥必不得制餉此臣所謂清餉源者也至臣不敢議裁練餉而請罷練兵夫有兵食餉自當練也即欲别存鼓勸犒賚而已乃餉額既過多所練又至少如薊督𣲖練四萬五千人僅報二千五百保督𣲖練三萬人僅報一千五百保鎮𣲖練一萬人僅報三百餘甚至諸邊將吏匿全鎮原伍置而不言惟舉抽練之數號稱單虛以欺朝廷此向來奏請抽練邊兵别加練餉名目者真誤國之小人也臣請盡罷抽練之兵還其原伍則移徙無煩糜耗盡革不裁練餉而餉自裁於以稍紆民困莫急於此也統候聖裁崇禎十六年六月初九日具題奉㫖本內併三餉為一餉以便清稽兼省紊溷深得執簡馭繁之法以後各省直徵收民糧悉去三餉雜餉名色止開正賦兵餉二則依田起科俟事平酌減依議行其易知單式樣並分𣲖省鎮司官即詳議來看至罷抽練杜耗糜自屬確論但兵還原伍作何操練責成著同兵部從長㑹議具奏欽此停遣部科疏題為官省則專能辦則勵謹條簡截責成之法以速輸將事夫臣部急餉惟嚴考成考成者明乎其有專責也其責已專矣又别設官以分其責是教之卸也以臣之議催餉科臣既當停遣催餉侍郎亦宜並罷即分催司屬亦可不差蓋臣以為節用愛人之道莫大乎省官也遣一朝臣地方即多一番供億小民即多一畨驚畏而究竟無加於撫按幸不辱命仍是乞靈撫按耳令之巡撫比於古大國之諸侯而巡方繡斧所稱代天巡狩者也撫按不能為誰能為撫按不足賴又誰足賴乎朝遣既停撫按自無所推卸然尤望皇上特申嚴諭兼敕撫按而尤專其事於按臣蓋撫務猶繁按威特重并令按臣選委廉幹推官一員專催一省餉務仍以其姓名上聞使推官凛凛常有天威鑒臨其上夫推官者州縣所憚也而自治其土即於地方無所擾怖皇上以錢糧為第一義考核按臣而推官能否臣部亦得而問之誠無愆缺即與減俸行取否者論罰有差凡為此者誠以皇上天語必愈於餉臣之筆舌而巡撫必愈於客卿之侍郎按臣必愈於行省給諫推官必愈於閒局分司此臣所謂省官則專者也至於錢糧起解職屬藩司往者州縣多有完徵解司而被部參重罰者此由藩司不為即解或那移他用或委任非人部無由知惟有參罰以致羣論不服勞吏灰心今請令有司完解到司取有藩司實收印結立申到部臣部於文到之日即於本官名下注完考優立移吏部紀録先經降罰者立與開復凡收結不到部罰在州縣收結既到而銀解後時者計道里逺近歸罰藩司持之斷斷如此則賞罰明而人無曠職臣所謂能辦則勵者也帝王之制天下貴乎術簡而法信當民窮愁苦之時術愈貴簡然而行罰不信則簡適所以導慢臣所謂速輸將之計者止此伏候聖裁崇禎十六年六月初十日具題奉㫖覽奏簡要直截深得速運之法已另有諭㫖了天津截漕疏題為敬遵傳諭詳議截幫事宜事前初六日樞臣馮元飈從召對出至臣部口傳皇上聖諭所奏召買截幫事宜即與計臣詳議來說欽此除召買一事欲求官民兩無耗纍之法容臣確察所在地方應否減免及熟籌遣官委商孰為便益另具奏請外至若截幫之為利害直可一言而決者因聞巡倉御史倫之楷有疏及此應候得㫖據覆所以逡巡而今據押漕道臣方嶽貢報稱漕船頭兩幫已抵天津此則議須早定矣夫為尾幫豫津之說者本為京倉急至陜之米此誠忠計而樞臣以為不可臣亦以為不可者良以漕船利於津截尾幫豫津則幫皆趨尾至必後時遲至八九月間水不得行必改從陸陸運之費三倍於水臣部動增三十餘萬之費官費不足勢必役民賠纍驛騷禍延甚大此之未便寧須再計乎惟是京倉將罄根本宜憂倉臣鰓鰓止為此耳善處之策惟敕津撫漕幫到者不拘頭次定額五十萬石疾先運京度可足二月之食其餘聽津撫如常截運關寧諸鎮期於速達如此則京邊俱濟矣京米宜急惟不必一時盡至津截即緩要不宜定之尾幫義圓而事始有利無害伏候聖裁崇禎十六年六月十二日具題奉㫖是即行津撫將漕幫到者不拘頭次先運入京五十萬石餘聽截運關寧仍察新裁額數發去務期速達該部馳飭惠恤車戶疏題為民困宜蘇運期已及聊陳目前半救之策小紆聖懷事今為畿民大纍者無如僉報車戶一事僉報本求富者而富者臨時既易規營其先又豫竄身官役詭希優免勢不得不及中户以及貧者有財則賄脫賄亦無端無力則攢當攢亦俱盡官給腳價不能當時價十之五而重以猾胥凶攬凌索千端以此道路號吁十室九蕩臣自筮仕至今痛之二十年頃受計事側聞皇上當食憂歎因布文告博采羣謀凡告臣者第言病耳非必有方顧臣已得其藥矣臣意大都惟欲改民運為官運自置車輛集資募民而今漕已至津更弦無及然目擊湯火則先為半救為半救之策有三一曰併倉倉分東西東倉距大通橋近者三里逺者十餘里西倉皆二十里而遙西倉一運當東倉三運而官增腳價每石止六釐故西運甚困今米運京者多不過二百萬東倉厫坐綽然有餘曷暫併西於東雖官仍分設固已坐縮十餘里之地即省費十得一二矣一曰橋支凡軍受米於倉者今悉使受米於橋見謂煩軍逺涉不知是軍所樂也軍受米於倉有三苦倉攢勒索一苦也斗斛短少二苦也攙雜陳濫三苦也去三苦即得三便或使得預支一月則軍益樂而給米照京倉凖斛每袋餘耗仍歸本倉則官亦無損自米至橋之日至運盡而止約為期三月月計支米二十三萬餘通三月即減車戶七十萬米腳價省費十得三四矣其又不足即請量增腳價每石三釐臣部設處不滿五千金而民已欣然如獲大助即省費十得五六矣臣之策不止半救然試以今年變通便利遂以道有歡聲即不改官運而民已不厲即改官運而官亦不費矣時日既迫羣情望恩倘䝉鑒俞乞蚤批發本內橋支一節臣猶恐軍心同異親過總督京營吳維英面商可否隨經維英周詢軍中取有京營副將王承𦙍呈揭并手書報臣極言軍士歡便之情臣又以橋所宕散給放之日慮有紛喧請敕巡倉御史就橋彈壓而營卒統以營將衛軍統以衛領臣部又多委司官佐之則無囂囂之慮矣又嚴令官旗米須燥淨攙和土稻及水者有重罰蓋米免曬揚官旗已多便益而人心無厭得利又思作弊耳崇禎十六年六月二十六日具題奉㫖覽卿奏深得救困之策本內并西倉於東受軍米於橋及預支月糧事宜既稱便益俱依議行其巡倉各官就橋總理力禁插和水濕尤能革弊宜民即著卿速行嚴飭倪文貞奏疏卷七
