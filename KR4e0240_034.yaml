body:
  text: 倪文貞講編巻一明倪元璐撰經筵臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懐之能哲而惠何憂乎驩兠何遷乎有苖何畏乎巧言令色孔壬此一節是言帝王為治的綱領都是歎美詞時字解做是字帝指帝堯驩兠是堯時四凶之一遷是竄徙有苖是為亂之國巧言令色孔壬是外面好其言善其色内裏却大包藏着姦惡的人臯陶歎美説道人君治道多端其大者只有兩件一在知人一在安民盖人之才品不同心術各别若知之不明如何得舉措民服所以要知人萬邦黎庶皆仰頼大君為主若安之無道如何得本固邦寧所以要安民禹聞臯陶之説因嗟歎而言如汝所言這兩件都兼舉而無歉不但尋常的人便是帝堯之聖猶且難之葢知不是淺淺的知直把這個人的肺肝伎倆分毫俱鍳别不差何等明哲以是而用人則大小得宜舉天下極不齊的人品偏是他安頓妥當這呌做能官人安不是小小的安直把民間所苦水旱盜賊等事一一替他消弭無害何等恩惠由是萬邦黎庶心生愛戴若人人有個聖明天子在其胸中這呌做黎民懷之既哲且惠智仁兼盡此時衆賢集於朝百姓和於野人心丕變邦本輯寧雖有黨惡如驩兠者亦皆改行從善矣何足憂乎有昏迷如有苖者亦皆感化歸服矣何必遷乎有好言善色大包藏姦惡的人亦皆變狡詐而為誠實矣又何足畏乎葢本計不失則萬化俱臻帝王所謂得一以為天下貞者道固如此以臣觀之二者之間尤是知人一件最為綱領今皇上愓厲憂勤切切然以剔蠧懲貪籌兵詰餉為憂這都為安民之計但安民的事業件件是要好臣子做的若不得其人而用之雖念念憂民何益於治若用人而知之不眞或誤收匪類或用違其長雖日日用人何益於民所以臣言知人是第一綱領然在皇上的知人第一要知輔臣而輔臣第一要知六部大臣以皇上之至聰極明加之精心體察倚仗得一個天下為已任的輔臣則天下何功不奏輔臣能以皇上之心為心公虚詢訪眞知灼見替皇上用得一個抑邪扶正鑑空衡平不愛錢不狥情靣的吏部得一個運籌决勝能任將的兵部潔已奉公能生節的户部其諸各部盡得其人則天下又何事不舉此又是知人的綱領至於知人之法不外聽言觀行周官六計弊吏胥統於廉能廉則事事從國家起見才猷幹畧都從此出皇上平臺召對文華商確無日不接見羣臣問對之間即是觀人之術孰至誠而不欺孰明决而多智孰果敢而能任孰持重而有謀察之既久舉大小諸臣的邪正能否無一不瞭然胸中然後隨材授任課其殿最懲其貪墨則庶績以熙天下之民舉安矣益曰吁戒哉儆戒無虞罔失法度罔游于逸罔淫于樂任賢勿貳去邪勿疑疑謀勿成百志惟煕罔違道以干百姓之譽罔咈百姓以從已之欲無怠無荒四夷來王此一節書是虞廷憂盛危明之言乃千古帝王惕勵保邦戰勝廟堂之本務當時伯益聞禹陳克艱惠廸之謨因推廣其意以告帝舜嗟歎説道君道至大天命無常帝其戒之哉如今四方雖是太平無可憂虞然而治亂相為倚伏不可不時時儆戒其所當儆戒者則有八事大凡高明之主不患廢弛而患更張更張之弊總歸廢弛此惟謹守成憲庶無差愆故曰罔失法度高明之主义不患荒淫而患滿假滿假不已漸至荒淫此惟時澟怒渝庶無怠惰故曰罔游于逸罔淫于樂從來邪正勢不相容既知此為賢人便須一心信任倘以小人間之必至于掣肘䘮氣敗其成功故曰任賢勿貳從來小人根株難㧞既知此為憸邪便湏决于屏斥倘或隱忍遲疑必至於養成禍亂不可收拾故曰去邪勿疑凡所謀為須要心裏確信得過方可施行若本無定見作意為之即是疑謀豈可措諸政事故曰疑謀勿成凡百志慮須要正大光明若稍叅機智術數即是曖昧失君臨之體故曰百志惟熙大君舉動但遵道而行自然百姓悦服若違背正理市恩見德以此求譽反得謗怨故曰罔違道以干百姓之譽明主有何私欲或原從治道起見而持之稍失其中與天下人的公心相拂即與私欲無異䆒之民心不和我願亦不得遂故曰罔咈百姓以從已之欲兄此八者若能時時儆戒無怠于心無荒于事則治道益隆太平可保不特中國服從就是寄象諟譯皆向化來朝矣伯益之言如此以臣觀之伯益此説分明是一篇保邦制勝的韜畧然却不曾一言説及如何講武如何詰戎全在提挈廟堂上的精神故其立言極有次第先在克己省躬次之進賢去邪又次之審謀愼慮終之以收拾民心而控制四方之術已盡于是矣我皇上清心寡慾視民如傷又復宵旰孜孜效法帝舜的治天下然而今者秦豫盜賊揭竿披猖財盡民窮兵驕將懦多艱如此豈是無虞處今之勢直當震懼脩省易轍更弦非徒儆戒咨嗟可得了事但震懼之過或致張皇未免務為一切苟且權宜之計葢臣聞制治救亂之道有根本有枝葉何謂根本振挈紀綱激勵志氣辨别賢奸宣布德澤昭明公道此是根本何謂枝葉缺兵求兵缺餉求餉以兵治兵以餉治餉此是枝葉枝葉雖不可廢却須本根强固則枝葉自榮伏願皇上事事以堯舜為師誠如書言所稱遵守成法簡飭身心好生為德主善為師不以君予之無速效而参用小人不以邪人之有小能而流毒善類不以小恩小善而傷國家之大體不以私喜私怒而逆天下之公心如此則廟堂精神提挈於上施之刑政自有條理而义守之以恒持之以愼何憂不治平乎徽柔懿㳟懐保小民惠鮮鰥寡自朝至於日中昃不遑暇食用咸和萬民無逸一書乃周公戒成王法祖恤民以為祈天永命之本此一節則獨言文王親民之德與其憂民之心勤民之政葢曰人君惟自尊故志亢而不肯俯恤民艱惟自聖故氣浮而不能深察民隱文王以剛徤之德而出之寛慈眞見匹夫匹婦皆能勝予温温可即柔到箇盡美之處是為徽柔以高明之資而處之謙抑眞見天視自我民視天聽自我民聽翼翼以將㳟到箇盡美之處是為懿㳟其胸懷所存惟以保䕶小民為務又念小民中之無告者莫如鰥寡矜恤之至加惠必先於周到之中又不失緩急之序由是施之政事不敢怠荒自朝至於日中以及日昃勤勤汲汲食亦不遑一心惟求萬民樂業無一夫不得其所煕皡太和在成周宇宙間斯已耳文王之憂勤如此眞萬世人君之極則也臣按漢儒賈誼有言政無不以民為本以民為命以民為功以民為力由此而觀國家凡百舉動無不根極于民民心不和即無一事可望成就文王自朝至於日昃其間豈無庶務旁營而獨言和民者其宵旦所圗悉闗本計雖千功萬業到底只是民受其休也恭惟皇上好生洽民勵精宵旰如傷若保未或過之而適當多事民窮盜起推其禍亂之源總起于加𣲖議者謂今銷兵無期轉餉不繼繇役豈能驟息賦税豈能驟蠲然臣以為國家之政事大要曰内治外寜而已内治必責之有司有司之賢者無事自能撫綏有事自能守禦上有德意必能宣布上有苛令必能調停保甲農桑自然興舉而風勵有司之道在明賞罰今貪吏未盡懲治誠使内責銓衡外責撫按嚴甄别懲勸之法而絶包苴竿牘之私以墨敗官者立與糾劾果有循卓異等者加以殊擢如此則民受吏之福不受吏之患矣外寧者守邊宜合數路連為首尾而勿聽其畫界自全禦宼宜責巡撫各保一方而勿咎其隣國為壑葢互相援則聲以有所倚而壯故守易為功各自守則賊以無所歸而窮故勦易為力因之廣屯鑄勤募練既可寛省調運又以安集流亡至于馭將之法尤貴明其賞罰責其致力于戰而不敢縱暴于民如此則民被兵之利不被兵之害矣此目前切要之政也惟在皇上振紀綱修敎化信詔令一事權求大奸而赦小過惠京師以綏四方更願大小諸臣洗心盡力分則各共其職如吏部必擇安民之吏兵户無為厲民之謀合則相與有成如兵部必為户部酌量贏絀勿輕調發以累輸將户部必為吏部愛惜人才勿急考成而沒治行由是庶績其凝太平之業可以坐致矣倪文貞講編巻一
