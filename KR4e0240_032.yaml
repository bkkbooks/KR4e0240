body:
  text: 倪文貞奏疏卷十一明倪元璐撰屯鹽合一疏題為請復屯鹽合一之制以佐餉務之窮事據保定巡撫徐標疏稱明主貴五穀而賤金玉朝錯所以論貴粟也往者中鹽之例天下商賈輸粟于邉計數給引計引行鹽邉地荷耒雲屯倉箱如京如坻爾時遼東千里多晉人商屯其間各為城堡耕者數千萬人皆兵商馬數千萬匹堪戰不惟富而且强三韓固于磐石後此廷議小利是見以粟多而賤改粟納銀設諸鹽運使轉漕餉軍於今屯艱鹽艱漕亦艱矣近見計臣生節要議一疏內有商人輸米淮倉繇海運可避江險一欵惟其近也臣愚妄議若輸粟于津于通于京于邉于畿南則更近或併海運河運亦可酌省者北地一時無粟開荒即可成熟晉商最多亦最耐田家之苦若遵復舊制不論邉腹凡用兵之處招引商鹽商開荒屯種計開屯若干准行鹽引若干即作運司銀數當必樂從畿南高邑令招晉人開荒繩繩襁負而至殊得其力臣竊有意乎此也信能行之商人羣佃輸粟兵士隨宜待哺屯也鹽也漕也合而一之未必不可佐國計也等因恭奉聖㫖抄出到部該臣等看得鹽糧責商輸粟于邉所以實邉也九邉重則輸粟于邉京師重則輸粟于京法貴因時惟圗其急者而已臣前引司務蔣臣之議欲使諸商以米易鹽積米于淮自淮起運避險省費官商並利法雖莫善于此誠恐漕運鹽課一年有中斷之虞是以再請召對酌行今保撫徐標援臣之議疏請商人輸粟于津于通于京于畿南併海運河運亦可酌省北道無粟開荒即可成熟是合屯鹽為一誠補救之急著蓋臣條議十欵中有京引一議欲輸粟于津别開京引二十萬以省截留使漕挽盡實京師撫臣之意正與臣議相符至于開荒屯種自是良法若准按數行鹽惟慮開屯徒有虛名鹺務反受匱詘莫若但令以米易鹽則諸司之在津者自行屯種以備上納將無事督責而耰鋤遍野此一舉兩利之道也候命下再行條請崇禎十七年正月十四日具題奉㫖京引輸粟議屬可行仍令商徑納京倉為便該部再加詳議具奏防守措置要略疏題為急申防河守城措餉制兵之宜以資天討事頃者寇禍日深聖明赫怒至移調禁旅以征誅昨臣隨輔臣入對中左門竊聆指授既極周詳而愚臣管窺尚有急切要著者夫賊既在秦則遏賊當專力于晉晉有偹而後無患是故今日之謀大略貴于虛實並進虛者在督輔建泰奉聖主威靈奮其敵愾之氣鼓倡忠義磨勵鈍頑收拾人心鎮定民志而已實者在于防河守城制兵措餉今河亘千數百里兵力所必不能及宜責沿河州縣各自為防所慮望風奔逃人無固志臣請大宣德意于沿河保德蒲解絳吉興縣榮河河津平陸芮城垣曲鄉寧寧鄉等十四州邑蠲十七年田租之半又以其半留該地方資其防禦一切征調供億勿相煩纍即以守令為將輔以本地紳襟而率其地之壯勇為兵賊至其汛不得渡者即為上功重行叙賚仍分遣道臣以時督察如此庶百姓以感恩而知效命地方以專力而易奏功此一說也其一則扼勢建瓴防易為力宜令該撫審度扼要平廣渡口可容賊騎數百以上者各築敵臺以憑炮擊則可以五十人制數千賊之命惟疑磚石之功資多時曠請令以土為之凡土築之法下宜堅厚上宜浮虛堅厚則不震坼浮虛則不激掣可以承炮發逺立于不敗即于其旁建設營舍總亦纍土不費多資旬日經營即可畢役此一說也其一則逺餉不給宜謀近取除夫鼓勸募助以義舉者多給督輔空頭告身一聽便宜激勸外臣更請以近日工部所條事例文册給與輔臣凡在地方有心慕官爵而憚于赴京聽就其地輸資行間督輔即為給劄具題徑得赴部謁選或以例格過侈不妨稍作减裁所入資財悉充軍餉此又一說也其一則兵貴乎精宜明用寡嶽飛以五百背峞勝敵十萬溫造亦以五百甲士擒斬南凉叛卒數千安祿山反虜也幾移唐祚其初亦只恃五百驍僮耳今日大患在于備禦廣而兵力分不明棄取緩急之法又大將無親丁死士節制不行臣請撥真定額餉三萬特給督輔使于宣大兵三萬禁旅千五百之外别募敢死材健五百人以六十金養一士足為優厚督輔則與之同甘苦性命此五百人者逺足制賊數萬近亦足自制其衆懾息歸命不敢惜死此後增加凖此為例如宋人所稱兵樣者又一說也臣不知兵言其淺者伏候聖明裁擇乞速下督輔審酌施行崇禎十七年正月二十一日具題奉聖㫖這條奏虛實諸欵悉中機宜著督輔詳酌行該部知道請免軍籍疏題為再陳生財便圗懇速俞行以裨國計事昨臣從輔臣等召對因請發臣覆奏內供改折及捐助給封二疏蒙諭回宫簡發復諭臣愚凡關緊切許具題催謹將臣部未發疏欵開列奏請臣因思理財之道有正有權要惟順民情之欲惡直捷利行為貴也是故臣為內供改折之議者正也所以除民之困也若其為捐助給封之議者權也而不戾於正蓋本乎理而順乎情非有教令督責之也臣恐聖意未决故敢申請乃臣昨晤京西屯撫方孔照出其所條免軍籍為民籍一議大略以凡軍之家原有一支當軍他衛每十數年歸宗勒取軍裝大户嘗𣲖二三百小户百兩不等今其軍之絶者屯田為人所占其不絶者亦既長養子孫承户矣祖籍軍名似可豁除合無凡係軍籍許納軍裝銀兩免其勾補改為民籍只此一項可得千萬民所樂輸若慮後來勾補無路衛所空虛今欽定屯書內開民占軍屯者免其問罪通許照民田起科不如按屯畝分數起補軍丁依然額籍不減臣聞其言驚歎心折天下軍籍皆苦軍裝䆒竟未嘗勾補徒費一畨騷索耳誠得納資脫籍化軍為民天下人情必大感悅只一籍百金計之天下軍籍約百七十餘萬除經賊亂殘區之半少亦可得千萬一歲撻伐之事充然有餘此亦所謂順民之欲以便民為裕國雖權實正者也臣與孔照咨商生節之謀尚多其所言田賦利弊甚詳而切臣於是服孔照之才也夫有學問者必有經濟然而空言無識者轉以急於事功譏之試思堯舜湯武之為君臯傅伊旦之為臣何事不期見功績用弗成帝堯能終宥乎孔子曰因民之所利而利之又曰亦可即戎夫聖賢之道言之則必可行而無不立奏其效所謂措之則正施之則行者也方今軍國需才甚急如孔照者惟皇上留意崇禎十七年正月二十六日具題奉㫖軍籍原屬祖制豈可議更不准行鈔法窒礙疏題為遵㫖確議鈔法事該臣奉命㑹同王鰲永看得鈔法利行道宜愼始而窒礙則有四端一當推行之先愚民未明聖意訛興撓阻也今議早頒詔諭明告天下以法行自上如正賦關稅罰贖稅契間架等項悉俱收鈔其在朝廷所發軍餉商本役餼匠值等項及民間交易行使悉聽願便更不抑勒急遽强行如是則民初不怖既而樂之而後鈔可大行也一議設鈔商領散而始事必懷觀望先須官自為之官則慮有胥役為奸留難勒索民以多費為苦即咎立法不良今議遴選能吏試于近畿授之科條以立榜樣必如民間交易簡易公平使民翕然稱便因而推之天下則如流水也一有司徴收未必凛遵功令有名為徴鈔其實徴銀或鈔十三銀居其七鈔之去路無多民必不以鈔為有用今議責成撫按嚴飭有司遵行凡贖稅一兩而上寧减數示寬不許攙用銀鍰違者贓論仍以鈔行多寡殿最考成則有司知勵也一民間買鈔以輸糧稅貧者既不能頓遽收買富而黠者或多攘積徴貴居竒乘急罔利則小民大困今議設法禁杜仍計地方應領鈔貫依數倍之如應十萬者倍給二十萬寧贏留餘母縮踴貴則亦無弊也以四議舉其梗凡此外補苴變通在乎任者總之法行有漸今日以安輯人心為本臣惟常懷魚驚鳥散之憂以襄皇上惇大寬裕之治必求有功寧徐無驟伏候聖裁崇禎十七年正月二十三日具題奉㫖這鈔法四議尚未詳速著再確酌來說請撤桑穰中官疏為請撤桑穰內遣專責有司以安人心事陛下鋭行鈔法專遣內臣孫元德前往浙江蘇松山東等處收買桑穰頭運已報起解專官速成在臣部可藉手辭責矣乃頃自浙江來者偹述民間驚聞中使之至凡紙戶傘鋪悉皆竄逃其浙西有桑之家閧傳朝廷將以入春不俟蠶熟勒剗桑皮衣食之源於此將絶洶洶藉藉十室九驚凡此皆民間訛言過計使者未然之事也然臣慮其流弊將必至此何者凡民間自取桑穰皆因剪落遺條俟四月蠶事告成之後以其暇日收棄地之利于桑無害今以欽限迫急朝使威嚴所司望風奸徒生事勢必就桑取皮先蠶毁葉皮盡根枯則終身之資絶葉棄蠶死則一歲之事荒浙江連歲竒荒杭嘉湖産桑之鄉幾無遺孑近以江楚震鄰人心風鶴逆賊張獻忠至僞為中貴及兵部差官騙招金華海鹽丁壯數千以去此何等時復堪擾動蘇松東省又不必言臣昧死請敕鈔局先將解到桑穰造用其餘惟嚴責撫按專屬有司必俟蠶成之後收買報命所遣內員立行停撤或欲臣部題委司官而臣謂部臣與內臣何異乎一稱詔使銜憲急功自藝其田寧顧民事不若有司猶通蔀隱臣前請罷餉部餉科即此意也今臣杞憂急以入告伏望即日俞行安定人心早速為貴耳崇禎十七年正月二十七日具題奉㫖桑穰責成有司展期收買即撤回內使如議行閣部最要事宜疏題為恭承召對補牘彚奏事臣于正月三十日及二月初二日連䝉召對確陳軍國大計其間有臣先已奏明者有臨時靣奏者愚劣之誠皆䝉皇上嘉許而丹陛倉猝恐口語未能悉達又仰見皇上委曲疇咨日旰未御尚膳悚仄而退謹將閣部最要事宜摘列條奏如左伏候聖鍳施行計開一各處錢糧逋缺數目臣察十六年分正賦兵餉除蠲免銀四百二十九萬一千三百兩零又撥勦餉銀二百三十九萬二千四百兩零又題留瑞藩兵餉并撥買米豆銅改徴兑銷等銀九十四萬二千四百零只完解部銀一百一十七萬四千八百兩零共未完銀七百八十七萬五千二百兩零關稅鹽課倉助共完過六十八萬九千四百兩零未完二百六十五萬四千四百兩零其中地無兵荒歲稱稍有者臣已于去冬摘參南直江南福建山西江西山東長蘆等處撫按已下等官矣仍行文十日一催責成司官趙龍等及各關倉附近等差分頭督催不敢泄玩各州縣完缺細數另造清冊偹察一臣于去臘靣奏風聞山東一路不肖有司有借題私徴蠲糧者現在行司官訪核主名先請飭令各該撫按據實指參即以悖㫖殃民逮問正法奉㫖錢糧已經蠲免何得溷徴著該撫按嚴察參奏有已徴在官者姑責令起解作下年應徴見餉等諭今據利津川人有向兵餉右司陳扆誦言其本縣䝉蠲復徴者及問之同官王鰲永云無縣不然不特利津也又聞畿輔亦有然者不特山東也懇垂嚴諭責該撫按察參正法以一警百用蘇孑黎一臣部之應付京邉者惟恃外解今餉銀解到八萬餘兩而京邉之索餉者不啻數百萬臣前題明餉到先發者京軍選健米折一萬七千兩練捕米折四千三百兩此無容再遲而邉鎮最急者如寧逺山海約給三萬密雲薊州昌平永平易州通州等鎮量給四萬官舍月餉又須一萬五千兩當此京邉嗷嗷餉之未至也猶引領而待餉之既至則內外交迫倘不發則事不可知臣罪無辭身無足惜而事之决裂不可挽也臣察浙銀久報到河間臣已差促沿途地方官撥兵護解使京邉不致觖望俟解到奏明一前據廣東委官楊䇿勳解到餉銀十四萬兩稟稱尚有兩批在後因俱避亂取塗曲折所以稽延又稱四川銄銀四十萬盡被左兵劫掠則知後至之困亦不盡由地方官疏懈也除現差司官趙龍朱子升沿途催儹星速前行今分遣中書舍人姜承宗馮斐數員于沿邉地方撥截應解額銀一催一解亦為兩便業經疏列奏請一津糧截撥三城扣除之數臣察天津撥遼鎮米豆十六年預計米四十四萬七千五百三十石零豆二十八萬八千石自三城報陷臣屢移察該撫尚未報到而臣按籍預計兵馬實數本年撥給應較十六年减去米一十九萬三千三百石豆二十一萬三百六十石一責成各督撫自謀生財之䇿臣先經請㫖叠移惟宣撫朱之馮漕督史可法知㑹臣部一咨內條三事一開事例以助城守一通鹽引之窮一給屯糧餘俱褎如充耳容臣三催又再不應請㫖議罰一巡按御史催餉完缺賞罰之格業同閣臣擬議諭奏請訖崇禎十七年二月初三日具題啓沃奏謝疏奏為啓沃無當包荒特宏敬謝天恩並揚聖學事該臣于本月十二日經筵進講大學樂只君子一節書敷陳既畢恭䝉天語諭臣書講得好但今邉餉匱絀壓缺最多生財有大道生之者衆此語作何理㑹君德成就責經筵不宜套漫臣時不勝悚仄伏念臣學本迂庸識尤寡昧惟以蠲賑施仁乃安民遏寇之本勦練加餉乃民窮盜起之原因而追咎倡言加𣲖諸臣釀成禍端實為罪首故引聚斂小人為戒欲以好惡因物之義朂勉聖德而選詞不粹立義多膚又臣身在講筵乃忘官司計事計既兼講為職講宜主計為言誠當包絡經權連貫標本營綜世務參酌時宜何得專守足餉在于清兵一說為司計之成謀而不䇿現在之匱缺然時竊瞻瞳采側聆玉音惟見藹溫非有誚讓此為匪怒伊教誼兼君師臣受誡而出未敢引罪自陳乃昨十三日晡閣臣陳演等傳臣至閣恭述今旦上御暖閣召閣臣特諭云從來講筵惟有問難未嘗詰責昨日偶爾詰飭朕之過也先生每宜救正朕仍傳諭講臣以後照常盡誠啓沃毋得因此輒有避忌欽此閣臣又備述聖懷撝抑誠切諄惓臣就閣庭應聲淚下於都哉天地之大聖人之宏也臣自服官以後凡國家之事苟有所知無不欲竭其愚戅然亦豈敢托拾陳言依傍時事捕風捉影空談紙上博直言敢諌之名而置君父之憂于度外乎生節之謀本不能尅期奏效苐臣自去年五月管計業于關寧薊永四鎮首清本折三十萬又遣司餉郎中孫襄于宣府鎮清餉六十萬又咨查寧撫黎玉田清餉七十餘萬又先後准樞臣馮元颷張縉彥咨報缺兵之餉三百餘萬硜硜之誠以為兵清而餉無浮冒餉無浮冒而國用足國用足而加賦可以漸减賦漸减而民力少休於以殄寇勦賊莫切於此惟是從前匱缺已甚聖明宵旰臣孤存報國之心而不能紓國之急臣實有罪而天言垂教引為已辜則臣更何地自容也仰祈皇上解臣計職使臣守講讀之司專文墨之事必當益勵學問誓竭愚誠芹曝亦忠露雷皆教海枯石爛報德何窮狗馬區區死而後已臣不勝感激悚惶之至崇禎十七年二月十四日具奏奉㫖覽卿奏謝知道了著益攄藎效忠實禆治理其生節清釐事宜原屬司計職掌亦要殫力籌畫無致匱缺以副特恩奉議輸捐疏題為欽奉聖諭事該本部題前事等因奉聖㫖這借助贖罪分别叙釋等事俱依議仍著多方勸輸以濟邉急不得聽其推諉內員武職俱一體照欵行如有殷富士民好義借助作何旌勸也著詳議來說分省原自妥便但係被寇地方無妨别舉諭㫖嚴禁抄傳知道了欽此臣思借助之令及於官紳在聖衷猶以為非其得已況士民乎夫官紳義無所逃相與鼓勸之猶存禮體士民何知而臨以詔令名為鼓勸實則逼脅蹂蹴之耳必有挾讎取賄百害俱生今天下貧無力者多半作賊從賊其為皇上出資守城同心讎寇者惟恃富人此即國家外府金湯留之有用㫖內如有二字原非坐名責輸而臣恐逺近風聞即遂騷愕以此祕愼不敢告人若夫有財輸財不呼自至者臣謂此亦不須預條旌格何者士民急公率有二冀卑者冀得官高者冀得名耳冀得官者事例盡收之矣事例已有成則賈人之心錙銖必較豈肯舍少就多其冀得名者如臣昨所題叙徽民程大功父子捐至三萬准以崇禎十年題定則例凡捐二千五百即授中書三萬兩合與十二中書今臣減其半而猶以為殊異者為其無求得報以義得官芳于以資得官耳凡有識之徒見及此者皆非應募求賞而來故臣以為不須設格程大功父子即格也伏乞鑒裁免行詳議臣不勝悚息謹題請㫖崇禎十七年二月十七日具題飢軍索餉疏題為遵㫖回話事該順天巡按柳寅東題為飢軍索餉斫傷撫臣地方大變已經剿撫星馳上聞事崇禎十七年二月十八日酉時奉聖㫖譁兵戕撫殊可詫異為首的密拏正法脅從的安戢還伍俱著該督撫道加意料理其致譁情由仍著巡按御史即行密察奏餉銀多方措發户部堂司官回話該撫被傷情形兵部馬上差人飛探具奏欽此臣聞報駭憤受命恐惶譁軍至戕撫臣實為異變據以缺餉為詞而明㫖特令察奏致譁根由仰徴淵鑒舉朝所疑以為凡飢譁者計必出于擁持挾索未有自讎其主帥至于戕殺如此之毒者也該撫呼餉非司餉者有餉司在何不同禍既由救飢即應搶掠何為撫衙獨沸市肆晏然又飢則俱飢沙中同志彼捕反者是何飽兵以此言之明由驕兵畏調而憚光弼之嚴耳但一訪求即知其實然而時當匱絀餉實不敷自該撫七月受事以至于今凡發過月餉銀共二十萬八千兩近以外解不至應不以時㑹有至者又以根本急計偶作那移邉人不知易生怏怏臣謹一靣凑措現餉不拘多寡隨所有應之一靣𣲖撥順天府屬涿州等處額稅共五萬兩乞遣行人司行人謝于宣前往守催押解足以小安軍心杜其偶語矣臣以駑庸竭蹶生節伏候聖裁請停催餉疏題為臣鄉驚魂未定內遣成命宜回懇乞聖明俯從輿論事前奉聖㫖軍餉亟需解運中斷蠲緩疊頒民生未蘇今特差乾清宫管事王坤科臣韓如愈馬嘉植辜朝薦著各照題定地方訪察已蠲免過錢糧小民曾否實沾恩惠地方有司有無預𣲖私征害民須大張榜示嚴行體訪如確有見聞指參重處即催京邊正項併改折贓罰已征未解錢糧及周延儒吳昌時贓銀照敕諭內數目勒催星解又朱大典已有㫖著撫按提問姑令納銀四十萬用濟軍需准减其罪一併㑹同撫按勒限督解王坤韓如愈等著作速起行敕書關防即行撰鑄本章准從㑹極門封進户部仍將應察應催錢糧數目造冊付王坤韓如愈等該衙門知道欽此臣等恭誦制詞具徴德意本以民生日蹙守令無良違詔屯膏察一警百是則此舉誠為惠民而設原非專在催徴即以催徴言之當兹時艱四譟外解不前臣等同處一舟不寒俱栗況臣璐司計尤切楊號又凡皇上敕遣內臣每嚴約束知必周思利害切誡多端使者定能遵體德意載其清靜然而臣等相與籌維期期以為未可者誠以臣鄉金華之亂雖賊渠授首而黨蘖未清朱大典適居金華其地人本梟悍重以駭蕩之餘忽聞詔使天來一驚百動又四十萬金何容易辦勢必遷延時日牽引親朋洶洶不休良奸並起即其他郡邑積荒新警是處驚危科內諸員一時總至有司承奉督責寧復聊生亂人乘之恐遂無浙是則臣等之所大懼也且非特臣鄉也江右方殘閩粵俱震而江南尤囂陵喜事訛閧易興誠恐事端相因遂起天下只此數塊土護之宜若嬰兒勿使有驚驚則必瘚且科遣三人並饒風力度能盡職仰副殷憂懇乞聖明深思俯從反汗所關安危大計誠非渺輕至朱大典物論雖騰而罰額太侈尤希恩減過半免纍地方臣等不勝惶悚激切之至崇禎十七年二月二十三日具題奉㫖專委科臣已有㫖了朱大典貪婪異常豈得代為請減併一切應解錢糧如催不及額致誤軍需該科必罪不貸倪文貞奏疏卷十一
