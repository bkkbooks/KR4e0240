body:
  text: 倪文貞詩集卷上明倪元璐撰古體黃石齋舉子同館勒雙巵以壽杏壇推才五臺選德為是父兒宜煩孔釋其二今之黃童乃在漳江是父是子亦既有雙題王季重石鼓淮河兩歌二千年古九千里曲請無彼觀而此之讀擲地作聲染字皆緑昌黎扶輪少陵捧轂題畫石為吳駿公骨則有餘態殊不足問之君平傳於五鹿畫石為祝寰瀛我醉欲眠其中空洞其二靜而有文可不與語其三人癡多肉石狡去骨山靈世情與汨俱沒其四比類連徒稜稜岸岸其五黝然以黑蟠然以憨似隨魚網出於江潭化書談峭想當盤桓煩子再往敬問平安其六居百尺樓或拜其下其七熊經鳥申可以長生其八善舞多竅強骨能飛題扇石為王霽宇司馬靜安以貞軒翺而騁巫髙見飛李廣疑寢其矯如虬將縈似蚓備德矜能膚清骨挺我將拜之請君勿哂題畫石為朱丈恆嶽中洞以靈骨強而正使人如此天下其定為胡甥武遷題扇石奉陳明卿祭酒結為地脈奮為星精觀其嶽嶽有若文人其二如其飛來必有攫去此石頭禪不去不住題解石帆追褒册子責花責其果奬柯奬其株為果為可食為株為可扶廣陵八月濤白馬張素車橘花臺上花一開千日敷濤氣為男兒花妍發閨姿所以兩異人鴻光雙聚眉干鏌稱夫婦精合生雙劒黃門躍其一奔霆以激電方其理祥刑持法如持水及其拜夕郎觸山如觸紙江流豈不洪追源良以逺有母問平反無父教咸諂薪盡火方傳形沒理彌顯旌賢旌所生彤章下元土一命遊鶤飛再命潛蛟舞不知地下人為作何歡慰君看死者榮當知生者瘁人生忠孝懷但學圍葵理忠以傾其心孝以芘其抵曹娥祠早歲浪影日夜翻一翻一酸楚憑舟認碑氣神童而廟古屭汗洗籕文蟲口箋痛譜健哉十四姝脛走天吳府載沉復載浮潮汐共吞吐神人相媚時波心五月五盱有技絶倫媚神以妙舞神何以報之媚盱以死女不由盱有女那知娥有父一浪使盱腐再浪使娥俎誰云死娥處不是生娥所茫茫忠孝魂入水即水主近從西江頭割來濤一縷一衣帶水耳翻出竒如許沈孝廉繼母節頌夫亡痛欲自殺其夫鬼哭夜夢乞不死撫孤天橋夜坼婺光起愁鴻泣盡蘆花水塜中韓重寧孤棲鬼聲啾啾乞無死養血血飛成羽鱗潛蛟快舞雙龍子霞文欲聚霜華消但望懷清臺氣美黃金臺吟閣試吾將揚髯鼓腮問乎昭王之金臺提金呼人汝其來壯夫面土心成灰宿瘤如有貌想當不自媒嗟吁乎士不愛鼎王不好瑟燕王臺上取良金荆王門下投奇璧璧固賤於砆金亦不如錫吾聞燕王買駿燕山下蹄鬛相逢多路馬路馬易嘶路神易祈若俾駿馬鳴自理駿馬寧死而骨耳馬口瘖人眼瞢誰知者九方歅九方善相馬篋中無黃金嗟吁乎郭隗樂毅非高賢燕臺抗千金燕士持一錢臺高於天士卑於淵嗟吁乎今燕古燕古盤吟吳橋范質公吏部園丁掘地得十磁其九應鋤俱碎然本頑濫非可貴者一獨精妙然得完質公以為有神吟古盤徴和古者制器人奧深有神理範泥能玉明投塵不灰死本期豐城光故蟄吳橋里一鍬喧五龍十里霞文紫天壤凡英能盡聽爐錘使就以昆吾鈎妙巧盛兹簋何殊天地爐精奇埏范子百年顯晦緣大略通相似衆缺所以完大美不能毁左羊量楚卿召管商齊壘並審才不如推能者生爾風華足相親遂與為雙士配以氷玉壺注之昌城蘂弗使學劍華化龍延津水書浮丘左公傳後曾閲遺編節烈林無端感激淚難禁宇宙茫茫流水逝秉彜好德在人心偉哉正氣砥倫常肉骨雖寒魂魄香即如浮丘左少保立朝精白矢剛方憶自貂璫煽毒薰蔽明煬竈玉偏焚福善禍淫天靡定公與應山志不分羅織百端膚已縻捧日擎天甘如飴閃倐逆氛若電掃造物衡平信有知離照當陽表幽韜孤忠己録綸音褒草野傳呼競稱快臨風嘯咏首重搔吁嗟自古誰無死或重泰山輕鴻毛君不見李固杜喬標漢史日杲杲兮泉滔滔健婦行為宗節沈氏作有健女子漢不如鬚眉百輩為次且天柱地維時􅑶􅑶手持名教安鰲居十八間關方婉孌雞鳬珮玉春風倩星橋忽坼燕羽差千日簧翿激於電塵生甑釡家徒壁藐爾呱呱老姑戚收魂約痛為其難朝事酒漿暮襞績燧人無靈風不反旱魃為虐池無蘩天之杌我良不克摩榆織荔矢弗諼大刀截髢小截機誰識青閨是絳幃參窮荻盡課不歇鬼為夜哭同歔欷二十餘年猶一旦芝草榮階方燦爛未亡無志求難老歸報黃壚應一粲吁嗟苦節自不朽乃若其才世豈有方今海宇急需賢安得如爾者八九毅以治兵無逍遙晳以治糈何庚癸分津布要誠如此潢池坐化揭竿毁賣刀賣劍賴循良劇盜稿縛蟻賊僵於女則師士不冠匪徒家禎伊國祥臣忠婦節排九閶仰視列宿射寒光五言律登香爐峰觀石壁在江西到頂知山大他家盡小巫試看煙似篆應豫號為爐摩詰室安否稽康書有無此原入畫格著我即成圗山行即事橋影如長練肥蛙侮瘦駒十山則一水東佛而西屠竹倩雲為客花囚蝶作俘風傳糟氣好幸有杖頭蚨泛湘湖呌破鸕鷀夢粗吟與細呼柔風扶病櫓瘦影點酸湖舫額誇題米隄身盜姓蘇山山有新意不是畫葫蘆夏駕湖夜泛湖口交雲腳憨煙一萬梢盲舟逢石怒狂韻解山嘲野有螺開舍人如鳥失巢愁磷方結陳竪指畫乾爻行路行路不期到拋鞭任鈍驢雨戾唾花面雲勤顧鵲廬詩材資大獵湖長奉新除稍俟雙眸濶關門即著書遊飛來峰未寫亦稿子連天雲一團花情如石冷鳥語逼人酸溪合雨成拍峰無嵐不冠湖山饒煉格政在杳茫難其二領取空濛意叢林五月寒雨如椎博浪石可枕邯鄲漸覺身非肉儻由山是丹分明舊相識故作面生看同漢逸康侯步出靈鷲寺踞石飲流蕭然自逺祗是無他供家常石一支册雲侯洞口詔水使詩脾味去僧無幾福踰佛不知三人誰免俗判一與沙彌發足靈鷲抵天竺便訪峰丹二上人聞之劉夢得只此外何奇青得山無奈白為雲可知親僧因佛面刻竹是花詩道破真名字西來第幾支送陸鯤庭計偕習説又三載逢人膽過頭衙官班屈宋兒子第融修伸紙只無畏上書非有求管城飛食肉相法必封侯再至飛來偶然成小别幾許閲悲歎召鶴僧持節埋花蝶挂冠松巢新竹攘山法野雲干喜有峰猶在知他飛去難夾溝馬上作舍舟而就陸譬若解連雞野外山綿蕞花間鳥滑稽央驢權不借陷酒入偏提汗漫亦殊樂誰為七聖迷野食我曰馳驅日渠云稼穡時驢糧恭艾子馬食怒張儀謀以肉而鄙人因癡乃肥靜宵得戰勝不敢薄羮藜冒雨行樂陵道入其城蕭條非昔矣而聞中使者索郵騎大譁感賦已作不棲鴉隨風轉鹿車絲雲抽繭谷針雨刺紋紗來去千年鶴官私兩部蛙看惟城郭是愁聽此囂譁雄州道上望溪流泓然大小雄如畫丹樓十里城此方元特達得水益精神口語煙波氣飯香魚子羮扁舟遙望美乃始覺驢獰丁卯春三月道經河間有感不覺泣霑衣徘徊百事非滹河沈麥飯獻邸播珠璣赤子終當弄婦人恐不歸民情與士氣智者必知微至日入賀不識陽生意但觀天子容羣謀各寶鼎睿慮獨黃鍾獻履既無補呼嵩亦不庸所期添一線智水與才鋒雙節篇岑憲副二媵謝葉並誓靡他撫先嫡遺孤至於成立都人士譟歌之鸞悲隻不舞鶼比兩為奇燕子最深閣懷清相望碑孟陶貴毛裏嬰杵仗鬚眉何似雙婺影桑蟲夜祝時戊辰春引光照幽谷谷中人鬡鬇羣處飲神糞翻嫌持聖燈燃犀水怪沸失日酒人朋溫嶠世無取微開吾不能其二貴鶴貴其唳厭蟬厭彼喧喧經霜塞默唳與天通言賈傳誠初學留侯豈美媛無將絳灌語去與圮翁論其三蜣拏丸不脫龍見珠而爭二物各持據千秋分穢清侏儒觀一節曲女無巍城鯨力蒲牢上看誰作大聲其四李目年八十出胎壽已登及其老也戒故詡舌之能壯健非徐偃聰明異許丞誰其無姓氏牛馬胡為應其五昔云必復楚亦曰蘇君時寧作秦庭泣無為馬食羈蒲胥投憤轂博浪喧驚椎血滿脈俱竪不能如戚施其六自有荆軻客舞陽非所期驚人截豸角難事謀狐皮東食豈西宿伯塤誰仲箎有懷既獨往將助亦胡為其七每承長者責蒙亦有區區馬脫五何罪龜藏六已愚海潮音不女戎服射為夫所以蹶然起登山求猰貐其八如非道千丈曷敢逼魔城神鼠嚙盂繫尸蛆失鬘瓔自為狐識錯非與魅爭明商陸子如熟杜鵑亦不鳴其九美號世羣托孤情物所攻蝠能幻鳥鼠獺豈祭虯龍欲火其書易并剸吾子凶要知蜃樓閣非必隼高墉其十世局梟盧喝以官注者昏黃師呵自了孔子擊夷蹲誰任千秋擔公推五父樽無將忠義死不與喫河豚按是時莊烈即位公論劾朝士首章蓋指事直言之也詞臣而爭國是頗為臺諫所側目蟬默鶴言婉而多風又有以無可奈何為附閹解嘲者故復謂其不當以孺子忍辱自托也攻崔魏者引東林為並案公上疏曰以東林為邪黨將以何名加崔魏崔魏既邪黨矣向之首劾忠賢重論呈秀者又邪黨乎哉又其時於高邑吉水淇澳輩有趙黨鄒黨孫黨熊黨之論公謂東林如顧憲成趙南星高攀龍楊漣鄒元標于孔兼王紀馮從吾周順昌魏大中周宗建周起元諸賢其為理學清節復何可議此外間有矯激偏畸者然自不可與任真率性呼父呼九千歲之輩同觀蜣龍分其穢清公如撞鐘以醒羣聾故結之曰鯨力蒲牢上看誰作大聲也此下乃重篇申之五章則追念同志之賢六章則慨想同聲之助七章以下乃直自任其擔曰舞陽非所期明不欲與偽君子共事也黃師一聨言不當為自了漢白眼看也當時如吳橋漳海半居林下公犯衆忌以辨邪正之界從本傳及諸牘證之知此詩有鈎鎖開闔之妙而非過於新奇者謹附識之舟次吳江一離胥渡口即是五湖豪第石登花案除雲入水曹小帆如蝶翅暗浦乞螢尻不問知吳地風呼也帶騷錫令陳石夫邀飲惠山賦謝自關緣法合天亦為停雲山懼水勍敵石推松冠軍宰官身淡漠文字飲氤氲笳鼓蛙俱好誰能喧使君奉贈李信卿太公按太公即忠肅公邦華之父欲奏元靈曲河陽春正曛西平矜禮法南極動星文老子樹為姓山公人事君二郎知必做自可嘯遊雲金山巨靈驅嶽走半渡落泥丸靜鼓記舟里中針定浪盤竿頭容塔進壁上聚龍觀最是移情處驚風失碧瀾瑞芝為呂豫石太常賦尋常只作飯天遣啖神仙函德新名殿崑崙大治田羊愔夢不昧坡老食知鮮何似玉虹草一醺三百年遊雞鳴山寺公時為南司業此山非苟作風雅又威儀鐘老尚能健松肥喜不癡溪流中有佛鳥寂後無詩下坡忽然悟我寧非辟支選房士稿得二十四人何如渭亭賦二十四登髙九子龍殊好五侯鯖合淘持鞭嘗百草為頰助三毛贈世綏山果不仙亦足豪讀徐九一疏草余求讓官石齋不許九一起而申之辭甚切至中間見推數語則何敢承也賈誼承紛亂韓歆坐不謙漢如鐡必奮人匪金胡針伯玉妻聞賦豐干僧發譫自因真好色移奬及無鹽其二三萬卷蟠腹安能為伏雌文心提氣骨諫舌報鬚眉俱笑李邰讓誰教禽息知尋常推舉事不幸後來奇四十初度一萬五千日只如推桔橰蠧心癡脈望鳥計妙寒號祝髀生􅡌肉開胸驗膽毛知消幾量屐能不絶山濤其二約略生來事十年一轉輪深源寧作我燭武不如人登塔畏天逼下坡愁路親何妨為弱仕強以贈吾身其三亦復何滋味如蚊咂鐡衣戰能肥卜子舌已爛王晞自呌一鵝出甘隨六鷁飛豈容又十載方誓墓知非其四官間彌玩日仙館恣龍癡老信鬚能報童心面不知柘枝久已厭竿木聽相隨年壽是吾事胡咨唐舉為憶母遂病三上疏求歸不允却賦十詩去住尋常事千圗萬不能臂消月半寸醖戀日三升徐庶卧龍代燕昭死駿興如臣真可放聖主意深宏其二母曰嗟豫季帝曰吁咈哉不教歌大隧惟恐薄蘭臺駒芻縶遐往貍首射不來鳴霆興百蟄何處著蛩衣其三三載千明發豈不懷宛鳩既慚蚨子母亦妬雁春秋心畏病因病人言愁始愁難將五十席換取一扁舟其四共曉承明貴漢臣殊異同汲生求入幕嚴子乞開籠謁者竟淮海會稽俄侍中由來英主意不肯示通融公時上書政府請改官南京以圗迎養卒不可得其五情緒如春草茸茸不可刪蟲攻心是恙刀折首無鐶遊士倨黃鵠豪人悶白鷴微臣非此意亦不動天顏其六去亦寧無補未為脫雉樊席前由再見閭倚豈私言賈傅因之進王孫所以騫聖人非不省只慮蕩獼猿其七兼將病標本寫入乞歸辭國手多迷藥方書等詛碑上醫惟一物下鬼是三尸對症文無草誰令黃帝知按公疏謂京師如海然獨無醫諸醫雜進寒熱虛實昧其症溫涼補㵼乖其方元氣消耗坐致尫羸蓋如吕誨之諷諫乞歸之故即是藥故曰對症當歸一名文無其八曾觀人上書淡逺䇿疲驢明月謹環玦窮交懷笠車巨靈強剖擘路鬼笑安居坐負秋來意湘江大好魚公疏申請起用廢斥諸賢以解已職其九金馬凌天漢侏儒何所裨時宜非此肚渾沌孰為眉上水船良是喪家狗謹辭可憐歸雁盡才寄數行詩其十春明門蕩蕩我望似鴻溝曲有公無渡藥難王不留身星背驛馬手疏謝江鷗只為恩深重無緣學沐猴病起蚤朝馬上口占示同列淡月趂霜白僵鐘不自聊馬圎劉駕夢酒激汝陽朝天子正懷渴侍臣猶病痟寒號蟲是我敢向鳯池驕念五日大霧幸能吞卯酒馬上任紛披步幛石崇勝流煙封子隨糊塗爭大小視聽入希夷果是公超作軒皇豈不知訪客出春明門木孔蟲穿葉被天瞞到今化機與草説春勢獨山任出酒撓花氣呼工按水音悔將袍笏至據法合書侵其二亦如彼漁者不覺造桃林青守山相老紅交花未深黃鸝無客氣杜宇自婆心未可遂辭去再來何處尋醉巫醒巫顛禹步敢召廬山神寧與石言晉不能松事秦重華旦復旦孟子醇乎醇啓沃寧無志延英望後塵其二公超作大霧誰不中遊蒙二典足三窟五經徒八風天嘻孤烈缺雲訊隔豐隆更欲循墻走將無誤乃公請不請不多留意逢人與混茫鬚安衾上下獐在鹿邊旁鼻肉贅天樂耳蟲糜墨香攻心奈熱血聊服鬱金湯其二但不言溫樹酬人即已間拗鵑商陸子癡雀紇干山鞾隔搔難著牀同夢不關此環豈可解吾已解連環公在講筵敷陳朝寧黨援蒙蔽之局莊烈頗傾聽之將欲大用政府內忌公而外相引重且遣同鄉示意公笑謂吾生平不愛熱官不喜居要人籠絡之內故有醉巫四詩送冒嵩少赴官南吏部一官如算子下上從人心水母矐蝦目山公趨竹林六朝聊弔古半壁足撑今慎弗嘆李蔡俱能辨沈任其二三十車字去金臺等空龕席居末榮末飛意南至南盡日持夾袋逢山采煙嵐樂飢清溪水畢卓無此酣飲臨清馬太學園亭自午至月上始散得遊字亦為貪景物非但主能留藤拗掣松肘風尖錯鳥喉火攻螢下䇿水遁月陰謀今者如不樂真慚馬少遊郊遊不悟黃河面見山有許容六經間跳躍五嶽大遭逢雲膽落韓愈煙心恱寧封斯知華嶺葉定不是癡龍其二矐目可專聽鑱官得恣遊昔賢誠卓識今士亦良謀楚璧刖梧鳯越金鑄水鷗自緣力舉翮飛得上山頭卜居自此至凃太學二章皆林下詩亦由貪道韻求與寺鐘鄰嗜酒酒泉郡姓何何國人楚云小歇腳舞取略旋身幸有池兼竹此其家不貧泗州有僧伽大聖或問師何姓師曰姓何問何國人師曰何國人其二取稱吾才貌愚溪與寢丘名齋曰讀繭呼水作詩猴賀監湖分曲張融屋在舟元天能自致三士不須謀斥田治宅婁園袁師德鄭壁魯新災郭巷反顏子薇山半伯夷襟全由肘讓肉盡恐瘡疑飢至方知誤誤緣讀泌詩默坐默坐無絲挂化豫為水鷗山頭望廷尉壁上觀諸侯夢境咄嗟辦文心汗漫遊始知佛快樂不在度人籌郊外謹遵蝴蝶路尋遍稻芽香百體富花格四聲正鳥腔與春為野享比室更家常回顧紫薇省諸君忙不忙體秋乾坤悔狡獪爐鞴入精微靜者知光彩道人同氣機似貧非是病惟瘦勝於肥至此彌多力不為暮惰歸其二惟無可艷羡所以足歡欣如水不如醴好老亦好文徐熙淡草草仲統瘖云云箇裡真音色癡人誰見聞其三紛華日以逺戰勝乃翻癯教世以黃老視春猶婦姑凋枯非殺氣陶煉各丹爐不曉名場客神形有此無其四勢人既函矢麗子亦圜觚鐘鼓享之背齎咨賦者誣舟無水可住琴不絃能娛二子心差似不然即釣徒其五大都求自了蕭瑟復何云與物分家當如人添面紋將無含內景或有怨深文天帝䇿司令清剛為上勳其六物理成斯退津梁元宰痡占爻得損卦畫佛作眠圗配以秦文淨加之遼鶴孤豪華無可設惟有淡眉鬚升高升髙詎有底目極雲中君腰貫鶴祈合監州蟹乞分智謀延道里判手積銖斤欲問老僧法云何不見聞贈蔡江門司理盡宇若毛鷙長沙尤未寧官兼佛救世帝命爾司刑但把光明燭悉焚羅織經頴川真宰相萬目注璃瓶世事有可憂歎者作八化詩鸇鳯亦難必肉咮化大拳上功憑枉棒下考等重淵哭虎將焉避捕蛇亦豈全司勳無定論少府量金錢時災荒相繼而司農告匱注考首問催科公嘗曰郡縣者親民之吏郡縣不為民無復能為民者又曰考成煎峻守令雖卓魯必得彈責而召杜亦化為屠伯故首及之其二狐虎亦難必威骨化媚珠軍容多禮數謁者廣妻孥恭謹將門將尊嚴姑上姑師中有女子何以激眉鬚中涓監視四出各軍陽以稟成為恭實藉口卸責也疑竟有嚴事奄者故四五六句云爾其三錦練亦難必天機化繭絲蕭何刀筆吏鄭綮滑稽詩河漢而無極豆籩則有司堯言俞咈目二典猶支離散人上書言事者多驟躋通顯其四鼻耳亦難必中凖化側輪媪相翹專座公卿翼兩甄防魚教鱉守引鶩與雞親嫉惡貴巷伯不知誰譛人張彜憲既總理户工二部遂請共坐堂皇少司空髙公宏圗爭之謂臣侍尚書不侍內臣也乃命撤彜憲復請别開府檄召侍郎計事髙纍疏乞休云其五足首亦難必低跟化高頭寧火張彜第莫刓子密侯雞爭撻禁鼓狐亂傳妖籌吾見臨民長甘言諂悍囚公疏曰自吳鯤化以部民參撫按為大吏者望豪氓而氣懾加大凌貴防其漸也其六肉骨亦難必羸肌化大􅀈令言原懦將王則自傭奴大吏縛猶稿名城摧似枯波翻五六月天子為停餔譁兵脫巾如戕殺甘撫畢公自肅登撫孫公元化寧撫王公揖之類其七草卉亦難必香蓀化刺荆耕田多賦稅作賊有功名北跳踏雍絳南遊翻洞彭但更名曰盜即解殺官兵為民困而為盜伸流氛所以日熾也初獻賊就撫公謂此賊不誅天下事將不忍言又疏曰潢池之亂本由飢寒愁苦即應以救飢寒愁苦之法為韜鈐戰權且曰及今不圗必至無地非盜無民非賊刀劍多于牛犢阡陌決為戰場尚安能執空版而問諸磷燹之區哉真至言也其八丘陵亦難必榛嶺化麻園貫索星臨廟臯陶祠咽門死灰燃即溺鬼朴至何言地大官俱備崕州寧足論時政煩賦重仕籍易干吏議歎凡到無如奈衝喉翔白虹穴皮穿蹴踘捶字隱絲桐沸竅狼腸直應聲蟲耳聰提將心坎血去逐不周風其二哭笑俱難處姬文造此謀不如龜息閟較比鶴鳴幽族衍蘇門嘯轅分華嶺齁愁城長萬里勃窣是煙樓其三辦此非尋俗文心與賦才神輿時喝節候管忽飛灰風有若號者蟲生名怪哉小消蛙腹脹正爾慮蚨回其四吁咈難追帝唯阿豈翊皇傳烽告義漢警哨徹愁鄉自可配笳拍藉之消劍鋩大都由怨作以此續詩亡其五不似無心蚓茹泥徒吹噴離騷經沒字顙呌子能言逐悶出牙闔盜情輸耳垣曈曨已激熱得致石人論其六似有通消息情深不可臚讀書呌警䇿呵鏡取糊塗閻沒前持槖梁鴻後捧爐坐煎忠孝士聲出變頭鬚塗德公太學以疏救豫友石齋廷杖遣戍便道訪豫山中臨别感賦才接雲虹氣吾旗已豎降一浮鋤水宅共倚呌山忩蔣築能無徑潘才信若江不須邀月上君面有銀缸公有舟名鋤水齋窗聨曰呌山山應邀月月來其二賴有昌明氣一開混沌天不曾知棒痛豈可咎霆嚴亦以王回義愈知鄒浩賢鬚眉吾亦好輸爾獨千年朱成國心翼晉爵熙朝多盛事最著是良謀方叔推元老新田咏壯猶酇侯加劍履召虎拜圭卣一時班絶席百尺看巍樓壽何非鳴母丘太孺人鄭媛輕白鍔陶母刪青鬟致義鬚眉上競功詩禮間人傳韋氏學仙在麻姑山不食監河鮓冰心自駐顏諸蟲名呼被於人事因據為義者凡八物各賦一章鷙格物論鷹之類則有隼鷂雕鶻鶚鸇皆鷙猛之鳥魏書性頗忿鷙漢書義縱鷹擊毛鷙為治天地並尊殺老拳摩烈霜劍精羞再擊矢法列三傷家築避雷室人虀偃月堂東階鳯何懦義縱笑軒皇猾猾無骨展體見肉入虎口虎不能噬處虎腹中自內嚙之或云即蝟左傳奬順天道無助狡猾從無肉離骨可信是甘柔蝮子貽蛇患桃蟲通鳥謀智囊癭是毒警枕夢如流想見李林甫蜂脂鑄鐲鏤駑相馬經以不合格者為駑李斯曰上不知其駑下史遷曰僕雖罷駑錣策不能勸何况鞭影乎由胸無道路化世為崎嶇江上汁諸葛延英汗令狐莫將萬石粟笑彼一囊芻蠧壁魚蠧書昌黎曰豈殊蠧書蟲生死文字間韓非子有五蠧篇與倉帝爭力系出祖龍餘脈望艱成就藝香費祓除青苗配字説封禪倚天書謀國文心盡銷光月蟾蜍叨餮鈎吾之山有獸羊身人面名曰叨餮嗜食人周鼎鑄其像縉雲氏有不才子曰叨餮東坡賦老叨盍觀周鼎上有口即無軀腹匪將軍負肉猶子我屠越缶多海物𡨕鑄廣財爐大約俱人面知誰不可圗狼狽狽前足絶短每行常駕兩狼失狼則不能動假成式曰事相乖曰狼狽自無長掌跖踸踔何迍邅蛩駏足相比夔蚿孰可憐華歆友割席毛仲客逃筵失據亦云極披猖豈不然流離梟也關以西謂之流離詩曰瑣兮尾兮流離之子見則凶家國愁吟瑣尾詩謹循黃帝令虔禱鄭僑祠硩鏃無專職率更反得移賜羮亦打草胡不深長思渾沌崑崙西有獸有目不見有耳不聞人有德行而往抵粗之人有凶惡而往依憑之帝鴻氏有不才子曰渾沌上古未昭晰曰渾沌安能長不夜天遣混貞淫獬薦無斯觸窮奇良所欽惡人由逆我中尉獨開心只坐無聞見肝腸乖到今鄭元嶽司寇解網志喜亦念臯陶直平反信早孚星辰摧貫索勳業託耕鋤雲著連山易阿成卧佛圗清時詢黃髮未易守菰蘆和劉良哉韻京兆官五日商英憾十年獨留龍象在若有鬼神然夾袋中無意石牀大好眼斯時眠不易鳴鶴或聞天皇極門頒厯閣試鳯闕開彤旭猊爐散紫煙六階齊度緯七政轉璣璿甲厯龍纒改寅賓象魏懸明時功在革資始義承乾黑帝威初試東皇信早傳周官新月令甘氏舊星篇人繼羲和後書成蓂莢前庚先三日戒貞下一元旋圗籙符垂赤干支德應元興王惟省歲太史又編年賜出黃星曜披看緑字鮮因知天厯數如日起虞淵倪文貞詩集卷上
