body:
  text: 倪文貞集巻十三明倪元璐撰行述先考中議大夫雨田府君行述嗚呼詩曰鮮民之生不如死之久矣不身經之何由知其言之痛乎元璐年纔二十遽失府君此由罪積禍延元璐當死即以府君棄元璐而元璐闇弱無所之又當死不即死者非徒有母寔以府君於鄉多德於世多功而浮沉無大位萬或湮沒使後無傳豈不為死吾父乎抑唐人以不得昌黎藏記為不𦵏其親今价人當世鴻文所歸不得一言為之十字雖馬鬛崇􅀢何殊委壑用此收魄澄慮取所衆著綜條如左無復文采惟不誣耳葢府君之為人也好行義而惡誣稱是故元璐勿敢也府君諱凍字霖仲别號雨田其先宋之青州人多顯者文節父子著巳兄弟侅偁從蹕南渡侅判紹興因家上虞之賀溪子忠又徙横山後五世孫文質當元時募義兵禦㓂有功為防禦千户子彦忠仍嗣職彦忠子春國初以賢良徴不赴春少子述初景泰時輸粟三千石賑饑臨山築城又助白金三千兩朝廷義之賜璽書束帛授徴仕郎不仕述初子晏晏子堂堂生抑菴公諱鎧領正德庚午鄉薦歴官南城縣知縣有高行祀於學宫抑菴公生南望公諱應蘄績學孝友以府君貴封文林郎娶陳太㳟人嘉靖乙酉秋九月戊辰生府君府君生而英奇與羣兒嬉戲即形志畫四歲時倭抄鄉邑王父徙家避之既廹甚乃獨持冡伯洙源公去遺府君寢綳既覺室閴然起出門外大擾擾心計不可啼循隙影行彳亍十里許及王父王父曰吾固知是兒不死矣性篤孝五歲為王父理刀圭至損其指王父數奇讀必丙夜迨就枕足􅂒冽如冰府君翼兩脇擁持之夜以為恒不言苦其至孝天植如此稍長遂磊落有奇抱能䇿事時龎公條編法未行往來貴人騷動有司不能供則使其邑之富人王父與焉王父寒士有司修郄耳當是時蕩數歲糧得貴人一饗弗饜也王父既苦之日與抑菴公咄嗟不已府君年方十一從抑菴公踝間吚吚語曰若然厲民胡巳時夫有司胡不為一切之道税而供之安取是鼎鼎者為抑菴公亟驚起連呼曰兒不凡越十年而龎公按浙建條編議卒如府君言九歲能屬文十六補弟子員嘗筆耕坐讀小樓歲不三四下所著襦寸許至穿孔今猶遺孤等為司馬家帷云庚午督學林公奇府君文㧞高等秋領鄉薦年二十二蓋府君與抑菴公俱以己酉生薦庚午亦一奇也辛未計偕時江陵相居正典試事府君巻巳為同考許公國所賞牘呈偶策語及時務稍戅江陵援筆彈之曰此狂生遂下第歸而下帷者三年甲戌成進士授安福令安福仕國矜理學令輙易得罪人為府君難之府君獨喜曰吾猶石然其以安成砥矣既至即鼎新復古院與其鄉之大夫約曰某年少待罪斯土唯是諸君子左右之乃諸君子亦毋以私跡某門以是鄉之大夫悦而嚴之府君益勵治異政纍纍邑西隅數火患月十餘驚府君黙自念我令也固能勝之則立木尺許而自署名其上曰某遂絶有隣部民甲乙聚族鬭乙負明日殪病叔示之甲懼而賄焉則曰此證符也令不能辨甲抵死獄上當路移府君乙固使人為亡者婦府君疑乃謬為識亡者體貎舉問婦婦茫不識也随府君指如轉圜益大疑訊之吐實吾非若婦耳利乙財府君曰未也若有子邪曰有子曰而子殺人遂俛首服葢乙殪其叔於舫而婦子長年也為同謀云於是舍甲罪罪乙擒大豪三王榘者以豪論死乘前令弛而跳圜土焉出沒江湖間為大盜巳又剽其弟去數年捕弗得府君下車不浹月捕即得之并若弟還王繼者擁貲丘若搩挒邑邑被死者數十人以死鳴顧得死者又數十人其宗大父行某被縶掠且死作長恨歌又囑其子曰必墨一楮筆一禭我乎鬼則可鳴也人則無鳴也其子固呑恨寂寂久弗聲至是亷狀發屍墨筆宛然也豪役鏹萬走竿牘如雨勿聽按如律王羅者隂殺人既梩藟掩之矣府君舟夜經心動使人守勿去旦發之屍也中遺畚焉而題識之曰王羅即以自致王羅奚説哉時三大豪殱民得高枕卧而豪右始怵怵相戒歛手避倪公葢府君年少其决斷則老吏不如直指聞府君能舉積歲疑案三十餘授府君府君操筆了了翌日即具牘報纎悉中窽直指大駭服以為神明由是治行為天下第一當是時江陵相奪情視事府君頗弗韙之㑹有詔勅天下盡毁所謂講學書院者府君力持之復古院竟不毁已而御史安福傅公應禎劉公臺進士吉水鄒公元標彈章相望俱杖謫去直聲振海内府君壯三君子而自幸得剖符其鄉也則於鄒公之投南荒滯逆旅也拏舟而饋之漿傅公戍定海則祖之詩家故近定海則貽書王父洎弟侄軰必時時勞傅公又製浦姬吟詞氣惋結而劉公時僅得禠職府君數過從豪飲達曙至掀髯㦸掌涕泗交頤下聞者寒心府君不顧也劉江陵士也而語加峻焉江陵恨恨必手刄之屬其私人御史某使狙伺焉㑹劉氏甥謝燿者先以劉拒不得嗣劉氏大恨劉條劉不法數十事陳牒府君時已緘白江陵相而與巡撫某謀既訂矣特欲從府君權輿顧以私㗖府君曰事成當得好官府君厲聲曰吾豈以犬彘貿好官因立召燿榜數十予判如山刷滌為盡御史大沮為燿作奏治百日糧走都下迨府君聞已渡鄱湖矣飛卒追而圄之乃江陵相摩厲以須詰何以久不上曰已發為令所追耳江陵相大恚時主爵疏行取姓名府君踞第一江陵相一筆勾去貳府君松江而劉獄遂成然竟以府君湔洗律不得傅姑戍潯陽道死劉之不庾於狴者府君力也先是府君未第時夢朱衣吏引至一所如王者居主者持佩金刀者一人授府君曰以煩汝葢至是始悟金刀為劉云江陵相既嗔府君疆項而又以不得大辟劉由府君復下令推府君疵不得乃云粟入厫少非格貶山西臬司照磨府君怡然就道無何遷同安令同安洪司㓂鈁為怨家所告時中臺所下訟司㓂詞凡三千六百餘應逮問者二萬餘人原坐司宼贓巨萬計多官累歲不能决府君一洗故牘浹旬而定司㓂寃白而洪氏所株牽悉不理八閩讙然稱平諸生葉日新貎奇而誕好與方士游忮者遂為蜚語云日新負貴徴招集亡命謀不軌䇿於某日劫縣庫縱獄囚屠同安城直搗温陵而北矣逺近洶洶擕家去者千計時府君方詣郡從郡中宻檄召日新慰諭之并還集諸擕家者而其年江陵相病死有上書訟劉寃事雪府君名益大著詔徴為南駕部郎佐船政初高皇帝水征所載軍馬者曰馬船載輜重者曰快船自文皇帝定鼎金臺快船取諸京軍無資給軍惰船易敗則使自繕船其為令曰非甚富弗役也而中人衛帥以為其外槖也受役者至倒脂罄髄不能供富家黠既以其賄免而具中人産或又其下者即無不人人繇於是名垜甲朋蠧出千孔先是有求鬻婦輸繇者有夜逋自署其門請捐宅舍者投繯者蹈河死者府君既洞知之一日署正郎篆吏持文書乞判不可了商役投牒請者千餘人至盤踞樹顛如閧市已輙有操劵請收逃人婦者府君咤曰而將令我主畫諾為而軰作賣妻牙耶叱去退而覃思之更三晝夜不交瞚躍然起曰得之矣㑹有風霾之變詔求直言府君總條馬快船得十議議得便宜行者可弗聞以其五議具疏因大司馬郭公上之一曰議官守二曰議差使三曰議支放四曰議木料五曰議出則已又因署篆少司馬顧公上言留都根本重地都城内外編户軍衛居大半干城爪牙於是焉賴今則日朘月削極敝而不可支矣究厥所由則船差之害為大而各衛之所以告病也臣謹按大小馬船與快平船差等耳馬船不以為苦而快船則深以為病者何也快船之應役者皆小甲之正身而馬船則募夫應役也夫有常值故人皆樂從人皆應募故外無需索兩船利害何止徑庭臣以為今日亟反之計在改快船為馬船而已所謂改者非改其制與名也改其寔而已改其寔者去小甲之名而從募夫之例也如是則所謂百計經營多方求索者不禁而自革矣臣備查進京馬快船共八百六十四隻内馬船三百六十四隻每船募夫一十六名共給值二萬九千有奇月糧米六萬九千快平船共五百隻若從馬船例募夫侈矣然各船皆三年一修以供差使而差回空泊者輙二年有餘故朽多而費重各夫廪值亦三年分領故勞少而利微若各船止留三之一而廪值增三之一使以一年修船出差一年更番休息則船藉於頻修而不至朽夫喜於增值而不怨勞故留船六百隻而循環足用矣又下江馬船七十六隻尤須减三之一而隘其制并作進京船數則進京馬船共存三百九十而快平船所留止須二百一十矣照例募夫增其值不過二萬歲支米四萬耳而少科之可入金萬五千則所少者不過五千而修造所省亦畧相等矣馬船差頻増值約歲給銀萬而本部馬船工料歲贏二萬量入為出又寛然有餘伏惟皇上作民父母四海軍民皆吾赤子而留京重地較之他處尤切即使國家額外捐金萬兩米萬石出此六七萬家於水火之中鞏留都於磐石之固以皇上之聰明仁聖固將欣然樂從而况通融裒益本不出經費之外者哉疏上時宰揆申公時行王公錫爵讀疏嘆曰嗟乎二百年未有言之者非駕部才疇辦此亟擬上得命專責成府君而兩相君又飛牘慫慂之曰幸未死願得觀成焉而瞑府君弗得謝起更張之諸區畫具載船政新書中乃良工心苦口䇿事日夜噙喁不休飯間杯盤果核悉引而署之曰此某舫某木具某商役某銀某餼計舟所往來輒操箸蘸巵中瀝畫塗於几而屈曲導引焉如親篙繂者葢自丙戌春抵夏三月而定迄又明年戊子春三年而告成計歲省金錢十餘萬蠲夙逋萬成之日數萬人歌舞於道隨府君馬尾而謡謡曰是倪父則活汝不倪父耶汝則死於溝而今死於丘此一役也掠璫弁口中肥固人人淹恚先是則造作蜚條㸃灼府君若軰力悍也又動輒曰上供語危而所部軍騃善疑每出令意即未可訟言而疑謗遽無以解前年減快船半駕馬船者疑移祟焉千人譁然起或云須榜諭之府君曰勿事也徐瞚語其署中人此良法若解邪曰解即願充邪皆叩首曰甚願則立判其子弟數十人已而各署請者人三千悉予牒渡江走江淮衛譁者以為掩巳也刧而啟之盡投籍者又署中人乃䘏然駭曰厲也胡為乎來哉投戈而散戊子秋詔明年潞王之國徴南三百艘又部徴百艘運壽陵松時南舫遣者强半餘弗支又卒不得一艇應今年上供人情震駭羣璫固欲剡手衝府君胸得間輙眉舞曰看倔强漢何處討兩頭顱來府君殊夷猶奏記司馬夀陵松即不必迂道易南舫徒撓厥本貢舫若者輸若者不急緩輸舫北遣者若者宜弗留遣還充今年貢若者留區處大當司馬喜擊節随奏許可羣璫乃閉目摇手不敢言葢府君之為應變才類是乃中外大奇府君曩謂措大骯髒詎幹辦焉如此哉既奏績上主爵謀胡以酬勩則擬晉府君璽卿府君曰郎卑曹也而驟清華我其以身支鏃哉又有以粤左士屬府君者府君捫胸謝曰有斗血喀喀嘔艅艎盡又能嘔鉛槧乎而首揆姑蘇申公又以其桑梓請曰强佐臬焉府君謹謝懼南陽不可問為相公憂於是皆不果庚寅撫州大飢民為亂廷遣二千石必得循吏如古朝歌詡渤海遂者莫可任其撫之大夫居要者日叩主爵之閽而請焉曰必借倪公於是出府君為撫州太守命下都人皇皇蟻聚司馬門牽司馬裾為我留倪父司馬慰諭之曰天子急活臨汝安得留夫法未敝也若何患於去倪父乃散發之日自公卿以下及其鄉之大夫送者車千兩祖帳鱗次三十里其軍衛十萬家人手一器縵臺而酒之攀車拒輪闐咽衢術府君為留三日乃得去府君去而諸豪弁不逞者賄同曹郎某謀變法十萬家又輙鼓噪呼懷甓伺殺某某避匿免朝議惡之鐫其官都人乃益德府君為立祠顔其宇曰惠德置守者歲以府君生辰崇俎豆至期聚而祝之者萬計限為之穿鄉民有操雞黍卜者輒應如響咸神明府君謂生猶著異也祠日加搆焉郎曹得祠及餞送攀留之侈皆前此未嘗有也府君去都都之人如䘮未至撫而撫之人竊竊喜曰上以仁人來矣則稍稍定比至撫出市攫坐辟者三百人條蠲賑十䇿旱禱至嘔血得雨則又益大定居五月更守淮安郡郡當子午道使客如蟻守車馬行酒炙勞之故事民為供府君咨嗟曰守即主人但當解槖中裝供客耳何池魚閭左巳之民如釋重負者部使者啣命布桑孔筭𣙜甚府君支數月糧䄂而遺之曰守無狀俸可𣙜也願為吾民請一日命使者慙靣赤至頸乃稍稍戢寛十之五時大治河費度支金巨萬乃竣河使者酌酒賀也一夜隄隤津頭踉蹌言漏三下矣府君勅毋閧檄營卒千予之所應餼者使人人囊沙石抵之昧爽安瀾矣而河使者睡齁齁聞之大驚失色已知夜來狀乃徒跣謝曰公真神人我則幾為羽山之鬼故府君詩有辛邜三月隄夜穿披衣起看月中天又貔貅聽令三千軰少府不費半文錢皆實錄也於是大司馬潘公季馴以天子命視河漕上絶奇愛府君上劄子言使其守郡是猶絆騏驥之足而責之千里非其任矣曷不假某使者節使理徐州兵事其於淮民猶宇下也書猝上府君詣司㓂力辭不得而太㳟人陳方就養於官一日暴殞府君哀毁踰制七日夜水漿不入口號聲達於四衢淮人重哀府君以母故幾自引又輒私相弔若我軰復安得母倪使君哉府君既扶櫬歸里中三年未嘗見齒甲午服闋上時播酋漸梗廷臣持勦撫兩議勿能决日盱衡望府君來將委郡焉入國門明日大司馬石公星邀計事石耎人也而夸曰虚聲勦之儻怵諸撫矣府君曰奈何以威弱子之術怖狡囚哉若自以其夜郎雄不大創安得怵當事者礪空刄焉而彼固狃之曰儂頸誰當置此所謂養癰也因立條勦䇿如移楚撫調客兵便轉餉散七姓分土司數事曰如此猶當費金米數十萬其不然者且百萬司馬心非之曰剩計耳义問乃舉高皇帝執田琛傅介斬樓蘭事以對曰一武士力也石咋舌頸􅀈至腋府君力陳父老願王陽自處遂更荆州而播事他委承石㫖事大潰裂楊酋日睥睨焉負嵎而虓當事決䇿議勦費帑金一千萬有奇粟倍之折士馬無算府君言卒如左劵云荆州相居正里也羣張慄甚屬所親乘間言府君笑曰即往者令傴僂致㳟事即不可知苟云强項又何虞乎比至待羣張有加計不籍田如千頃為勢家所侵悉徴予之人以是服府君厚德終長者前太守闒茸賓其掾掾得戴儒幘白事多舞文者府君至按誅數人左右咸股栗而民以為慈往廩宗藩由胥胥槖焉而鍥絀與之諸宗既待炊毋暇問大率十得六耳府君著令制胥不得措一指諸宗大悦曰倪使君生我荆之士悍而刓其隅有數生以丁祭勒一縣尉令掛冠者有以其妻嘗友始則昵而侮之既則忤而鳴之者有縣令首擢士反持令短長榜而數之者有殺其家之季至夷其靣鼻口耳者府君悉收而寘諸理士於是有絃歌之思葢府君蒞荆以月計辛壬癸甲耳即無不歌亷暮賈晩也而他撫臣褚司徒鈇已露章彈去之矣先是江陵相寃殺安慶士吳士奇多鈇力府君數口呰之鈇聞而怨府君至是荆從事萬君建崑以循良徴鈇媚焉檄荆鍰如干非例也既報命一空函耳而將命胥至淮有為之謀曰胡不贄乃私致戔戔兩縑鈇見之大怒曰何兒㺯我遂奏劾某上交非分宜鐫官府君徑拂衣歸乃荆士民怒不㳿我小人㡬枵以壑賴倪使君乳若漕撫奈何奪我荆君於是州邑民葛天祈等伏闕呼籲又持牘訴長安諸貴公引問之則交口頌諸貴公感動曰嗟乎民戀四月守如此夫則直指徐公又上疏大約言荆太守某天下才其守制狀如某某某即列漢牘中當第一今以胥役小過去之失百姓心惟陛下持域外之觀為元元計亟賜某環必大效於是鈇益慙復上書構府君且自引臣即不能格一守何伈俔居吏民上書達冡宰兩難之既而曰司徒鋌而走矣寧全重臣覆鈇是然府君意自得歸奉王父盤跚山水洒洒然客有怨鈇者輒笑解之非禇公儂那得一日萊舞君則宜為儂德褚公客益服雅量焉居歲餘詔求異材堪受閫外鉞將百萬徤兒者臺省以府君名上而播事方益熾重慶需守時冡宰及諸大僚急推轂府君揚言曰夫夫曾䇿播矣如觀火守疇過夫夫者而主爵郎為朱公敬循於府君同里閈㜕也引嫌焉而曰誰復能古人我矣遂止府君聞而更德之曰愛我哉巳亥丁王父艱府君年已五十餘猶日夜孺子泣仡仡封樹之坏沙拳石皆出十指葢府君於此惻惻風木也無動色毛檄理而南北言者及浙撫按大吏薦剡滿篋單詞合詞歲無慮十餘上顧府君卒無有赫蹏及都門貴人者辛丑歲府君家食已七年而山隂朱文懿公賡由宗伯大拜起田間行矣府君以其子吏部㜕肅野人服送之且祝之曰公自愛愛我必如吏部君慎毋露憐才半齒落野人事文懿傴躬謝而于于東山者又六年於是信州楊公時喬以少宰典銓局矣其於府君賢素瞭㑹有詔起溝中瘠固矜慎之則探尺籍疏名賢若而軰諏海内焉凡三年報牘上他姓字褒彈半出至府君則人人褒識之如絫規然丁未遂疏起府君瓊州荷俞㫖時璐嫡母曹㳟人新逝而璐猶舞象童府君雅不欲出曰家孽如此誰潦倒支蠻烟瘴雨者因上疏辭不允銓部且促駕急不得已驅車就道然猶次且歲餘也丁未冬抵瓊瓊濱黎既海颶地震益樸簌而窶至茅葺廨民居截竹為楹椽泥蔗葉為瓦又郡缺守八年法弛民輒玩比府君至而百廢具興矣俗喜告訐民練衣必綴苟不綴其猾兒以為其家富必求端彈抄之所持牒株引多百餘人逺弗集也捕先得者姑不就鞫而纍久而死者十六七府君憐之著為令誣者倍所坐凡牒子不得過五人又出先繫囚數百如驅笠中豚者郡伍百捧檄如虎又傅翼焉所至箝掠民鈞矢未入家已蕩府君悉停伍百所欲召以屬一老胥即無不束身請者曰今即死不猶愈破家死乎時黎數千人譟當事大治兵府君為當事言渠蹲䑕耳童子投礫焉而跳且嚙也烏知叛情無巳一小創之則授畧幕帥某如吾指當勝帥如指往果勝隨檄之曰止哉弗縱掠也歸乃益布威德黎大悦且震蛾伏郡堦請焉邏者獲舶數十商也而上之幕帥又上之制撫曰賊也固不勝自功乃移檄府君不容口府君曰商而賊矣疇功乎為具狀申救甚力制撫慙而釋之活數百人有其媵私奴覺而斧驅之奴則反格而傷其脰也既難口之而浮引以鳴曰盜府君以屬令令顧得盜四十人并呈所殺人械既八十日而曰血濡械滛滛也府君曰寧八十日而血濡械滛滛者哉引讞之展轉得奴姦狀四十人果非盜悉縱遣之歲大旱屬府君病甚使其倅暴巫不雨既私念即死猶當為民請乃牒諸境之神而曰明日太守輿病禱矣神必假我雨三犁出則果大雨不遲晷民以為神郡通海得泉率鹵民故病弗食府君祓而禱諸神别穿地出羙泉焉民德之曰倪公井捐贖􅀈繕敗雉千民又德之曰倪公城葢於是瓊大治粤撫按臣交章推卓異第一上而府君顧已憶湘湖蓴戀戀也當道持不可凡三請三留云先是臺省以他事攻山隂相甚力至是比部某子甲以謁不遂齮焉乃持浙之人十數以及府君曰而私而鄉某某而戚某某焉府君聞之齤然笑曰若疑我以山隂相得官不憶我以江陵相幾失頭耶夫兩家炎孰㷔也乃今顧甚荷勸駕矣緣是請益力㑹當大計葢歲己酉而璐以是秋謬鄉薦云府君歸而曰雞肋即不得煩班頭兀馬長安道我憐汝髫弗解客也當嚮導汝乃擕璐入春明既不復能割寸縑贄京貴人出懷中刺又漫漫落落曰我散人耳比當衡議去留其銓郎悸而曰寧時局是狥曷禠之其冡宰憗而曰寧公議是矜曷縻之于是乃以才不及落三官猶為首䑕其間云當此之時山隂相既葢棺水石漸暴府君里居浙中丞某公直指某公干旄相繼至意諷府君當再出山府君瞪目不答益楗闗著書具丹漆器勘剝古今案如推大獄葢為之廢爐箑飱寢者歲餘自曙手一編扺篝燈不息璐諫之即云樂甚然時稱眼澁神氣日漸耗甲寅秋自武林山水還忽不甘匕箸减餐巳又减巳又大减至啜糜一盂醫數軰罄籠裹不效祈禱四出不效璐兄弟搏頰叩天請身代又不效其始顧猶能策杖門外對客浮白呼盧也于辜月之念二日日南至據榻不能起于嘉平之念四日昏定忽神彩煥發呼璐起掖坐璐全體支府君背瓚􅀈羅侍榻下府君則端坐垂拱如有所對者已顧璐微笑瞑矣天乎痛哉天乎痛哉府君事王父母生死稱至孝居常敬事冡兄洙源公而䕶其季十洲公晉源公備至鞠誨諸從子弗異璐等親族所藉舉火者拯㧞脫縶械者剪拂借羽毛稱冠裳士者凡若而人性不靳施而介一不義物脛而前則面頳咄咄弱冠成進士長安俠某者奇府君貎輦致金玉諸玩好器纍纍府君悉謝不受曰是蠱我也所歴官多郡邑入帑自薪俸外即所謂劉寵之錢胡威之絹無有耳其持論輒得大體有先見治獄多平反他所全活無慮數萬人要其才足辦安成之民饑㑹其城圮府君下令亟繕城人竊議歲則𤯝而又土石祟之如白骨何府君曰吾固以圮城肉白骨也出厫谷如許募民民利得餼無不爭繕城者陴雉巍然而溝者起倅雲間時鎮江大饑當賑十萬户枵以須而所司區畫侜張逾旬不定或欲鑱眉識之而民益騷比直指移府君往乃區賑所十三檄令以下十三員主之即彈指了耳又饑者千人屯東郊外有欲掩扉拒者府君泫然曰將立斃之乎勅司闉聽千人入第盡塞支路留子午衢如矢里設餅􅠑若置郵焉而導之西郊則饑者飽噉躍而出西郊矣于是一時上下皆以為材而其先任事者滋不悦大都府君居官易得譽謗以此也退而老于鄉則喜振貧弱噢孤寡有吳商某徙家來為比隣居既嘗以其子謁府君死而嘬藐孤者蝟起也府君敦敦卵翼之引與璐偕牕燭比成立及冠乃遣歸凡其自持甚嚴偃室值所當言縱郡邑長强愎自豪貴必梗梗起爭之邑人盜伍百持漁者十餘固蚩氓也已先懾伍百即不復能置一詞於令府君聞而跣見令白寃狀令驚釋之即請何法獲真盜授策焉數日果獲盜令謝言泉湧漁者至今俎豆府君云府君于家國務無所不腹畫元璐夜必侍府君飲府君飲必教元璐一事凡聽其言策㓂如提嬰策邊堡如布籬壁策兵事通曉諸脱兎環龜法如捽蟻解甘石家言策天如斗如錢孔如相掌文種駒俵如畜薄中蠶河如瀦策銓計如概如廢置家監倣金城畧策屯鹺開中策銅楮榆杏交子如列眉策内外曹藩臬州郡縣如五指頓裘爬梳之如搔肌疥而纎至于鞭杖履屐醑粲醯滷之屬亦各有部署不率爾置之未嘗解目語額瞬而談人意中了了如曼倩猜郭舍人謎射上林棗無遁情者資頴慧一目數行下即食頃裁百牘判數十紙如風雨十吏不足供于衆氏靡所不闚尤篤好易春秋史漢老莊管韓綱目等書讀書腹無留疑所不解必解篇詗章索盡萬籖如捜逋賊相字句别結眼藏所褒彈換千古啼笑不作矮子觀於訓詁言未嘗存兩是文宗漢詩宗盛唐字宗晉皆足以沾丐作者所著有船政新書經濟管窺理學度針保民更化録閒閒堂㑹心錄星㑹樓集碧山吟初府君甲戌釋褐出東阿于文定公之門志節葢與趙公南星相伯仲遂道義締結而鄒公元標則患難交也既又同官駕部晨夕過從互相劘切故府君自言吾生平學問得夢白南臯之助居多每教朂璐輩但不自甘為庸衆人即是做聖賢地歩恢而為事功奮而為節義亦各随其所遇以自見若齪齪于富貴望三公九卿如登天則志趣日下矣嗟乎此數言者非立志之針砭守身之藥石乎所取士如劉君孔當鄒君德泳蔡君獻臣謝君應祥王君應乾周君懋相言君爾行郭君煒周君獻臣等皆一時知名府君少壯眉目姣好如畫五十豐頤層頷嘗手鑑自藻曰此庸不當耄耋耶而纔享年六十有六天乎痛哉卒之先一夜夢赭衣員數百騶斾鎧仗如林肅冠一袍一輿一促駕去云當授顯職覺而光摇摇在目也府君居恒自言曰死當為神豈其騐與不孝元璐等將以明年丙辰秋八月奉府君暨曹恭人合𦵏于上虞白馬湖之岡穴坐乾面㢲東䕶王父母塋如拱葢府君生時所自卜定而命元璐曰必𦵏我是吾魂魄猶從吾父母也元璐故痛勿敢違則又手狀徼惠下執事既椎甚無能哆一言而當世所㖀㖀府君者如留京司馬門石江右復古院誌直道編劉氏䘏忠錄諸所載船政及江陵劉御史事如指掌夫其人自為乘豈餙説私好哉若乃生平軼行尚有元璐不能知而海内名公知之者倘不秘如椽餉隻字潤冡中枯先大夫死且不朽即元璐軰一旦蓐螻蟻其以是對先大夫矣亦死且不朽倪文貞集巻十三
