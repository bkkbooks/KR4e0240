body:
  text: 倪文貞奏疏巻一明倪元璐撰首論國是疏奏為世界已清而方隅未化邪氛已息而正氣未伸謹瀝愚忱仰祈聖鑒事臣聞持世不平則隂陽之戰起論人失實則舉措之道乖頃者宗社之靈篤生陛下生知濟以學問乾健妙乎從容大奸霆驅徽猷飈發天如再闢人等更生生平以堯舜為極軌今乃知有過之者臣非敢為佞也臣又仰窺聖人無我深嫌門户之名㢲命重申動以人才為念純王之心較然天下矣然而皇衷自著其公虚廷議猶存乎我見臣竊惑焉臣以典試復命入都從邸抄見諸章奏凡攻崔魏者必引東林為並案一則曰邪黨再則曰邪黨夫以東林諸臣為邪人黨人將復以何名加崔魏之輩崔魏而既邪黨矣向之首劾忠賢重論呈秀者又邪黨乎哉以臣虚中之心合之事後之論東林則亦天下之材藪也其所宗主者大都稟清剛之操而或繩人過刻樹高明之幟而或持論太深謂之非中行則可謂之非狂狷則不可也東林所引用者每多氣魄之儔才幹之傑其間不無非類要亦可指數而盡耳而其中則又有泊然無營翛然自逺謝華膴其若脱付黜陟於不聞而徒以聲氣心期遙相推奬此其人尤所謂澹泊寧靜之君子也今而曰邪黨則無不邪黨者矣且天下之議論毋涉假借而尤不可不歸於名義士人之行已毋存矯激而尤不可不準諸廉隅自後之君子以假借矯激深咎前人於是彪虎之徒公然起而背叛名義毁裂廉隅矣甚而連篇頌徳匝地生祠矣夫頌徳不已必將勸進生祠不已必且呼嵩而人猶寛之曰無可奈何不得不然耳嗟乎充一無可奈何不得不然之心又將何所不至哉議者能以忠厚之心曲原此輩而獨持已甚之論苛責吾徒亦所謂悖也今大獄之後湯火僅存如西江西秦三呉三楚之間什九名賢半皆豪傑叅之理數決無沈埋況奉恩綸屢俾酌用而近者任事諸臣猶欲以道學封疆四字持為鐵案雖或薄從湔袚未肯力引同升推原諸臣之心或亦深防報復之事而臣以為此過計也水落石出正人相見總為崔魏之異已即可化牛李為同心況年來之借東林以媚崔魏者其人自敗即不需東林報復若其不附崔魏又能攻而去之者其人既已喬嶽矣雖百東林烏能報復之哉事理甚明迷者不悟臣所謂方隅未化者此也臣又從邸抄伏讀聖㫖有韓爌清忠有執朕所鑒知之論深仰天聰曠然知人則哲如此而近聞廷臣之議殊有異同可為大怪爌之相業光偉他不具論即如紅丸議起舉國沸騰當時任事大臣並皆縮朒緘黙而爌獨侃侃條揭明其不然夫孫慎行君子也爌且不附況他人乎迨權奸表裏逆焰大張爌以申救抵觸岸然投劾讀其陛辭三疏字字秋霜一時以為宼萊復生趙鼎再出而今推轂不及點灼橫加則徒以其票擬熊廷弼一事耳夫廷弼罪固當誅在爌則不為無説封疆失事纍纍有徒而當時議者乃欲獨殺一廷弼豈平論哉此爌之所以閣筆也然究竟廷弼不死於封疆而死於局面不死於法吏而死於奸璫則又不可謂後人能殺廷弼而爌獨不能殺之也又如詞臣文震孟正學彊骨有古大臣之器鄉人月旦比於陳實王烈迨夫三月居官昌言獲罪人又以方之羅倫舒芬與臣同年同官儕輩憚其方嚴不敢以鴈行相畜而當其去國飄然聳身天際有臣如此自堪千古而今起用之㫖再下謬悠之譚不已豈以數十年前有其兄文從龍不逞之事乎夫人知有從龍以為之兄而不知有文徵明文彭之至徳特行以為之祖父且賢愚相越舜象已然世不聞桞下惠膺盜跖之誅司馬牛受向魋之罰震孟何罪遭此嫌譏將無門户二字不可重提聊用更端以相遮抑耶臣所謂正氣未伸者此也總之臣之論東林不主調停而主别白臣之論韓爌文震孟不爭二臣之用舎而爭一朝之是非伏乞陛下以臣此説申諭諸臣凡於持局用人之際俱不當存形骸芥蔕之心要本公虚以消偏黨其韓爌雖廷論未屬而早奉鑒知之㫖何難特命召還文震孟雖諭㫖已頒而既來不簡之言尚冀温文奬雪於以破方隅而伸正直之氣道無出此者矣抑臣又思故憲臣鄒元標業䝉明㫖優䘏矣而易名之典似當一併舉行元標之理學宗王文成而鯁直類海忠介宜令該部於二臣之間取衷二字以旌儒碩至於海内講學書院凡經逆璫矯㫖拆毁者並宜令其葺復葢書院生祠相為勝負生祠毁書院豈不當復哉臣草疏畢又竊念部臣王守履以進言之急而犯失儀之條陛下慨納其言而薄鐫其級仰見陛下造就人才之心甚曲而厚也然時經三月懲創已深履端更新萬靈共躍倘䝉矜宥召復原官則聖度極於如天而朝儀亦因之愈肅矣臣無任悚仄待命之至崇禎元年正月初五日具題奉㫖朕屢㫖起廢務秉虚公酌量議用有何方隅未化正氣未伸這所奏不當各處書院不許倡言創復以滋紛擾王守履混亂朝儀業經薄罰豈容薦舉市恩該部知道駁楊侍御疏奏為微臣平心入告臺臣我見未除謹再疏申明以祈聖鑒以質公論事頃臣不揣固陋冒陳世界已清一疏臣原為臺臣楊維垣而發也特以意存微諷語似含糊致䝉陛下責臣以不當臣方惕息省愆措躬無地既又恭繹聖㫖務秉公虚一言非特教戒臣愚實足驚醒羣寐維垣正人自負度其必無怙心乃接邸報見維垣有詞臣持論甚謬一疏辨難臣言甚力則臣請先明前疏之意而後及維垣之所難臣者可乎夫臣之於維垣非敢苛求之也誠以維垣能乗陛下之明斷繼楊所修後而直糾罪樞又改鹺差而佐察荷陛下之重任則凡一切轉移世局攬羣材而遊大道者非維垣誰望乃臣竊讀維垣入告諸疏則深訝其不能仰副聖心且若相反然者葢陛下之論一則曰分别門户已非治徵一則曰化異為同一則曰天下為公而維垣之言則曰孫黨趙黨熊黨鄒黨陛下之於韓爌文震孟曰清忠有執曰已著起用而維垣於爌震孟曰非賢曰不簡是陛下之於方隅無所不化而維垣之於方隅實有未化陛下之於正氣無所不伸而維垣之於正氣實有未伸陛下事事公虚而維垣言言我見臣於是深懼維垣以城府之心坐隳成績所以冒昧有言葢為陛下攄啓沃者微而為維垣效忠告者大不圖維垣之以臣為甚謬也據維垣怪臣盛稱東林葢以東林之尊李三才而護熊廷弼也然亦知東林中有首叅魏忠賢二十四罪之楊璉及提問崔呈秀欲追賍擬戍之髙攀龍乎且當時之議其於三才特推其揮霍之畧而未嘗不指之為貪於廷弼特未即西市之誅而未嘗不坐之以辟則猶未為失論失刑也若以今日之事言之以魏忠賢之窮兇極惡積臟無算而維垣猶且尊稱之曰厰臣公厰臣不愛錢厰臣為國為民而何況李三才以五虎五彪之交結近侍律當處斬法司奉有嚴綸初擬止於削奪豈不亦驕兒護之而維垣身係言官不聞駁正又何尤於昔人之護廷弼者乎而以臣為謬臣不受也維垣又怪臣盛稱韓爌夫舎爌昭然抵觸逆璫及抗疏嬰禍之蹟而加以説情㒺利莫須有之言已為非論矣即如廷弼一事爌特票免一梟未嘗赦而欲用之也至廷弼行賄之説自是逆璫借為楊左諸人追贓地耳逆璫初擬用移宫一案殺楊左諸人及獄上而以為難於坐贓於是再傳覆訊改為封疆之案派贓毒比此天下共知者維垣奈何尚守是説乎至不附紅丸與孫慎行君子之説臣言原非矛盾葢慎行清望較與王之寀不同議雖刻深亦不失春秋書趙盾之法使後之人加慎焉可耳夫董狐不為賈直趙盾亦未嘗貶賢而以臣為謬臣不受也維垣又怪臣盛稱文震孟夫震孟臣不更論即如王紀清正著稱臣不知其與寃死之周朝瑞寃戍之惠世揚踪跡何如而但知其以叅沈㴶忤逆璫而譴斥震孟則以薦王紀而降削葢均之得罪於逆璫者也至以破帽策驢傲蟒玉馳驛此説何可全非夫刑賞出於朝廷而榮辱因之若王紀之時已半是魏忠賢之刑賞矣維垣試觀數年來破帽策驢之輩較之超階躐級之儔誰為榮辱不特此也宫保蟒玉之劉詔何如桎梏械縶之耿如杞自此義不明於是畏破帽策驢者遂相率而為頌徳生祠希蟒玉馳驛者遂呼父呼九千嵗而不顧可勝歎哉至如批照告公祖之謗呉人盡能辯之葢當朱童䝉吏呉時責斃寃犯其妻貧不能斂乞丐里中震孟從衆題助二金事止此耳有何把持放肆而以臣為謬臣不受也維垣又怪臣盛稱鄒元標夫元標之為兩截人者以其前半峭直後半寛和耳若詆之為要錢多藏則又是厰臣不愛錢之轉語臣決不敢奉命也故謂都門聚講非宜則可謂元標講學有他腸必不可謂聚講之徒不盡端人則可謂聚講之意或出邪謀必不可且當日逆璫之所以驅逐講學諸人而拆毁書院者其意正欲以箝學士大夫之口而恣其無所不為之心自元標以偽學見驅而逆璫遂以真儒自命學宫之席儼然揖先聖為平交使講學諸人而在豈遂至此哉若臣易名之議擬人以倫王文成武以濟文而元標匡攘之能或遜海忠介直而微隘而元標寛大之度更優此為定論而以臣為謬臣不受也維垣又極力洗發臣矯激假借四字夫臣之此言正為人之詆真狂狷為假名義者發也當崔魏之世人皆任真率性為頌徳生祠使有一人矯激假借而不頌不祠豈不猶賴此人哉臣固非有取於假借亦非謂東林賢者之於名義盡屬假借也東林已故及被難諸賢自鄒元標王紀高攀龍楊璉之外又如顧憲成馮從吾陳大綬周順昌魏大忠周起元周宗建等之為真理學真氣節真清操真吏治戍遣如趙南星之真骨力真擔當其餘被廢諸臣臣不敢疏名以冒薦舉之嫌而其間之為真名賢真豪傑者多有其人豈有所矯激假借而然哉維垣認臣抑揚之詞為一成之論而曰臣大謬臣益不受也乃若維垣之論臣心所未安者有三維垣以為真小人待其貫滿可攻而去之而臣以為非計也必待小人之貫滿而已不知壊天下多少世界殺天下多少正人雖攻而去之不亦晚乎即如崔魏之貫滿久矣使不遇聖明御極亦誰有能攻而去之者乎維垣到底以無可奈何之時為頌徳生祠解嘲而臣以為非訓也假令崔呈秀一人舞蹈稱臣於逆璫其餘諸臣便亦以為不可異同而盡舞蹈稱臣乎又令逆璫以兵刼諸臣使從叛逆諸臣便亦畏而從之以為適值無可奈何之時乎維垣又言今日之忠直不當以崔魏為對案臣謂正當以崔魏為對案也夫人意見不同議論偶異總不足以定貞邪如宋臣蘇軾之與程頤交詆為邪而兩人並自千古我朝大禮之爭論者亦兩賢之惟至品節大閑一失遂分霄壤夫品節試之於崔魏而定矣故有東林之人為崔魏所恨其抵觸畏其才望而必欲殺之逐之者此正人也有攻東林之人雖為崔魏之所借而勁節不阿或逐或逺者此亦正人也以崔魏定邪正譬之以鏡别妍媸維垣不取案於此而别為中途温解之喻將無不東不西半補半下之間又即維垣所稱鄉愿之屬乎至云東林二字不當復言臣深服維垣無我然請維垣胷中不存四黨之見臣亦絶口不復標東林之目矣總之東林之取憎於逆璫獨深受禍獨酷在今日當曲原其高明之槩不當毛舉其纖寸之瑕而揭揭焉徒予逆璫以首功反代逆璫而分謗斯亦不善立論者矣人材不可不惜我見不可不除衆鬱不可不宣羣議不可不集堯舜之主必不可負英雄之績必不可隳忠告善道之言必不可指為生心害政之説願維垣之熟計之也若臣鄉中之賢者亮節平心臣雖未嘗與謀度不以臣言為謬而區區胡煥猷臣何至拾其唾餘哉然而下士一言偶合豈必盡廢而反之古人有師馬師蟻者惟是魏忠賢之餘論崔呈秀之故智則必不可奉以為經守之不失耳臣以維垣持議愈乖不得不再剖析要於就事言事此外雖有見聞不敢旁叅一語惟聖明裁察崇禎元年正月二十四日具題奉㫖朕總攬人才一秉虚公諸臣亦宜消融意見不得互相詆訾至於宣衆鬱集羣議惟在起廢一節已下所司著銓臣咨訪的確具奏該部知道請燬要典疏奏為公議自存私書當燬敬陳膚見以襄蕩平之治事臣觀梃擊紅丸移宫之三議閧於清流而三朝要典之一書成於逆豎其議本可兼行而其書則當速燬者請詳其説葢當事起議興盈庭互訟主挺擊者力護東宫爭梃擊者計安神祖主紅丸者仗義之言爭紅丸者原情之論主移宫者弭變於幾先爭移宫者持平於事後六者各有其是不可偏非總在逆璫未用之先羣小未升之日雖甚水火不害壎箎此一局也既而楊漣二十四罪之疏發魏廣微此輩門戸之説興於是逆璫殺人則借三案羣小求富貴則又借三案經此二借而三案之面目全非矣故凡推慈歸孝於先皇正其頌徳稱功於義父又一局也網已密而猶疑有遺鱗勢極重而或憂其翻局於是崔魏諸奸乃始創立私編標題要典以之批根今日則衆正之黨碑以之免死他年即上公之鐵券又一局也由此而觀三案者天下之公議要典者魏氏之私書三案自三案要典自要典今為金石不刋之論者誠未深思若夫翻即紛囂改亦多事以臣所見惟有燬之而已夫以閹豎之權屈役史臣之筆亘古未聞當燬一未易代而有編年不直書而加論斷若云彷彿明倫規模大典則是魏忠賢欲與肅皇帝爭聖崔呈秀可與張孚敬比賢悖逆非倫當燬二矯誣先帝偽撰宸篇既不可比司馬光資治通鑑之書亦不得援宋神宗手製序文為例假竊誣妄當燬三又況史局將開館鈔具備七載非難稽之世實録有本等之書何事留此駢枝供人唾詈當燬四故臣謂此書至今日不燬必有受其累者非主三案者之累而爭三案者之累抑又纂修三案者之累也何也爭三案諸臣其品原分三等下者如崔呈秀劉志選李春曄等之附和希寵不足問矣最上莫如黃克纘賈繼春王業浩高宏圖劉廷宣等始處君子而不必求同既遇小人而自能為異本末炳然雖有忮者莫或能加之也然而管華之席未割老韓之傳同編在數臣高明之觀豈不引為坐塗之辱若其次焉者雖非盡有撑持要亦不皆濡染而特以史氏抑揚之過保不為後人翻駁之端至於纂修詞臣之在當日則更有難焉者丹鉛未下斧鑊先懸姜逢元閣筆一歎朝聞夕逐矣楊世芳呉士元余煌等備竭調維其於忤璫諸疏有匿其全文者有删其已甚者時傳書成而獄又起則有寧加醜詆之辭而決不肯下一不道無將等字面以傅㑹爰書者凡此苦心亦多方矣而事在見聞之外未易可明彈章一加萬節俱喪諸若此者皆臣之所謂累也累之不已元氣又必大傷當今正氣日伸方隅漸化自應進其平飲沃以温湯倘復尅伐不休正恐清寧無日然而逆璫之遺蹟一日不湮則公正之憤心千年不釋也伏願陛下勅下該部立將三朝要典鋟存書板盡行燬焚仍命閣臣擇期開館纂修天啓七年實録而又命纂修詞臣捐化成心編摹信史凡關三案之事必執兩端之中而又命三案中賜環諸臣各以聖明御極為再生之年勿以恩怨橫胷理前身之業至於一切妖言市語如舊傳㸃將之謠新騰選佛之説毋許妄形奏牘橫起風波則廓然蕩平偕於大道矣臣向以是非之心言是非今以史臣言史統關大計伏惟聖斷施行崇禎元年四月二十五日具題奉㫖覽奏三案兩端之議原當並存但已有實録自不必復增要典且既説史臣編摹苦心則其論斷之難於傳信在史臣亦自念之這所請關係重大著禮部㑹史館諸臣詳議具奏聽朕獨斷行熹廟實録著擇期開館纂修務以平心存其兩是餘諸臣亦各宜和衷共濟這疏持論虚平有裨新政該部知道倪文貞奏疏巻一
