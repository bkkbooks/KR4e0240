body:
  text: 倪文貞集卷十九續編二明倪元璐撰書牘與楊武陵相國嗣昌自神廟中江陵相以健敗後之執政者隂擅其柄而陽避其名於是乎以瞶眊為老成以頑鈍為謹慎以隂柔為和平以肉食素餐為鎮定一切疆事朝事置之度外而日與傳燈護法之流彌縫補苴以固其富貴老先生未入綸扉即毅然以名宰相自任海內翹首治平喁喁然有救時之望然某竊有所質於左右者今天下之勢兵與餉二者而已兵不能戰而日以索餉為事餉不能給而因以加泒為䇿自古及今無驟加二百餘十萬之賦而民力不困者某固謂足餉之道只在清兵而已老先生剔釐整頓之方所當與計樞二部通盤合謀者籌之有素而某輒條數議冀以葑菲見采世或有鉗我於言者惟垂察幸甚寄錢麟武相國象坤自十年來聞見所及帝賚之良進退出處之正未有如老先生者也顧老先生所持者正已之事而救時之道原未盡此今之所謂救時者非必有才也遊光揚聲以為才詎不悖歟盜賊滿天下為李綱趙鼎則必求嶽飛韓世忠之將而用之庶足以辦賊某倀倀無之動釘世眼小需秋爽決䇿拂衣耳復張中丞延登甲戌日讀大疏激切詳盡使聖主動色蠲恤之文下如流水仁言利溥信矣此後事宜亦惟留神極慮求其萬全大都海寇之來必有內導巨浸之後必有大荒南顧維桑言之色變耳寇禍蔓於秦豫當局者𠞰撫俱失其宜侏儒既飽金門之粟豈可竟置身于官守言責之外不得其職則去秋風一起定當為蓴鱸歸眺台光于兩髙三竺之間也與蕭郡伯震下里遂為魚鱉非老公祖恤災設竒平糴定亂則周餘黎民靡有孑遺矣善後之計知無餘籌谷虛下詢彌見憂勤至意今日之事在民情以蠲賑為急劑而欲奪羽檄之資既恐不能得之於上在地利以築塘為首功而計徴畚鍤之費又恐不能得之於民誠為大難是在神明其用耳與胡大行麒生庚辰鵬奮以來吾道生色迹其致用方將彪炳千秋豈特為世間達官巨卿已耶不佞鬋髳最微臃腫已廢而君國之念有不忍一日釋者惟奉蘭心竊欣榆意髙文精微特達一時無厹山居憿慁讀未見書並用鼓舞矣草率附謝答蕭令君琦庚辰本不以一髙第動色吾韓若然而三立之事正以是為階者立功不須言即改學究而靜進取則立德立言亦從此始也今民窮盜起急需良有司休養生息之雄州諸蠻所窺天下多事雞蟲皆有躍馬之心犢牛刀劍韓若當不讓古人專美於前所謂金湯道存保障耳僕明農將母已畢餘生乃歲且洊飢洶洶如處崩濤所謂先天下之憂而憂者非徒憂也將有所以救之者也然則山林之樂豈今日所敢輕言哉忽承使問感此夢尋衣帶錢江望猶河漢耳附復不宣與從兄三蘭元珙役旋知涖任之期攬轡澄清此其時矣夫繡衣整飭官方首以奬亷懲貪為義第豸臺者百城之圭臬必先自處於潔清無欲之地而後可以激濁揚清轉貪頑之固習且察吏亦非徒貪墨之謂也周官六計弊羣吏曰廉善曰亷能曰亷辨蓋守令號稱牧民其大要在於鋤抑豪強字養小弱爬騷地方之利病鈎稽胥史之巧猾舍此不能則或庸愞而託於朴誠捷給而託於幹辦皆足以貽誤民生兄試平心察之分别黑白貯之夾袋上之封事則風勵所及其有益於吏治也多矣江右土瘠而俗淳足以興起教化要使匡峯鄱渚間有以神慈頌者斯則儒者救世之雄業不負所學耳與仲弟獻汝元瓚近事如中使四出撫鎮失人要皆可憂可歎之事欲哭則近於婦人徒有氣塞耳同門黃石齋馮鄴仙真皆鐵漢而吾容與其間鮮所表見然已蛙腹脹破可奈何哉外寄劉念老一札并奏稿二篇此老為當今第一人物弟可時往請教執弟子禮勿以其道學先生迂而逺之也其二白雲親舍有母之尸饔求歸之心真如籠鳥欲出不能息也既泒承日講初以不能歸省為苦今思此真儒臣陳善責難之會矢當竭慮納牗寧使觸諱蒙譴必不敢依樣從事昨泒講省刑罰薄稅斂數節正今日對針藥石吾節取時事細為發揮而中堂發刪發改堅拒而止平章如此真可笑歎吾自惟人臣致君無有大小但使乘時隨事畢竭愚忱盡心之謂忠不欺之謂誠儒臣之業已效自是乞身歸養斑衣取娛長為農夫豈有憾恨乎其三南雍已擬三月竟得北鱣舞膝在目忽復奪之中酒下第不足喻此情懷自政府以及親知無不勸我迎養吾心大動不可遏止母親之壯健朝紳莫不知之帝京上國母親亦豈可少此觀光弟幸為我預籌勿拘勿執當設身處地即如吾通籍十四年妻孥聚首而將母無聞天各一方過此以往歸計尚未可知吾口口節義反踈承歡以此惴恐夢寐不寧只此板輿非有艱難其諸一切但得母親一個肯字吾自有安頓部署之法家中塗中總易易耳其四自五六歲時出就外傅即讀四子五經之書所謂學也講學者發揮其義理而已博學審問慎思明辨講學之法也幼而學壯而行講學之功也祖孔孟而宗程朱學如是是亦足矣倘或以此為老生常談而别尋議論雄鋒鋭筆移日分夜以成書者約略如襌燈語録正恐論語半部孟子一篇尚未能身體力行是其所講者不過秀才家帖括伎倆耳弟輩試思吾言則知誦聖賢之言行聖賢之行弗於正路中又生岐路也與浙中丞暨鹽使者辛巳辱承函教深欽海谷之誠老公祖搖山撼嶽所至風清不能躋堂稱賀惟望風雀踴而已竊有請者敝浙連歲竒荒而杭湖紹尤甚斗米至六百錢積殣相望此三百年所未有之災不知前此兩臺曾繪圗以告否若猶未也則祖臺今日之事矣當此度支告匱之日請蠲不得尚可緩征即僅緩征而德音既章所司亦暫戢追呼之吏俾民得專力東作以待有秋或先得明諭遍告有司使知所重在民而不在賦在有司不過為吾民受一二月參罰耳古人矯詔發倉今即矯詔緩征何不可乎南北異勢各從其極為言今日東南之勢極矣極則必變不得以西北斗米一金人相食為比也萬惟仁人亟圗之與鄭臬副瑄辛巳頃會集各坊司賑諸生商榷良久俱以官厰煮粥為甚便蓋平糴則分毫無利即科餘米給賑亦不過人米數升一二而盡耳惟煮粥則食惠既贏而延度又久救民喘而定民志莫善於此至於給米宜合算兩縣飢户照口均分今察山隂飢口僅一萬八千會稽多至二萬四千而米數乃照縣中分非平也乞下郡邑亟行改正與王郡伯孫蘭辛巳昨相率蛾叩蓬萊未獲面展縷縷車騎過又失迎為歉也粥示一頒羣情大定矣惟聞官米用過一千五百石山隂又增飢口行商又求量寬如此則米愈少恐不能足五十日之數昨道臺以為溫米榖至便有接濟倘不時至則奈何又各坊公私諸賑全得諸生之力往來奔命亦既勞止矣至於粥厰尤為繁瑣冀得溫文鼓舞使之樂善不倦則士心益奮耳伏希台裁其二敬承德意密訪得各學城居極貧諸生共九十餘人法取精嚴汰之又汰矣義舉仁聲所不可失如銀兩未敷或以台米之先至者為之亦可也風似稍泄懼有陳乞者幸即出示定之大意云照得年荒救飢宜先救士本府確訪得各學城居諸生某等共若干名中多才士好修貧困特甚誠不忍其飢餓吾土地也特率僚屬各捐微俸量行資助自四月至于七月分為三期每期給銀一兩二錢五日前示至期齊赴府堂候本府親自給散周之固可受也或有未盡以需續訪惟不許諸生自言凡具呈陳乞者一概不準行在士之自處宜有體節耳今將各生姓名開列于後與同年祁世培彪佳辛巳米盡而大飢又至宜諸老之皇皇也弟適病瘍不能遣步昨陳天若兄到榻前面商其條欵精詳多可採行惟年翁廣咨獨斷行之適見余武老公函甚妙誠得道臺蚤回以通官糴禁私販為兩盡之謀所禁之地海口為急江干次之所以禁之之法以有濟無害為主事固不容遲耳與同郡司賑諸生辛巳適聞彚齊送府之説在鄉紳五位中已有齟齬者想不訛耳總是此説大不通募助銀米何能一時奔赴在本坊逐期給散尚可零延湊補或將糶入銀兩應手翻騰若欲一日取齊萬不可得之數如此雖十年不得決䇿索我衆於枯魚之肆耳鄙意不如急發各坊開賑之示而以各坊現在之米先給之徑以草二日始事並謀之世培年兄立示為望其二别後夜熱解衣取涼感風困甚今旦才汗出頭猶岑岑也枕上見尊示不及報坊各歸坊之議千聖不能易有何沸騰不可乎今必須彚齊送府均泒散給不知彚送何時得齊散給何時得及枵腹引領不可泄泄也凡議論之無弊者須見到即行至諸兄分任賑務倍極辛勤博施濟衆之舉在今日行於一鄉他日宰天下亦當如是想黽勉從事不敢告勞耳其三許時不晤風道俱墮也米價不減外饋不至貧富俱盡道饉日出雖或二麥將秋寧可恃乎無可奈何創為一命浮圗之會私意操約而功廣無如此者城中行之半月微有條緒冀得遍之鄉都台兄幸與同心細切謀之隨方化導必有應者吾􅒰非圗福德盡心焉爾已其詳祈覽册可得伏冀留意族議照得米價日騰救荒無竒頃蒙縣父母德意勤賑欲令里各賑里年各管年因思本族飢户原已不少即具公書以族自賑族之説報之矣此有二説一則不欲使本族貧者受賑於他人二亦不欲使本族殷者報名于官府誠兩護之䇿也然又恐我族殷户因此遂不關心今議除兩宦户捐賑之外自三月初四為始至麥熟而止族中有田若干畝以上者各隨田畝多少分等捐輸半月二賑每賑每口米五升或銀二錢單到各自公平題認倘有吝抗者衆共罰之仍以富户報官此白與上虞周令君銓壬午米價不減而土廩俱盡憂如之何比以歸掃松楸小留祖舍導宣德意捐俸倡賑為里各管里年各管年之計惟是寒門兄弟以遷居會稽附甲無所歸著而寒族又什八貧困堪充賑户者不過賤兄弟兩門耳今議以本族自賑本族不敢以煩他人而凡他族之富貧相等者俱可倣而為之若其族之富多貧少者則責其兼賑他姓零處雜居不成姓族者則責諸其里之富户是在里長公虛確察庶不有辜鳩鵠耳又有啓者亂民搶掠一案先之以威嚴繼之以寬大仇扳必塞牽纍必禁可謂􅋵縱得宜之甚而比聞四鄉尤有小騷者似由一二舊案偶稽結證而地棍因之以嚇挾差役因之以索擾皆望台丈悉行湔除以示與民更始之意則懷德而畏威者愈大條示宜亟章之庶使窮谷皆知而姦人無所容其鬼蜮耳其二頃者五都飢民數十人以富户失賑哀籲道臺并告急于治某時聞道臺微信其言有怒富户之色而老母五都人也治某乃急作調停私立勸册一本老母捐助三十金為倡傳募諸家諸家固多好義册到便俱欣然隨力捐賑不五日事竣而道臺之牌始下治某身與其事斯為實録富户飢民誠兩無可求者也台兄報繳之詞亦惟盛奬富户樂施計不旋踵之義而曲原飢民歸命語不擇音之情斯為兩平矣與于太守頴壬午海寇颷發實敝郡有剝膚之慮上有龔次公可無患也惟是敝郡往者每有無賴之徒其非挾貨泛洋與倭為市即下海入寇夥抄行劫歸則仍是客耳甚有陽投名勢家為僕而陰結大盜橫行他邑吏不能問即其主亦不能知其為盜者凡此之􅒰實繁有徒今賊來未必非此􅒰為之向導即不然亦當乘機而起敝郡之籓籬惟定海使賊得越此而西則餘姚之臨山上虞之謝塘山會瀝海三江之間處處皆賊所及孫恩之亂在彈指間也惟老公祖留意倪文貞集卷十九
