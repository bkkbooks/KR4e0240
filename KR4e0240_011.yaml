body:
  text: 倪文貞集卷十一明倪元璐撰行狀贈太子少保都察院右副都御史浮丘左公行狀當天啓之世之稱楊左猶漢曰李杜也楊公左公相倚為義亦若鶼蛩駏虛然矣光皇帝彌留選侍李希封后不得及帝升遐哲皇帝即位既六日而選侍猶嵎負乾清乾清者上及后所居宫選侍以上幼沖欲矯遺命正位垂簾母天下廷臣皆憂之於是楊公為給事中左公為御史相與謀曰苟以驪姬良娣而攬雉瞾之權禍豈止於歸胙寶鞍人彘房州已乎於是左公先上疏力請移宫大略云內庭有乾清猶外庭有皇極惟皇上御天皇后配天乃得居之今大行皇帝賓天選侍非毋儼居正宫而殿下乃居慈慶不得致哀几筵顛倒乖舛不可之大者也疏上楊公繼之遂有旨移選侍仁夀宫而上還乾清中外始大安當此之時以前光皇帝登極詔收召天下名碩充庭盈位銓總佐則趙公南星李公騰芳陳公于庭總憲相繼則鄒公元標孫公瑋高公攀龍總垣則魏公大中總道正協則袁公化中周公宗建考功則鄒公維璉程公國祥並矯志澄清誓言必濟小人挾異議者大懼乃日環謁者監之庭而請焉是時魏璫忠賢怙寵用事而御史崔呈秀憾高公攀龍給事中郭鞏憾周公宗建內閣魏廣微憾魏公大中羣憾倚連摩厲須割其時楊公左公並為御史中丞兩公又相與謀今京貫連串指鹿日甚天下事不可言於是楊公先上疏列忠賢二十四罪左公繼之草三十二斬疏未上而謀泄小人乃竊為忠賢謀矯旨斥楊公左公並為編氓既以逐二公為端於是譴正人無虛日其既盡小人又為忠賢謀置獄如宋同文别立私人為緹帥長四出捕騎首逮楊公左公及魏公大中等時左公居桐詔使至公如遇其素期者容詞間緩而桐民哭且譟又數百人密齎糧欲從公伏闕公果辭之不得至欲自引乃返其時道路為沸聞楊公之出應山也亦然小人乃益忌且懼又為忠賢謀必急殺兩公左公至詔獄坐妄議移宫為首辜吏又詰何以受遼撫及屯吏金公愕不得對既而笑曰誠然獄上飛贓二萬厲刑比追敕五日一具奏既栲掠垂盡乃書絶命詞著茗器中示其弟孝亷光先及子國柱等曰辱極汚極痛極死矣死矣如二親何卒之日長虹亘天里中星隕如斗光煜煜然公既死而外大吏承旨徵贓愈厲公家貧盡籍田廬二十不得一併及昆季宗戚於是太夫人與其伯兄相繼死弟孝亷不敢赴春官危者數矣封大夫且死而蘇卒病痿得禍之酷古未有也而其時楊公同日暴尸廣衢吏籍其家不遺一椽太夫人七十餘至寄居城櫓其明年今天子御籙殛璫及其黨誅竄有差詔褒遺忠贈左公都察院右副都御史再贈太子少保官其一子豫祠諡恩數與楊公等云史元璐曰璫亂戮士至漢建寧明天啓而極然自其所執之言以量其智愚魏忠賢者亦安得比於曹節王甫乎節甫之誣君子曰是將為叛以叛為名掩而殺之其正也今之為詞則以三案三案者注誠震器雪痛鼎湖即如此何宜可罪夫家駭而索賊親死而咎醫者其情也今曰賊不可索醫不當咎是為有罪猶曰是常嚴治其家而孝於其家為可殺也凡此皆小人之誤忠賢小人固亦須讀書也且夫小人既以異議取詘其勢不得不報君子然而昔者君子之待小人逺之而已而今之小人所謂報東門之役者至於掩捕孥戮不已毒乎故為三案之異議者自其持之何必無銖黍之義一倚璫而反失是故今之君子為易辨也若夫篤學貞志正骨孤情霜清電明霆決飈烈即漢膺密未有能如楊公左公者矣三案之立議始於挺擊中於紅丸終於移宫此以楊公左公為後徑三案之承禍始於移宫而挺擊紅丸以類而求之此又以楊公左公為權輿流覽三朝上下五十年之間而不叩樞鍵於楊公左公又烏可謂之能知世務者哉楊公别有傳左公名光斗以生之辰月宿斗故以名字拱之别號浮丘又曰滄嶼生時赤光滿屋九嵗能屬文作粥賦十四作瑞麥賦公父碧衢先生嘗語人曰吾祖難當公以佐唐命封王爵世祀於涇長二公自國初由涇徙桐活桐人無算而近則吾大父及吾父並多隱德宜有顯者其在是兒乎年二十六庚子舉於鄉又八年丁未成進士兩舉皆第十一人天下甚誦其文授官中書舍人久之擢監察御史入臺蹇諤有聲尋奉命視屯公以北人不知水利畏言屯田勝國初倚漕東南至以御酒龍衣求米張士誠今不改謀後將無食乃力請屯田又請倣漢力田科以屯入多寡為殿最使人自為屯又請置屯學設博士弟子員因屯糧制餼詔俱報可於是屯功大興其年入穀數千鍾季年倍之鄒公元標道見之歎曰夫治天下豈不以才哉人苟有才天氣地力皆可得而變也往三十年都人之視藁秸猶扶桑也而今畝棲若此嗟乎當是時神皇帝不豫璫劉朝等矯東宫旨索世廟戚畹絶莊公封還不啓曰尺地皆殿下有今日御史受命巡田安敢以田私進奉乎璫大恨去已又糾巨璫陳登奪子粒為屯蟊當按一時咋舌曰真御史真御史云亡何改督學政奬才絶蹊倣古弓箭社遺意教士習射士皆能挽強於是以爭移宫聲大著遷大理寺丞尋晉少卿又晉左僉都御史履虎得嘻以及於難云公有深識是其力所由生也嘗言元祐去亂法不去亂人此為大錯又言李伯紀爭事不知爭人事失易救人失難回又言近見宫府鉤連魍魎晝現以宵小託婦寺以婦寺起戈矛凝隂感召大亂日生原其本來皆由穢濁故徵人以品徵品以清凡此數言悉徵學問知其擊姦琅琅非由氣激者矣生某年月日卒某年月日先後娶某某子姓男女具詳家乘云巡撫雲南都察院右僉都御史昭自錢公行狀公諱士晉字康侯别號昭自系出武肅元至正間嘉興侯國馮者自臨安郡徙居武塘數傳至柏峯公而盛柏峯公名貞生子吾仁吾仁生忠所公繼科是為公父二子長東閣大學士塞菴先生士升次即公也公年十七補博士弟子員二十四領鄉薦三十七成進士筮授刑部福建司主事出讞三輔轉本部廣西司員外郎擢守大名遷督餉副使晉河南右布政中璫禍歸今天子登極起山東右布政視漕五年拜大中丞鎮撫雲南其明年以勞卒於官當夫顯皇末年穆清高祕天下之慮皆注宫庭一妄男子曰張差者橫梃歘入直犯承華掊格司門聲勢洶厲既衆漸集乃始就擒禁帥以聞傾朝駭震忠計之士詰所由來而彼憸情獨憂投鼠薄乎云爾詭曰風癲曲彌漆炭以遮豫讓淡形圖匕而脫燕丹公在西曹正言嶽嶽豈有鶴禁不如桞樊棓梃得加椎鐵將出時屬同部郎王公之寀就獄推讞公力贊爰書遂章法斷於是給諫何公士晉上疏聲誅國畹摘抉之論指畫畢形意以寶鞍發機烈於歸胙羽翼為力不敵胡巫給諫故常薦公醜徒疑有指授手剡目懾鏑鏃紛如逼脅司勳幾中危法會有大臣持救僅脫於羅其後五年三朝易代凶閹擅國薈蔚朝隮遂乃大治黨人星犁三案楊左六義北寺孔哀别命同文以囊厨俊趙公南星及公數彥南冠即訊周內承辜先是公守大名居鄰璫里時則人賦美新户陳畏壘獨公嚴岸恥與為緣其郡翰林魏廣微蜂目已露公與之素稀款誠及拜白麻彌存淡逺二憾既甚龍亢不回緹帥田爾耕者魏豎之雄倀辨獪陳雲漢者爾耕之梟畜也承徵庭燎列署津門怙勢雄行鴟張虎挒當公陳臬縛致其人責以狐憑抶之威杖爾耕大怒矯旨收公鈐將以下數十人拘繫詔獄上連京貫並繩合箝極彼山稜誰不􅖁者聖人當秉鋤凶顯忠四召英登始還魂魄易曰碩果不食斯之謂矣元璐觀夫盡性則道建立我而物從故恕物甚盛德也然不可以之權父仇抑已甚謙衷也然不可以之承津貴是知察深所以致忠孝之情矯舉所以章亷恥之道萬厯之季率持渾厚之言天啓之初盛循通達之論厚則厚矣墨子因而無父通又通焉謁者由此多兒明道之功資斯亢骨制俗之法利彼嚴顔填決回飄非力不舉詎有對君父不愧其制行復有遺慚臨生死無撓其遇物猶形纎畏片言之義足焚百氏之書一日之名可懾千年之豎雖復嬌手踡足閟息緘聲漢濱柴桑與同潛蠖介山汨水終遂灰沈而志義鋒華已全能事況於出搴豐績動致峩稱攬節者材松資剛以用石日噓英焰以扇功爐四奮長鞅而播才轂者乎凡公之才四言可盡曰安曰決曰慮曰幾安以制棼決以拯棘慮以審宜幾以應變制棼之術莫著於其守大名趙魏之地貴尚拳勇遂有不逞之朋三物詛斯號曰捶手鶉牽蟻結藪逃集亡公以神熛疾霆察捕飄忽簡六郡之良家募三河之年少吏胥伍伯盡能挽強酒角兒嬉俱循控縱帝畿而南屹為嚴障當此之時賦斂日增公外弛叢役內料帑存入解薪糈出裒鈞矢集金四萬抵民徵一年又以州邑厫積紅朽無禆制使出入回易變陳為新偵時貴賤以權金粟由是蠧清民飽饁軍無詘公之貽也拯棘之謀莫良於其制餉公既受命建節津門時饋餉梗塞輸挽驛騷公以陸運力移費繁於是核韎韋之萬旅彚時日為三運春暮起洋涉冬已濟所省車牛不可計算凡三年轉餉三百四十萬有竒道通子午之谷師無庚癸之呼又復新建囤厫資為永計量其餘財創置書院以處屯生芟柞絃歌聲呼相答兵農禮樂於斯為盛焉審宜之智莫炳於其理漕漕有二殃從以四死二殃者治粟不兼治水則水殃粟治河不兼治盜則盜殃河四死者司兑之吏便金抵粟則金生而粟死久之金亦死領運之卒便粟貿金則卒生而官死久之卒亦死自公受事寄家舴艋頭如蓬葆手口卒瘏防漂設衛兩治治殃杜抵戢偷二禁禁死又以五郡白糧例資民解而介於強伍凌禁千端後夫取凶坐貽家蕩因持平量制以嚴條使漕白相銜同羣齊濟由是公私諸解并力咸心自春二月至於夏五萬艘灕然如兔如馬達於潞河百年以來此為稀遘至陜入絳天子恃之應變之略莫神於其撫滇六詔天末彛狡懷諼岑儂雞爭隂資普臂其謂中國畏動憚兵隂陽之情實由無懼公曰是猶驕猿岸睨緩繳不一大創戎索安施乃檄諸師乘所未備縱兵掩擊斬獲甚多陶孽搆交啓疆稱亂公以徑卒搗其中堅立擒首謀縛置麾下度既心屈釋之使歸於是諸羌蕩魂戒勿敢犯以為軒后之符尊此環脫武侯之算妙於縱擒矣公又謂崇墉列垣譬獸角尾置郵傳命等人血脈是興版築爰闢荆榛六城巋然十驛渙渙夫投檻循縚則猱鷹無自命之力乘嵎決堰則虎鯨有立幽之神凡彼南人俱欽四略若其詳折又有六功興鑄利一也除水患二也積倉穀三也廣壁帳四也爭貢金五也築夷館六也行斯六者計數存焉以錢制貝以鏹權錢以水制農以兵權水以壁壘為守氣以積貯為戰權以痛哭為勝心以懷柔為法禁神明所會祕邃之歸才及一年遂興百廢斯為神敏韋葛所難者也嗟乎蓼菜成行明非治軍之器履屐失任則為無制之才治世之資道兼拘縱苞誠統逺推公渺雙原彼孤情嚴節靜理虹精霜氣滌濯雲雷則有然者乎公豐頤英盼人望如神與物無欺張喉肝見恤鄰敦族鄉黨歸仁及其死也巷人皆哭生萬厯丁丑八月二十一日殁崇禎乙亥十一月二十日享年五十有九捐館之夕星隕中庭前此食時悲聞旗庫芒角櫪馬月􅝚雷轟死亦尋常古今多異何哉詳公家乘盛極一時伯氏羮梅業凌崇璟將相之道視彼二難二子旃棻文孫默黯摛星掞日屈賈推顔幼節之秀篤於機雲伯起之風蒸為德祖紹庭繩武於是可知貽燕之言亦不謬也公既器綜文武迹遍中邊道亦多方功非一槩史巫紛若不足為辭孝子永言璀燦綿繹元璐以為尺牙明象片羽徵苞識公徽蹤皆其大者春秋所貴不在繁稱延陵之題亦惟十字世有鴻匠吾其素臣耶通政大夫山西左布政使肖巖鄒公行狀元璐蓋觀才德之相賊亦若水火也作物之氣裂器以求稜挹己之心刓隅而保質是故平世之所龍光危時以為高閣其道之必有專尸天下所不能孤恃也若夫靜恆無咎動必有功達既不離潛亦難拔惟古龍德之大人能之近世則我肖巖鄒公矣公諱學柱字國材肖巖其别號云其先得氏由鄒人是為聖人之後晉國子祭酒湛唐江隂刺史思道宋進士霖廣濟將軍戩及忠公浩其最著者也戩之曽孫曰植者宋紹興中自毗陵徙居會稽因家餘姚數傳至懋二翁當宋亂隱居修內景之學腹有凝丹稱堅固子猶及見高皇帝鼎興殆將百嵗矣凡更八世為石泉先生以公貴贈山西左布政使生龍巖公即公父也公生而頴異讀書常兼數人龍巖公竒愛之束髮就試輒高等吾虞陳梅軒先生一見即字以孫女今所稱陳夫人者是也先生謂人曰是兒文武材其為人壻則逸少忠武之間乎隆慶丁邜舉浙江鄉試第八人明年戊辰成進士授平陵令平陵豸貏難治公年少其嚴斷則老吏不如邑大豪湯梅等橫行一鄉悉捕得按誅之然其馭民以寬又明曉大計以為興利不如革害邑故離官民為兩田官田之賦倍民田民無欲得之者貧者急斥田則偽為民田官責租其宗貧人不敢辭無田有賦其始苟塗一時後乃為永纍公下令置其里中民之少贍有心計者為大小區長丈量民田即畝虛實小區長以報大區長大區長覆之以報令令乃褁糧持襆戴星從之循量阡塍若數計然又邑有湖曰長蕩者夙為勢家侵擅公盡剔歸官得田數萬悉承租於是官租常贏田無别識田無别識則官民一官民一則賦定賦定則民不急售田不急售田則無詭遁無詭遁則不苟塗延纍百年之患蕩然俱除平陵之人德之曰鄒父生我顧其勢家多不悅隂使人伺察公過不得則為謗書卒亦不能害名日益起天子聞之召為禮部主事國家故事年未三十不得為臺諫方時承平天子則猶斤斤循恆貫云當是時顯皇帝初御極典禮繁重公通明包舉已遷祠曹郎會江陵相柄政其所厚御醫徐偉者丐名爵非分江陵相目攝公公齗齗不可江陵相大憾恨公久司三禮有美聲當處華要江陵相悍然麾之出為歸德太守天下志士為公惋歎今夫漢之博陸非聞道之佐而唐相李逢吉則今之三尺童子所羣譏也然博陸取郎璽不可得反加郎秩二等司儀李翺面斥逢吉過失亦不承罪以今天下雖甚乏休几博陸不可望庸渠李逢吉亦俊物乎然自公處之適如也公守歸德決藴灑煩善政挺紀時大盜朱應科剽掠雄行官民不敢問公至設法擒獲磔之都市人言歸德守文吏辦賊如此已擢江西憲副備兵寧州廨有物為厲公操文驅之立絶改視學江右江右之文與其人於是翔起其後林然多巨公名卿晉東廣參政丁龍巖公憂三年起補河南遷湖廣右布政又遷河南左布政屬嵗大祲中丞集諸大吏策救公曰豫糜便中丞曰不如豫米公曰豫糜民日得食豫米民再日不得食中丞曰不然夫豫米則上不勞費民旦集日中而散耳公曰米以薪為功使民自為功則得半米我為之薪則得全糜故曰豫糜便中丞曰夫糜哺而盡矣民受米稍留贏可支再日公曰唯唯否否夫米可再日宿者吏之計非民之計也懼有中飽終餓吾民中丞曰苟厲為禁而求之何中飽之為於是公不能爭中丞竟下令人給米如干而吏果中漁民飢益甚道殣相望朝廷聞之尤河南大吏救荒無策時山東淮揚俱大飢天子不遣使獨使使持節勞問河南中丞心恚公又申前議不移臺使者聞而韙之檄所司作糜如公議於是飢者悉起中丞益慚恨公其後數月幕僚李廷槐等解金錢至都盜摩取鎔事發中丞因是托公以失職聞朝論知非公罪顧重違中丞乃平徙公山東豫魯等大藩猶若弗徙然其時公論明於上如此公至山東以礦使橫甚具奏欲因兩臺上之弗果遭丁太夫人喪三年起補山西先是豫中丞修郤不已值嵗事又隂中公司勳司勳論公不及至是調補云方此之時稅璫四出三楚則有高淮豫章則有潘相齊魯則有陳增三晉則有孫朝初而晉使者虎挒尤厲白望鬼倀布滿鄉郭又自置關𣙜貨商旅為之不行甚則奴畜有司小不稱則拘持摧辱之大吏與爭即飛章告不法士氣既激矛尋不已公曰不可譬之狐鼠激則變生若夫鷹人制鷹狙公弄狙以我縧鞲因其朝暮亦何患之有乃時為好語歡顔即有甚撓則正色鬚立璫無以測公卒不敢動傳曰士之甚勇之甚惟公有之而忮者又托公他事嵗計復稱不及當調簡考功法凡不及平徙至三即終廢主者憐公才反故鐫公一秩以亷訪使守上湖南會楚悍宗棓殺趙中丞可懷醜徒縱橫匕首晝出一城皇駴公特鎮之以靜全楚賴之又為令禁主名引盜者不聽理所全活無算尋加右布政使守湖南如故公之再為湖南也簡軍實飭防禦解嘯聚釐侵冒公以其官曰守是則其守也而巡使者曰是則其巡也怒公侵官搆之直指直指固惑之會公又以爭馬政與直指忤直指遂奏公云云有詔罷公官自公成進士至是凡四十年年已六十矣既得放歸􅀈然獨喜益多讀書內治性命而外以禮正俗課其八子悉能文章出所畜俸金搆祠置冢上旌先德下紆族哀方正和厚為其鄉祭酒人瑞者二十九年一日以微疾逝嗚呼公性孝友居喪哀毁骨立所受石泉公以來遺産悉推豫其兄肖龍公莊其嬪陳夫人白孺人如友陳夫人有女士稱白孺人之拊諸子人為咏鳲鳩公之化也所之飲冰沒之日家無餘財而多行義有名卿子為其下僚者死則經紀其喪賙賻過當振其宗親枵者與食暴者與葬漂者與聚當陳恭介之為吏部也廷議屬公建牙保定恭介以㜕故引嫌不可公聞而更德之恭介既沒貧不能斂公為之具槥如禮當時比恭介徐勉方公陸贄不誣也大都公體正而不厲物骨強立而不巉崿為容勞不鳴功清不嫉俗章施矯舉還其悶然威電清霜悉為元氣夫是固天下才德之大聚全歸矣自公以嶽牧之貴蚤榮後凋百年以還抑所稀覯然而人猶有憾焉北山大夫豈不在位而從外事其詩曰旅力方剛經營四方以為不得入參風議無救周衰召公豈不壽考及其致政周公曰耉造德不降我則鳴鳥不聞以為老成在野則其勢不盛由此而觀假天欲正用公則必使其先四十載蚤據鈞衡後三十年無歌薖軸如此則可以大治天下而夀一世今僅焉耳豈不惜哉元璐自成童受知於陳恭介恭介亟稱之公公見元璐文即慨然許字以女憶元璐舞象時公當之晉先大夫拏舟挈元璐送之江滸酒間公教元璐以文章行誼者凡百十餘言元璐終身誦之後又二年公女未結褵蚤亡元璐由此披猖失比十年之後變起帷㡩於是中傷有踰怛慟悲夫公卒崇禎乙亥某月日距生嘉靖丁未某月日享年八十有九國家令甲文臣二品以上年九十所司以聞遣官存問更及數旬應循斯典又一惜也娶贈夫人陳氏先公卒四十年别娶孺人白氏子女婚姻具詳家乘光緒昆季將奉公柩合陳夫人歸窆陳山之嶴命元璐狀之以求銘巨公元璐援其舊聞參互家乘暴諸羣睹無敢夸稱章幽澤枯實惟鴻匠夫李漢玉潤能序昌黎中郎蘭心樂碑有道此非阿好彼曰無慚要於誠然義一而已光祿寺寺丞先兄三蘭府君行狀嗟乎池草通魂人琴發慟豈徒其孔懷之為乎夫五倫之道必有所互取之故子賤取友乃云兄事王季恭兄而云則友此言人與者貴其氣親而天連之期於道合也今天下皆以吾兄光祿之於元璐為有朋孚維元璐亦自謂吾兄弟真相知知之故能言之鮑管惠莊曰知我而已昔吾倪氏自宋南渡由青州徙越家於虞之賀溪尋徙橫山其在宋名巨輩出文節父子其著者也入明傳代六七無顯者至曽祖抑菴公始由鄉薦令南城而王父封文林南望公至行篤學不仕至先君中議公始登甲科亢節致功鞺於天下然官不過太守而季父封侍御晉源公德甚卲亦不仕至光祿始為御史持斧握衡然又不久中蹶至死才得六品官而元璐一再侍從亦遂廢故人謂倪氏仕宦有如蝸遊然以豫觀於光祿十數年間服官致身所用磊砢俊偉為世所稱説者雖不極崇膴其以紹我前人之休亦其恢宏卓爾者矣蓋當熹宗之末年逆璫魏忠賢擅政既盡鋤天下異議者又欲富已過於天子乃使人四求天下富人私過奏之掠其資財於是告密蜂起歙州姦人吳榮者人奴也告其主富人吳養春以布衣擅黃山利數十年及諸不法狀即有詔捕養春而使工部主事吕下問乘傳至歙籍其家當是時光祿由祁門令以能移歙而下問怙威暴橫掠吳氏贓盡一郡掩捕四出光祿抗首為下問言詔籍養春耳一郡何罪乎下問不聽衆積怨憤一夕萬餘人鼓譟斧部使門入下問驚遽踰垣走衆求下問不得乃大擾亂光祿聞變即單騎詣部使門衆見光祿至皆羅拜號曰公子我而使者剃刈之今必求殺使者乃歸死公耳光祿曰今殺使者天子必殺令是而殺令也衆悟乃散而下問夜奔二百里至績溪投空廨中蹲伏梁上者纍日既定光祿乃往勞下問下問出挾刃哮曰吾今與令俱死耳光祿笑曰何庸爾耶已定矣下問既無所泄怒乃上疏歸獄光祿忠賢怒欲逮光祿緹校已戒而其時詔使逮周吏部於吳吳人顔佩韋等憤譟格殺詔使事聞忠賢心懼遂停緹校而光祿事得解時坐養春贓百萬徵栲踰年未及十萬已竭忠賢疑所司姦利又使大理寺正許志吉者馳歙州督贓甚急志吉故新都人而尤無賴自躪其鄉甚於吕又以已銜憲欲𨽻光祿光祿艴然曰以官則子客也以地則子民耳何𨽻之為竟不為禮即入見故益偃蹇凡使者令下縣縣多持禁之而其時天下郡國盡生祀忠賢志吉乃以諷光祿曰為令策救惟此耳光祿持不可志吉大怒罵曰是何蟲蟻而欲觸隆車乎即草疏欲劾光祿未即發會先帝上賓今天子御極懸鏡攬阿於是忠賢及其黨皆伏誅而光祿以治行高等入為臺御史光祿入臺首訟黃山之獄劾下問志吉上斥下問為民而使使即訊志吉光祿以天子方嚮言者言事日益鋭凡居三月所上言請召用廢籍諸賢劉公宗周惠公世揚于公玉立方公震孺畢公懋良范公景文蔡公思充劉公廷諌耿公如杞等又論劾顧秉謙霍維華李魯生門洞開等又發吏部姦弊劾主爵某某又請慎名器無聽雜流得入資為藩輔郡判凡十數奏天子皆用其言頃之奉命出按江西江西之俗其君子矜理學小人勤嗇力於農桑光祿因其俗而正之與其君子俎豆明道而約奢激惰以教小人顧以今天下多事豫章四達文脆而海鯨方驕兵禍必及乃檄諸路衣袽為寇備計居亡何而寇至江西自桃林瑪瑙竊發而後不承寇患者幾百年至是粵賊鍾凌秀等由閩武平突入贛界旋由贛入吉州圍永豐甚急逺近大震時撫軍移疾去代者未即至光祿以惠文冠攝理兵事募丁健飭將吏集資糧謹偵諜清野積繕城濠以五千人扼賊心背又結鄉兵五千分防鄱湖九江之間遏其北流賊進不敢攻城退無所掠於是始困光祿又以兵單上疏請敕粵閩黔三省會兵合𠞰而先此我兵已破賊於黃牛岡既又敗之木湖及三省兵合遂大破賊斬獲無算渠凌秀等宵遁去自夏四月至秋八月凡五月而賊平捷聞天子嘉之又以增城南昌功成賚白金三十兩當是時光祿又以將略聞而朝論特以光祿儒者有文章名頃之奉命仍以御史督學吳會光祿之自為文清微典凝守脈鋒見其察士則尊繩簡貴理道而特不欲沒其才以為拘畏則氣衰以此剔滌凡三年吳才盡出甲於天下吳之君子以為三百年來學使未有如光祿者也而復社之論作社盛治才而其人矜名氣人求入社不得者皆忌之會諸生陸文聲有所欲中又希執政旨詭陳風俗云敝皆由士士必以社亂天下天子方急正士下其章使學使者批根治之光祿上言社矜才有之亂無迹天子曰士如處女子即矜詭以何為才光祿曰今士下帷結業相尚為文章亦處女子之道也豈可以其刺紋有稱譽比諸倚門且文章者士之靈心即國元氣厲治士必絀才使天下相戒不敢為高文非世之福不可執政曰御史庇士甚殆有牽撓不稱職乃鐫二官降光祿寺録事光祿雖貶官心痛時事上疏規切執政語甚激又云今閣臣分曹擬旨無主名有所逃責請令各疏名使明主得因事考其能否奏上執政大怒擬旨切責然天子覽奏心是光祿言更令易擬凡三上不得天子意天子竟自降詔俞之著其言為令閣擬疏名自此始執政由此怒光祿以天子意方嚮之未有以中也亡何執政罷乃稍遷行人司副尋奉命治益邸喪事事竣歸里既以稔勞又聞寇難禍及福藩痛忿齒齘忽病噎寢疾五月而沒沒前十日而光祿丞之命下今故稱為光祿云此其居官大較然也元璐曰光祿長元璐九嵗少同學五六年日一賦宛鳩其後同登第邸中連牀夜論呢呢至燭垂跋童僕鼾齁四徹語不得休大約相謂吾兄弟今日如趨塗辦程宜權騁宿即所用報天子者上之致身立朝比隆崇璟琦弼次之則噩然言出氣飛使世貴其道最下則循事見能所至一再稱惠人亷吏耳出此三端不可為人異時枕被相對寧能裂裙障面乎憶為此語垂二十年而不意三言者遂為光祿審傳象照夫人度量相越蓋甚逺也以元璐視光祿雖後死走肉耳是故元璐每哭光祿必汗下豈非悲慚並來神之自告耶光祿為人外爽中凝骨強體厚其事父晉源公甚孝母王太孺人蚤沒時光祿方八嵗至今遇伏臘嵗享輒悲慟不自勝而後母俞太孺人至慈光祿事之積誠起敬􅎵瀡逾篤友其伯季推肥讓甘身殁之後而伯季乃倍飽其子故人皆謂光祿之能其官也其有本也光祿偉儀幹修軀廓目廣顙旋頷口幾容拳耳不及肩者三寸法宜壽然而火色師曠相王子晉岑文本相馬周並云火色騰上必速不壽固非誣也光祿病革執元璐手曰吾相不宜死今乃死嗚呼吾負君親悲哉光祿諱元珙字賦汝别號三蘭先中議之所命也曰虞二山蘭芎蘭阜與子而三期子嶽立芳紉耳昔先中議愛光祿過元璐而當先中議令安成有惠政其後以救劉忠愍及爭復古書院不毁忤江陵貶徙安成人以為忠祀之至今及光祿按部至安成以一少牢謁先中議祠下時冠蓋雲會童叟聚觀者填咽衢巷人以為美談云光祿以萬厯戊午舉於鄉天啓壬戌成進士生甲申十月七日卒己邜三月二十九日猶子會吉等卜葬有日請銘禮也元璐以為大人君子必謹修辭故特言其衆著者使夫見即不疑援筆易下耳漂説誣親敢乎哉倪文貞集卷十一
