body:
  text: 倪文貞集卷十明倪元璐撰墓志銘資政大夫禮部尚書兼東閣大學士青嶽劉公暨元配夫人曲氏夫人王氏合葬墓志銘夫崇濟之業所以考名人憂患之心所以正君子是故苞桑休否蒺藜乘剛負宏者無狹模審端者無回志亨困之德篤於劉公矣公諱鴻訓字默承别號青嶽其先自寧津徙居長山始祖善興善興生謙謙生拳拳生達達生元元生璽璽生伯能伯能生天賜凡傳八葉代有聲聞博陵士族之宗琅琊人倫之盛所自來已天賜生公父觀察頃陽公厨倉言乎其學江海以為之才强諍之聲體雍岡鳳于蕃之績追峻嵩高教篤慶流法宜繩繼公其長子也公生有異徵幼形竒表黃中等身之書流睇可盡長吉嘔肝之語乂手能成總角丱兮名歡一郡十舉不第囊錐相疑幾及㑹稽富貴之年始售廣川天人之對故知洪音不爭於急節修翎必資乎利風遂以雋選為翰林院庶吉士橐筆三期聲稱日出授官編修公綜習典常精疏義務昌黎文起當一變之時習生史才有不常之譽知制誥一年獨持體要如絲如綍其道可觀校士春官囊綜楩梓廬陵之勒軋茁興國之榜龍虎方斯蔑如也於是國家多故顯皇奄棄天下貞皇俄繼上賓鼎湖再號連山幾沸離嬃覬軒權之座旭馭委虞淵之都公乃㦸手掀髯昌言聲義規責時宰其音琅然同列聞者舌呿而已尋奉詔以兩朝敕㫖頒諭朝鮮賜一品章服公以海國我之外藩綏遐激忠存乎推置於是裁約享饋章示規繩是使卉服之長冠帶而問詩書窮島之人啁嘈而讚仁義公之能也復命擢右春坊中允旋晉左諭德遭頃陽公憂摧毁之誠幾於死孝服甫禫起少詹事維時節甫乘權膺固駢戮嵎虎懼其多翼謁者怪其有兒招延苟朋刲割剛士公入都門義形難犯璫之羣兒以難告璫曰黨渠不除後其噬臍由是矯㫖褫公冠衣而公自喜言笑晏晏非有山鹿庖厨之懼野鵩坐隅之感古之樂天知命無入不自得者矣居之二年否極以喜今上乘乾出震鋤奸顯忠有詔廷臣極搜舊德凡疏朝野十人比於周亂公名與焉皇帝考慎旦日召執政以下入對乾清焚香禱天冀得良宰覆名金甌明慿帝賚首探得公上心甚悅即家徵公為禮部尚書兼東閣大學士發册遣使肩背相望控辭不聽凡五閲月隨使者至闕下陛見之日嶽立鵠舉音吐軯訇上遙見目成喜著瞳采當此之時地氣猶結首肱分道荃葹競時晛莫窮瀌夬有留莧産祿窟而猶在牛李壘以方爭綸扉之長引質漙先朝之嫌畫諾之司慙丙魏同心之致公至木彊感知氣昌章邪摘疑察察如也於是奸徒大沸剡手須剸遂乃召鷹起犬移眩緇素有靦面目視人罔極商英報元祐之憾宗孟以司馬為譏賴夫聖人瞻言王赫斯怒刑夫干戚投於帝江營蠅樊榛歘然離破羣迷衷聖國是以明公是用感泣刻肌益靡避懾因承密對力言吏速化則治不成民重征則盜不息又言帝王之道必世後仁譬身元氣久自蒸徹又請渙居益饋任人責成既以魚水方孚無言不得退朝目送勢所難居遮道手加情何易答且夫指天畫地莊論也以為過厲其氣雖誼辟不必保交㑹食拂鬚寅衷也以為孤遂其情即微言可以弋禍始終之際明哲所憂㑹以京軍置帥制書不符議者毛吹歸諸機密原其顯過小事糊塗閣班後公則猶叔季而言者倉卒承詰遽以公稱值上勵精無私制治不欲使天下揣疑祕㫖以為天子箝鍵言路袒翼凝丞乃下所司雜施窮煆孔璋石烈今世所稀呫嚅之間已成大獄詔下戍公鴈門公奉命坦施北向稽首臣罪彌天死不足塞幸承貶竄夫復何云即日徒步出國門書衾悴然見者哀歎至則雜諸戈殳致恭其帥雖元鎮吉陽不移崛强而子方淮水能聽風波循省之餘益修性命暇或攤書蒔藥賦詩泳游間選緇流與爭道韻適如也亡何寇犯五臺鴈門雲擾公奬鼓家雜仗劍登陴傾囊鬻裝以享戰士賊不敢犯孤城獲全方之段干深坐以保西河王蠋閉門而全畫邑雖休瘁不同抑亦各有其力乎風霆易􅀈水石能明天下方矯首跂遵鴻之儀五位或拊心思放麑之過詎期疾作竟致彌留以崇禎五年正月十有二日卒於戍所枯竹未生曷明不負牛車共見已白非欺悲夫既卒大吏以聞詔辭感惻聽諸子得以其喪歸葬其土仍敕給傳官為治行非諸流人可得而望斯明至仁之存乎墜履定論之凖諸蓋棺矣公泰山之容滄溟為量髯㦸載義眸電曜靈正骨嚴顔晶衷博體室鮮抱裯之媵門無彈鋏之賓矜岸方幅不以厲物靜穆虛淡不以篤時道廣渙羣才周勝巨迷􅀈資其斷斧驚帆恃其智檣然而挺柯寡枝遙流不曲體誠曰坦測表云疏此其所短是以困也夷考生平每逢竒異讀見黃衣死流巨響負瘕臨危化人饋之神藥涉波胥溺靈禽定其傾舟豈惟生有自來抑亦誠之通召然歟公生嘉靖四十四年七月九日享年七十元配纍贈夫人曲氏同邑通政使曲公遷喬女繼室纍封夫人王氏同邑太學生王公東漢女齊德均禮踵美增華雞旦奉以翺翔鳩桑形諸帶辨亦簧翿之唱和梁笥之規隨也曲歸公七年以勞沒王後公一年以悲殞子三孔中孔和孔武女五孫男一曰愷配嫁姻姻悉於家狀父書能讀祖笏行獻龍文麟窟挺挺抎抎孔中等以今年某月日奉公柩暨曲王兩夫人合葬王家莊之東阡禮也伏波發藁不假大招之文元成仆碑共切重興之望元璐不敏敬為之銘銘曰泰山巖巖峙為人鵠學山至山于何不穀扶滋氣道昌沛文辭使則不辱其羽可儀璃瓶渙然誠帝之賚朝踐斗樞夕清薈薉茂名難居殊恩莫保夏氏之璜則亦有考英州儋耳概多名人露霆皆教天王聖明孔璋何人谷永不作為臣不終死而猶􅌓帝施敝帷賻曰車馬魂乎歸來若無罪者佳城鬱鬱三英粲兮馬祠魏碑臣日望之永寧别駕贈朝列大夫福建提學參議敘菴吳公暨配贈恭人陸氏墓志銘西漢循吏訇然而著者不過數人耳顧其才高下猶有間趙廣漢不及張敞張敞不及韓延壽韓延壽不及黃霸黃霸不及朱邑朱邑茂已然猶不及河南守吳公也吳公者不可名名不可跡跡何以言之也史曰吳公不舉其名是不可名也史曰治平第一不詳其跡是不可跡也以吾量之廣漢等數子者生於本始地節之代席孝宣之飄氣以厲其功能瑰術瑋聲貴乎蓬勃吳公者文帝之臣也與其君同德度其制治必尊道德而薄刑名必貴精誠而賤術數必求無咎不求有譽必畏有罪不畏無福其庭不必缿筒其袖不必記籍其野不必下神爵其道路不必有烏攫肉其生不必太傅封侯其死不必桐鄉之俎淡節靜理道之宜民而延世者也今入秀州晉縣洲錢之鄉有橋曰八道是為吳公葬地華表碑碣不沒於土者二尺既千餘年披蘚可辨其子孫聚處憚遷族日蕃茂俗號之曰千年吳也系序名氏官爵指數之齒齒然而今敘菴先生又以循吏聞先生之佐信陽永寧兩州一時之為州佐者莫或及之故亦稱第一也先生之言曰吾治民去其害民者已耳信陽多猾胥為奸蠧先生彈剔之風雨除鳥鼠去而民大悅永寧年饑先生發帑賑瘠瘠即起設法招流流即集心誠求之而其明年大稔民又大悅先生之為道悅道也天不能害其民而況人乎是故用漢法宜入先生司農廷尉今以今貫平遷留守參軍乃老當此之時長君少參成進士適當為令得親民於是先生盡以其道禪其子教少參曰毋束濕毋草菅毋長莠此三言者朱邑黃霸用之至精而少參得之以治新南兩城亦稱第一大都先生為人晶中朗表矩步繩趨敦彛選交守謙握固始於治身中於為政終於翼子皆是物也生嘉靖辛酉卒天啓丁卯享年六十有七以少參貴封文林郎贈朝列大夫配陸氏內則周舉佐先生教諸子嚴過先生生後先生四嵗卒亦如之享年亦六十有七封孺人贈恭人子四之屏壬戌進士歷今官福建提學右參議之翰邑庠生永貞國學生之經邑庠生諸孫九人爾塤爾篪出之屏爾基爾壯出之翰爾華爾埏出永貞爾圭爾埈爾埴出之經爾塤余門士也登己卯賢書文行翔振人謂先生子孫繩繩然度其後又必千年也先生名尚倫字覲揚敘菴其别號也葬於保村安字墟之阡有題其表曰明吳敘菴公之墓以使千年而後有辨於漢吳公云銘曰毋識其名與跡於其碑之趺而於其顱土不得沒蘚不得糊後更千年史失而於墓求之乎大理寺左寺丞鼎梅劉公墓志銘蓋豫嘗讀鼎梅劉公封事作而歎曰嗟乎古今君子小人之相治不自為力而徵助則必皆敗也漢中葉之後以君子內治其小人不足而延外力外力一入而天下盡化為盜賊明天啓之季以小人外攻其君子不能而仰內力內力一出而天下盡化為婦寺盜賊之毒不得存君子婦寺之羞亦不得存小人故此二力者難借也昔者仗馬不揚極於中歷貞皇一月環節雲流當是之時蒸蒸皇皇南北二龍俱興於位二龍者北有吏部尚書高邑趙公南則左都御史吉水鄒公蓋當時所歸稱如漢云三君者然也二公之道異趨同歸趙公救時而急事功鄒公正本則尊理學學尊教立務廣聲緣惠此京師樹廬章鐸明誠正之宗發春秋之義鼎鏡並設筆舌斷然小人患之度不可制乃移其懼於中閹告其魁魏忠賢曰是等召徒集謀意在君側耳忠賢由此甚恨清流以去鄒公為其始事鄒公既去㑹南吏部缺人廷議復舉鄒公請賜環召不報夜半傳諭內閣如鄒某衰老蹣跚何宜復用時首輔葉公向高爭之不得力求罷歸於是山東道御史劉公上言陛下奈何以蹣跚棄元標元標自由向者抗忠受杖壯已蹣跚豈關衰老陛下誠以元標蹣跚宜益重元標且元輔以不得其請求去陛下終不用元標是速之去也又言閣臣所司存乎票擬中㫖頻宣焉用彼相奸人旁竊懼成鹿馬曺節王甫事可寒心反覆凡千數百言指畫危戇忠賢聞之大怒已而左副都御史楊公璉疏劾忠賢二十四罪舉朝大譁忠賢益信其黨之言其黨又告忠賢以劉公居鄒公之里而交楊公甚歡於是乃逐楊公而用他事黜劉公時劉公遷廷尉丞數月矣尋即逮楊公等六君下詔獄栲死緹騎日出以求其類天下謂必及劉公劉公既治囚服訣妻子飲酒俟時久之不得命而先皇上賓今聖人當陽收振魁柄醜徒伏誅旌亡求廢有詔復劉公原官然劉公已無意更出時時與長安諸貴公絶交書諸貴公意少衰延俄十稔劉公竟死田間嗟乎觀於劉公之道則知居天下之義其愚莫不利用鋭居天下之利其智莫不利用錞也當劉公首奮義椎楊公從之羣賢慕楊公之義皆學楊公其後凡楊公之徒槩多死者然楊公實學劉公劉公顧不死及楊公首承譽命劉公從之天下發劉公之義以及羣賢其後凡劉公之徒無不庸者然羣賢實貴慕劉公劉公顧不起由是觀之可知龍德畢萬七戰亦在牖下介推十九年亦在綿上厯啓以還七十餘年之間天下之嚴節靜理握固養冲未有如劉公者也劉公名重誨字忠甫其别號則曰鼎梅始祖德才君當宋南渡自閩徙贛十一傳為贈公梅隱先生是為公父梅隱娶於談生公公生頴慧十八補博士弟子三十七舉於鄉又十年丁未成進士筮令臨淮其治決藴灑煩均畸賦蘇疲遞招撫流亡三百户民用歌之以治行第一拜監察御史鯁固敢言他所條上君德固守正法等疏陸敬輿不能過也持斧畿輔豪貴屏息官終大理寺左丞生嘉靖四十年九月十二日以今崇禎十年七月十日卒於里第獲年七十有七元配黎早世追贈孺人繼娶封孺人黃氏八子皆才曰佺曰價曰儉曰傖曰伶曰􅀈曰俆皆黃出曰佮妾白氏出曰價即豫丁卯所舉士也孫男良靖良竑良􅀈良翊良珝良玗良珃良疇良晫繩繩凡九人曰佺等期以今戊寅八月葬公南番淵之陽而曰價以豫一日長又能知公輕千里乞銘其隧豫雖病不得辭銘曰章水貢水交靈起哲天祿卯金元城漢鐵鳳咮能鳴豸角誰截虹飛義鬚霜揚諫舌攀檻嫓忠破柱方烈北寺嘊嘊黨碑嶪嶪碩果或存元芽其茁介推不言元亮不折世亂埋輪時清結轍奸曰殺之亦不得殺帝曰爵之亦不得爵殆古至人莫可濡熱養浩尚元因時而設家近鵝湖恣其澡浴猗歟劉公豹文龍德生氣熊熊千年墓碣封文林郎吳荆陽先生暨配王太孺人墓志銘家國皆貴陽而賤隂今以為陽治治國隂治治家男子乘陽而積剛婦人比隂而窮柔皆陂論也夫孝弟公正寧靜亷淡溫恭貞栗陽之徒也凶悖鷙害佻放凌躁暗昧苟且隂之徒也與陽同剛皆君子與隂同柔皆小人往吾年友吳朗公給諫上封事為天子别言隂陽剛柔君子小人甚辨而烈雖遂得禍天下著其義或咎朗公為高論求人難盡之名不知其所習取諸庭如荆陽先生王太君者陽昌之氣治家滿家是其家無小人安得不厚求天下乎荆陽先生諱思䕫字欽堯以字行更字大章其先閩龍溪人宋之時有南隱公者始徙黃巖自宋建炎至今凡十六傳為樊陽翁樊陽生二明即先生父也二明有特行娶彭娠七月生先生先生性資高秀書非秦漢人不讀為文茂古名噪一時顧其意特岸然不屑科舉曰我思尹焞實獲我心於是乃築舍委羽山中聚徒講德其學以洗心明倫為宗居父母喪哀毁骨立杖而後起憐其季貧即不自治生業而為季謀甚周季卒以振嘗有吟云盡瘁歌棠棣含愁廢蓼莪聞者悲之以為即棠棣蓼莪之詩也先生生二子長以病不終讀季曰執御即朗公先生教之為文不使知馬足然固不欲其以文逢世每曰窮達有命吾願若為好人耳朗公以乙卯薦鄉書越七年壬戌成進士先生不色喜及朗公司刑濟上先生從板輿至其署見其魚縣梁上厨有虀糲突烟爐火淡渺若微雲又見其戴星出燭再跋不得寢或又出不意發其槖中裝窣然有聲悉官文書耳於是乃大喜曰兒大耐官職是為好人矣一日出行㕔事見鞭鞔甚設慘然不樂久之顧謂朗公曰將毋使劉寬笑人乎吾聞之樂記云夏楚二物收其威也夫然是為詩書文教之器甚明故曰朴作教刑豈曰殺之耶朗公怵惕受教終朗公之治濟以是無寃民云當是時㭬人矯䖍亂政誅鋤遍天下顧其視羣邑令泛泛水中鳬耳故當時為之諺曰曽執權受迍邅曽上言結大寃卑官外官陌路相看蓋謂郡邑吏無與朝論禍不得及也乃先生獨感憤齎咨一日書卷懷二字使使持示朗公朗公心悟㑹閹銜命視漕者道經山東時監司以降皆負弩走百里蛾伏道周惟謹朗公受檄謬驅車入舍俄從車中慿軾大吐委頓即日稱病還邸闔門不出上登極先生即更馳教朗公曰促視事時清日明無用卷懷為也蓋其高明之槩如此亡何病作遂不起濟人台人皆巷哭其後三年朗公起復召為給事中朗公既感恩奮激極言加派之失又以今天日方晶而雺螮四塞權貴之意上移魁柄君子日退陽反為隂乃上疏論宜興相大臣交惡之收繫獄中凡三月天子悟其無罪釋還田里自朗公以直諫蜚聲天下天下益用明荆陽先生之道不與他人與諸其子故曰安軸不定視其屋梁夫車軸持動屋梁持靜以其所持正其不持是則明者之所取也詩曰教誨爾子式穀似之朗公之似先生其以陽剛之言夫先生弱冠娶王太君相莊如賓太君之治家無嘻色無遽容事其尊章與先生齊孝教子嚴過先生每誡朗公曰而必毋忘身所自出而必謹身毋罣人言朗公佩此兩言終身夫是兩言者君子之言也太君雖女子無隂柔之氣即太君不敢厭隂辭柔顧其人豈女子哉朗公將以某年月日奉柩合葬某山之陽以元璐舊史使為之銘銘曰其父所教之者曰卷懷其子由之以履方其母所教之者曰謹身其子由之以守常是父是母萬夫之望天下學此兩君子者何患其道之不陽剛乎封文林郎福建道監察御史馬公鼎臣暨配封孺人劉氏墓志銘豫與馬騰仲侍御如蛟同出韓宗伯若海先生門比於胞乳騰仲令山隂時入拜豫母甚恭騰仲上奉其太公鼎臣翁及太君劉孺人豫雖隔千里心事之猶父母也騰仲俄遭大故舉襄葬事方使使屬銘而寇禍作騰仲伯仲俱以身殉豫於此雖氣壯發而情中摧每思報之援筆腹痛今年冬季君光祿如闕貽書曰異時吾伯仲以必得君一言為能不死吾親君復何宜久負之乎豫發書涕下如綆縻嗟乎自騰仲伯仲之死騰仲伯仲已不死非惟騰仲伯仲不死其在太公太君教忠翼子生氣熾然下視世人皆將狐狢噉盡也且夫已死矣豈豔稱曲說能呵噓之苟自不死又豈言者之力哉然而豫不敢辭者以吾舊史志其大者以風公名成字汝器别號駉野亦曰鼎臣其先世宋以前亡稽已在宋有光祖者仕至柱國元有六六統制者父子相繼鎮江淮有異政因賜居全椒之五龍山其自汴徙和縣此始也入明兄弟二人曰九成九思者集義兵從高皇帝於和所向有功授金碑萬户已而九成戰沒九思請老家於和遂為馬氏始祖生子雲雲生司徒諒諒舉宣德癸丑曺鼐榜進士歷官吏科給事中山東參議應天府尹南京户部侍郎當為京尹贈祖九思封父雲如其官三世皆稱京兆司徒生永賢以成化甲午膺里選不第官止光州牧生子正道承司徒廕未仕而卒生子一虞號日塘日塘公生三子鼎臣公最幼甫七嵗遽失日塘公母楊年二十八忍死撫孤人為之歌寡鵠其後騰仲成進士上言其情天子嘉之賜金立石其里豫時頌以詩有曷留老眼看孫子但不峩冠自丈夫之句云公於窞棘生而枕處之有如蓼蟲故其讀書能攻苦研昏練爽以致其材弱冠名噪一郡以餼入太學凡十數舉不售天下皆歎公有文無命至哲皇帝御極之二年騰仲登第登天拾芥或況之眉山父子云其又三年以騰仲奏最封文林郎山隂縣知縣又五年以騰仲入臺遭際覃敘晉封福建道監察御史蓋自騰仲成進士豫於公行事什九見而知之矣騰仲筮仕為吾山隂令取山隂只鑑湖杯水所食米自和輦致凡歷道里千三百里見者咸驚異之曰嗟乎使君清至此其後乃知公教之也騰仲能飲人不敢召豫召之獨來曰敢忘雪日共立程門時乎酒至才五巡即起辭去豫問曰是何旁午耶騰仲曰無之間者過庭適有聞作令無多飲酒耳豫悚然不敢投轄雖騰仲至孝亦愈知公教矣公非徒教子亦教吏也當此之時公留官廬甫數月一日忽促駕歸騰仲大驚跪問何以公曰滫瀡纍邑因指案間膾醢總總者曰此庸非魚鮓耶騰仲叩頭出血請留一月卒不許他日為豫垂涕道之如此豫又聞之和人自公以封御史歸其鄉益務為德喜賑貧乏嵗施槥至數百人貸之錢者多不責償前後焚券亦至數百然其意以為為德不務本行譬之車室不求轂礎也故其道必先聚族聚族所以尊祖乃立祖廟因而教養之耕者豫田讀者豫孰生者與聚死者豫藏和人歸義以為范文正公再見於今也當公童時以孝友稱老而彌篤其言曰醉飽之失人何必無吾求不干犯名義缺陷倫常則已耳嗟乎非公有道仁人誰能為斯論乎筵㑹當前修容著飾一夫罵坐一吏吐茵羣起詬之等於非類父母之喪斥逺苫土樂爾妻孥飲酒食肉舉世皆是不以為誅世論之顛無若此者吐茵罵坐雖人極憎非桀跖之行樂喪忘親雖世不怪有豺獍之心天下之為豺獍者不辨則鳳麟却走狐魅競起矣嗚呼可不懼哉公儀表峻偉身長八尺生嘉靖乙丑五月七日卒崇禎甲戌十月六日配劉纍封孺人别自有傳要其秉禮敦仁尊倫行義殆由天合其始歸楊夫人語人曰兒有令妻勿憂橫事其既沒鼎臣公哭之曰值爾雛姪免廢墜撫我猶子無參差可知其槩矣生與公同物是在正月二十有六日長公凡百日卒先公三年為崇禎壬申十二月十有二日自鼎臣公沒之明年流賊犯和騰仲方據草土起涕泣誓其里衆佐主者嬰城固守賊不能攻將引去忽一日颶風大作守者皆墜城遂陷騰仲猶率二百人與賊巷戰良久力屈罵賊死闔門自伯氏如虬而下男婦死義者十四人事聞上嗟歎其忠詔贈騰仲太僕卿官其一子天下皆以騰仲非守臣可無死城騰仲自以王臣隨地當死又不欲棄其鄉名義倫常騰仲守之如握固然亦猶行公之道也騰仲昆季以崇禎乙亥十月合葬公及孺人於其州殷塘北山之原越四年戊寅始追而志之系以銘曰百不已喜行義百不侈喜不蔑紀其子因之罵賊死死者凶數而天以報吉士報之以所喜贈中憲大夫𤣥圃鄭公暨配陳恭人方恭人墓銘鄭鴻逵使君瑄以正學淳化鎮吾越再嵗越大治尋以望遷越士民數千胸胸跣奔告臺使者必為奏留我公使君亦跣奔告臺使者毋聽士民留數千人乃日夕臥使君輿必借一年不聽則滃然聚元璐閭而請曰鄭使君去我輩無生理今不為我留使君天子亦何用起公田間為元璐聞之流汗促駕往見使君曰八情如此即漢主寇公不能回潁川何君之固乎使君於是始以其誠涕泣告曰嗟乎瑄其非人哉自瑄父母之沒逺者四十年近亦二十餘年異時貧無以葬既通籍踰紀蹇蹇栖栖今幸得間又筮以明年春二月良君為我權不葬其親與去吾士民孰戮也言已又涕泣出袖中一編示曰辱君題墓白吾不欺耳為我謝士民元璐默然良久揖而出遍告國中曰事不諧矣其長上有大事而其民欲奪之不祥也聞者皆泣乃止退而發使君所示編時及暮篝火讀之孝哉永言乎是其為封大夫𤣥圃公之義也向固疑使君之治必有譜今乃知其近取諸庭凡使君之取諸𤣥圃公而式穀似之者有五其忠於其事甚似乎其為孝子其協恭上下大夫之間甚似乎其友于兄弟其潔清無欲甚似乎其曠逺不謀其家其肅物甚似乎其嚴正動止禮法其膏澤周塈甚似乎其俠施𤣥圃公之為孝子者公父某公以亷吏沒於官公年十三哀毁幾滅性母夫人病肺且痼嵗十數作每作必需公抱持公日夜憂泣餐寢俱廢如是者二十年及後疾亟公籲天祈代頭叩磩血流滿顴猶不止既卒慟幾絶水漿不入口三日親知援禮文譬之乃稍進糜然竟三年絶滋味不入內琴祥而後解嚴焉若此者其誠至專一故可以教忠事也𤣥圃公之為友于兄弟者公敬事其兄某兄死撫二孤如字其子公嘗讀詩喟然而作曰以周公之為聖管蔡之為讒其詩猶曰凡今之人莫如兄弟以吕召畢散之為友而管蔡之為兄弟其詩猶曰雖有良朋況也永歎今丁嚶四求而鬩聲中出不已傎乎若此者道貫於塤篪故可以教上交下交也𤣥圃公之為曠逺不謀其家者公生平不知何物美好惟豪宕好遊名山川所為詩文高典瀏脫多半紀遊凡鍾石九仙麻姑石梁南田石洞西洋梅峯杖履所經雲霞為變物情筆采相助為歡而四壁僅立二頃俱荒凡先世所遺資財悉推豫其兄之子若此者其中蕩蕩然故可以教潔清無欲也𤣥圃公之為嚴正動止禮法者門內之政肅於朝典臨使君兄弟盡日不矧使君兄弟苟有過雖至細必正容責之甚者呼杖每語人曰嘻嘻者家之賊也其為獨立之言者二曰經史吾田忠孝吾寶耳若此者不失家節故可以教貞紀肅物也𤣥圃公之為俠施者自其窮困為諸生舌耕筆鋤而宗姻若而人皆藉之舉火當其義至巾榆荻粥悉推與人公之友有陳長吉者貧而母病公捐資療之曰猶吾母耳有洪美度者遘竒疾公操圭匕與同居處至身疾作不肯去曰吾病易為也居恆謂使君曰天人止祥無如方便大道之旁寧容種刺乎若此者公欲而親物故可以教施濟之道膏澤下於民也嗚呼是則吾鴻逵使君之所為治譜者矣詩曰以燕翼子豈不然哉公諱元勳字無功别號為𤣥圃其先世河南固始人時有為福州路總管者遂家於閩數傳曰奎者有隱德生萬鍾萬鍾生演演生日休即公父也舉於鄉仕為東粵從事有聲以嘉靖己巳生公公年五十而卒時為萬厯戊午未及見瑄之成而其後以瑄貴贈中憲大夫先娶陳繼娶方皆贈恭人並矜嘉則而方恭人尤以教勤稱蕙文蚤凋簪笄共歎合葬西郊杜塢之原銘曰孝友以物身寧淡以正情不威而能禁淫無財而能濟人竊其道以加民則必有千年之名是故貴乎趨而過庭光祿大官丞周桂寰公墓志銘周氏之著於松陵者其先則大冢宰恭肅公以銓綜著鑑尋甸守中憲公以保障著才進士宜春公以絃歌著道侍御史來玉先生以剛鯁嬰患著忠而其後賢則今㑹稽使君燦更以無欲不煩著亷愛斯為盛已天下以為是其家則猶瑶圃也小璣蒼璧入將失容曷復有其子孫兄弟父祖頡頏下上而為名其間者乎而光祿桂寰公固有以名公以恭肅尋甸為之祖宜春侍御為之昆季㑹稽使君為之孫而松陵之人軯然而名公者不曰孝子則曰悌弟不曰慈父則曰義士曰仁人蓋吾聞其所名孝者以其自致也自致以其勇為公父光祿存江公沒公孺子泣充瞿骨立未竒也當此之時仲氏既貴衾之襚之公曰吾事封之樹之公曰吾事曰吾長督耳其趨孝如趨市懼或先之者苟自引賤貧致哀焉而已故曰孝子其所名悌者以其分疚也分疚以其無我仲氏中道殞吏繇其子使將千粟饋京師公方齎裝謁選既哀其子乃移繇於已移裝於繇裝既盡不得謁主爵吏而歸或嗤公愚公曰嗟乎即非孔懷天下寧當有分榮不分悴者耶若是者是其枝連故曰悌弟其所名慈者以其鞠哀也鞠哀以其寡欲當公鼓盆腹悲時年四十强昆季乂方貴盛有華族欲女之女者公辭之甚厲曰吾豈能蘆花衣吾子乎卒不娶終身夫篤儷逺芬克己明志此其於道甚備也公特曰以愛吾子故曰慈父其所名義者以其賤貨也賤貨以其保交有公之友某假公資客死公為焚券又撫遺其家甚厚又友某挾僞取公貨數百金去卒不酬公卒不問此二友者賴公之義以不凶終公曰鮑管何人羊郈在我故曰義士其所名仁者以其濟衆也濟衆以其忠上邑患水宰大治塘將助不應公奮然輸千金由是輸者麕至而塘成已而嵗饑宰下令平糴公倒囷應之則亦遂有應者而饑不害卜式曰有財者輸財漢武侯之以為是其以一慨生百慷者也故曰仁人夫此五者公之梗凡然余以為觀止不欲多聞公道大都公有志量多讀書上觀下詒知所取豫夫取則必取之其祖父與其昆季豫則必豫之其子孫往者不可見余向見侍御今見㑹稽使君孤松芳蘭其徵也夫公葬既十年燦之治㑹稽於是二年鋒車埀發乃使余為之銘銘曰瓊之視瑤瑤何以傲孰曰顯功則鞺而幽修弗耀乎備道五矣而安有餘道封承德郎吏部稽勳司主事李漢翔先生洎配許安人高安人墓志銘凡負濤氣宜奔騰壯發而廣陵之皋人所歸道德於漢翔先生者曰以其古處古處以其守內守內以其淳靜夫淳靜者遏澆之巨砥禁喧之元符也昔者庚桑之道貴無為不言而俗化彥方之道歸有制亦不言而俗正淳之取化靜之取正譬則鞺之取鞳耳天下於是以為先生之道兼二子也先生以仁義為稼穡以孝友為蠶織以攻苦為飱寢以溫厚為醯醬以謙抑為檣馬以廣大為帷被以安淡為簪帶以慷慨為囊倉以坦施為針藥有願其識有畏其知有榮其生有哀其死生嘉靖壬戌沒崇禎庚辰瑞世七十九年當其為士士儀其文三十年去為大官丞吏隱二十年以子吏部貴聲聞天子稱封公十九年先娶許良媛也不幸早死繼娶高先先生沒十六年備德盡儀多士行並以吏部貴贈封俱安人子四文學之本吏部之椿其著者也二子潛飛異遭而天下並貴其文章名行比之軾轍即亦以先生夫婦為允明程母葬於城南之原銘曰靜其氣以淳其邦雖濤之怒能不降不孤有雙於戲先生夫婦之德之龎湖廣布政司參議備兵常鎮道諶軒商公暨配張孺人墓志銘㑹稽之商在百年之內嶻巘彪耀者其先則太僕明洲先生肅括有儀槩廷尉燕陽先生宏深而軒翥贈公景亳先生不仕以篤學守已聞而近則冢宰等軒先生以端亮清通為時表極諶軒公最後起而服驂於其祖若父兄之間天下以為連甍錯組雖察目利爪莫能離其編縷也越人曰繄商人實為四世五賢矣自諶軒公通籍至於蓋棺十餘年間譽望滿世其最挺舉莫如其為諫官時耳先是六七年公以商城令治行高等入為兵科給事中其時天子以王人皆輕藩國而文吏賤武臣特著令嚴藩禮如制而抗韎韋節使之右又得下符𨽻郡邑公以為天子宏略然而怖其卒也乃上書千百餘言大約欲天子以義抑恩而師干大吏得以權制將帥天子覽奏怒㑹首輔烏程以病下直次輔長洲文公得為天子言是其詞雖戇要有明識其意忠不可罪也持久之天子心悟乃從文公言僅奪俸三月於是公名益振而公亦益自奮繼上又十數書多危切大臣用事者忌之出為按察司僉事視兵瓊州瓊海外荒服黎漢錯居泯棼不可治往使者率因俗為治曰不治治之也公曰吾在天子前數言禮樂教化今專節海上不使一方暗䀜得耀光明而化椎結為冠帶還念珥筆掖闈時即地可穴將不入乎乃為其俗明分義正紀綱漸形文章之言玉帛之事而又割正民黎不得相出入為奸亂安南彛商蕩而以寇聞者公亷得實悉縱之給符使返其政純任德禮一海歸仁焉無亡晉少參移鎮毗潤毗潤土華族繁多豪猾難治甚海外於是錫山民以逋官租結聚焚劫為亂所司愕眙請無急曰急之將益甚公艴然曰吾向亦數在天子前言兵事曰亂則斬之今小警輒縮朒是使天子薄諫臣曰子在朕前智略輻輳出連十數城即如河中木耳乃驅車疾馳至錫發數十校械其魁至立斬之餘黨悉平毗潤之人驚相謂公有將略也而一時之論又因此追念公始令商城其治備文武之道使民見慈而豪右畏之如毅神威霹然者邑有巨憝負嵎連黨數百人倚串官市為里閭大害莫敢問公悉捕置之法公自以至清度豪右無所持之故擊治甚力一時稱强項令必歸商公論者以為公之為諫官彊直治氣皆由於此矣自公之為諫官風論一出而天下皆歸道於公凡十餘年間出入中裔小剸大割天下之論公與公自論莫不引符於其為諫官也傳曰辭之不可以已也如是夫顧自吾觀乎公之一身相反者四公為人朴訥和靜有如處子故人曰與商公遊覺葛天為近而及其感至氣發爭是非殿上執獶持虎力雄萬夫此其相反者也公行避蟻手觸童子幾與俱啼抶囚十五以上則心痛不食而掊擊豪强拔薤破柱齒齘鬚張威怒四達此又其相反者也公困文場四十年垂老讀益勵椎鐵為盡語人云吾奈功名心急何而當其淹疏嶺海夷猶坦施琴鶴淡然貌彌華舉此又其相反者也公孝事太夫人五十猶慕每一之官心顔俱悴卒以哭太夫人中傷得疾以死而當其入諍嚴庭出犁梗穴乘危觸險若不知其家有母者此又其相反者也倪子曰此由公至誠明道因事竭才凡天下畸至之行甚通之情皆不可語於此是故由公之道可以為大臣年不究德惜也庸非天哉公名周初别號諶軒舉崇禎元年進士生萬厯丙子卒崇禎己卯享年六十有四配張贈孺人備儀齊德别有傳長公一嵗先公二十年卒合葬西施山之原銘曰呌於閶闔氣達誠徹以生其業治民而民悅控彛則彛懾千功百能由諫舌東里鄭公墓志銘鄭孝亷元勳以甲子魁南國始吾讀其文謂人曰是某以上人也既三年見其人䢴水益自失乃孝亷顧以吾一日粃先退而執箕其又一年吾官南雍孝亷乃以其父東里公藏銘請曰惟吾父之才與志其生不售無如世何死而不朽則在夫子吾唯唯受其狀讀而歎曰父子之道同氣異息有若是乎公名之彥字仲雋東里其别號云其先在宋曰文顯者登王十朋榜進士官迪功郎為諸王宫講自宋迄元峩科達官不絶入明曰道同者以進士授官河南道監察御史抗直有聲革除之難與其叔徵君曰桓者死焉世稱雙忠兩公既罹慘禍其後人遂以讀為戒數傳至嘉靖時曰天健者始讀書知名再世生良鐸又再世生潔潭公景濓即公父也公生而秀慧有至性潔潭公讀書不成家益廢乃棄而為客配張從焉則遺公與其王母居時五嵗耳頭角嶷然七嵗奉王母徒步數百里㑹母張池陽道路見者惻然憐之潔潭公客數年家稍振乃盡室徙維揚尚無意教公讀也其仲父某公偶攜之煮場一時從某公丐貸者數十人某公既盡應之而不入其契既而忘之公從旁舉奏了了不失一某公大驚因令之從師受尚書學公既負異資又靜專攻苦學日益進毗陵宿儒曰賈善長者其門最多士公皆溟滓弟之為文有氣決同郡張紹川公見而竒之遂字以女弱冠補真州弟子員郡邑每試輒高等然不售慨憤入成均時大司成傅公博士董公見其文每輒稱善置第一又不售甲丙之役已收復落者再蓋真數竒云公性好施方授室大㢮奩飾以周賑窮乏至有赤貧起家至數千緡者葬其外氏祖父孫凡三世公家五世不異食自公持家柄十餘年無間言既而或勸之曰久聚必爭公歎曰理或然乎乃始謀析箸出其裝褁文簿井井繩繩以授諸季不私絲黍羡三千金一門之人以公治家久甚勩請得為公夀公毅然辭之凡公之義正不苟財利類如此公雖儒者然有志量能決事士大夫之負世望與公交者所商多天下大計公抵掌洞然聞者駭服鹺使者下車問諸商疾苦凡諸商所條上即出公指授主者無不熹心立見施行者而一時里中大姓方程汪吳諸氏有大爭必以咨公公為摩理切勢授之成謀人奉之如循畔然其不然動往得咎故里中以為神明里豪某氏者為鹺巨猾睨公經生竒貨輒鉤牽起大釁危中公人皆為公心悸公談笑應之豪反得大創以去晚嵗講研天文旁究山川形勢著漕運海運圖說鋟行於世周核至當有識多稱之者嗟乎自國家急兵食以來凡十數年薦紳朝士以為其鵠也銛智矢而謀之然試詰以綱領何在則植睹泚口而不能應豈其肉藿異量與何公之洞也銘曰智謀國老場屋義及物蚤窀穸嗚呼命也夫韋若豫處士墓志銘君名宷字若豫浙西武康人居上陌矯志刻行期為聖賢其學以靜誠為宗四方聞其名從遊日衆隨世為科舉之文世宗其文如其人既乃自咎曰夫學道而應科舉譬之避人而入市也昔者尹焞恥之吾亦恥之於是乃絶意聞達家貧四壁立不肯干人邑令有遺謝不受嘗遊豫章逆旅困頓故人吏其土者修臨卭之分甚恭君與書絶交云即客無狀以猪肝纍安邑此惡賓辱令吾不忍為拂衣竟去其狷峻類如此豫章余公應桂者孤岸少許可獨心貴君號曰畏友㑹有詔公卿以下各舉賢良一人余公大喜曰無若韋生即草疏將上使使物色君顧已死余公惋恨旁皇更求代者良久不可得喟然歎曰嗟乎天下士豈易雙哉君以崇禎八年五月卒於里葬武康之丹山銘曰是百世士稍豫品官更歷一紀道行於民頑懦俱起惜也僅爾倪文貞集卷十
