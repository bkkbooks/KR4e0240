body:
  text: 倪文貞奏疏卷十明倪元璐撰救秦急䇿疏題為救秦急䇿事臣觀寇之趨秦是圗家當盜竊仁義瓦解人心風聞牛酒犒軍開門款逆賊本秦人向苦暴兵反以水火為之雲霓半月以來烽信杳絶凡傳尚存不陷者多是由降得免臨潼非守朝邑是破慮成割據坐失西陲新督後至已分客主呼兵號餉倉皇痛苦當局情事非為葸謀臣部空鐺不能大副要以撫時量勢實切疚心承對至今臣憂深病作既而思之事亦有可為者臣維古者封建諸侯以為屏翰國家大誼篤于宗藩今天下諸藩無如秦富晉雖小儉亦尚能國也皇上何不立垂手詔切諭兩藩以剿賊保秦責秦藩以遏賊不入晉責晉藩如兩王能任殺賊即不妨假以大將之權如其遜不知兵宜使悉輸所有與其齎盜何不享軍賊平之後益封兩藩各一子仍如親王之制亦足報之矣詩曰宗子維城兩王不見近者十一宗之禍乎而周衡特以慷慨捐資獲全青汴兩賢王忠而熟于計必知所處伏惟聖明決策施行崇禎十六年十一月初八日具題奉旨逆寇西犯秦晉諸藩自當竭力同讎這奏切諭饗軍事宜深得封建屏翰之旨著吏禮二部擬議速奏門稅積弊疏題為請釐門稅積弊以警官邪以蘇商困事臣比察崇文門稅事不覺呌歎失聲嗟乎官貪如此百姓安得不窮天下安得不亂乎有商人湯茂等因臣方務釐剔呈稱該差苛罰情弊臣初疑其言過實因拘本差書辦三人及鋪商十餘人到部臣親訊之羣商具言每有失報一紗一裙通罰全單而又倍之至于數百者臣大駭安得有此因弔取從前報單閲之凡一單所開貨物多者至二三千件數十商之所共也商云通罰全單者蓋言以一貨失報而重科數千件已報不漏之稅以一人犯令而遍罰數十家同單無罪之人積而倍之以至數百臣訊該辦有此否對曰自來有之例實如此臣益大駭問以奉何明旨則曰無有也問有例簿否亦曰無有也臣歎無律無例而能守之不失此之律例即在該辦胸中口中提挈本官耳又問此項罰資銷歸何處對以即充餉額不别分疏此又知盡歸私槖耳臣時怒形齒鬚痛抶之數十所司往者不可追臣蒞任來署管者主事朱從義也時臣曲咨本差利弊從義不為臣一言幸以他事奉旨降調去任苟久任之必無能改于其德合于原降職級外再實降二級以不覺察之罪罪之臣猶以為薄也臣因之深思敬陳末議自後商人失報貨物者依律只沒本件入官此外更無科罰所沒貨物即發本商照時估變償上納凡罰自絲銖以上悉須具帖呈堂批行方準堂存案册仍以每月朔望二期頒示榜文彚開半月內所罰名數商人見此榜文方行完納凡罰入銀兩另作一項歲終報聞充餉不許混入稅額之中違者官胥並從重論則貪狼奇鬼之術俱無所施去商大纍而國亦有小利焉以其後此所罰皆歸官也抑臣因崇文門而知天下之為關者皆如此矣臣見南中關署有大書刋牌凡漏貨一件通沒一船貨物之半入官者此又是何律令所司凡奉詔書槩多挂壁惟此等杜撰條例奉為龜蓍自臣所見能不為此者幾人哉除不時咨訪糾參外伏希嚴詔飭行今日苟使商賈常通道路無怨亦綏靖之道也伏候聖裁崇禎十六年月日具題申請封典疏題為欽奉上傳事崇禎十六年十一月二十四日恭接內閣送到上傳昨户部所奏兑貨一事是否可行仍著議妥具奏同日又接上傳官軍布花本折俱未給散著輔臣傳與該部務在本月給散不得遲延欽此該臣看得兑貨一議起于侍郎王鰲永其意本欲自南起腳處所為之今取急濟眉燃或使京商以布匹等貨抵兑會臣部即以抵軍需商人以脫滯貨為喜邊人以得京貨為貴轉移之間可得倍利及承對而出集商人與議纍日羣商以布匹等貨賣盡無多且邊人此時冬衣已備所餘零雜未必邉人所需事須來年從長計算容臣與鰲永酌妥另疏奏聞至于布花本折應銀八萬餘兩而太倉庫存止一千餘商人兑會上納用過共八萬餘兩未完不上七萬未必月內能完惟須急催併俟外解之至幸得接濟自不遲延也臣面承聖諭歲內須措銀百萬倘外解不至臣復何措乎雖有權宜如贖罪事例亦猶逺在來年臣計畫無之復申封典錫類之説苟以是號于天下亦已緩請先自京官三品以下近畿外任各官及畿內外林居間住而止未經贈封者聽得捐助分别等次酬以應得封典限以盡歲而止或可立得若干萬皇上聖明慎重名器顧臣謂此與他項濫冒不同其説有三親以子貴雖不封之人之崇禮之猶其子也本為其所應得所爭後先耳一也以資納官即得臨民視事今天章雖貴僅一空名耳鞶帶之榮沒者泉塗生者亦不出里巷閫閾之內二也又臣之議聽諸臣效義于先而示酬其後以其忠來以其孝往立言有體非懸王言為市之謂三也義取救急此等不為無可為者臣本儒臣設䇿出此誠心疚汗流顧以為猶愈于加𣲖開採耳如蒙裁允乞立敕吏部同臣部二日內詳議開列具奏施行至商人年標先經臣面奏放行以此通人情而示信並附題知崇禎十六年十一月二十七日具題奉旨知道了布花銀兩著速催蚤給不得稽遲封典準暫行即會同吏部詳酌議妥具奏鹽政改官疏題為鹽政改官宜明職掌懇乞宣昭諭旨以定大謀事頃蒙皇上召對內閣府部等官臣從諸臣後奏稱國家命脈繫乎淮揚誠為南北咽喉財賦都會賊寇所最睥睨今鹽商五百萬資本蕩于亂兵失業星散非徒虧課已也天下形勢於是乎且將坐失而不可收拾最足寒心請特命才望大臣一員專鎮揚州撫商通貨行劉晏之術兼令聯攝竈丁鹽徒漸成保障富強大業端在于斯有此大臣則巡鹽御史一官遂可停撤既專責任無所旁撓又得因其廨宇人役不煩增費誠為便計奏訖蒙天顔霽悅稱善其明日傳命吏部如議選舉能者吏部咨商于臣以淮海道僉事黃家瑞上奉聖旨是黃家瑞升都察院右僉都御史督理淮揚等處鹽法軍餉事務欽此臣聞家瑞之為人也潔清而敏決制下舉朝皆賀然臣惟恐更制之始不明指歸或以此舉僅為鹽策一事已耳如僅以鹽而已御史執之有餘今之任事者亦能也所貴乎大臣者欲以博通兼綜為務以鹽為端而益以通貨貿遷如劉晏所為竈丁鹽徒皆可兵也當餉未集以威德籠束之使不為盜賊及其用足即可收而餉之屹成徑旅可以翼漕可以支寇又可得久任十數年不移亦如劉晏然者并略倣文天祥建閫立鎮之意是臣今日所以請皇上改官之意也否則何事取高皇帝之舊制而紛更之乎為此具題仰乞聖裁審酌先之以諭旨繼之以敕書確切責成使知所守或云宜召家瑞乘傳入對皇上面指授之臣等亦得與往復咨謀謀定而後受事此言似有思理蓋臣初意欲吏部選舉在廷大臣衆議未決臣因力自請行在今日足國強兵之計臣必不肯獨貽君父憂而輔臣景文等謂司農之任較重未可輕移臣因舉家瑞以代然臣猶恐外吏不知朝廷之指而任者不副議者之心耳統候聖明裁奪施行崇禎十六年十一月二十八日具題奉旨淮揚特設重臣不止鹽法一節凡裕國足民應行事宜卿即日詳議確奏咨商輔臣撰敕責成不必召對巡鹽御史著該衙門停撤釐飭漕欠積弊疏題為欽奉上傳事臣于本月十九日恭承召對清問漕欠過多作何釐飭臣時面奏大要言其弊有二一在于兑次軍民通謀折乾一在于沿途旗甲私行盜賣欲絶折乾之弊惟責巡漕御史于京口地方設法盤驗欲絶盜賣之弊惟多設督漕官員就沿途處所多方禁緝除此二者别無他謀昨閣臣陳演等傳臣至東閣恭述上諭詢問釐飭之詳謹條五議以請衛官不肖旗甲無賴則聚而食漕米立盡今責糧道選官必廉謹責有司僉旗必殷實此一法也衛官不能制旗甲而反衣食于旗甲所在相關漕務衙門不能察衛官而反漁獵乎衛官所衣食漁獵者皆取之漕米今責漕運總巡諸臣立法力禁衛官使必無求于旗甲力禁衙門人役使必無求于衛官少所費即少所侵此又一法也軍民皆利折色入船原無足米今責各撫按嚴飭有司凡軍民交兑顆粒盡須本色有私行折乾者與受皆罪此又一法也漕艘至京口是為大滙今責巡漕御史于此設法抽掣盤驗過此淮上漕撫又覆稽之如米不足治該辨重罪立責買補仍察𨽻何州縣該有司並行參治此又一法也過此所憂惟在盜賣督糧道臣不得分身偏攝請令各撫按每府愼選廉幹府佐一員各督本郡之糧以參制衛官而襄道臣之不逮米到京通察無虧欠即與超升府正無循題敘虛文欠者分别多寡差等禠降此又一法也行此五者釐漕之道已盡伏候聖裁崇禎十六年十二月初一日具題奉旨條奏五議悉于漕事有禆著速行各該衙門恪實遵行請停開採疏題為民情宜順開採宜停事本月初二日閣臣陳演等傳臣至閣恭敘上傳二事一議開採一議事例欽此該臣看得為開採之言者蓋以此天地自然之利行之可必無弊者也然臣中夜思之竊猶以為未便雖曰鑄山埒稱煮海原其利害實相徑庭其説有六海挹注而已山須鑿發勞費金銀之氣又未必可望而知一也民不處海多山居者百家墳墓千家閭井或言其下有金銀則鉏斸必及之矣二也即云北地山少民墳而山川秀氣拱衛天都毁掘所加動傷地脈非如酌水于海無關形勢三也天下莫不歸利于鹽而歸害于礦自萬歷年間礦使為禍海內寃痛沸騷至今故老言之色變驟聞此議復興即必驚相告語訛言四起羣心動搖四也又臣嘗纂修神廟實録據所會計出入子母大都得不償失即當時使者别有進奉總由威脅地方逼使包承認納富者蕩産貧者殞身盡是民脂豈為地寶五也有礦卒殃民即必有礦賊殃礦向當神廟太平劫殺屢告况在今日誰不生心此輩一聚不復可散漸成形候與流寇通氣方當東防西禦豈可又聚羶招蠅六也有此六者臣不敢議凡救敝世如理敗楹若為求蔽風雨之計而轉開鳥鼠之穴則利未享而害先之臣惟恐詔令一出示人以端有司欲以見功姦人因之生事天下皆山也聞風而起言礦之徒日集輦下鼎鼎騷騷安知所底以臣之見莫如確循明諭使該督撫自制財用聽其便宜曰便宜則百事俱在苟無害吾民即斟酌行之非必決意開採也至于事例內如準貢義生等議或不妨暫行容臣會同禮工二部酌妥奏聞崇禎十六年十二月初三日具題奉聖旨覽卿奏自屬正論但念國用告詘民生寡遂不忍再苦吾民如以地方自生之財供地方軍需之用官不特遣金不解京五金隨地所宜緩急皆可有濟其視搜括加𣲖孰為便益倘地方官奉行不善借端生擾如鉏斸墳閭逼勒包納等弊責成督撫罪自有歸發下坤輿格致全書著地方官相酌地形便宜採取仍據實奏報不得坐廢實利徒括民脂湯若望即著赴薊督軍前傳習採法併火器水利等項該部傳飭行鈔法難于遽行事題為鈔法推行有漸以順民之所欲事前月二十日恭承召對面諭臣會同王鰲永蔣臣詳議鈔法推行事宜臣愚謂鈔法祖制也自今日議之則為非常之原矣皇上注懷軍國法祖宜民獨斷毅行誠為艱巨慎始慮終舉朝鰓鰓臣等亦戰戰也顧臣以為欲行難行之法先須安定人心今外間洶藉不明聖意以為朝廷將廢金興楮強民收受抑勒通行此誠勢所萬難要知功令原不如此皇上行鈔先行自上不以責民如起解存留錢糧及罰贖稅契關稅間架等項百姓所輸官者即須用鈔鈔無兑耗民必便之若朝廷之所豫民如軍糈商本匠值役餼不遽行鈔也民間田屋米鹽一切交易行使聽其自便不強勒必行鈔也即有折閲不便官自受之于民何與焉此意斷宜于數月之前詔諭天下使百姓曉然知此法之行實于民間有利無害以此大定其心則訛言不興令行無禁至于法行以漸宜自近始在內局造鈔且不須多明年先于畿輔一二縣愼擇廉敏甲科往為之令如徴糧收受有法罰贖稅契等項如法徴收移其私囊以為國課使民歡然稱便若惟恐鈔之不行者如此一年立擢科道而臣部亦愼選司官就彼給散民以銀易鈔者平凖交易一如里市無所費擾而民亦歡然稱便如此一年立擢吏部夫天下有司不能盡廉敏部司之遣亦不能遍天下也惟立一二為之鵠的使姦人不能撓法有司之不能行法者不敢咎法之不善則法必行矣且在近則易察懸賞則知勵畿輔之所慕天下慕之逮夫羣情知鈔之利競欲得鈔而鈔于是乎與黃金等貴黃金于是乎與土同價故曰巽以行權復久湮之制當易動之時驚風驟雷非所宜也區區之見伏候聖裁崇禎十六年十二月初六日具題奉旨覽奏自屬至論但鈔法期于速行其間或有窒礙自宜詳細講求豈得遲之數年即會同王鰲永確議奏來倪文貞奏疏卷十
