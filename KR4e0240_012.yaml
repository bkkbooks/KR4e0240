body:
  text: 倪文貞集巻十二明倪元璐撰誌狀誥封韓母謝太淑人鍾太淑人合祔墓誌銘蓋今世躬被道徳而名聞天下者無若吾師若海先生今天子注期鼎耳旁求且及而先生顧以連執太夫人喪久滯草土先生之所自致孝禮殫矣而天子懐甘盤之徳先後予葬祭有加人子榮之方先生之發使請恩於朝也顧授書元璐曰惟吾嫡母謝太淑人葬且二年然猶虚墓碣今又將以某月日葬吾生母鍾太淑人既均聖善又皆祔之先宗伯之左右必子為之合誌其幽以其義類比於史之同傳是可為也璐於是惕然承命蓋謝太淑人者生有至性年十六歸海羅公逮事其舅博士公甚謹時姑黄早世太淑人悲思憾恨毎嵗時致祭躬親錡釡對之輒嗚咽不自勝亡何博士公殁海羅公方充瞿以為孝太淑人則起持家棅井井繩繩也海羅公治家修整即燕居言笑稀絶太淑人處之如嚴賓然故人謂韓氏家法冀缺何曾復見矣當是時食貧良苦太淑人殊夷猶益自操作黽勉有無即緩急無苦乏絶者與人和而有禮宗婣盡稱之凡生數子皆殤今吾師若海先生及其仲日敬季日欽蓋俱側室鍾太淑人出也鍾太淑人父鍾翁以名家子貲雄一邑多治别墅山莽間㑹宼發穴焉而賊黨中有故為翁治田傭者郡守某外慕搏擊而中多欲遂以是文致翁已又使其傾家營一寺自贖成矣詭言不良悉圮之使更造告殫不聴曰若無子女乎是亦貲也翁窘甚涕泣謂太淑人曰事急矣冀子為周伯仁母以振家門於是乃相攸於韓惟太淑人自以為屈節甚怨雖自既貴以至垂老每言之悽恫良久云然太淑人性特婉令嫺禮法歸韓嚴奉海羅公而事謝太淑人謹曲無忤謝太淑人以是親愛之撫先生伯仲無殊已出有其已出四女愛之不能及也鍾太淑人之為母其教比父既以中無顧嫌益得專力為畫荻丸熊之事於是先生以丁未高第中宏詞科讀秘書金門使使並迎三尊人者時二老難逺行不至獨太淑人以綵輿周覧王畿凡三年而海羅公捐館舎又十六年為崇禎丁邜時先生方寅清留秩而謝太淑人以病卒於家又三年庚午鍾太淑人繼之兩太君皆以先生貴累封至今稱謝太淑人生嘉靖丁未十一月十五日享年八十有一鍾太淑人生嘉靖甲寅七月十二日享年七十有七大都兩太君之為恭孝儉勤而稱夀母若合珪璋也則真娣姒云元璐曰自某立先生門凡十年積知先生之有母儀其上也然所聞兩太君徳甚備今先生所授狀僅焉耳惟先生以為婦人之道固不可以繁稱也抑竊有慨焉前五六年兇閹用事大庭之麻嵗三四發海内之人即以為位望無踰先生者乃先生竟淹踈自逺終璫之世吏隠白門而後始以憂去自先生之為鯁固寧澹非有難於此者然聞兩太君實教之嗚呼豈可没哉既為之志因系以銘銘曰女有士稱母均父義鴛戢斯福鶼比彌貴無喪厥茀並良其袂有子顯名不必毛裏有夫齊徳不必正位金水之輝與陽俱麗鬱哉斯丘萬有千嵗誥封恭人宋母左氏墓誌銘萊陽之有宋氏猶安平之崔汝南之應也叅議公之峻整宗玉兄弟之名通盛矣抑猶有女徳所謂左恭人者可風也宗玉兄弟將葬恭人發使走千二百餘里援其姻繕部高公宏圖所為狀請銘元璐不文又心韙子瞻從載筆來不敢輒承藏記謝者數矣宗玉兄弟豈心知其如此而顧命之乎葢左為萊陽望族多聞人恭人父孝廉之有三上春官不第卒恭人性寧重年十九歸叅議公宋氏世以儒術顯至公而大當公為諸生甚貧而專讀不知米鹽何等生兒乳絀恭人手經指挂間為小兒頭上巾鬻得錢募乳乳兒公舉於鄉三年成進士授定興令恭人從之官自公為令清無一文逼嵗除旁顧僕婢縷裂悴然自語即安得百十餘無名錢使人懐十輪翔舞入新年耶葢色頗愧恭人從旁笑曰而家領州邑三世矣自吾眼中不慣見何物是無名錢若第作書報舅氏云兒不如阮孚亦何如大人刺寧州時當不嗔也葢公父某公先守寧州人比其清胡質故恭人云然於是公乃大歡呼飲而罷公既以彊直不善宦棄縣令為學官稍遷國子博士博士官八品俸入益儉一日呼馬謁客馬圉請值無以應徙倚久之恭人為出弢中金數鐶授公公即得廓然一月騎馬恭人因顧謂宗玉兄弟曰昔汝父讀吾月字三十雞嵗畜豕四五頭出市賣之即得金槁束笥底既若而年不意遂是博士馬值也巳公遷農曹時京師豕肉貴恭人即不食豕而憐諸子不能如桞氏教使終食蔬乃别市羊肉為餔具率羊食五日當一日豕夜則取飯瀋雜大菜和油煮之飲御諸子以為常云當是時公受命司餉北平大司農予金錢二十八萬購豆芻四十萬事竣贏金四萬吏密請為公夀曰此例也語未卒公頰發赤腦脈墳然如壯綆厲呵曰與跖同攫何例耶卒棄不取歸語恭人恭人曰甚善雖然即置之吾猶懼為跖守也今若以畀堂司抵年例則有歸矣夫為國節浮又兼舉一事不尤善乎公喜從之此兩人者其清則天合也而恭人尤善慮如此且夫饕取者庸人之所惡也而學士大夫或為之者其亦有道焉曰人規我隨一道也曰矯亦可譏一道也曰不汲竭而損餘且物自來一道也曰事其事矣亦若餼然一道也握此四道者而四萬金兎興馬逝灕然至其囊中弗怪矣夫愚攫者不見人見金智攫者不見金見道不攫者不見道見跖然人猶以公為易曰鬚眉耳恭人婦人不聞北門詩人之言乎且公即忘定興徬徨嵗錢國子先生呼馬不得時恭人亦不恨􅀈紩小兒巾孳雞牧豕時鹿門䝉山何徳之齊也久之公以積資擢山西叅議尋改備兵榆林以親老丐歸而宗玉兄弟先後成進士俱試為令迭互輿奉恭人文玉既以治行第一徵為吏科給事中而宗玉悦安察朗以治祥符皆恭人之教也恭人之為人習苦而力為義與人多周旋人有忤者雖甚愠涕泣而已不能有發攄習苦則革不榮力為義則中悐悐然多周旋則神費不能有發攄則氣菀不達以是蚤衰方年四十九遽隕兩齒未幾都盡齦相摩不能離虀腊於是崇禎壬申九月以羸疾卒於祥符官署悲夫倪子曰吾讀宗玉兄弟文章奥微精典以一萊陽撥策天下天下皆學之然皆不能也其所以不能天下亦皆不之知夫宋氏之文湛於經之至精而取其堅理而天下以其貌近子乃掠子而䝉其榮華榮華之言有茅是故可破也若宋氏之所捶結繩轄未有可破者其竒爾力其堅非爾力也抑有胎禀焉觀於恭人之動必禮守必嗇抱其性義若鞬然豈不可悟文章之道哉恭人生萬厯丙子子三長琮即宗玉次珵字呈玉季玫即文玉娶某某氏塋依祖阡之北林庄銘曰夫取其義為之官而官偉子取其道為之文而文起吏澤十世文章之力千紀嗚呼恭人不死勅封李母姜太孺人墓銘凡人著節譬臨怒潮航者蕩魂觀者歌舞夫婦徳居安而領寂也若其不幸閔㷀集蓼道貞義抗則亦遂橛挭鞺鞳傑烈男子皆畏之矣丹陽之姜為今望族當顯皇初載大宗伯鳳阿先生名位最炳及其中季先生子養沖公以外藩吏抗疏極論時政忤㫖落十二官以老當是時養沖公之名振於天下其後又三十餘年給諫興化李君清嚴節敢言失貴臣意幾中危法其時之稱鯁固者又皆歸李君也大江南北尋咫之間二華蹋離是為姜李姜之後多英而其究貞於女徳李之先多顯而其原篤於母儀則所稱李母姜太孺人者也太孺人備美不可詳稱而天下所大尊文人作者之所艷舉則皆以其苦節明義夫節義之為宫鐘非若内言沈閨惡其外出者矣養沖公生太孺人凡十八年而以歸徵士二十有六而稱未亡時生文學洵九年給諫清七年忍死恩勤慈盡嚴出血淚和飯毒於熊丸既又十餘年而給諫遂以少年連第授官甬東從事給諫之為從事也民自無寃甬東之人皆知其堂有問平反者尋以治行第一召入内垣天子以其知刑又使執刑給諫既感恩奮激又以太孺人義槩疇昔教忠無畏禍兒女子之言其愛子之名甚於其官益復慷慨發攄無所牽摺當此之時天子英武欲以義正天下而邦禁大臣顧乃托為張杜之謀以窮威取貨周内沈命梧丘晝號給諫心痛之疏言其狀甚盡大臣聞之恚上書反攻給諫又時為蜚語動上由是得㫖落三官予外時太孺人已病給諫歸拜牀下涕泣久之太孺人即問兒何由得歸給諫以誠告太孺人大喜曰兒能如此吾即死何憾哉其後踰月遂瞑嗟乎給諫至孝顧其始不曰有母在不敢以身許人其既亦不曰無令太夫人知者即太孺人之為人母者可知之巳管仲三戰三北曰吾有母老唐李臯獲罪出則囚服就理入則擁笏懸魚坦坦施施及貶於潮以遷入賀此二子可謂孝矣將不疑其母之為庸婦人乎太孺人生萬厯癸未卒崇禎庚辰葬上元縣之躍鯉山於是與徵士同穴倪子銘之曰不言而雷域中者其義節乎何物縞綦乃爾健烈為其父教而子學之是曰姜李三傑也華母陸孺人墓誌銘往天啓丙寅之嵗璫禍方烈錫山高忠憲公吳門周忠節公同日被徵三吳震駭當是時怯者閉門勇者揵舌而諸生華仲通時亨顧迺侜張奔蹷呌哭並形左右兩公幾與同盡時予尚未交仲通聞之吳人之言如此私意彼其人必孤蕩一身釋然無復所生之慮者既復二年余始得見其文與其人大都豪舉健持當有竒節漫叩之有父母乎仲通肅然應曰並無恙余怪問即如是向者奈何遂以身許人仲通因言爾時實氣激無所復顧忠憲既因時亨得蚤戒歸全止水已即有嚴命根究所由然者時奸人搆致時亨甚力盡邑為時亨骨戰時亨父某公初亦危悸至終夜繞床行顧時亨母曰若且奈何母夷然微笑曰吾兒欲為范孟博吾亦孟博母復何憾時亨父稱善意大安於是就枕齁出仲通言已即起立义手曰吾父誠達士吾母則亦丈夫也余聞不覺距踊出於几上嗟乎六七年來天下正直之氣不在冠帶而在章縫不在鬚眉而在巾幗如此者豈不炳哉亡何孺人以病卒仲通遂以藏志屬予且示之狀余曰無庸也是母欲為范孟博母即孟博母所由傳亦只數語耳孺人之所以不死庸在多乎余備員史局深明古人闡幽之義以大柢為本即如狀所稱孺人事尊章孝甘貧佐讀不妬逮下備慈嚴之徳以朂二子使他人母有之亦駸駸乎稱女士矣其在孺人譬之長松所貴不在鱗文是故可畧也銘曰舉世女子有女子者行高於士嗚呼偉哉何母胡太孺人墓誌銘余以丁邜嵗奉使典江西試事闈中探一巻讀之宏茂以逺射其年正可强夙洎發覆則為何子三省方垂髫鬑鬑也怪士早慧如此必其家學有由然不然是有祖徳已而察其為人其襟靜而體専則又意其家必有閫教焉夫金水之星禀月之教以為其輝故其物粹而貞温而有力詩曰太姒嗣徽音則百斯男此歸宗功於女徳也其明年春何子偕計吏上謁余京邸逡巡出其大母胡太孺人狀跽而請銘余讀狀所稱其於余所意三者則均有矣余既自矜不謬故亦樂得而言之按狀太孺人胡近公長女何平山公之繼室也平山公先娶羅孺人生子孔陽孔彦羅孺人早世平山公以藐孤故乞婚於胡以為是其鄉右族有内行法當出賢女已而果然太孺人生而靜婉能讀書通孝經列女傳諸書得其義指持身進止禮法戚里見之者必曰此郝家女云歸何婦職明備事其繼姑胡太淑人如其姑􅎵瀡非其手出不以供也平山公既以高才領解與其伯氏心泉公季後峯公科名鼎峙人稱之三鳳太孺人顧獨瞿然以為盛名難居朂哉夫子察其所持葢少君徳操之流亞也當平山公之為𤾂城從事到官五日即解綬去𤾂城之人高之為亭志之曰高風當是時使平山公歸而謀諸婦動有北門之適靜無由房之歡斯亦烏能脱然如此者乎撫三子陽彦修如一人為賦鳲鳩莫知三子異乳者也太孺人嘗讀書至孝巳伯竒事以為此非人情葢其書不足信課三子讀甚嚴孔陽卒以是雋於鄉名籍籍起彦修亦並有聲賢豪間世言何氏代有三鳳則孺人之教也孔陽既數舉不第乃俛首就一官閩之清流孺人竊竊語孔陽專城聴政自雄業即而無失衆人母余亦衆母母孔陽頓首謹受教竟以循吏稱三年奏最詔授今封太孺人葢於是丸熊之能見矣大都太孺人之難能也其孝能孝其後姑其慈能慈其前子不櫛而知詩書通梵書而不佞佛言不出閫而捐金以疏黌流蜚聲學士大夫之間君子曰太孺人誠女士云銘曰姑非其姑以齋以慄子非其子以肥以澤其履也閨民有食其徳其戴也笄青青之衿有謌其績異哉從母王太孺人墓誌銘吾倪氏以仁義聞至王父南望公而篤矣南望公積學不售而有四子先府君中議公處仲而季即封侍御季父晉源公晉源公先娶王太孺人相莊十餘年而太孺人即世時生伯兄文學十年仲兄光禄八年其後四十年光禄成進士又三年始以歙令最追贈今稱太孺人尋召入臺又以恩申贈於是太孺人之徳聞於天子者再矣光禄直節鯁亮方有盛名通籍未二十年奄遽殞秀天下悼之葢光禄既殁而太孺人淒然猶在殯也於是晉源公欷歔徬徨謂伯兄文學曰往而母病革執余手泣曰吾實負公顧即死勿藏也吾日一汲於園今使浮我是間魂魄猶當持兩兒吾即死胸中氣歕然如雲霓即兒不貴朽此園耳余聞其言心悲抑非亂命也故重違之今四十年而兒幸貴又不幸死復何待乎乃經度逾一年得地曰黄泥菴者形氏相之吉斷以今嘉平幾望穸焉當乞銘晉源公徊翔久之而以使其猶子元璐謂元璐曰古者卑得諡尊則亦可銘也吾特以子文約而有體耳元璐造然受命伏而思曰嗟乎婦徳何易言哉戴子曰婦空空此言收名斂功示人之難也有可示人者大著耳婦徳之大著二攖變著節安常著孝節者治氣正才忠臣之事豪傑之行也孝之為道循性致情誠正之學聖人之所務也以元璐所知太孺人之事吾王父母其幾聖乎昔者王父文戰不得志卒得心疾疾作顛則舌出齦合血沫委藉以為恒先中議未貴臥起飲食率須先中議先中議既第授安成令當之官王父病不得行則獨輿王母陳太恭人先中議臨去涕泣諗晉源公曰吾恃若耳不然吾何可官晉源公年少專讀則又内要太孺人曰吾亦恃若耳不然吾何可讀太孺人性至孝以是二恃者則益恭太孺人之事病翁即一切􅎵瀡澣潄嘗先意刺情不需呼命察疾將作䕫䕫憚憚無敢啑咳無敢啖飲無敢臥寐如是者十餘年俄嵗驟饑殣量塗太孺人脱簪珮四求得精粲以供王父粗者食晉源公而自食粃晉源公讀歸見之流涕太孺人既致誠玉父而又以不得侍王母心憾恨已而王母卒於官邸太孺人方以哭殤病臥訃聞毁踊過當竟不起閭黨稱之以為生孝死孝太孺人皆有之也當光禄持臺使者節奉華綸歸里謁園宫伏地嗚咽贊者發明詔以次薦冠珈象服舄奕華舉當是時宗婣中外無近逺畢㑹皆吁歎言曰嗟乎天之報施孝婦如此雖遲久不於其躬抑豈有爽哉自太孺人之備徳齊案歸順諧類歸宜拊下歸惠教勤歸慈通務歸智安貧歸介而元璐不敢詳稱識其大者耳即季父約而有體一言是教元璐為文者也太孺人父賀陵王公為勾餘聞士其先樂湖雙堂兩先生皆顯貴太孺人年十八歸季父生嘉靖己未二月十九日卒萬厯辛邜八月十六日享年僅三十有三子二文學諱元珂娶陳光禄諱元珙天啓壬戌進士歴官江西廵按南直督學御史以言事救䕶復社謫行人司副稍遷今官娶賈季父繼娶俞封太孺人生一子元琩太學生娶姜銘曰兒弗貴慎無瘞悲哉其為志也明乎孝必孝報之故雖四十年而可俟誥封孫母錢太夫人行狀昨嵗丙寅秋七月孫母錢太夫人稱大齊先是里中士大夫蚤戒則以其年正旦上觴雜屠蘇奏之此如景星爭先取睹亦為眺月者難其舒望庶乗哉明以為迨時也太夫人既受諸大夫觴然神明不衰至七月及其辰則遂爽然受其季比部君觴里衆歡躍以為願義圓盡忽更三日媊文霣芒衆誠函酸亦莫能怨者此即以比部至孝幾裂肝腎然固不可以仇造物也於是將藏請銘比部乃自為乗授予狀之以介諸名公先生惟太夫人宫鐘久而比部孝子之言詞㫖悽至即名公先生立言所衷豈在余哉比部之意以為縷縠相謀共為藻繡鍼通其間則亦其介之者乎如是余安得辭葢太夫人者錢之自出父侍御公諱應揚魁浙舉進士有聲學者稱後峯先生太夫人生而凝整喜讀書悉通内則女誡列女傳諸篇得其義據母潘孺人蚤世事繼母孝侍御公愛之甚於子曰即櫛之庸渠不亢吾宗耶初孫文恪公陞與侍御㓜同學及薦又同譜又同官禁近於是請婚既襟契筮之又良報從焉太夫人乃以年十六歸清簡公鑨當是時忠烈公燧死宸濠之難已二十餘年王姑楊夫人在堂夫人既中傷忠烈居常每悲泣不能歡而性端察家人見者並顔戰太夫人承之婉婉媞媞盎如也事繼姑楊夫人尤謹定省如禮葢太夫人上事兩世即無不憙心歎稱之者人以為難當太夫人之來歸也侍御以忤分宜相不久罷去窶甚不能飾奩帳而文恪守官清家人食貧太夫人則緂麻索縷佐清簡讀清簡讀日奮遂以終軍棄繻之年領鄉薦又十三年登第授司馬郎徊翔曹署者四年晶金粟馬羊之誓而太夫人則亦綦縞自持如其未貴時亡何清簡以文恪喪去官三年服除時為肅皇帝之季年方崇壇祝弛朝御奸人因縁竊弄亡敢誰何者清簡憂憤抗章切諫言向者鹿馬神霄之事可鑒也章上羣奸皆剡手以須傾朝危駭宗親聞之者懼禍連及率裹裝夜逃去然太夫人獨夷猶如常時人以是言太夫人殆儒者夫人臣以忠𫉬罪即及其家豈言禍哉漢王仲卿妻呵止仲卿不當泣牛衣固已壯矣然仲卿既在位懐章奏彈大將軍王鳳仲卿妻遂乃伊優作情語牽持不知當時何用知仲卿尊貴太夫人以為如此則猶婦人也已而奏竟寢不下清簡又上疏乞骸骨歸太夫人忻然偕隠乃飭耕具召傭治田而躬操作佐之取給饘糜而已居久之莊皇帝改元清簡則以薦起南銓洊歴卿寺尋召入居之二年值江陵相奪情摘斥言者清簡以為爭之即非其職乃徑拂衣里居又十年葢清簡至是凡再起再罷自其出必岸然挺氣義斥賄砥權雖健夫不能奪比歸田乃殊澹逺雜然處寒生野老間莫能辨察者故當時士類謂清簡殊有龍徳然惟太夫人能齊之亦天合也於是冢子如法以少年成進士授比部郎當是時太夫人又以子貴而清簡季弟鑛方司銓奉楊夫人北邸太夫人從之婦姑甚驩即無異事王姑時尋遘楊夫人變扶櫬歸留比部於官時國本未立天下有大疑焉比部上書乞蚤定凡數千言敷㫖危動顯皇帝覽奏震怒下詔貶潮陽典史太夫人聞之益喜曰是兒欲為范鎮吾何求凡太夫人之為人母比於義方皆此類也比部既淹疎嶺海之間不得召而清簡再起光禄歴南北冢卿凡七年以守正忤時宰太夫人勸之歸持其共儉逾年而清簡捐舘舎又二十年而季子如洵又駿起舉高第授官亦比部郎比部風節如其父兄而特敦謹司讞多平反者世知其有母儀即稱之雋不疑云於是太夫人年九十餘春秋高矣潮陽君既即世比部乃陳情力求終侍得請太夫人於是享無方之養又八年而至是臻百嵗以微疾卒臨革神理晶然亦無所愴恨者太夫人之貴以夫封淑人以季子比部最晉今封一品太夫人身歴五朝凡五承譽命先是慈聖太皇太后千秋命婦入賀太夫人與焉太皇太后從衆請啟簾宣示軒表退賜文幣其明年仁聖太皇太后千秋亦如之一時壼媛傳之以為榮太夫人既感國恩深重即一飯無敢忘當國家之盛日北向呼天祝釐聲鞺然與隣嫗讚佛者晨昏相應有以灾雰邊警聞輒憂著眉面每旦起必持瓣香禱於庭或哂太夫人何為者太夫人正色曰子不聞陳寅妻杜生同君禄死共王事之言耶朝廷正何用豢我家豈能簪笄自處令漆室女笑人聞者悚服大都太夫人於婦徳無不備其孝根心處娣姒猶胞乳然持孔門恕字張公藝忍字終其身其為儉勤至一敗縞笥之八十餘年而百嵗手猶握鍼當清簡之為禮際其至恭止疏布一頭即皆出太夫人掌經指挂者嘗家祭無所供得兒折簪喜曰已得醨黍矣此其至細然中安無飾情他貴人母妻不能也馭下不束濕與人姁姁自里媪田姑見者皆驩然醇飲人人自謂得太夫人意而至其動止禮法嚴於杲霜其持家棅握轡守銜蓼菜甂甌不失堤列自清簡四十年居官不内顧比部兄弟及曾元十輩幼讀無外馳其才雖傑男子不如生平自無疾病即不曉藥爐何物卒之嵗猶辨蠅頭書不御鳩策上下階除如少壯殆天授云倪子曰天之於孫氏葢竭竒以奉之使其男子世有忠義文章徳業之事而巍卿大科蜂涌鱗次以為國華不已又益之以女徳自太夫人之備徳而處積貴齊案名鉅下將軾轍蘭荃敷挺崇封極年所謂女媧以来未之有也原其敦仁守虚規於不敗故孫氏之子孫其代有哲人而䝉天佑雖更百世不可得替也使其人替而後乃於太夫人乎取師使其天欲替之而後乃於太夫人乎取澤則尚將延享數十況其為升恒者哉太夫人以天啓丙寅七月二十五日卒距生嘉靖丁亥七月二十一日贏百年凡四日云其在孫氏世系子姓具詳家乗比部將以某月日奉太夫人合葬清簡公某山之陽幽宫永禎惟如椽所命雖極為之足取不愧葢太夫人女中郭有道也誥封商母劉太夫人行狀葢昔吾先大夫與故廷尉燕陽先生同薦於鄉而交最讙居又甚近腹背相倚中離一澗不可梁為方舟如席引繩而渡時時往來語笑移日以為常當是時先生亞嗣仲文公早殁冢宰周祚為之長孫方弱冠有文章盛名丁酉里選先生以其試文示先大夫先大夫讀之喜形襟袂連呼曰必得必得撤棘之旦先大夫櫛洗已即過先生曰吾榜使前驅也掀先生髯笑聲未卒而報者至乃呼酒盡酣而罷時予方五嵗或擁之之太夫人所太夫人旁午探果餌啖撫之今憶之宛然其後五年辛丑冢宰試春官相去幾四千里先生顧已得其文又以示先大夫先大夫大驚曰幾幾魁天下乎已而報者至䕶名狀甚堅不即揭先大夫方過之從旁呵曰即第三人何秘乎報者錯愕即揭狀果第三人於是里中以為美談也兩家既隣比相親比於同室雖聲呼至細亦如晨鐘夜舂倚枕能聴之耳自太夫人之稱未亡苦節炳然逮其既貴母儀日益著而吾母太恭人每言太夫人英偉男子也當太夫人暮年以來所傳聞數端即以稱英偉不虛耳葢冢宰兄弟至孝􅎵瀡至腆即恒饌常可供十數人太夫人不辭將徹必以散諸子姓隣近以逮僕婢至盡乃已或訝之太夫人曰兒等食大官糈以是禄養吾誠不欲琴瑟數秤米薪使吾子無所明志即吾分甘為惠固是其孝耳聞者韙之予因此悟不特曽參之孝養志也曽晳之慈庸渠非養志乎惟太夫人知之固已英偉一矣太夫人姻族既廣而宜子孫晩年門内外所自出及其兩黨冠縰無慮數百人其奔趨太夫人有如朝典人人心嚴太夫人而顧樂就之太夫人動必中繩言必成倫而其教人有方故人謂之女師予又因此悟隂陽之持教一也新婦蔽幃中言無出閫固然耳為人之母有教人之責矣班曹皆立言著誡宣文君至垂幔授生徒惟太夫人則又知之固已英偉二矣太夫人性和好施顧獨斥逺俗所使女牙婦儈者比於梟虎其羣數百游徼士大夫家如蠁投醯獨無一窺太夫人屏著者又一日廣㑹有尼突至挾方廣册諷太夫人即注千錢可恒河沙量福也太夫人搖手曰吾何事福吾一丸泥塞此善門既久矣麾使亟去或勸太夫人誠云善門又可得福何靳少錢太夫人曰吾避惡却禍耳何善與福之有夫使若等挾禍福之説以簧閨媛凶而家矣吾亦以教吾子孫也予因此又悟晉之天子至以姏姆師尼亡其天下陶宗儀曰三姑六婆家之蠍也學士大夫不能守其誡而太夫人持之斷如固已英偉三矣當冢宰之承環命太夫人既耄老冢宰辭至再不允太夫人曰上恩至矣且天下多事聖主急才必有倚閭而無側席是為不忠又豈得稱孝耶冢宰不得已洒泣就途既至闕時時上言求歸養一日入對涕泣叩頭請上不聴又請上怒厲聲責之冢宰遂不敢復言時太夫人已病困聞冢宰之不復請也反益喜嗟乎太夫人之忠也予因此又悟温江州之於晉有大功焉使其母先不持裾度其後可無憾恨漢安國恨矣世以其母知興見忠故亦不罪之假冢宰當日不得辭使者而太夫人有持裾之心冢宰今日即何以謝鮮民今即冢宰甚恨鮮民亦不以之貶孝者由太夫人之忠見志成也固已英偉四矣是故太夫人者元璐母子之所最知甚服即令孝子不以告觀風不以詢固將著之彤管而今以冢宰請狀又稍益之冢宰所自言者維太夫人劉之自出劉之居曰水澄為越望族自明興以來大科名卿蟬聯鱗次太夫人父太素公母姚儒行齊徳為州里所稱太夫人生而秀慧太素公絶竒愛之人鬼謀盡而相攸於商商自宋南渡從汴徙浙入明多聞人至太僕明洲公而大燕陽先生繼之益鞺鞳矣先生由進士為御史有聲官終少廷尉生四子次即仲文公館於劉一年而以太夫人歸仲文公既才竒不售讀日益苦太夫人䌟䌤佐之五舉終不得志邑邑以死太夫人痛甚顧復忍死以撫諸孤太夫人至慈煦煦然至是乃解柔著嚴冢宰兄弟皆以太夫人為之父與師業益大進亡何冢宰舉上第授邵武令迎太夫人之官不許曰吾有吾之姑及吾父母安能從若翩翩板輿乎其後八年冢宰以治行高等召為戸科給事中於是其姑金太夫人及太素公夫婦相繼以天年終冢宰始得奉太夫人京邸久之擢太僕少卿尋出撫福建中罷起督師兩廣十數年間太夫人皆就養於官已晉南大司空改大司馬太夫人歸而周覽家園者凡二年當是時今天子登極改元仲子少叅周初成進士矣冢宰喜曰何患無事君者乎即上疏乞歸田侍養許之又十年少叅自商城令入為兵科給事中尋出為僉事備兵瓊州上思舊徳即家起冢宰御史大夫不一年擢今官少叅又自瓊州晉今官備兵毘潤之間於是太夫人年已八十踰二矣忽卧病月餘卒不及見二子而目瞑其心誠無恨云先後凡七承譽命葢教子而食其報若耕刈然太夫人之所以教其子者率循事㑹因時致規苟著之典常則皆臣紀也故其教令曰愛民教諫官曰强諍教大吏曰正巳而其教憲銓則曰虚公平恕嗟乎此四字符太夫人非徒教其子也其以起世救時是則名醫之本治也循腠測腧而以投其針石天下皆當舉身聴之今使天下之持大權者隂詭刻深執隨投㑹即其官可以長子孫冢宰顧以太夫人之教不終日耳使冢宰非以太夫人之教不其墮乎哉太夫人生某年月日卒某年月日子孫婚姻詳家乗冢宰昆季謀筮良日合葬太夫人芝塘湖山之陽乞銘鴻碩而介以予言予才薄文采不揚不敢挾李翺不讓之心矜高楊二媛之紀若乃贈公之曰齊徳二難所聞教忠則有徵矣夫昌黎能誌韋君温國則銘程母皆由極信元蘇不疑壼秘今之君子何獨不然乎倪文貞集巻十二
