body:
  text: 倪文貞奏疏卷九明倪元璐撰臚陳生節疏題為臚陳生節要議事臣觀今天下大事患不富强也然富强之謀必衷之於仁義而始無弊臣本腐儒謬膺巨委當此時勢危迫聖主焦勞三月以來咨求籌畫心血幾盡生財大道逺或數十年近亦數年既不足以救眉急權宜之策臣不敢為求其正切不過數端其間又有必恃資本以行或更須參伍而定者具列如左仰厪睿思一漕鹽即司務蔣臣四議之一臣知蔣臣以此其法欲使諸商以米易鹽積米於淮自淮起運循舊例四倉逐節盤遞是則漕法止行于淮黃而北避長江數千里之險省費不資運節既短則往返無所稽遲使稽察不難而盜賣自絶新漕在七八月便可過淮春冰一伴即抵壩通船輕運速不憂淺凍而于是鹽米通流官商並利籌漕籌鹽莫善于此乃臣所致疑者獨自新法未定舊法變更中間一年漕運與鹽課不無中斷之慮誠得設法通融濟此一年以後踵而行之則萬世之利也蔣臣議之蔣臣曰能行之乞再假一日召對以畢其情一錢鈔亦即蔣臣之議已經臣部看詳題覆如法行之錢流滿地矣而臣所難者以其議欲鈔之行先須廣鑄廣鑄必先謀鑄本耳臣聞舊通督王鰲永本治兵之臣而滿腹皆持籌之計立主鈔法可行其議多與蔣臣合者特欲加造小鈔五百三百一百者相兼而行始可流通不窮又欲自關稅為權輿使商得以鈔當稅則鈔行于流水今現在通幸賜召對果能堪任即用之督理鈔法責其成功可也一漕折臣聞之科臣光時亨馬嘉植等之議欲使內八府額輸銀糧悉徴本色准數折江南漕米其收米也每米價值七錢准租一兩則民必樂從其折漕也每漕米一石科米價及尖耗水腳諸費責銀二兩五錢而民猶以為甚便此誠兩利之䇿然臣惟恐本處粟米散之京軍而不肯受又近畿爭輸本色則畿民必常食貴米此須召對戎政諸臣及敕薊順督撫熟籌通算期于無害而後行之一截漕即臣前以樞二赴召入對之言其法詳于前疏臣意以海運虞一朝之患通膠為難必之功誠從分水嶺盤運有成則漕船及淮而止所省長運挑河諸費不下三百餘萬而科臣曽應遴又有飬魚池一議稱海運自齊堂而南由竹島以達地名養魚池為文登境地鑿而通之道里無多即可經流入海南避成山之險北無毁琢之傷雖不能如膠萊之徑捷較之陸運猶省腳價其言簡盡云得之太僕寺丞賀王盛王盛先令文登籌此甚熟皇上試召二臣同臣集議因遣工部明幹司官一員前往分水嶺及養魚池地方屣勘形勢工力二議孰便擇其可行者選用風憲官一員協同登撫為之蓋必登運有成謀而後淮截可決䇿耳一京鹽有投議于臣者欲于都城開鹽引十萬每引照遼例納價八錢本折相半上納以充兵餉之需仍行文兩浙鹽法衙門照察遼例于正附綱引之上𣲖行每綱引十引帶京引一引若無京引綱引不許過關橋取掣其引價鹽斤及餘課割沒等項悉照標鹽往例毋得故違損益出示曉諭在京諸人有願中引者赴部報名劄行太倉本折均半上納亦當議與寬減以示招徠如此可得引課二十萬亦一䇿也一雜折凡為內供雜項改折之議者不一而足未蒙允行蓋必有難行者也然臣察內庫所需黃絹顔料油漆蠟茶弓箭弦條等項外解甚苦又多不堪駁換害纍遂不可言而究竟逋多難徴時久幸赦即如臣鄉所供弦箭一項十餘年來無年不駁者以其非地之宜決不如式所司詳慎何敢輕收是則十餘年來民間實受百千之害而在官曽不得一弓半弦之用民命可矜物力可惜也臣請聖明再加審詳通察一應內供本色凡在所不急及必不堪用者聽得改從折色凡物值價一兩者連鋪墊倍責一兩折解在朝廷驟增一倍有用之利而民已脫于水火歡動天下矣夫聖主每損上而益下今益下而又可以益上何憚不為乎一清兵清兵者二其一兵部所報缺額兵數可裁二百餘萬但恐邊臣以缺額須補為辭即不然不肯扣新而欲以抵舊則清猶不清矣此須兵部飭明其一則臣部所議各鎮司餉兼列兵銜以清兵之事屬之自臣部所題餉郎尚以部覆候㫖頒敕方行現今無一到邊受事者又以餉郎之行必帶有多餉使軍心鼓舞歸命而得以問其虛糜今部庫如洗眼穿外解臣心戰戰然臣請更設一法誠得聖諭各撫鎮諸臣能清兵百名實升一級無所報清者罷之則餉司尤易為力臣法可得而行也一省辨往時戎籍所載不及今時三十分之一而戰勝攻取士馬飽騰權一而餉不分也今大帥驟增十餘倍副參都游守把驟增三十餘倍行伍之士皆恥為兵而幸為官才設一官役使羽儀又數十人士飢而此輩荒飽如故士之不戢餉之扣尅職此之由前有繳部一糧單內止五百人而中千守把凡三百五十人兵僅一百五十人虛冒如此餉何由不詘臣與樞臣馮元颷㑹議一日而裁八百員誠見及此耳一役稅聞諸總憲臣李邦華之議今天下內外吏胥承差各有頂首文契悉令呈官照稅每百兩納稅銀五兩非官印稅契不得授受臣初聞之恐傷大道既而思之此亦一道也昔者先王惡民逐未所以征商吏胥者不農不商而在官為市沿積頂首過百踰千則不止逐末矣今農辦畝租商輸關稅田書屋劵悉經稅抽此輩游手以蠧取財既不能絶又不征之何以服彼農商乎以治蠧為生財此則憲臣體用之學也又各處吏承納班大省或至一二千人各差御史承差多者或至千餘人價重者至一二百金少者亦三五十金皆借之以庇其門户或納于各布政司或納于各差今若以此盡歸臣部仍嚴為之禁庶人在官者但得受祿于官而不得擾纍于民其意與事例相等一洋政臣聞之原任通政司使施邦曜之議曰福建有東西兩洋商舶自前代至今俱收其稅以資國用者自天啓年間海洋爭利不靖遂議禁止試思犀角象牙香料非兩洋不産今宇內諸貨充斥而猶曰禁洋不開是真掩耳而盜鈴也蓋閩人以海為田一日不下海即無生番人日用必中國之産一日不往即䦨入故官日禁之而民走死如鶩官亦無如之何上下相蒙徒隂為豪有力之利何不明開使朝廷少收養兵之費乎帥臣鄭芝龍坐鎮閩粵交界之地又素交孚于逺島乞即以洋政委之則一年可致十餘萬之餉也邦曜官閩最久故非浪言又臣司官王之驥閩人也其言曰此禁開而閩盜始稀謂洋開而生盜者非有識之論也然臣更請令在廷閩紳共為詳酌必歸于有利無弊而後可耳已上十條臣所持生節之謀採羣言而衷于聖賢經世之道然其取效必通數年為計若旦夕見功急抵蠲缺則猶未有䇿也凡救急必出權宜臣期皇上力行王政何肯為苟且遷就之䇿惟是庚癸四呼臣憂在眉睫不知所為耳崇禎十六年八月二十七曰具題奉㫖奏內鈔法廣鑄已有㫖了雜折酌行三年清兵汰將專責各省撫鎮勒限核詳不許仍前冗濫漕鹽截運京鹽洋稅各欵仍著議妥詳奏以救時艱欽此扣折漕運疏題為請扣漕運為積貯以罷召買而弛民力事仰惟皇上軫念京庾因新漕未至現米僅支兩月軍糧特發內帑四十萬金為召買積貯之謀臣隨分泒司官程正家姜叶卜陳聫璧蹇宗吕四員使乘秋熟登場或就近畿採收或召慤商承納不拘一法聽其便宜務于九十兩月內竣事現在則以新禾在野稍須時至即如鷙鳥急搏矣然臣細察京師奸囤競皆廣收深藏居竒射厚而遊徒徼幸求充糴商投呈該司者不下百餘經此輩騰鼓米價勢必驟踴民既怨咨官亦不利也因復廣詢博訪乃得可以便于國而更便于民便于兵者查關寧薊永四鎮歲需米五百萬石向於天津截漕從海道分運撥給然聞四鎮將士原未責其全運漕撫旗甲與天津餉司每私折銀而薄解米耗蠧國家米豆數十萬石而臣部不得過問當事諸臣無一言及之者臣既矢誠天日務在剔弊節浮前於截幫疏中既微察其端而不能窮其實也故臣初意欲於歲運之內扣五十萬石入京倉而以每石八錢折給四鎮在邊兵既可以得金而太倉遂實有善米上下交利一舉可竣今問之津撫知僅折米二十萬二千五百石臣即折發帑金一十六萬二千兩劄委員外姬琨往津守催將漕米督催啓運以實京倉又察今京軍匠役亦喜折色請即以九十兩月米按照時價折色與之則又可坐扣米十六萬石連四鎮共得漕米三十餘萬矣此外僅餘帑金七萬買之易易然本處所産粟米入倉即變黑色不堪久貯誠欲久貯非漕米不可而漕米既無可折扣臣又思之豆亦糧也軍興尤所急需並令買糴數萬石在明歲則與米同功在此時則分米之勢焉至臣受事以後日議清釐縻冒之法其四鎮向來所折所運實數容臣詳細核察奏明埀為定制則兵民皆屬至便而國家歲有積貯民力可以稍弛矣恭候聖裁雜折事宜疏題為詳酌開明雜折事宜以惠東南事伏念臣以庸才司計其所以生財者不出於大道必不可然聚今人之謀以生財無不傷道者以其一益必一損此盈必彼竭若夫兩益交便名起利隨上實緩所征而反享厚獲下實多所出而反歡更生盈庭千䇿未有如內供改折之一事者也臣察十庫諸色名為上供內外所司倍存嚴慎一解一納艱纍千端有解必賠無納不駁凡內庫駁退之餘即非民間所敢公取徒以膏血委之溝壑因而追比株牽家號路哭而究竟一駁即有一缺駁之不止缺無完日民已破家庫仍懸罄臣察十二年以前千萬積逋一赦俱盡十三年以後册載全未完者什而五六非不解也駁而不來耳即使嚴催而愈催愈玩由此言之損仍歸上以其兩損易以兩益何為不可皇上仁覆天下又復節險性成屏絶嗜好停嬪減膳浣濯卑衣甚欲夷諸器御與民庶等此堯茨禹菲之心也謹開明條欵伏幸詔諭天下凡十六年以前逋缺悉如常價折納免行倍加此後除上供袍縀不敢輕議其餘貨物凡官可召買者悉從折色令各該撫按公估時價量添解費輸納夫典衣典冠雖分曹事而同舟通力必無殊心其所折入銀兩即用以為益餉恤民之需當聖主大賚渙居內府外府何所間乎計開一不急而應折欵項黃蠟光粉緑􅈨明􅈨黃丹藍靛槐花紅花紫草茜草燈草生漆嚴漆桐油螣黃銀硃錫水膠牛皮牛角牛斤絹絲綿苧布柿餅川椒蒲杖烏梅五倍子葡萄紅棗栗子蜂蜜核桃薥秫稻皮已上均非急需悉可改折一似急而應折欵項白蠟六萬五千斤芽茶四萬八千斤葉茶四萬斤黃熟銅二萬斤紅熟銅二萬二千斤生銅九千斤黑鉛一萬五千斤棉花絨三十一萬斤棉布三十六萬匹梭布三萬匹芝麻一萬四千石白粳米五萬石白糯米七千石已上似關急需然本可購買亦應併折一工部欵項如弓箭弦條及一切軍器斷斷無用决宜折價京造者也此外容臣咨查酌列奏請崇禎十六年十月十三日具題鼓鑄大計疏題為欽奉聖諭事本月初十日恭接聖諭鼓鑄為足國大計近時事多艱銅本稀少御前及在內各衙門已有㫖盡數摉用今內外文武軍民人等俱宜急公體國共濟急需著遵照律例除鏡子軍器寺觀鐘磬鐃鈸及匱箱等物事件鎖鑰樂器古銅免毁其餘定限三個月俱行銷毁一切廢銅並赴官賣給價不許違禁打造收賣其有捐銅助鑄的悉照事例議叙崇禎制錢仍以六十五文作銀一錢其餘雜錢槩以二文凖作一文低薄小錢自五分重以下者四文凖作一文其私販低錢著該城御史嚴禁緝拿仍各大張曉示至南北銅商領價誆官逋缺巨萬屢㫖究追著經管官勒限追完仍各自行回奏各省直作何勸勉并設何官專司應行事宜著該部詳妥開欵來看昨據計臣倪元璐奏薦王鰲永心計可用著以户部侍郎兼工部侍郎提督二部錢局錢法鈔法責令清釐局商蠧弊疏通錢鈔如辦理有效即行優叙倘壅窒踵弊責無所辭特諭欽此臣于是恭服皇上之思深而䇿備也如此則處處有銅源源可鑄富國之計盡此一謀然而臣猶有說凡一法之立一弊即生今欲使私銅盡絶無如專禁打造犯者重論夫用之家千而造之家一禁千不如禁一此為絶源之法如此則民間成器不須盡責毁銷即責毁銷但勸諭之不必設為嚴禁即設為嚴禁請但行之紳貴勿及士民紳貴義無所逃擾害不及若行之士民則告訐四起挾詐橫行從此騷然大可慮也聖諭不言挾銅不出者作何處治仰見淵衷矣然而民銅不出鑄本猶微有法於此請令有司罰贖減半徴銅如稍有力應罰銀一兩三錢者僅輸價值六錢五分之銅則民爭輸銅矣民爭輸銅則銅價必貴銅價既貴則凡有銅者莫不居竒射利歡然出而應之不出一年天下之銅悉歸官冶民間非但不騷抑可取利夫使民賣銅于官必得虧折賣銅于民必得贏息而有罪輸贖者雖苦于買貴銅而實喜於承半罰則亦無不便也凡法立而民稱便因勢順導之則行于流水矣恭候聖裁崇禎十六年十月十六日具題奉㫖奏內欲絶私銅無如專禁打造深得要領即著卿悉心講求鼓鑄善䇿以資裕國欽此督撫制置兵財疏題為欽奉上傳事昨以閣臣陳演等傳臣至東閣恭述聖諭關門三協應用本地之餉養本地之兵及計臣前奏一切屯鑄生財等事責成該督撫便宜舉行事宜可㑹同詳議具奏欽此臣惟今日之勢誠必以督撫境內兵財聽自制置略如唐藩鎮者然後天下之事可得而為所謂大建規模者也譬之民間家計蕭竭而有衆子即宜割室分資使之自食其力共治其家若以一冢子持其斧囊而此衆子者但呼飢寒不知生節則衣食立盡故一司農必不能應天下之呼一內帑必不能濟司農之乏臣初入告曾持此言而皇上即持臣此說以告輔臣蓋臣觀古之大將羊祜杜預韓麒麟韋臯余玠張浚之流未有不自生財者也其所生財亦只數者屯鑄通商而已屯取聚衆而言本為兵事邊將所謀今腹地營墾即開荒非屯也邊外地已不敢屯薊永之間固多閒曠宜使盡利非必悉宜稻黍棗栗薪芻皆可致貨臣又聞薊州党峪地方産鉛可鑄現屬司鑄主事倪光薦往察而未報薊督或知之他如鹽榖等商踵背相接此外又如贖罪事例輸粟于邊而請命于朝者皆可得為也總宜令薊順督撫詳求悉計條列具聞以是為其家當凡所請者必盡聽之臣向覆淮撫史可法請增兵餉一疏責其自條生息所宜欲以淮揚為端漸行邊鎮可法尚未覆奏今即以薊順為端漸行內路可耳至于錢糧附近截解此誠便計臣亦嘗面奏及之退而察附邊額餉實亦無多以此久不决策謹條八府正賦屯糧民運及三協餉額確數如左大都于三協五之一耳以供薊督一標則有餘又臣聞永平府同知馮如京大有謀識人傳其言曰得永平一郡糧足了永平一鎮兵事此語甚竒顧臣未深識其人或敕薊督物色之嗟乎臣之事君如事天亦如事父也目覩國家之急不思所以救之而猶清談勦說鄙理財為管仲劉晏之策譬則父母方謀一家之藜羹藿食而其子顧慰以衡泌樂饑此愚子之忘其親者也目覩國家之急不思所以紓之而惟呼兵號餉變聚斂為加派掊克之謀譬則父母方憂一家之鳩形鵠面而其子直欲以攘奪為事此不肖子之欺其親者也皇上惟戒諸臣以清浮冒杜侵漁為節用之道惟戒諸臣以因天時乘地利順民情為生財之道則兵食足而民信聖賢之論政全矣崇禎十六年十月三十日具題奉㫖各邊督撫境內兵財聽自制置誠為便計這畿府正賦民屯本折原額并屯鹽鼓鑄事宜著行該督撫計議速奏馮如京果有謀識可用著該督奏明欽此倪文貞奏疏卷九
