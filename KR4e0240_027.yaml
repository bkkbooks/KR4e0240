body:
  text: 倪文貞奏疏卷六明倪元璐撰恭承召對疏奏為恭承召對遵㫖申奏事臣本迂愚歸田奉母七載於兹㑹以國家多難諸臣謬稱為救時之才仰䝉聖恩命臣佐樞星馳至京陛見之晨遽䝉清問遏滅寇賊切實要著臣遂率爾而對首奏南北情形次奏目前方略次奏禦寇機宜次奏制財足用兵餉宜合次奏淮鎮切謀及夫截漕末議方凛天威百不攄一過荷溫文曲褒仍令詳悉奏聞臣感激慚仄謹復申闡條奏口語離為四牘仰塵睿覽詞意朴鄙惟冀見之施行然臣以為猶屬標計也為今本謀在乎主術力行仁義提振紀綱愛惜人才興尚氣節定心志一議論信詔令慎誅賞其下則竭忠畢力惟以殄寇安民實效是求而不徒託之空言如此何患大功不成太平無日乎臣不勝隕越待命之至崇禎十六年二月十九日具題奉㫖這奏本謀自屬正理知道了該部知道禦寇機宜疏為遵㫖申奏禦寇機宜存乎制財足用事臣至濟寧風聞左良玉縱兵大掠闖賊已自荆襄順流而下江淮震駭既而知其非實也然今日良玉忠悖之關惟在廟堂駕馭之法使闖賊及今速趨下流者猶尚可言也如其雄踞不移按兵四視家當一定勢大難回此則大為可憂矣今皇上赫怒特遣輔臣督師撻伐聖明睿算元老壯猷豈臣憃愚可得仰參旁贊惟夫規模大概妄謂宜以九江為中權武昌為前茅淮揚為後徑始事之圖先在遏之使不得下必欲進擊𠞰除特須兵餉厚集力滿氣充若旦夕計功則臣不敢知也又臣統觀今日大患在於兵餉之權離而為二師中丈人不得自制財用譬使操舟不豫之柁也以臣愚見督撫行軍宜必假之利柄凡一切屯鑄鹺𣙜之務悉聽便宜宋張浚視師關陜朝廷特命趙開為之轉連使以此軍用沛若所向有功又臣觀今之大將皆無餘財養士凡大將必有家丁死士比於爪牙苟如千人之將必得百人與同生死此百人者皆一當十百足制千人之命使千人畏此百人者則不敢慢易其將而自成節制責進則進責死則死威易為威恩易為恩要此百人實非易養隆餐豐犒十倍尋常官財不能應之貧將無所措手呼庚呼癸於是乎不可責之赴深溪矣昔宋邊將家屬皆食於縣官市租𣙜稅悉捐豫之凡將皆有黃金享士牛酒犒師終宋之世名將如雲職此之故臣愚故謂馭將之法宜使之難貴而易富將貴必驕將富必勇伏候聖裁崇禎十六年三月二十九日具奏奉㫖本內以九江為中權武昌為前茅淮揚為後徑聯絡遏𠞰殊得制勝要著至禦寇須先足財屯鑄鹺𣙜作何便宜舉行還著該部從長條議來看淮鎮切謀疏為遵㫖申奏淮鎮切謀及截漕末議事該臣觀南北扼㑹惟在兩淮誠得精兵三萬益以戰艦千餘近翼金陵逺蹴江漢倘遇警報猝至檄萬兵入援朝聞夕發南兵徵調悉可不煩天下大計必在於此惟以公私俱竭措餉無從臣於是有截漕之議也蓋今為海運之說者惟慮成山之險近䇿鑿通膠萊河為便矣而或以分水嶺係登萊龍脈不宜毁斫且下多碙􅀈勞費無益今議海船從淮口出鶯遊門過齊堂島不過好風兩蓬直進膠河口裝上小船剝進膠河不五十里徑抵分水嶺雇覓居民小車盤至嶺脊凡四十里達於萊河復裝小船沿海揚帆略無島礁漂捐之患再用好風四五蓬即抵天津此功一成而兩淮三百萬餉出其中矣何以言之凡河漕每糧一石各州縣給旗甲腳價等費多至三四兩今既及淮而止於道里省三之二腳價亦省三之二檄令州縣循三兩為率以一兩給旗甲二兩解淮庫計江浙等處正米二百萬石可得銀四百萬兩以百萬為海船及盤運之費餘三百萬以百萬募兵三萬以五十萬治戰艦以五十萬製備甲械及馬此外猶餘百萬若初年一切措置及海船盤運所不敷者尚可取諸此也循此行之淮之富强甲於天下即一淮安滅寇沛然有餘矣至於任事重臣自膠以南凡經理淮口海船及漕海兩船交兑察徵水腳之法皆責之淮撫自萊而北凡措置車輛倉厫分設官署及盤運之法皆責之登撫要取同心深計事成賞如克敵此非厲民之政難必之功苟得其人未有不辦者也此外議設道部及參將等官於分水嶺上又移車運之費改為人運即以運夫為之護丁可得飽兵五千不煩别餉一切事宜候俞行得㫖另容詳奏伏候聖裁崇禎十六年三月二十九日具奏奉㫖覽奏淮海截漕膠河剝裝甚屬利便且能精兵裕餉以資滅寇尤裨大計卿已簡司國用正可主持力行即著悉心籌畫將責成經理等項事宜詳確開列具奏該部知道奏請祖制疏奏為隆命義無敢辭祖制理宜奏請事該臣於昨十一日酉時在部辦事接到吏部咨文欽奉聖諭兵部侍郎倪元璐著升戶部尚書即日到任不必例辭故諭欽此臣本庸才聞命驚懼既思今日大計無如兵食二端苟不及今整頓天下事寧復可言又臣仰見聖明獨憂宵衣旰食者今十六年矣臣叨侍從每懷疚心而臣自束髮讀書頗欲以忠孝自奮又受恩最深中夜傍徨惟慮灑血無地司農雖甚難臣才雖甚陋而所以報國報君者莫切於此昨臣同官馮元飈過臣恭述皇上面諭褒臣學問忠誠之素並期以太平事業臣惶愧感激筋脈騰奮雖微明諭臣亦不敢辭也顧臣猶未敢遵㫖即日到任者緣察㑹典洪武二十六年著令凡戶部官不得用浙江江西蘇松人臣浙人也皇上恪遵祖憲事關更革不容不一奏明為此徘徊具請恭候聖裁崇禎十六年五月十二日具題奉㫖覽奏援考舊制具見詳恪目前國計民生應有生節大道以卿邃學敏識講幄敷陳特兹簡用原非例推著即遵諭到任不必遜請該部知道義社倉書疏題為恭進義社翼富倉書仰祈斟酌施行事崇禎十三四年臣鄉大饑民亂臣時里居極一郡長吏及紳士富民之義修賑千端僅可小救而羣力已竭富者皆貧臣於是歎鄉無積貯而聽命於嵗之為害至此也乃起而講求社倉之法凖古人而斷以己意行於臣之一鄉已有端緒因著緣起名曰義社翼富倉書臣之愚見以為古今社倉代有良法而沿久即廢者皆繇仰資於官又衆各為政又出貸責息又不能制欺又司其事者不食其利坐此數端雖以朱熹崇安之法最善且久亦不過數十年而已廢矣臣反是五纍得其五便其詳具載於書頃五月初閣臣陳演等恭傳皇上富民至意召臣與謀臣因及此閣臣稱善聞其明日入對遂為皇上言之退索臣書臣敬謄繕進呈倘有可行便乞頒曉天下此法在於郡縣長吏風勸里黨富家城坊村社各自為之苟興其端民自不倦亦王政救災之一法也倪文貞奏疏卷六
