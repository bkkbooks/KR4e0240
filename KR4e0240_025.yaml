body:
  text: 倪文貞奏疏巻四明倪元璐撰宼禍陳言疏奏為宼禍非常敷天共痛微臣以投車之憤攄借箸之愚特懇聖斷施行除殘雪恥事盜賊之禍至如今日震及祖陵可謂極矣自往代衰朝所未曾有者今於聖世有之此國家大辱誠陛下臥薪嘗膽之時諸臣嚼齒透拳之日也臣叨近侍哀憤有加三日涕縻枕袖俱濕苟援理數而論賊惡貫盈血氣同讐殄滅蕩平宜在朝夕但臣區區之見尚有深憂臣觀今日人心所在思亂賊踞南北之衝江湖積盜響應必多又疑有逋蕩魁黠之徒竄為謀主翼虎教猱黨類日繁智計日益我兵將主既恇孱客多驕暴在道則虞騷掠同舟又慮參商誠恐本患未除他變或起而盈廷之議率循膚影又非有握本居要灼然制勝之謀一戰𠞰蕩臣實未見其端也若以臣愚所為陛下求其本謀提其勝氣者則願陛下首發罪已之詔頃覩聖㫖有云皇陵罹變朕實不徳所致臣恭誦之餘應聲淚下以陛下聖仁中懐至痛不難自誣為諸臣引愆即此一言盈朝動色猶恐窮谷遐陬未承斯義請立降明詔痛切撝謙布告天下傳曰禹湯罪已其興也勃焉唐徳宗中主興元一詔雖狂將悍徒無不感泣卒以削平大難事故有空言而勝十萬師者此義是也然固非空言也因是以廣宣徳意除民疾苦今民最苦無若催科顧亦未敢容易興言冀停加派惟請自崇禎七年以前一應逋負悉與蠲除斷自八年督徵如令有司考成亦務少寛繁瘠之鄉量以八分為率又東南本色雜解擾累無紀今除上供軍需萬難更議者姑仍舊貫其諸一切苟非至急如絹布絲棉顔料漆油之類悉可改從折色官代輸將此二者於下誠益於上則亦未之損也何者凡民財力止供此數此贏因而彼縮舎舊則必謀新計在公家現嵗所征仍無缺欠而百姓則由此魂夢稍帖頭緒稍清且吏無甚畏即不廢追呼亦豈必無孔邇相親之意折色之入於官甚便京師百貨所萃有需何難購求計在内庫陳陳之積可無朽棄而閭閻則由此解納無煩駁換無累且法非甚害即少加餘費亦非必有多取為虐之嫌陛下之民脱此二者猶脱湯火也其又二議者今發弊而逺追數十年之事糾章一上如行大疫藤纒蔓引延結不休扳贓而旁及數千里之人部文一下如捕反鹵鼎沸波翻寃號四徹所以海内安分守株之輩衣食粗給之家苟聞族屬親知罣於文網雖無宼至亦毎一夕數驚嗟乎誰有以民間此苦告之陛下者乎今請發弊止推現前勿窮久逺追贓但嚴本犯勿聴扳牽滌往毖來垂為厲禁庶幾逸檻之猿不貽殃於林木在山之鹿不興懼於庖厨苟是數者悉行臣言天下必大悦感憤賊氣自奪賊黨必攜𠞰蕩之期斷可六月而望即或不效治臣妄言臣不辭也臣惟用兵之道必循本計今人皆薄仁義而尊韜鈐不知仁義之即可制勝也且潢池之亂本由饑寒愁苦而起即應以救饑寒解愁苦之法為韜鈐戰權譬之救火之謀云必須激水此豈矜矯深微求高一著之論乎及今不圖日蔓一日必至無地非兵無民非賊農桑解業商旅絶行刀劒多於牛犢阡陌決為戰場陛下亦安得執空版而問諸燐燹之區三尺雖峻亦安得保家畏死之民而治之哉故以今日之勢為殄賊之謀即使韓白再生良平復起不能易臣此説幸陛下内斷於心亟措行事當事大臣亦勿以臣書生迂濶付之飄風時罹極亂猶且拘時顧忌矜細遺大不圖更始將聖明宵旰何時得釋祖宗在天之恨何時可紆詩曰神罔時怨神罔時恫惟陛下及諸大臣念之臣不勝哀痛激切崇禎八年二月十五日具題奉聖㫖這所奏亦見悃忱蠲除逋負量寛繁瘠原屬朝廷恤民至意其本色雜解匪係上供軍需的作何折色代輸積案纒累無辜的作何省發疏釋俱著該部詳議確酌具奏頒發詔書事宜還候㫖行六乞歸省疏奏為微臣夙疾陡發乞假調理事臣於昨二十七日畢講還寓隨即發嘔頭目眩摇良久小定㑹有臣中表近親從臣鄉來京見臣臣私喜當有臣母家書索之無有稍咨臣母動定又云都不詳知臣心疑戰偃牀家人意臣成寐久覺有異相聚徬徨然臣自明即是異時所患怔忡之症今特加甚耳臣病本由思母既已屢陳未䝉鑒允自後涉夏必發發必經秋如是三年矣兹又見端恐復延篤緣今講筵未撤臣不敢不特奏明謹一面召醫調治惟求即效朝可夕出畢目前講讀之功如更十日起色不見者是則可憂區區之私另圖瀝請伏祈聖慈矜察崇禎八年四月二十八日具題奉㫖倪元璐准暫假調理著即出供職該部知道七乞歸省疏奏為臣病痊可無期臣母衰孑堪念伏乞聖慈憐臣先後累請激切至情特允歸省事臣於四月二十八日以夙疾舉發具奏請假奉㫖准暫假調理臣感激聖恩安意調養既復十日醫藥罔禆臣固知療臣此病不關醫藥凡病必有由藥期對症臣所感怔忡痰泄等患明因别母而起因思母求歸不得而劇烏鳥之私先後陳請亦既五六以至於今母年日益臣病日増即臣言歸豈假多説只以臣母行年七十有五又臣通籍十四年官京師者十二年未曽一日迎養又臣自庚午至今違顔六年臣何能不力求歸苟不得歸臣病又何能愈然臣更有瑣屑微情為陛下殫陳之臣所受先人數椽火焚蕩盡臣母於是迄無寧居又臣行時以臣母之命攜家赴京今子女悉依臣所臣同母一弟讀書他邑定省不能時至臣母眼前寥然獨女婢二三人耳毎得臣母家書輙歎凄寂臣今坐處誠若針氈又臣異母弟生員元􅀈少有至性昔年庶母李病革元􅀈割股肉方寸雜糜進之卒亦不效遂至毁羸㝷感竒疾於今四年殆者數矣臣母憐之尤甚於臣臣身沐恩光出依日月入擁妻孥獨使衰母病弟棲止敗垣愁涕相向肝心何在得以晏然於此晏然是其心已死矣寧復久存長事陛下乎伏望聖慈矜憐特允暫歸無論生死皆有銜結之日臣講讀最無能今詞林藹藹求如臣者豈患無人又臣觀晉太子洗馬李密陳情切至一請即得後世以為其君至仁陛下誠即放臣天下必且謂陛下曲體儒臣恩宏錫類聲頌無紀且臣以五品小官積嵗累陳輙被温留疑於體制亦不符協惟陛下審察施行臣不勝哀切崇禎八年五月初九日具題奉㫖著遵㫖即出供職不必屢請該部知道倪文貞奏疏巻四
