body:
  text: 倪文貞集巻四明倪元璐撰制誥四川遵義軍民府知府黄立言制曰朕觀漢代邊徼守臣悉資將畧李廣魏尚祭彤任延之徒才氣鋒舉抗稜籠裔然固非能闢國百里也循持無失而已國家以為守者文徳非必﨣桓雖絶隘巖陲惟任儒士顧以國靈不匱恒得其人爾具官某屢試而效移守牂牁其治文眀傅以嚴徤農桑芒刃相錯為功使徳浸於中威行旁逺朕聞而尚之朕惟由秦迄今二千餘年獝狘之種驟被冠裳方踰再紀譬十年之病療始淹旬嘗慮乘羸蹷然而作得子拊循更益繼者踵事勿失則亦可以無患矣用旌子以風可階中憲大夫錫之誥命朕今所持大振天下者其道有三曰重守令慎疆圉破資格而已三者以子塞其二則朕豈得不又圖其一乎翹車在前冀子終譽妻制曰朕聞馮寳之守南涼其婦洗為之謀之無有失也豈勇可習惟婦亦然歟爾具官某妻封宜人某氏以中華燕婉從其夫萬里戎馬侏離不以為懼今即謂爾夫所綏民靖邊者舉由中贊朕不能知然固已難矣用加封爾為恭人慎勿以命服為易洊恩為常必敬必戒無違夫子父制曰夫功業非一日之積也其始必有其見端如火熒然終則熏燎其父子之間乎爾原任長稜衛經厯黄登乃具官某之父原其夙所居職比於古之叅軍受官銓衡而臨戎幕左右韎韋咄嗟鈐符克以才稱為時所譽則亦文武之資也施於爾子領符絶障内拊羣庶外控諸蠻禮樂機能張弛不失雖專城為貴其道豈有殊歟是父是子允文允武用加贈爾階錫之誥命尚祇承哉即報朕者其益佑啓爾子如爾結草母制曰記有之母没而桮棬不能飲焉澤存焉爾推而言之亦可曰母没而蒯麻不能御焉教存焉爾爾贈宜人劉氏乃具官某之母操績致勤敬姜復出爾子之彊立不怠自其成童則已然矣今貴五馬而釡庾不逮康伯擁綿以泣宼萊捫足而號陟彼屺兮是可痛也朕用加贈爾恭人旌而有子嗚呼夫既有子云何不喜浙江寧波府推官李清勅曰人亦有言以法律為詩書夫以法律為詩書不猶愈於以非法律為法律者乎朕讀詩書為仁義至精之言者靡不致詳法令而高皇帝之制律又什九取諸詩書稽古憲今豈有敝歟其上自司宼廷尉下至郡國聴稽之司朕則一遵古先聖王之道高皇帝之意左握詩書右持法律叅伍考平焉爾具官某本諸晶心致精審克東海之無寃民朕則聞之維甬海邦罔不宼賊再嵗以來遂以衰止則刑平之效乎用階爾文林郎書不云乎哲人惟刑無疆之辭爾其懋哉妻勅曰法吏之妻勗哉夫子有如曰無以喜怒生殺人則已㡬矣爾具官某妻陳氏自爾夫之以哀敬明清著平東海中贊之力則已彰然且夫窶貧者士之所歎而況婦人乎覩斯陽陽彌徵齊徳兹用封爾為孺人尚益敬戒無替則亦有無窮之聞父勅曰夫水之傳器也雖方圓致殊而不易其味父之傳子則亦猶然爾生員李長祺乃具官某之父以大儒名卿為之祖若父而其子則亦有良吏之聲於天下即爾中處述作已明若以朕所聞其才甚高而學廣義多即微其祖父若子亦豈可没哉兹贈爾為某官嗚呼不於其身則於其子信夫母勅曰天下之不治則由士大夫不篤其倫不高其節不篤其倫則其義微不高其節則其功墮士行如此朕欲以婦徳正之耳爾以節旌姜氏乃具官某之母松栢之心是天所篤靡他靡慝誓存共姜取爾孤貞布諸百爾可使居恒厲氣不絀其功臨危致身不没其義道關風㑹詎曰渺微兹封爾為太孺人嗚呼以爾父之鯁固爾夫祖父之忠貞萃靈於爾爾子則亦於是有祥刑之譽誰謂節苦而道窮乎江西臨江府推官今陞東城兵馬司指揮田蘇兆勅曰吏治之大者無如理人禁非理人則寃抑寡禁非則豪宄絀審若能之何施不可哉爾具官某當理洪州强立察朗僉曰清霜移試輦轂益彰通敏其明習積練所由來矣故曰習者之門巧者不過仍以往績授爾階文林郎使爾司城佐臺使者之察也夫都城百孽所歸譬則松栢之下必有叢草爾職參吏將抑其興文厲武慈健並章庶以不隮典聴朕教直𨽻鳳陽府穎州知州沈延祖制曰朕觀往代多以其國重臣貴職養優方州而今特使士初試及一命以上者為之夫祖宗之意以為為臣養優則不如其為國責勩也然而責之已甚矣郡督其上譬托頭於肩而邑之肩之猶指之仰臂也輻軸相維轂居其中有難為者焉爾具官某守其家學敷為國華文譽雄騫才鋒健奮屬以筮仕授之名州惟汝陰為中都根本之區況比嵗當災盜洊仍之會資爾心晶如水月鏡非鈎合浦珠還知孟嘗之異越王石見表虞愿之清誠可雨號隨車天名照蠟用授爾某階抑古人有言曰諸侯並立終善者長焉寧先病而後瘳詎先瘳而後病乎毋棄爾勞則維王休父制曰朕惟為人之道以才衛世以福自衛視為固然不知其必有取之取之則必其父也夫逺或難稽再世之澤如出户顧廬返踵可得爾生員授儒官沈應和才名江海學號厨倉毫茂可觀神清不俗且周施不報循月令掩骼之文洽比孔云市馮讙焚券之義俱非斯代可得而求夫景必隨形枝皆稟柢故知韋經之傳為世業于閭以報其前修矣爰是封爾某階其自今往則益迪爾子俾罔或恃罔或憚罔方成而忽墮浙江嘉興府崇徳縣知縣龔立本勅曰今欲义安天下使桴皷不驚至治日出其道必由於得吏吏必自邑令始矣朕求民之莫當饋輒歎亦維古之治主璽金茅土廣厲循良朕師其意不敢忽也爾具官某學成有用體詣無塵秉鐸材蒸分符瘠起頃臺使者覼縷上言凡夫田疇子弟琴舄童禽形其至誠敷為大象亦既卓朗章於聴觀朕用爾嘉授爾階文林郎抑聞之曾子譽衰於宦成是則可憂也爾盍懋勉其惟有終浙江金華府金華縣知縣項人龍勅曰夫吏治者精微之業也有民人社稷禮樂兵刑儒者之務詩書所求莫不歸之苟能其官抑將可以為大臣爾具官某治婺三年大吏上其績曰無不辦者所司覈之曰審是則朕之所厚望也吕夷簡始佐穎川遂期宰相漢制郡邑高等入為三公皆為循端測歸區量才際顧今猶以恒貫階爾文林郎錫之勅命即士初試使一邑之人親之如父母而其聲聞於天子雖不遽顯亦可謂之道行志得矣於戲是豈可以不終哉妻勅曰夫受人之民人而為之牧之是豈一人之為乎出則其父事兄事示之水薤入則其同夢儆於雞蟲如此以㡬不墜堇焉爾爾具官某妻程氏室家之壼非朕所聞若以爾夫宰邑邑治化成名立自朕觀之不有羣資則有陰贊不然則其無中牽也用封爾為孺人於戲含章有終妻道也尚引弗替永孚於休父勅曰易曰黄離元吉黄土色也土父火而襲其文明猶之子父相附麗以為道故得吉焉爾項元輔具官某之父朕聞其慕義抗躬志節挺舉學儒不成棄而學劍爾子偉達之氣著於專城則亦其道也是用封爾某官且夫官怠於宦成曾子之所以誡曾元也他日又獨立豈忘斯義乎母勅曰夫横海之鱗不生於蹄瀦彌天之翼不奮於蜂房以言乎徳産則亦有之矣萬物之榮各功其母詎可誣哉爾方氏乃具官某之母由爾以母道教爾子使其邑人有孔邇之戴其子衆母其母母師比以三年之成授爾封孺人即吏於民不能誠求如保赤子者皆為媿其母矣念之哉爾有母遺湖廣武昌府江夏縣知縣劉勷勅曰吏道多端其大要使民親之而已朕南睠荆襄師荒繹然夏口兵衝昔人之所慮也然今者沸羮之勢極於潢池揭竿之心生於愁苦聚天下之才無制賊者聚天下之徳無親民者奚惑乎夫吏親民則民知死長民知死長則其氣出何賊之慮爾具官某勤勤翼翼比及三年其效則使穫薪無歎頳尾絶歌旅樂其塗宼畏其界大吏考之曰未嘗有諒矣杜陶以來二千餘年以子張楚可授階文林郎朕以宰之能通於天下則翼宣之道出焉是以有宏文之令爾其懋哉妻勅曰妻之曰齊吏之曰理内有齊徳者外有理人之功民之父母有與共為之者焉爾孫氏乃具官某之妻朕則有聞爾夫至清絶塵形諸馬骨當是之時室人讁之亦烏能介然無變至於三年乎三年而不變其於妻道則亦以成用是封爾為孺人於戲其益黽勉思日贊贊襄哉父勅曰凡人蚤成必其父之遺其未竟必遺諸其子夫父子同體今以其潛顯殊遘或疑之是猶疑寒暑非一嵗之功詎可乎爾貢生劉志宇乃具官某之父積道窮經淹躓以死孔子曰有命豈不然哉今爾子英挺驟蜚為吏聲出獨立之義既炳以章蓋天之道猶張弓亦有不誣者矣兹用贈爾文林郎冀爾不昧佑啓爾子規逺持終即復結草不如斯報也母勅曰甚哉婦徳之為宫鐘也其夫若子皷而聲之烏可得没哉爾馮氏乃具官某之母何以知其順以其夫之名儒何以知其慈以其子之名吏天下烏有積行之士無耦徳其間奉公之臣無教勤其上者乎兹用封爾為孺人猗歟於是則有無窮之聞夀母純嘏湖南荆州府石首縣知縣譚尚烱勅曰今治令已甚司勲則亦治之司庾則亦治之夫使司勲正詞以治其繭絲而司庾骫志以治其保障天下豈有完令哉詩曰維昔之富不如時維今之疚不如兹此言民窮而吏益困也具官某政刑徳禮條然以章輯和民人莫不夷懌下戴其上牛車自輸非假羽毛聲稱日出如此則可謂之賢人君子矣朕以楚貏豸洊承兵革粤波南及壑以游鯢秦蔓西延嫁之奔豕殣痍相望仳蕩嗷然每睇衡湘愾焉廢箸嗟乎苟俾列城之長悉如爾良朕復何憂哉嘉迺丕績可階文林郎維朕以為治之已甚報亦宜然今宏文之求移諸循茂底之厲之則亦至矣其益殫厥心逺期宰世天下安得謂吾民父母不可與於股肱乎妻勅曰謀及婦人古之戒也不曰夫婦外内以經二物乎且夫謫徧於室而能陽陽左簧右房者㡬人哉具官某妻劉氏由其明理習勤終窶不怨於是爾夫得自矯挺晶志懸魚不以官財民膏娯其妻子故曰妻者齊也素絲五緎副笄六珈羔羊山河詎謂非配乎可畀封孺人於戲敬之哉孰是翟褘可忘縞綦父勅曰夫長民之道取諸其父則皆有焉非必教之睨而視之其則不逺惟孝子之㡬深者可與言此矣爾譚可旬乃具官某之父朕聞其誼至高不苟取予無陰陽懐諼罔物之心行於一鄉一鄉俱化嗟乎是烏得無令子哉爾子亦猶行爾之道也夫釣有方而或為御法土致能而必推火功殊塗同歸莫若父子者用贈爾為文林郎繄容城之民視爾子猶父也是真爾子爾何求哉為衆父父則已矣母勅曰昔者聖王甚重人母故其令曰夏不刈藍夫夏之徳赤赤長物而母藍聖王以長物故貴赤以赤故貴藍也則朕豈得不為長民者大報其母乎爾楊氏乃具官某之母既以高行襄隠鹿門而教子子賢名成底績是故天下之善皆可遡而求也苟不求之亦烏知陶侃之廉由於封鮓而不疑寛平有問平反其上者乎母人之道道在其母用封爾為太孺人嗚呼天錫爾純嘏夀母燕喜廣東惠州府博羅縣知縣劉守誠勅曰詩云樂只君子言吏徳也亦言吏有才以致徳於民也即吏無才誰徳吏者孔子曰大車無輗小車無軏何以行之哉夫才亦徳之輗軏矣具官某比及三年亦既以成朕觀頃者所司條上保障干櫓並在爾躬夫盜賊不靖則民無農桑威禁不行則吏無教化試爾盤錯利器飈生使海波戢氛行子皷枻若乃百雉搴壯不由官財三年屭然裝俸為盡雖鹽亭健令建康城表剛清之徳何以踰斯用階爾文林郎頃既擢爾佐郡菰城夫郡之於民漸逺而佐不能專郡事菰又巖地爾其毖哉父勅曰夫士行本孝非權輿之謂也孝子之於親苟欲致則必致之其精誠計數才斷氣決兼舉悉會而后其情盡道亦以出名亦以成嗟乎豈不難哉爾生員以孝旌劉載達乃具官某之父刲股稱孝享於瞽宗夫儒者之論以為子春傷足而悲惡虧親體刲股之義亦猶此耳朕不謂然是其設心以為不如是且死其親虧之云乎今為人臣殺身成仁不為虧其親體君親等耳即其親之體自為親虧何由可譏自爾以理學之儒道出於此斯關至正不為騖竒明矣兹以爾子奏績贈爾某官爾子且以爾孝慈其民忠其上本立道生信夫陜西西安府華州蒲城縣知縣錢一寵勅曰天不悔秦禍宼盜蟻結八年不散雍函之聚蕩為戰塲燐火晝游白骨山積重以饑荒斗米千錢殍殣彌塗父子相食詩曰周餘黎民靡有孑遺朕心痛之今兵氣不揚殺賊罔效﨣桓無可恃朕惟恃二三良有司耳具官某其治有條民愛其長宼不能犯災亦無害如火攸灼周廬具燼而獨巋然靈光自泰斯亦可謂之奇矣兹以奏最授爾某階朕甚重令而軫西秦即無厭苦勉為朕更拊循一年朕且召爾直𨽻徽州府績溪縣知縣熊維典勅曰廉者百治之本吏廉則其情靜情靜則靈見而才出且夫柔剛則吏所兼取也苟多欲則必噬物而甚畏人於柔剛之道何居乎周公之作周官也其心必曰有王者起必來取法要其弊吏斷以廉為本朕則師之爾具官某至清絶私邑遂以理凡其灑煩決藴綏良化頑則皆無欲之為也朕以為難用階子文林郎錫之勅命雖然爾廉以自正則可以厲物不可也抑抑乎若渉春氷豈有失哉妻勅曰女曰雞鳴聖人著之以風於世閭巷之間聞言及此是亦可經也爾某氏乃具官某之妻朕嘉爾夫拊循吾民若保赤子官俸之外非有餘財爾之中襄不言可見是用封爾為孺人朕以治績考爾夫以爾夫治績考爾寵命不常爾其念哉父勅曰聞之父之教子也十母吏之教民也百父由此觀之為人之父處吏與母之間不競不絿以施其訓苟非下愚豈有不成者乎爾熊希鳳乃具官某之父由爾子懸魚之清徵於馬骨是故知其有本不然則其教也胡威原涉不其鑒歟是用封爾某官於乎入則爾策之出則朕拂之爾子其馬也日以千里母勅曰子産衆人之母也抑知子産則亦有其母乎且夫任棠之教吏也鞭影爾龎參賴之矧伊操績某氏乃具官某之母勤斯天只而爾子以之篤其學嗟予慎旃而爾子以之共其官是誠母師為衆母母用封爾為孺人嗚呼朕將大進爾子即福夀名堂未為異數也浙江台州府臨海縣知縣周瑞旭勅曰邑於天下具體而甚窮吏之才故曰難焉蜀龎統當亂世心薄為令謬不事事然曰非百里才者非正論也且夫百里古之大國古之治此者魯公之才三年而後報政詎必小材乃得託之乎如曰天下為大百里為小辦大必廢小是謂人勝斗飲不勝勺飲也朕心非之朕苟得一循吏視其才若嶽海然爾具官某晶心茂能通敏沈斷承風者謂之嚴健仰沫者謂之温恭移是使宰天下詎有難哉可階爾文林郎錫之勅命嗚呼由爾之道更一年不變者必大顯庸之朕欲與守令共治天下敢循恒貫乎河南彰徳府臨漳縣知縣張爾忠勅曰治民之道本諸至誠誠至則志決靈出天下之才莫不歸之矣誠之命才猶心之命手足也或曰才故誠也以其才之所際篤驅其志就之耳爾具官某讀書為學學為經綸治漳三年致專取濟節浮給饋及於人田擐甲治軍民不曰擾甯武再出愚智無端朕不知其誠之生才誠生於才也大吏奏爾績曰最用授爾階文林郎朕以爾為吏有其將畧治民本於經術則知所以置子矣爾益冰淵無以名成而放河南彰徳府安陽縣知縣鞏焴勅曰朕聞周公之言曰為政不簡不易民不有近吏投繁處難與之為繁難則愈不治與之為簡易則無繁難者矣是故簡易者才之至歸也宓巫而下卓魯而上則皆用之爾具官某予之大邑三年有成其法以徳禮為鞭箠以明清為鈐轄綱紀自立民用以和故曰善政之致和氣猶桴皷也朕嘉子績用階爾文林郎今秦宼南突震鄰虩然民戴其長是則其干城也其更厲爾謀即宼至無害者以免難之賞賞爾陜西長安縣知縣梁州杰勅曰朕欲興禮樂而兵革不休秦宼九年墮城蕩野師出無功將不能戰歟抑吏不能將也夫廬墓之計急於首功守望之誼盛於袍澤含哺之情安於轉饋農桑之地壯於金湯此四者吏之所得使也今吏不徳無術失其民和疾視之心與賊為氣朕甚恨焉爾具官某令秦三年兩城並戴興進絃誦耘耝豪强貧弱以存流亡悉萃與宼終始民無懼心閭井晏然聲勢俱出是則子以政教為韜鈐子可將也宋人有言安得百子駿布滿天下乎用階爾文林郎繄爾才倍三年之功可以數世雖然九十日半其慎之哉倪文貞集巻四
