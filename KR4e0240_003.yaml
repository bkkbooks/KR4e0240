body:
  text: 倪文貞集卷三明倪元璐撰制誥禮部尚書兼東閣大學士徐光啓制曰夫姬旦以禮樂造周匡衡以詩書光漢古之明宰皆出儒宗藴兹文心彰為治業況於祕通圖緯旁暢機能天老受籙以配上台子房運籌而詘羣策有安社稷宜錫山田爾具官某品詣孤清學躋光大廣川之悟極於天人翁歸之才兼有文武是知八索徴倚相之修能亦粵三朝食甘盤之舊德既而邊吏不戒名疆坐摧維爾肯辭清切出領紛拏屬孫子以練婦人資光弼之新壁壘會罹貝錦遽歎冥鴻朕知其人召還厥職啓心命說典禮咨夷猶且出其幽通襄余欽若璣衡既正澤火俱宣是故綜子之長以古為鑑可使孝先悔笥家令羞囊鄒衍失其談天張衡詘於靈憲旁求既得大猶以張金礪朝夕之功玉鉉剛柔之節丙魏劑德為之寬嚴房杜並才致其謀斷翼宣之道斯不沒已嗚呼宰相讀書個臣無技清謹故殊伴食厚重自非少文有如爾者不亦難乎兹用晉爾階光祿大夫錫之誥命爾其欽哉益務懷忠絶欺秉禮絀數四郊歸耻一夫引辜懷若撻之心負時瘝之懼朕允保奭維若兹誥罔俾阿衡專美有商曾祖父制曰朕聞祖考之嘉名美譽亦猶子孫之冕服宇牆芘䕃宏多章施無既故寶良禾而昧豐壤驚洪流而暗崑源皆為繆愚失其本論爾徐珣乃具官某之曾祖載其淳龎游於廣大非必禰衡溢氣尊一鶚之能誠如季野不言備四時之德里懼陳君所短盜畏彥方之知羊裘高風鹿門大隱雖杜機九源而彌蓄其氣故行山十驛而不昧其宗今爾孫黼黻大猷丹青神化夢帝賚豫得之𤣥契為多率祖攸行知所從來者逺是用追贈爾光祿大夫泂酌注兹餴饎承其逺澤初生諸厥瓜瓞報其本謀於戲休哉禮部尚書兼東閣大學士何吾騶制曰夫車集輔以為安鼎居餗而徴實所以阿衡持轂有左右之功傅說執烹致羮梅之味厥臣一個其道多端喜哉之休爛然可述具官某體正骨强材宏道廣自班禁近遂迥時流王庾並長豐荒迭資其穀玉劉邢萃美華實各報其春秋用俾啓心藉聞逆耳丁鴻入殿則羣喙俱摧孫奭升筵則崇顔立降朕嘗悚承篤論靜省微言斯悟治平之理盡於詩書補闕之功存諸棐迪日成既宿非假旁求人情所歸自賢夢卜宅揆斯協光贊有徴觀其懷誠絶欺循體詘數我嘉謀則曰維后人有技以為若已誠由進無面從斯泯後言於退食居無私黨故消媢嫉於公朝若乃綢繆之力手口俱瘏夙夜之共頭鬚為變孔明之云識治姚崇以言救時謀斷環生變文在握有相之道於爾歸良矣通綜三載登理成勞朕體殷宗舊學之思循周后明禋之報特授爾階資政大夫於戲今饑饉洊臻寇盜滋生朕每當餐為之投袂冀爾引多壘之慙興納溝之懼逺維尼父持危之言近申晉公滅賊之誓集思以濟獨立無撓庶幾策力畢升隂陽不戰功彰傾否道極調元邦其永孚於休爾有無窮之聞管理新餉户部右侍郎周士朴制曰朕撫宏圖時逢多事深懼帝王之道雜於富强百爾之才注於功利故以理財責之儒者治賦問諸端人爾具官某體正骨强才長慮逺出有異績入多讜言當逆豎豶豕方牙蟲蜂將變維時懵者智昏於襲石怯夫氣墜於當車資爾百里之瞻奮其一椎之擊言既驗矣禍亦隨之逮朕解絃更新用人維舊召司常伯旋陟小徒授杜預以度支任酇侯而轉餉而爾審權金石竭慮中邊期於士飽馬騰奮揚赫濯非必天降地出妙殫營綜會計有章綱條無弊蓋既以兵多不戢大懷脫巾之憂亦由賦出加征深切反求之痛處兹旁午實亦奇難非爾之能孰肩斯任是用晉爾階正議大夫嗚呼今國比空鐺世當轉捩蠧積重則難剔病小愈而易加故時詘舉贏轉箸已窮於仰屋雖大來小往伏莽猶慮其升陵爾尚以正學籌財以深心保泰要引周官之制坐屈孔桑無俾元祐之衰退為紹述凡兹安阜平康之福咸爾翼為明聽之功妻制曰室家之壼景命侈其天釐風火之貞正位利乎王假妻者齊而兼士行家有好以章國榮爾具官某妻纍封淑人某氏易中饋之無遂詩季女而有齊當其斷織襄勤是使樂羊坐進及夫從官勗義因之李侃得遷乃若爾夫抗疏遺榮賴爾有䝉山偕隱之致奉公不染賴爾無北門交謫之言此誠良士之師資簪笄之秀出用仍封爾為淑人比王臣而無成有終當有道而子紱我佩總督薊保等處軍務兵部右侍郎曹文衡制曰夫詩頌元老易稱丈人以克壯之猶圖功好兼暇整以剛中之德奮武勳著敉寧所以威形四騏命隆三錫爾具官某不可親疏今之元敬兼備文武比於修期筮厠棘庭忠形藥石處脂勿潤版曹之良理繩不棼巖郡以治東海之歌每每南州之賦艽艽凡諸炳然可得而述洎於三吳建節百吏承風用使波鯨戢氛市犢解佩而時則禁旅日廢邊吏不咸喜峯之嚴隘曠若莽蒼薊輔之要衝度猶枕席朕輟箸而歎拊髀誰歸眷爾干城畀之鎖鑰北門資晉公之卧護遼人聞司馬而戒心而旌節甫臨壁壘遂變部署刀鎧悉寓鈐謀跋涉川原周知要害辛棄疾之威信著於車旗程不識之精嚴形諸刁斗自可弓名克敵樓號籌邊真有常武江漢之風非如灞上棘門之戲爾能如此朕復何憂是用晉爾某階於戲今天災洊至而我武未揚維爾淵謀不可聞見尚冀守其剛直益以精沈法濟寬嚴合光弼子儀為一人之美策兼兵食如羊祐杜預有十年之儲無或示瑕期必奏績宜有土田山川之報召虎豈徒精金古器以寵奇章爾其欽哉無荒朕命妻制曰朕觀往古曲軫勞臣東山斧斨婦歎形於鸛蟻朔方旟旐閨思寫以蟲螽惟夫靡室與家其情可念所以既富方穀有好必偕爾具官某妻淑人某氏充瞿致孝縰折有程閨通禮文婦供子職求之今代斯有至難若乃揚厯中外川霖金礪之功又爾黽勉有無游泳方舟之力況復江連沱泛星被衾裯梅桑以表心儀樛藟之迎福祿豈不足以示彼有位消其忮心乎兹用仍封爾為淑人有美山河無斁縞衣之志尚同薪膽式追錦繖之風巡撫江西都察院右副都御史解學龍制曰夫王猷允塞而求闞虎價人維藩之曰干城所以山川土田大酬江漢精金古器小報奇章國有隆施義存稱量具官某居品制才矜節治氣昔以直道罣於凶氛諫草雖焚黨碑不沒世歸正人之號朕維舊德之求屬以江州重藩比嵗多事爰命方叔出總師干所期萊公遙持鎖鑰維爾機能內秉威令外持遂俾杜􅌢囚氣於荆湘盧循墜魂於嶺嶠人還禮樂户享農桑僉曰西江今之樂土慎封申畫周嘉終始之功足食銷兵唐列上中之考是用階爾通議大夫今鴟黨日繁豨突不已大江右左賊所必窺三楚襟喉兵不加益尚益體求駿聽鼙之意厲聞雞擊楫之心共武匡王功苟奏膚於六月折首獲醜國必有賞於三年朕不食言爾無荒命吏科給事中宋權敕曰夫人鑑則明主之所取也取諸人鑑必取諸彊骨深識之士以為其於事無避而天下之議論有其歸矣古之帝王求得其人則必貴尚其言以章其志故其詩曰樂只君子天子葵之爾具官某靜沈之德以致其才當牧陽汾寬健俱出烹鮮拔薤原田積歌夫長吏者天下之所歸能也其不忍於吾民而健持其官則朕謂其人必致忠而氣出是故擢爾華要試之天垣維爾主其彊遂耻為伊優其身嶽然風論山立剔滌塗駁竭忠盡誠昔彥伯救時著樞機之論李藩批敕藴宰相之能以今量古豈不然乎用改授爾階徴仕郎今吏道多端而才效不出朕外責主爵吏而內望子子必圖之苟使吏無弊天下治矣其不然使吏無庾弊天下亦治父敕曰夫循吏之德雖更十世不可忘也漢光武之封卓茂去其為令二十餘年然其詔書則曰名冠天下當受天下重賞道止其身而報若此矧夫教誨爾子式穀似之者歟爾原任福山縣知縣宋沾乃具官某之父明體達用卓然儒者學問宏廣小試鳴琴觀其敏奏牛軱清徴馬骨釡魚之所揚義車禽之所獻靈汝隂神父和寧慈君可以方斯則其茂出者矣盡瘁中殞以軀狥官而傅譜再傳狐教無二是父是子可得而觀焉語有之曰樹落則糞本烏有懷其龜寶而不知其所從來者乎用改贈爾某官彌章鯉庭他日之心斯知喬木世臣之謂嫡母敕曰維婦亦百行也然而莫不有其本務焉不孝其上而能不妒與慈以及其下者未之嘗聞爾孺人以孝旌張氏乃具官某之嫡母美在其中聲聞於外觀夫所司之所條上往綍之所致稱崔婦趙妻不足為孝若乃佐夫以正逮下之仁斯俾螽羽騰歌江沱戢詠鳲鳩有如一之性倉庚為化妒之羮鬚眉所難是為備德用贈爾仍孺人嗚呼非其生而祝似移其孝以教忠厥維休哉生母敕曰夫貞母之教其子至矣矢於靡他猶曰二乃辟也云爾其子受之以共其官復何尤焉爾封太孺人以節旌丁氏乃某之生母自爾夫死勞以往皆未亡荼茹之年恃爾貞凝不可轉卷聽悽歌於黃鵠仰嚴幹於懷清燦彼國常光於女乘今爾子磊砢著節慷慨揚忠凡掖垣骨鯁之聲皆霜閫身先之教是用封爾仍太孺人嗚呼以兹再命報其三遷不為負人母矣聞者其興吏科給事中曹履泰敕曰夫欲澄滌六宇其必由吏治乎今選舉滋弊才遁功絀使朕日發誡而時察之不如求正色之士立於朕前是能為朕治吏使朕不惑也爾具官某風道遒凝掌跖高逺當其筮仕試於溫陵時值鯨鯢沸波鴻雁蜚野恃爾袵席內蔽干櫓外施晉陽之非繭絲朝歌之為利器循卓之致於此可觀既擢夕郎使表天掖而爾清剛彌厲鯁固不撓棐迪之心形為涕哭指畫之氣發於精微至言有入骨之誠號惕章揚庭之力是使人材日出吏道不刓斯誠百爾之所歸能重旒之所取照也朕甚喜得子是用改授徴仕郎嗚呼惟愛必犯惟直必平谷永繁稱不為能諍義縱鷙擊不能為治爾其念之怵惕惟厲思免厥愆父敕曰朕觀董子之言曰孝子之義取之於土董子以為土不自有其功名而歸之火是土之孝火也然而熯物著光火之自為功名而下教其土董子又烏知火之慈土有如此者乎爾原任羅山縣知縣贈文林郎曹嘉謨乃具官某之父處為名儒仕稱循吏鄭氈獨冷底髦士於成材潘縣俱春蜚神君之極譽至於教誨爾子鞺鞳於時出則流膏入而納誨是宜綽琰治譜祕為家珍斯知暾毅直聲本諸庭授緬懷舊德能不慨然兹用改贈某階如爾子官嗚呼朕為人子報其父如此國常固然雖然何以報朕户科給事中馮元飈敕曰夫功言之道如燧日相取朕治天下欲使致言者司功致功者司言致言者司功朕猶將疑之致功者司言則天下之所共信也且夫治氣强立非一日之積也其人功見則其力出其力出則天下之理歸之是故其言幾深可得而恃爾具官某襟藴鋒岸悉本文心前命榕城惠政挺紀屬寇蜂發海水為飛爾以書生暇整辦賊俘馘五百名酋駾奔既復揚鬐沸浪檣櫓壓城而爾機能非徒墨守設奇制勝遏來邀歸不俟外援破賊滿萬産蛙窟鼠方斯恧焉朕心壯之召居禁掖益復鼓勵哭歎俱興諫舌抨文不避權近缶孚而論絶其瞻徊氣至之言歸於倫脊凡爾所條皆相時最先拊鞬批肯不為巵汗是故能言之士皆以為難夫恆星豆離推明太紫羣嶺鱗矗仰高中黃諫者林立歸健於爾兹改授爾階徴仕郎錫之敕命嗚呼爾職於計是其畔也夫錢穀大命而罣於小數不察則日絀察之至精懼與治逺朕今務興王道爾規其大爾無面從妻敕曰夫人妻之德非其至健則亦不能持也許允賈言若其妻婦人者不其墮歟爾封孺人塢氏乃具官某之妻以其家貴則宜桃李驕穠以其夫貴則宜山河炫美以其嬪於清白則宜興北門交遍之懟以其相彼忠剛則宜懷谷風豫女之懼今俱不然豈非女士乎兹用仍封爾為孺人嗚呼維婦職亦諍實惟爾夫允師父制曰昔在皇祖顯皇之世居德秉禮興勵天下謹嚴近侍不畀以權而山澤征𣙜之政或使為之者以為其事末屑固非可以煩士夫也然而鴟狐宵張嗥攫四出其時士大夫率能矯厲風節與相撓持而上亦務為優容嚴幹之士雖亢無悔朕尚嘉深歎以為一時上下皆可紀也爾原任南京太僕寺少卿馮若愚乃具官某之父昔以崷望出守荆襄時值稅使矯䖍三湘騷沸恃爾鯁正豚畜虎狼致命亢威幾於破柱元賞之杖神策楊秉之捕任方可謂嶽然不畏彊禦者矣既罣箕錦蜚語日聞顯皇聖明有詔勿問料鬚而免斯有奇焉然猶十年不遷丐還初服皇考御極笥發衣裳陟於卿華有如威鳳尋遂凋隕形亡道存兹以爾子有聲諫垣用追贈爾仍正議大夫嗟乎揚飈之義雖使矇者捫鐘揣籥知為父風朕以甘棠式於爾子詩曰雖無老成人尚有典刑母制曰夫閫德非朕之所嘗聞也然而其理徴著土圭日景可測而得矣測婦以夫測母以子爾贈淑人顧氏乃具官某之母明於理道笄縰之英跡其靜正有齊淑慎不忒而爾夫資之以健正能其官爾子儀之以清貞紹其父思齊聖善豈有疑乎詩悲鞠我禮痛遺棬顧處前喪曷酬其母嗚呼用是贈爾仍淑人繄爾子忠斯爾口澤惟爾無斁繼母制曰語有之繼母食子雖肥不澤傷哉言乎然而秦翟之義胡不聞焉爾贈淑人姚氏乃具官某之繼母承人梁笱而不愆主婦莫莫之容樂我縞綦而能偕君子陽陽之致斯已奇矣至於桑蟲祝似鳲鳩秉均尤非笄珈可得而及兹用仍贈爾為淑人嗚呼慈孝至性詎關裏毛不忮之德敬告百爾巡視兩關河南道監察御史傅永淳敕曰朕思守禦之道在明虛實實者簡詰戎兵澄滌將吏虛則以氣取之耳制使御史察視巖關取諸其權重職雄得以抨彈一切然朕謂不如取諸其人之彊直為可恃也强直則其志不回其志不回則其氣蜂涌而出志氣之以致功譬磁之致鐵也爾具官某自其為令已章健聲洎入中臺彌徴嚴節鯁固自遂讜諤屢聞朕時一見其人識其風論心知斯士國之寶臣夫惟負氣無懼之夫可以當艱任大由是命爾握斧當關今士馬芻糧徴發旁午而邊臣暗懦不知所持韎韋之才萃於叨黷投超之氣沒於譁呼法令不張務為䝉惑微爾晶照四出鐡柱不撓亦曷使朕拊髀勿憂當食無歎乎是用授爾階仍文林郎昔李恂之按幽州賈忠之使遼左並以御史持節極命威能鈎致邊情贊禆廟畫爾尚務追昔軌致其成功詩不云乎悉率左右以燕天子爾其念哉福建道監察御史祁彪佳敕曰御史督刺天下道兼論察天下因之以無蔽奸遁誅其天子得之則亦可以穆然無為而守其旒纊夫君道主靜而尚寬以為御史能其官則能使其君如此故重御史也爾具官某茂才通明正骨强立始以韶齒試於祥刑而審克致精偏頗矯聽是使老吏失氣梧邱絶呼夫學問之能必徴於折獄正直之氣必出於平情是用擢爾蘭臺資其藥論維爾洞垣取識沒羽章忠朕嘗覆子昌言識其風㫖大都欲以道維法以禮濟威以謹微為宫府之防以規大為中邉之計官邪著鼎流民著圖才治文章學治功利凡兹棐迪悉本精誠斯悟前賢非為俊物兹授爾階仍文林郎錫之敕命爾既被命持斧三吳大江之間國之腰膂時則水旱寇賊姦宄豪强旁午奔會朕甚憂之冀子搖山無替朕命張綱范滂則亦猶人爾其念哉妻敕曰夫人妻之道亦以諍諍亦以法法猶夫朕之有諍臣法吏也苟得其人朕烏能忽之哉維朕亦以訓有位爾封孺人商氏乃原任南京兵部尚書商周祚之女具官某之妻承尊以孝處貴不驕宜其家人勗哉夫子靜好既著富穀與偕猶淡茹藘罔濃桃李觀於皂囊諤諤驄馬行行非有旁撓則知中贊矣是用嘉爾封爾仍孺人嗚呼履盈襲盛明哲所憂繄爾女士益凛釡滿則永有慶父制曰夫水雖傳器不易其味詩云泂酌彼行潦挹彼注兹可以餴饎此言澤自逺而能流體有分而必合也父子之道則亦宜然爾原任江西布政使司兼按察司僉事寧太兵備道祁承㸁乃具官某之父才峯道岸學圃書倉筮令巖城遂昭義問留樞小滯大猶宏張觀於艅艎三載之功動關豐鎬萬年之計一麾章貢再見龔黃理學相摩才名愈盛而强直多忤淹疏屢摧符離又歌湯沐為壯既而入守戎曹姚元之之條貫出陳時臬謝夷吾之功能積勞方遷引疴奄隕而國僑五羖農舂並停峴首桐鄉碑爼相望生歌死墓形沈名飛若彼趨庭章於執法教忠禪直又何奇乎兹用贈爾階大中大夫惟乃祖乃父世篤忠貞以及爾子延世長矣尚無冥昧益佑啓爾後人廣東道監察御史吳振纓敕曰夫才氣二者所以興世致功天下之所大賴也然猶有患正才以學治氣以識學識出而可以無敗才佚氣矣朕慎難臺諫冀求名儒非徒健持貴其聞道爾具官某績學名通居身高逺試於宰士知為吉人時使掄才咸稱得俊朕本宋宗慎簡之法因劉摯效用之心擢置諫臺日聞讜說大徴對仗小試司城膽目並舒銜轡無失夫諫官之道貴去名心法吏之威懼干元氣是以雖有藥口必不以摘剔幽曖明皎日之衷雖有鐵肝必不以剷削太和表清霜之力如爾志貞學廣誠至識尊庶幾蕭燧之逺時名陳瓘之持大體是用階爾文林郎朕謂天下可澄滌而治也將亦咏皇華之詩使子攬轡抑宋臣曾鞏之言曰御史責人人亦有責之者斯言燝然爾尚繹思不懈於位刑部福建司主事王肇坤敕曰夫刑者聖人所以厲教天下文明之歸也易賁旅之德綜於火離取諸此矣是故不宜付之法吏而宜付之通儒甚明爾具官某仁義之學注為哀敬詩書之氣被於簡孚精聽審稽以佐其長郵罰是麗倫要可求奇請他比則不為也自頃風俗寇宄暴悖日出禁之不止人用泯棼朕欲稍糾以嚴示世難犯而所司不察或為刻深刻深之治豈曰嚴耶若斯明清庶幾德禮用俾有衆知朕下車之心是則子之忠也夫皋陶之曰邁種伯夷所以折民豈意朕之庶臣有能明此者乎兹以奏績授爾階承德郎嗚呼爾道之平可以宰世其敬之哉書曰慎厥始惟厥終終以不困妻敕曰夫荏席物之細者也昔之仁人猶以為棄黴則遺故遺故則不足教義矧兹好逑爾某官妻葉氏始居約時宫鐘已著風雨恐懼方舟泳游足明黽勉之心徴靜好之德矣假其縞綦不替紱佩相將豈不雞旦蟲薨時縈夢寤房敖輿輻永愜從依乎遺挂閴然則誠可念爰贈爾為安人雖入宫而不見尚有好於而家繼妻敕曰人臣遂志致能豈不以內助哉房共由而樂室有謫則悲悲使忠隳樂而才出爾某官某繼妻張氏善相爾夫以能其職審克之道依於哲人是使下無庾情上不繆聽鉤距遜察嘉肺歸平而罔家於辭窶悴弗歎雖欲不功爾中贊其可得乎兹用封爾為安人嗚呼爾尚敬戒無替則亦有無窮之聞父敕曰凡天之道明報而已故或報其德而報諸其子未為遼邈也明王則之或報其功而報諸其父或亦宜然爾王文煥乃具官某之父聚義連仁有如襞緝觀其茂體鋒岸俱夷自可民比無懷世還繩結而當意激義起任俠周施一州之人悉同憂患傾舟分宅復何以加是故于閭宜容駟馬今爾子惟良折獄淑問有稱本厥由來能不汝尚用封爾為某官維易有之曰積善之家必有餘慶亶其然哉母敕曰父之教子也不如其母以其靜專而察微其子之成敗無遁焉者是故其子之成尤功母哉爾張氏乃某官某之母持詩有齊體易無遂簟衾著孝沱泛敷和匍匐凡民之喪只且君子之樂謂之女士斯不誣矣至若教誨爾子陶孟之能日問平反式資明允以是汝嘉封爾為安人於都休哉北堂侍奉不其有輝倪文貞集卷三
