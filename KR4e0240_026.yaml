body:
  text: 倪文貞奏疏卷五明倪元璐撰議復積分疏題為人材必可教而成祖制必可求而復敬陳造士之規以收儒效事臣聞之記曰王者建國君民教學為先士未有不教而成者今天下多事曾未得有猷有守有為之士而用之在野者名行不立而在朝者績用不彰若以臨淵之羡進議搜羅胡如結網之求退言教育且夫不言教則已教則豈有不於太學者乎太學之制振古已崇莫盛於我太祖高皇帝高皇帝手握罏錘禮隆法備彬彬之彥於時最多嘗曰宋訥所教個個有用朝廷好生得人以高皇帝聖智其曰可用必真無不可用者矣後乃積漸至於陵夷原其所由惟以納粟納粟興而教必廢其說有三以資入矣即不可復得為清流之官極其致歸州佐邑丞止耳三代以後之士莫不借功名一途引之道德既期菲薄豈有陶成一也監生致身之路别由科舉科舉取工時文一日而遇即可芥拾大科學於成均咨行考文踰年董之僅取丞倅誰不舍此就彼二也以教成為期於是有在監十餘年不得撥歷者今朝廷既取其資又無優除更益淹稽懼皆裹足不得不變半分一分七分八分之數為二十四月十一月八月六月之期撥有成期教無滿法教不成而期已及何術留之三也故當援納未停貢舉未復而言教士者說鈴耳縱使楊時秉鐸胡瑗傳經豈有濟乎遭逢陛下曠覽淵思力更弊令近雖以管計之議小復通融而選俊既升已分主客之勢興材振德千古一時際此時猶曰教士不急是欺陛下又曰士不可教教不可成是誣人材亦誣古先聖王凡人臣為此言者皆苟且悖謬不忠之尤者也臣謂人材必可教而成祖制必可求而復惟陛下先定規模規模之大者盡於八議一議分合流品貢選援納劃然兩塗流既不同教亦多術請以貢選為正流援納為閏流貢選主於教成不限撥期惟以積分數滿為率援納存乎風示則依原定撥限期滿為率所謂分也度援納之中必有英竒之士請得嚴加選遴拔其尤者進同貢選一體教習亦必題明奉㫖後准改流其法二十取一寧刻無濫又黜貢選之不率者使之退處閏流比於移郊移遂而凡遇季考科試則兩流萃聚更不分殊所謂合也鼓之舞之其在一分一合之際乎一議審定教法教習貢選一遵祖制自廣業堂遞升至率性則與積分積分者孟月試經義仲月試論詔誥表季月試經史策判參文與理文理俱優者豫一分理優文遜者半分嵗內積至八分為及格得撥歷出身不及格者仍坐監讀書所教之事崇德行明經術治文章尚矣而求致其用又必與之讀經濟之書求天下之事兵農水利分科取精律歷技射以時間及其援納一輩考分三等上者遴拔請㫖同貢選一體積分其次中人之資亦宜以貢選之教教之惟不輕改流以滋幸竇不程分數以妨撥期其又次者各相其材以施教格雖甚鈍劣必使講讀律令稍通治民大義他時雖幕倅螻蟻亦可不致面牆如此則無棄人矣一議慎選分堂六堂分司教鐸宋臣有言先廣求賢德使為師長則百度可不勞而成今請令吏部博訪名儒不論甲科舉貢必求四等之人而用之四等者一等品端學正動成楷模一等博物多聞叩之不竭一等老成拘方望而可畏一等慷慨特達氣足厲人凡兹四者皆為有範有法可以造材才地偶乖則咨部調改不肖失業即應時糾參稱職必與久任久任必與優擢又請遵照舊制助教以下得同博士一體考選非徒彰勸亦以示平一議崇尚經學聖神首出崇經右文海內通經之士層見輩起聞萊陽諸生趙金鼐年十八通貫五經得其指歸又聞有都通十三經者即士如此豈可處之璧館虎闈之外宜令各處有司不拘廩增附學有通三經至十三經者考驗得實即時通詳撫按起送到部奏請廷試發雍肄業臣又仰惟陛下興小學以正䝉養講春秋以章大義聖人之學包宏貫纖如此今小學既已頒行並宜令天下諸生兼治春秋之學蓋春秋取義於公穀胡氏徵材於左丘明士如通此者體用之事備矣或慮天下資性難齊請自雍士始高皇帝令國子生習讀春秋一法也一議申闡文體今欲致功必求竒才文亦如之士惟不能竒於是詭怪謬悠雜以異端之說此陛下所甚禁今或不察過畏功令謬以庸為正以淺為平其心皆存乎苟幸無過夫苟幸無過之人與苟幸無過之文其於世必無功亦豈真能無過乎今如使臣教士教之以淺庸則臣不敢今如以淺庸之士授臣使臣教之臣不能教也臣教士為文必以五經為師請自兩雍以及天下郡國衡文之司苟求崇體必無抑才抑才之誅與滅體等一議分别選格由積分出身者分别三等上等優選次等本選三等下選所授職銜非必過溢其本分惟昔由吏部莽莽匆匆一日之試而定今以太學銖銖兩兩嵗月之驗而分非侵官也臣意以為本由教成取選又豈得分教等選格為兩事乎一議召試簡授太學之士乃天子之所自教自試而自用之者也恭讀洪武欽定規條內議出身一欵云有才學超越異常者取自上裁高皇帝親召試張唯等十餘人授翰林院編修蔣學等五人拜給事中其他選授御史部曺方面不可指數今教法盡復而此典不行則士不勸請教成之日於前三等之外果有殊異卓絶如訓所稱者臣監特疏奏聞恭候陛下御便殿召入親試之或給筆札或垂問難有當聖心破格擢授否即已之其甚不稱司成之臣並承顯罰夫殊才不數清問難承且可否悉取聖裁即閣部無從仰贊競心何由得啓幸路何自能開建之則非常行之則無弊計每舉即不多收得二三人而天下數萬士之精神動如奮蟄矣一議清楚歷事祖制積分及格即撥各衙門歷事蓋欲其鍊習政務即進士觀政之意自積分法廢而此意蕩然因有正歷雜歷之分正歷止朔望一揖雜歷乃用之寫本雜役下同𨽻胥又復開贖歷之例正歷聽覓替身雜歷責輸寫值夫求其博觀有得而借面為之已可笑矣況寫本非生儒所嫻輸銀豈養士之意今請歷事無分正雜名色凡當咨撥一照舊規各該衙門以次分派惟以本監考定等第為其歷期之多寡上等三箇月中等六箇月下等九箇月各衙門收到監生務查有無替冒因而教之政事示以歷練之方一切謄寫猥差悉與革免滿日考其勤惰開報吏部不率之甚者發回本監再行教習存體責實無如此者凡斯八議臣所為規模之大者悉本諸高皇帝成憲非臣臆說也其一切科條約束臨時損益有須奉㫖者再請臣今不敢繁稱抑臣猶以斯舉雖循舊章實同肇造恭請特頒聖諭親灑宸翰日星雲漢興振羣心然後令之行也如流水矣又頃恭讀聖諭求寧起敝薦辟曠典爰始舉行天縱聖人動高世主自此英才必奮治行必興然臣猶慮知人實難敢贊末議凡各舉到人才姑緩授官先令歷事六部設法磨鍊如高皇帝武英堂鍊習故事且教且察幾及一年遴擇以聞陛下又親召試之見賢後用於是臨軒誥誡而遣之蓋其慎也統候鑒察謹題請崇禎八年九月初八日具題奉㫖奏內條列各欵甚於教學成材有裨著該部即與議覆恪實舉行其召試簡授事宜俟教成另行奏奪雍務急切疏題為謹條目前雍務急切恭請嚴文垂飭以振積弛事伏念臣本庸才不能學問叨冒人師每升皋座輒復汗流既念古人以教為學志氣所㑹何有愚柔以此靜維怵惕思勵顧以今生徒寥閴才百餘人稍出科條未能取暢英才樂育微有待焉若夫目前之務明㫖所已孚者不須再請前人所可守者不假更張臣力所得自行者又不須奏溷而積分修舉以復舊為維新除臣專疏奏請外所有事關各該衙門有呼難應必祈天語用致叮嚀者殆有六端謹條如左一請諭敕工部亟完修理以作趨蹌為照國學久經傾圯自崇禎五年署監事司業黃錦題請得㫖估修興作三年功猶未半臣蒞任之明日即巡閲廟廷以及六堂各等廨署頺垣倒柱觸目皆然屢經移催該管監督並以錢糧不副為辭當此空虛誠宜體諒但查原估數止八百豈以三年之力猶告羞囊聖域賢關此為不急誰是急者伏冀嚴戒該司刻期竣事仍令慎選委官臣監亦選㕔堂協同督理仍將臣疏此欵敕下工科載入注銷項內庶幾告成有日璧水有光一請諭飭五府悉催勳武子弟到監習讀以興門閥為照祖宗厚遇勳臣設為世胄入監習禮讀書之制歷朝申命洊有明綸近經前任祭酒傅冠署監事司業馬之驥纍疏及之並承切㫖乃自襄城李國禎而外無一人至者當聖明注意虎臣貢舉應期鵲起非惟腹心思託亦且聲氣宜連襄城獨非胄子乎何矯矯也除臣移文催取外更望天語嚴申遵照纍朝制令敕五軍都督府將公侯伯等爵及應襲子弟年十四以上三十以下未任事者通行查出開送兵部轉送臣監一體教習如有仍前抗匿者聽部科指名參處又敕兵部自後凡不由臣監起文報部者不准承襲推用其有恪勤受教如李國禎者奬勵以風永著為令庶幾世祿可官翹材蒸奮一請諭敕各州縣有司凡從前逋缺國學錢糧混報蠲免者明白開申以清㑹計為照自臣蒞任查核已前各處未完銀解見有混稱奉㫖蠲免四字輒得停催夫不明開係何年月因何事故奉何詔令而浮游影泛此可疑也安知非出詭稱又安知非暫停一年而後遂沿之永永者乎請得嚴諭凡經臣監移查勒限確詳回報如有朦混不明及過期不應者情弊顯然糾參處治庶幾欺䝉知戒士餼以充一請諭飭吏禮二部凡援例新生咨撥事宜設法關㑹以防詐冒為照納粟之例停之三年而今又復舉利舉則弊又將生矣查得天啓年間事例盛行之時每有假印假文冒騙以去者又有得部移文並不投監乘機伺㑹影朦取撥者此為奸以欺臣監者也其冒撥詐僞以欺該部者亦復猶然今除戶工二部通㑹禮部之法聽禮部自行防飭外其在臣監一收一撥之間設法關通者有二凡禮部咨送印文編立例字為號自例字一號二號以至無窮而臣監於每月之終即將收到字號監生彚册報部凡臣監咨撥印文編立歷字為號自歷字一號二號以至無窮而吏部亦於每月之終將撥到字號監生彚册報監俱以崇禎八年九月為始蓋編以字號則序次聯絡一或有斷續不合即知弊端而月一知聞則彼此關通不致以久逺難稽得容巧弄庶幾摘發為易弊竇可清一請諭飭各該問理衙門遇有監生訟訐事情當即移文知㑹本監以便稽核為照近經南京國子監司業項煜條議六事內一款歷事之當問大約言近來監生一經歷出絶不相聞然而北場懷挾之歷生罰及司成事變之興詎惟場屋如遵祖制則乞歸歷事之人於太學而司其去來等因隨經部覆得㫖悉以歷事監生歸之國學考選科舉此為束諸生以進取之塗即是嚴臣等以鈐轄之責惟是歷生之身依輦轂而足戒圜橋者比比矣脫或有壞法敗簡之事徹於聖聰臣等雖不得知何由逭咎除臣設法諭禁外尤冀敕下各該衙門無問班撥監生凡有事端興訟及被人告訐者曲直聽其公斷但一移文知㑹臣監臣監即可據以稽其行履設為防間庶幾約束得行士心知警一請諭飭本監屬員遵體巡風祖制依臣近議輪班守宿永著為令以防不測為照舊制自博士而下日輪一員巡風廟監至今不廢然止日一巡行夜則委之廟户前監臣傅冠同官馬之驥每對臣言輒懷深慮又且介於操伍屢有無知軍人夜行取便拆毁廟垣而過者歷經移文該管衙門出示禁緝未盡遵行而臣又思方今多事國學地處極偏寥曠疏濶保無奸宄竄跡其間今臣定議每夜委輪㕔堂等官一員從以吏役守宿防衛方在舉行復思事屬創始非經題請恐遂寢湮特乞明綸著此為令庶幾廟規日肅他釁不生已上六事蓋有先經奉命而積習猶沿亦有驟議更弦而微言難動嚴文一下則百事可為為此具題伏候敕㫖崇禎八年九月初八日具題奉㫖奏內國學修葺勳胄入監前已有㫖著再行嚴飭其餘各款即與具覆該部知道省愆陳言疏奏為奉詔省愆束身求黜因攄瑣論上慰殷憂事臣觀成湯之誥曰萬方有罪罪在朕躬其臣伊尹得是意也急起從之納溝由己若夫今日有君無臣上厪獨憂下鮮同德平治不出禍亂相尋財匱兵騷祖恫民怨堯咨舜警罪已側身詔文淋漓讀者皆泣可謂至矣諸臣於是乃倉皇罔措踧踖引愆以次及臣臣當泥首使臣自數豈假多辭陛下亦嘗使臣掄文武之材司啓沃之任何曾有一士致功一言合道頃視成均既復兩月蒸變之象渺然無端顧臣竊惟庸臣尸官不以一引罪即告無罪陛下亦不以一正庸臣之罪即曰天下可平臣即遂䝉誅譴不敢不一竭愚衷焉臣觀陛下之治天下根柢精誠推暨威德天下之人亦知感奮亦知愧恥而績用日圮災變日出譬之萬石之舟所虞淺水舟水相得則資利風夫陛下之智勇亦若舟然羣臣之材力其水也機行乎其間則其風也天下之才本諸其情今之人情率有四遁曰縮朒多畏曰揣摩善窺曰畫畔自了曰悠忽坐廢縮朒多畏者動疑有凶靜保無咎於是功稍難則斂手塗小險即抱頭決事惟首鼠之可安奉職以循牆為無過遁一矣揣摩善窺者不曰事理不易而曰上意如何不曰衾影難欺而曰耳目廣有測意㫖而求合者必無可信之心畏耳目而思避者必有欲為之事於是主張全失奸弊日聞遁二矣畫畔自了者胸無通盤之算誼昧同舟之扶所量在金錢決不顧郡邑有字氓之吏所牽在文墨或不問封疆當戮力之時坐俾民悼所天衆輕其長遁三矣悠忽坐廢者官稍閒即云局外事非我則曰人田兵食之匱亦既有年猝或問之概多失對守令之求亦既再月少可應者惟見倣徨皆由世務人材平夙未嘗經念遁四矣循此四者誤國有餘誠敕諸臣極力洗心其材自見水流盛長負舟而走矣臣愚故願陛下興進名節提振綱紀敦尚德禮參互機權勵亷恥為功能扶公論為元氣明職掌使羣材不匿核賞罰使衆志不疑於是告大臣以秦誓之言激諸臣以春秋之義袚將帥以詩書之氣淬縉紳以薪膽之心最守令以撫字之課上督撫以足食之考正士卒以殺半之權樂百姓以懲貪之法尊謀所以救寡益賞所以治怯練兵所以減饋儲才所以省官使天下之心畢出於赴功不出於救過天下之智悉注於實事不注於空談無兵必使有兵無餉必使有餉無法必使有法無人必使有人寇賊自此可平矣臣最憃愚或冀其言可存小安墜魄不勝慙懼之誠崇禎八年十月十九日具奏奉㫖倪元璐著遵諭恪修職業敷教育才以副委任不必引請這奏殊切時弊知道了該部知道恭候聖安疏奏為恭候聖體萬安因陳芹曝事伏聞陛下宵旰焦勞偶需靜攝旋傳遂已勿藥雍晬如初臣等憂喜回環不能漠默竊惟水獸未殄帝舜有憂然而恭己之容已形暇豫崇密不恭姬文赫怒若夫依京之致惟見從容古之聖人以不屈治志以無暴治氣以無倦治精以不費治神所以先之勞之適得彊固乾健亹亹天和不傷今寇楇雖極而聖敬日躋苟但措其綱條竟可坐收平蕩譬之醫者求病誠明標本只投一物立起諸疴為治不難願紆睿慮臣不勝犬馬之誠崇禎九年正月十二日具題奉㫖覽奏亦見忠愛知道了該部知道被薦求罷疏奏為微臣恥罹猥薦願罷歸田仍乞嚴禁煩囂以清議論事昨二十日臣從署歸忽閲邸抄見有湖廣黃州府黃安縣儒學生員鄒黃遵㫖明白具奏一疏妄行薦舉中及臣名臣不勝駭異夫以臣不肖而上書者不知而譽之此可異也臣亦非甚不肖而上書者又不知而以毁之之道譽之又可異也是故諸臣恥之臣亦恥之抑臣非徒恥之已也蓋猶有憂孔子曰天下有道庶人不議孟子曰諸侯放恣處士橫議由此言之議論之權歸上則治歸下則亂不可不慎也堯舜之世雖曰廣詢然今所見謨誥之篇獨存皋禹嶽牧之論不聞康衢之衆輒有揚言固知其時上自虛懷下原循分即其後世謀及庶人要亦祇是民間疾苦訪求無失或承寃抑得自理伸未聞使之參預廟謨品題人物朝野之辨原甚明也陛下海涵谷虛求言若渴本期宣隱燭幽而宵人遂以干進其法取諸痛哭至敢薄孔孟為糠粃其意主於雌黃至欲網簪紳為桃李一月未久蜂涌波騰凡夫游閒失志之徒狡獪生風之輩無不人矜蔡澤言擬千秋以至市諢優詼悉形奏記顛魔醉囈敢藐天威臣觀光武明主韓歆貴臣徒以指畫乖儀立從顯戮豈有委巷纖兒放言無忌者乎且夫議論不一則是非不明是非不明則賞罰不當賞罰不當則教令不孚教令不孚則人心不固故自吳鯤化以部民參及撫按而後之為大吏者且恐恐然望豪氓而氣懾惟懼惡言之出其口以為萋菲之威甚於斧鉞自鄒黃以下士薦及縉紳而後之為朝臣者且恐恐然聞叩閽而色沮惟懼好言之出其口以為游揚之辱甚於糾彈如是而望天下宣力之臣自好之士揚眉昻首以集事致功豈可得乎陛下誠宜自今亟垂厲禁禁之不已重法隨之於是以大謀付之廷論以清議還之士大夫無使下敢凌上訛得亂真告密希不義之侯傾危覬立談之相即或道存謀野不廢鐘鞀亦宜以條事歸之通政而重其封駁之權以訟寃屬之登聞而嚴其反坐之令密封伏闕悉遏不行庶幾幽隱仍通而紀綱不墮撥亂反治必在於斯詩曰匪先民是程匪大猷是經惟邇言是聽惟邇言是爭如彼築室于道謀是用不潰于成此言為政必明大體而聽言之宜察也惟陛下裁察若臣庸駑無狀至罣訛稱分宜斥譴謹敬待命崇禎九年三月二十日具題奉㫖鄒黃已有㫖了倪元璐著安心供職不必求罷該部知道倪文貞奏疏卷五
