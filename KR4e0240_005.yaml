body:
  text: 倪文貞集巻五明倪元璐撰擬碑奉勅擬撰巨馬橋龍神祠碑文朕聞聖王先成民而後致力於神故凡物不足以安大衆則不舉焉若有功烈於民雖冥棲淵沈必求其靈而報之古之制也出畿南百四十里古涿鹿之野天都砥矢之觀八境輪蹄之㑹有橋利涉曰巨馬嵗久日深霖推波嚙剥圮蕩然僅存基碣而已方時凍涸褰裳可從及其春䨙作波秋颷騰澇危湍箭激闊岸霄分望洋結行子之悽皷枻駭陽侯之怒朕聞而痛之昔孟軻非鄭是興溱洧之譏晉武平吳遂起富平之築杠梁以時王政之著者也然朕不欲問糈少府迺悉索宫儲命官致工自某年月日至某年月日而成橋髙如千丈延亘如千步堅緻壯闊視昔有加朕又念水失其歸則踶觸時作詔使分流出渚納於巨河倘亦善建不拔者矣先是凡三築輒圮既成人以為異朕曰其神於兹土者可祀也吏乃上言龍神之靈夫龍陽徳而列職於隂其處於水則亦有分上焉考漢以雍州諸水近天子都加車乗駵駒以祀今涿去都咫而神著靈如此夫朕之臣有讀書行義冐險畢忠功施於民而捍其大患者朕必畀之上賞於神則庸靳乎昔禹怒無支武懟河伯彼頑既譴此勩宜旌明矣是用封神為某爵錫之廟貌亦若吏堂皇以聴也嗟乎朕務開仁塗而濟天下懼猶未能神則相朕使河清道夷民終有慶易曰可用汲王明並受其福言水徳之可循幽元之有錫也豈有如國僑之云我無求於龍哉立石勒銘傳諸永世冀三光為配四瀆並垂云爾銘曰天府巨津視履所萃有矗其梁以舉厥墜誕周浮黿嗤唐卧虹載其熙攘我軌攸同晉臣舉觴曰天子聖予則何有神實予聴包靈王海列職臣波淮渦不舞瓠子無歌有嘉斯績崇封進之搆楹飭俎範其雄儀國靈歊蒸神光煥發於萬斯年視此銘碣江西丁夘鄉試策問問帝王以禮治天下而天下不之知其可知者與為粉澤焉而已夫禮之至盛莫若虞之禋類夏之玉帛商之元牡周之籩豆然是四者天下皆能稱物而名之天下皆能稱物而名之是天下所以不知也記曰禮本於太乙賈子曰禮者養人之道管子曰兵不禮不勝天下此三言者難察也且禮其燦然者矣而聖人則湛以元解使天下不敢問之經曲乃王者自以其徳養人而威勝天下而二子以為是二物者皆禮也禮則若此其亡端者與譬者曰猶之火矣火幽於燧而著其光大養萬物而能殺之凡陰陽生殺之器聚於火顯藏文武之道綜於禮有諸抑謬乎我皇上具神明之徳龍興以來崇典極儀颷舉雲會既以即位之明年郊饗上帝其乂明年祀於方澤而親釋奠孔子又明年乃朝見日所未舉者月夕陵享耕籍先農以需其時有司已毖矣故觀於今之世者猶幛繡而坐於晨霞之下也然天子於此其内必有精微之心而外則必有威徳之致章於露雷如池鐵山銅尋聲可察者士能皷吹言之歟天下觀聴之儔夢然不足與知之也士可不知哉且夫治以禮成而儀亦有辨其説在晏嬰之謹轡馬子太叔之審周旋也問起世莫大於救弊救弊之道存乎審見而决其功察如占氛棄之若灌今天下甚盛然論者以為其數則有五劇而邊圉之事不與焉明經坐販藩相顯市鹺屬無清流郡駕可詭獲劇一矣關益額而吏與國分裹𣙜與市齊貲則商跼足重困劇二矣衛將十九貧竭使督饋如驅湯火輒有髠顱以避鬻子而償劇三矣考成煎峻守令雖卓魯必得彈責而召杜亦化為屠伯劇四矣内地兵驕小撓輒閧主將囚氣劇五矣而又曰且有五中吏雜必中於法紀錢穀長民乘非其器黷以取酬朒而不任一也商困必中於居農百貨涌貴民食兼兩雖稔不飽二也饋艱必中於編户官運廢則民解興始於役富終以繇貧三也守令之歎必中於司農竭澤走險彌益仰屋四也内卒之孽必中於塞上徵發不應天下血脈與邊劃然遂分兩體五也察此之論五者危見然天下不以為可憂天下舉憂用兵耳語曰張毅養外病攻其内今如士見必云標病不急亦已矣倘亦曰内食實甚則當有厲鍼從之者顧救焚追亡紆步豈貴乎來士汝亦昌言問爾江右四繩無守之國也渚江於楚楚不予蔽海於閩閩不聴牢山於粤粤亦不肯割其嶺既已凉然而乃謀致其人於農桑禮樂此固然耳夫大險不列大鬭不起自天下戎馬之地瞻望以為神皋即非具生福不能享之也然巨湖浩淼均處阻深洪宏之間嘯聚作矣其後再傳華林瑪瑙東鄉桃源之徒探丸颷發至戕重吏躪州邑朝廷為捐金錢數萬三易長帥竭數年之力僅乃克之雖百年已事固爾鄉父祖所羈痛於心又今者楚驚黔孽閩海颺突無時譬漬灰延潤忽然可及而又爾鄉賦重弊滋催科驟急兵又白徒往者有事輒檄土軍招狼格虎適足騷耳此數者皆爾鄉未形之禍也天下之變生於卒而計立於豫自命之士智畧輻輳其意乃欲仰射天狼而豕奔腋下顧愕眙反走此可歎也孔子曰葵猶能衛其足諸士即無嫌過計試條所宜嚮者爾鄉大吏如孫忠烈之謹備禦王文成之精募練以治兵韓襄毅之均里甲唐文襄之清飛詭以庇賦成法不墜倘可修舉增飭之乎夫學者牖户之謀參於性命豈必鵞湖所廢講哉策吏將兵民天下非無民之患而患無吏非無兵之患而患無將非兵不足衛民之患而患吏不能自衛民非民不足養兵之患而患將不能自養兵非分民於兵而以兵竭民之患患分吏於將而將不能吏非分兵於民而以民嗇兵之患患分將於吏而吏不能將夫兵之與民可合可分者也譬之手然專其能於一手而以一時持攫一時抑搔可即分其事於兩手而以左任持攫右任抑搔亦無不可也將之與吏不可分者也其職可分其才不可分其才可分其志念不可分也譬之人然未有方任右手而擊其左手心不知痛勞其左臂而吾自顧吾右臂不還相䕶者也故以兩手分一身之事其道適歸於相濟以一心分左右手之用未有不出於相厲者矣夫古之制為兵民者其始井田為軍伍兩卒旅任地制賦因隙講武共輻以旋之而不厲其後鄙民為農國士為兵農不識干戈兵不諳耒耜畫畔以區之而亦不厲其始一時治兵三時耕稼一嵗衛士一嵗材官當夫漢祖唐宗之盛極規其兩便而不厲其後市籍皆征封君畢役番上變為騎兵長征以廢邊戍或以召杜郭李之徒自治其一區而亦不厲是故兵民之有濟無厲則已久矣兵民不相厲而吏不善取民則自厲民將不善養兵則自厲兵即吏與將不自厲其兵民而吏不能將則適厲將將不能吏則適厲吏將厲吏則迫吏不得不出於追呼吏厲將則迫將不得不責其轉運將自厲兵則不得不卸怨於單匱吏自厲民則不得不委咎於考成此四者起禍逃責天下之大慝也古之忠奉之士心計之臣未有若此者趙充國之討西羌也其先事則教耿中丞以湟中穀賤糴二百萬斛其臨事則上糧穀茭藁之數而議行屯田張詠之守益州也其始事則聴民以米易鹽得米數萬其終事則奏罷陜西軍糧充國恥不能自饋其兵而張詠恥不能取饋於其民然而羌日以困蜀日以富羊祜之帥荆州也初至無百日糧季年乃有十年之積倪寛之為内史也始以多逋租殿後以牛車争輸最羊祜勞其兵於十年之計倪寛竭其民於一日之供然而兵竟平呉民不怨漢故使充國翹戰功而求宿飽度孝宣必不罪其煩民使張詠閉近糶而責逺輸度宋真必不誅其餒士使羊祜以伐國之大謀正告其上兩河而還度不敢辭其轉運使倪寛以被譴之嚴文歸懟其下三輔之衆度不忍怨其追呼然是數子則皆有所不為由斯而談豈必一隅之師能竭天下郊圻之吏不問封疆資糧之供定出漕輓而上上之考决本催科哉故夫古今人之不相及也古人之治兵者必治賦古人之治民者必籌兵古人之為吏必以全力副將古人之為將必以餘地予吏㓂恂近餽燕趙逺餽關西以守其河内李晟内無貨財外無轉輸以戰於渭橋使今人為之則必變色而揚揭竿之勢大聲而攄絶命之辭韓麒麟朝務農桑夕謀生聚未事而憂戎役岳武穆北支强敵南敵楊么臨饋而歎民財使今人為之則必拱手而驕壁上之觀抗章而責絳河之慢故周漢以降宋唐而上將帥守令之無能而不相為用未有如今日者也今自兵興以來守禦戰鬭日習其事天下之智謀才力宜無有不出者天下之精神志氣亦宜無有不振者然而今者壁壘未渙澤井猶荒兵芻靈之曰象人民牂羊而吟墳首苟求其故雖三尺童子必知咎將必知咎將之無將畧必知咎吏必知咎吏之無吏幹而今將之言曰非我也單匱使然爾吏之言曰非我也考成使然爾二者之意以為空虚之没人韓白而功令之驅人桑孔也嗟乎聚九府之有注之一方日輸月將不可謂不繼也維正好義取諸其所固然亦不為無制也以是為厲將必務竭澤之漁以壯作好中軍之氣發蠲租之詔以祓甘泉烽火之凶斯已迂悖矣然即謂今之非以單匱厲兵考成厲民固有不可何也國之養兵者不如兵之養將者也國之取民者不如吏之取民者也夫妻子田宅主將樞要此四者皆兵之為將養者也贖鍰羨例公費行稅此四者皆吏之取乎民者也此四養四取者將與吏咸共奉之比於聖言王制握固謹持雖火焦於上池竭於下不可移奪而於是遲之一日有終月之饑益之錙銖有什伯之害在兵如尫羸之體偶間參苓即萎軃㡬墮在民如負重之肩稍加升斗即僵僂欲踣故夫單匱之至於厲兵考成之至於厲民也亦皆將與吏之為也且夫興師動衆積十餘年雖京茨徧野禮樂盈朝不能不見襟肘之形而出權宜之計者勢也若夫良將賢有司之處於此則必有法焉是故充國羊祜尚已秦漢之際一燕一代自當匈奴禄賞自足不取備於内宋姚内斌之於慶州李允則之於雄州莫不皆然此又一法也得其意而行之可以不矯首大呼王素守渭城减省戍卒而積粟支十年此又一法也得其意而行之可以用寡張巡與賊戰弓矢械甲皆取之敵不自修製此又一法也得其意而行之可以不困虞衡王晏球在定州城下日以私財饗士此又一法也得其意而行之可以不有其家而軍益富岳飛與兀术戰兵無現糧將士皆忍饑不敢擾民此又一法也得其意而行之可以雖遭匱乏無脱巾之憂是故張詠倪寛尚已何易于督賦役不忍逼下戸以俸輸租此又一法也得其意而行之可以損上益下李翔教民以田占租収豪室税萬二千緡而貧弱以安此又一法也得其意而行之可以裒多益寡劑量窮富何敬叔榜縣受餉物各數十以貸貧民輸租此又一法也得其意而行之可以詭濟种世衡以嚴治武功凡有徵需但以片紙榜縣門無不應時集者此又一法也得其意而行之可以雖追呼不害王慧龍守榮陽農戰並修歸附萬家此乂一法也得其意而行之可以民治兵董安于之為晉陽襲矢於茨襲銅於柱數年之後而皆利賴之此又一法也得其意而行之可以保障而理干城凡若此者皆能有以靖其志慮畢其計謀以著其神明其為國家章美救粃修濟袪厲亦多術矣故曰萬里之淵連於窽木千仞之谿升於垂綆此言極阻之可與致功至難之可以施救也今為救時之議者發言盈庭不曰縮餉則曰加賦縮餉主於清兵可行而不能行加賦則益困民不可行而不能不行於是有起而兩非之者而亦究歸於無策非無策也鷹揚不作乳虎成羣縱復晁賈盱衡計陶研策鏤脂畫冰亦何益於數乎且匪獨此也今盡國空鐺司農仰屋夫將博求通變深計之士而四顧無與窮年而不得固已焦然矣然愚謂亦不如選擇將吏而與之謀之則必有成姑無暇枚舉舉其大者如執事所咨屯䀋二事其地之廣土㡬何民之無田兵之不任戰者㡬何豪右侵没㡬何耕具種本何出㡬口家㡬咶鹽責商輸粟其何塗之從凡若此者問之他人不知問之分符列閫於其土者而有不洞然是謂披裘握冰不自知其煖凊也審惟是釋然挈擔而歸之若使謀其家計然者而乃重其事權寛其嵗月大賞嚴誅以隨其後不出十年紅朽之盛可致矣是故將吏得人天下大治漢文帝曰吾獨不得廉頗李牧為將耳孝宣曰與我共此者其良二千石乎古之致治之主灼然有以察其關鑰之所存如射審的固不誣也且夫辦天下之事莫不以才天下無事庸人擾之以多事天下有事才人靖之以無事才者事會之所廹心志之所呼也今使將注意兵則將才出吏注意民則吏才出將之心不分民吏之心不分兵而文武之兼才出矣此二才者周計而造功規全以慮變其鼔檝通志猶聚乎一堂之上而謀之世有此二才者而其時之兵與民翕然如一父之子是故歸於有濟無厲今欲為容民畜衆本固邦寧之計而兠鍪猶責帥之心銅墨有素封之氣詩曰朝隮於西崇朝其雨孰謂虹升而雨降乎視學及士習文體策王者之强其國必以詩書禮樂其治柔國則愈不能釋此也故欲威天下必先造士士賈勇不足則退而修其雍容之教古者辟雍之設天子之所自學以著教也於是揚其翠華則舎菜而祭瞽宗袒割而養老餽酳而乞言旁皇於一日之事詳盡如此者使人耳目開而精神動所以致其强也故饗奠之恭講論之美其柔可握而由其道則可以厲威而訓武古者出師受成於學返獻馘焉以為攻戰之道聖人知之故出則祈其意返而歸其功也魯人之歌涖泮者其士則虎臣其獲則琛賂其器則束矢戎車而已先王未嘗入學而教兵士未嘗加矛於俎而致用如此歐子曰武者救世砭劑而文其膏粱夫歐子則不知布和於臟逐其瘵蠱也然昔者先王之於學也仲春仲秋有視季春有視有旦入有晝入有暮入其於事為習於士為涵泳為嚌嚅教成而材備故曰卒然起一方舉統類而應之無所疑怍此儒者之成也其後世再世相繼則一舉之固已疎矣然間起之觀則亦可以使天下䘏然而有作詩曰鳶飛戾天魚躍於淵豈弟君子遐不作人此言士不飛躍其意則不作也士者沈蟄之器而飛其聲氣躍於文章察此二者則士之情盡見而可得矣然此二者士有二隨焉運隨天化隨國故以士之為此二者而天子之情亦盡見而可得矣三代以還惟漢最重儒學永平建初之年天子行辟雍之禮上者秉鐸下者圜橋至化介胄為絃誦被左帶以方領當此之時士則矜奮而興氣節砥植名行雖至刲首不可得抑其覃精厚思而為文章前則天人矢正後則典引規奇及於諸子莫不根極理道歸於典則矣然而其國靈所葢則大宛之蹄躑於六閑抑鞮之齒鱗於司㑹日逐之庭列於北圉哀牢之部綴於永昌終漢之世首功不絶也故曰文之所加者淺則勢之所勝者小教之所施者博而威之所制者廣故曰禮者威行之道功名之總也若夫唐宋之代舉其具文譬鑽僵槐豈可望其出火乎我國家二雍並峙高皇帝闢乾而養士於䝉泉文皇帝奠坎而觀文於離火路車頻駕誕敷恢恢思皇之猶可得而覩也其後則肅皇帝再興之典禮足以震中葉而有光而神皇帝一鼓之教思或不能保五十年而無敝則我皇上今者鸞旂之耀等於天披天下之士以為游於帝庭饗其鈞樂也今天下肅慎不庭鬼方未克所不足非文事也然向者司馬陳其六師天子即不韎韐以從兹六飛之靈勤抑如此者非天子之修不急也天子則猶是問鴞音於泮水矣故自數日以來小大並奮執事謂其象必鼓為烝皇而蹶生之勢將有見端於士習文體之際者斯不誣也夫士之相觀成習而相播為文莫弊今日矣然皆相於弱不相於强也為士習之弊者五舎龜觀頤一也蚤虱之􅕳二也佻達城闕三也不刺繡紋倚市門四也朋蛙聚鵂五也舎龜觀頤者餔餟甘於齊卿餐錢貴其宋相蚤虱之􅕳者蓼盤陳而乞化柳車結以送窮佻達城闕者舞態極於欽明琴心妙於司馬不刺繡紋倚市門者王門抱其竽瑟主第奏其鬱輪朋蛙聚鵂者豪心作而捲堂怒目逢而投甓凡若此者皆由其宵貌莝質神不足以定體而為之也為文體之弊者五嘈囋為悦一也離部野掠二也以移面為奪胎三也禠其鳳羽戴其蝟皮四也逐於狐鬼五也嘈囋為悦者子雲嗤靡於繡鞶士衡誚淫於防露離部野掠者伯起逐草於䜟緯平子游奕於鳥占以移面為奪胎者紹述聱聲於綘園彥伯變文於鶠閣禠其鳳羽戴其蝟皮者劉勰擬鷹鷙之觀郝隆竄娵隅之謂逐於狐鬼者麟篆詭少陵之秘蛇神乞長吉之靈凡若此者皆由其弱弓微繳機不足以要其的而為之也是故二者之為其兆則皆足以致兵禍而使之駕則必僨轅使之行師必棄戈而走何者其神索也李陵曰軍中有女子乎今女子之陰結於士志則豈得揚哉自數十年間官師之條日上詔令之戒日下而不能革也則庶㡬於橋門觀聴之㑹鏃羽相觸翩然反之然愚猶慮其不足以起者何也古者成均所萃則秀士選士之所升也高皇帝羅郡國之儁使學於天子出則膺顯職筦天下大柄如此其貴也而今六館之英盡鴻都之鬻則是天子使卜式之執經於前而責崔烈之致身其後猶懸牛首望其馬肉此不足以起也漢之視學其天子自為下說鳴叩互發於是乎開石渠虎觀進諸儒之言稱制决之而高皇帝於禹謨洪範諸篇振猶響玉也今天語秘於堅簧睿思襲於重幕則是使天地閉霆而啟萬靈之蟄仲尼棄鐸而醉七十子之心猶浴温泉有濡無擊此不足以起也古者取士熟察其人而用之今則糊名而求其文字古之為文者取格於古今之為文者取格於一代之制凡士之所為禪於聖燈者皆不可以謀於王鈇則是觀矍相之圃不可以得觶升桓榮之堂不可以得車馬猶懐三山沮於滯骨此不足以起也挾此三不起者雖天子月一臨膠序日聚徒而鼔之無益夫一日之感浡於人心者所謂兔起鶻落不急逐則遂逝者也如愚之議請必自天子更張之其上者禔躬典學明教化之本以周禮三物辟召天下使士無衺志無所冀倖而為文辭其次則使士崇實學以六經為帥諸史為兵衛士通此二者則志趣端而不詭其議天子則以聴政之暇延見諸儒考其得失以騐其材其次則追原祖制青青之衿不得以易上農之粟多金之賈不得以奸胄子之倫以時起居去其敗羣以興其行試士之文專取論議或發策詢時無使支離帖括如巫傳鬼教然者如此則士居身之地尊致學之功一故曰並一而不貳則通於神明參於天地蓋惟其懲創之意深而忠義之心發也忠義之心發則氣專決而神明奮故曰左執太行之猱而右摶彫虎如此則儒者之用見於天下而將帥之材出矣晉謀置帥趙衰曰郤縠可説禮樂而敦詩書故以天子之修舉學教興賢考藝而極其致則足以救弊扶衰者譬燧出於掌火降於日也而廢則併廢如蟾蜍之毁中於螺蚄也易曰君子豹變其文蔚也詩曰羔裘豹飾孔武有力夫豹䝉文而貢武此言士之能也此言造士者變其故常以新其文飾其固陋以雄其武也今海内之情沸然日潰而不知求之天子之教當官日敗而不知端本於士之行與文急治其詩書禮樂之務則亦何异立朝夕於運均之上擔竿而定其末哉明目達聰論帝王周知天下情注於虚而神存焉所謂神者開寤於心與萬物相見雖覆以十重之幕其光不没也劉安曰意有所至而神喟然在之夫黕黕漆漆聞雷窺堂捫鐘以為日者天下之寐人也熾然張金目以快射而研雉登牛鳴之聴若韓侯智氏之能亦明主所不貴矣故以韓侯之察細及豕耳而申不害以為盲聾將至智氏園亡一桃而知之而不知韓魏之舞欺於肘足其神之有小存所為大亡也且天下之形籟纚屬而奔耳目則立敝之道也聖人為之革其器以存其靈故取諸旒纊聖人之徳備諸易苞乾坤而貢華於六子位目於離以麗正而兩作宅耳於坎以心孚而有尚坎離者大險大死之所在也離既昃而焚如錯於乾澤之交虎咥人而眇目坎枕窞而寘叢棘綜於火雷之㑹何校而滅其耳聖人以為眇目滅耳則不足與辨物故於目去多白於耳去痛不辨物則不足以斥其疑故於目去幽谷不覿於耳去喪牛莫聞不斥其疑不足與為明聰故於目去見斗見豕於耳去聞言不信若然者精沈而照逺睟曰目上於天耳下於淵目天耳淵聖人之游也且夫耳目䝉而霽於明聰譬木䝉而霽於火木生火火燔木明聰生於耳目而燔耳目也故繁響淫觀雕辯蠱飾庸主悦之枕瞇而席瞶大功顯業仁稱義蹟瑰觀瑋聴者則英主之所喜也然使英主欣然而動於其情盡智而為之而其明日敗猶嘘野燐不足以出其熖矣昔者大畧莫如漢武而信主父置朔方郡發策引難章其雄察張騫乘之以為大宛可結月氐可通孝宣之治以為嚴教吏則無失職膠東相因是以占流民八萬而詔書曰治有異等之效宋神之朝氣罣於金陵之褊心猶日没於虹也新法之出萬釜並沸猶且曰今之古人夫此三君者天下之至奮也其志在於抗稜四裔阜民生而利天下而四臣者應聲而射以傷其明聰是四臣者其持之亦有其故矣而三君者以其明聰轉捩而下投之故以漢武為明是眇之視也武人而為大君以漢宣宋神為聰是滅耳之聴也履上位而何校夫天子之明聰横出而不正其歸則同於眇滅故堯舜者明聰之至也蓋嘗論之使治水九載之鯀播其掌蹠詫於偃騫之代則必齊袵而揖其大勞靜言象恭之共工搴唇出齦蹙肩隱項以託於王成安石之檣則必聚雷而褒其幹謹當此之時四岳之智存乎蓬艾也曰於都哉而堯曰吁咈哉堯吁咈霽其䝉而舜遂以生其流殛之道譬諸射者堯張弧而舜決注之堯舜者共耳合目而治者也堯舜清微其身以徧知天下而其神不外故曰神生其光非力索可得矣商宗之置相也以夢而啟信周成王之堲讒也以風雷而破疑天下烏知聰明之道有得於其夢與風雷者乎主術論聖人之治天下譬天氣之變萬物不著其力神行而不勞也夫聖人者離象領獨之名也使衆人芒聖人亦芒衆人懼聖人亦懼衆人費聖人亦費衆人竭聖人亦竭則無為貴聖人矣良醫之見病皆非衆醫之所洞也中庶子曰中害扁鵲曰蹷齊人曰蹷倉公曰湧疝故曰聞病之陽論得其隂聞病之隂論得其陽陰陽之所見榮徴水徴火聖人則皆有不因者也古之至人俞跗之徒因人考病因病求物故使茋苓執補巴黄執㵼冰黛當熱桂附當寒此八物之於四病者猶星野相握終古無變然或循其故而以殺人者以其惑於表應昧於主患主患不明則治之者皆客治之者皆客是以賊為其救也以賊為其救則神農之道其以殺天下無遺矣是故聖人之救亂也在明標本標本既明則不治者皆治昔者堯急舉舜則不務誅共驩舜急除四凶則不務勤有苗文王治一崇密即不身聴虞芮之訟孔子戮一少正即不苛求慎沈之奸然而智者所瞻通人之論以為堯刃共驩而寄手於舜舜抗有苗撻於四凶周政以大兵息小刑魯治以一誅正羣罪由此而言即謂放勲之果刑誅帝姚之毒征伐姬文之善弊獄仲尼之好察奸何為不然哉且夫興世變俗制於神明此非無術之所能為也聖人之為此者必有楗捩益以計數紆軫曲塗隱神制氣以達其事今欲徑遂為功正告疾取建鼓大召扶繩督趨以播船於山與驥逐走是則夏奡夸父之所不能也子貢之機不挾以圉人之捩役人之力不振以管仲之鈴去馬安得返仲尼之櫪纍車亦豈易達齊桓之庭哉是故相救之術不必其相反獨謀之功非期於獨勝甚矯之行有激之事察者所求聖人不貴也昔者漢唐之世亦多察主矣孝景以其下多欺則矯之以智數智數雖精不能勝袁盎而其甚者外以播其宗國内以棄其世臣孝宣以其下多玩則矯之以束濕束濕雖刻不能勝王成而其甚者使天下歸寃於趙蓋朝士移畏於恭顯徳宗以邊將不法激而為中制於是逐白志貞而用霍文塲竇瓘然志貞漁獵富人而竇霍頤指樞要其究則神策以殺大帥北軍以縶諸儒肅宗以寃獄無告激而為下聴於是疑謝夷甫孫鎣而信毛若虚然孫謝以執法嬰患而若虚以平反媚權其時則賢宰因之以䝉禠權璫因之以震主夫此四主者其志皆出於窮奸救弊其法亦足以儆頑擊䝉而循偏極流適以益禍是故古帝王之末治皆有難循者也今豈謂耳目非皇華之義刑名非五宅之謀綜覆非取謀於考績鈎察非稟教於鞀鐸者哉本計不得而徒循美名以騖天下則其身不靜其身不靜則其道有巇務道而使有巇小人抵之仁義猶足以亡國况法制刑威乎故曰君猶天也天不開門户使世相害人主以徳心騖天下則天下日敝害日以生凡道必有端物必有數端非守曲而以統逺數非窮多而以立少是故天下之言主術者皆貴乎其不勞也不勞者其有甚勞者矣今夫萬物皆尊綱而貴緒也自其拱手而享之綱立無不立緒理無不理聖人以是𤣥晏恭已無為自其厯物而求之排繁擇簡揮詳取要考萬目而選一綱攬千絲而得一緒聖人不亦黽勉敦云而有事者乎夫連錢以貫善制紛者也而為貫集材是生經緯之事人皆䝉貫之便人皆非坐而得貫者也是故治天下者而貴無為既宜以術取無為治天下而貴無逸則務乎其術亦足以㡬㡬勅勅自朝至於日中昃不遑暇食矣詎必以尚元守約為是闇弱無所知能大業之所不収英君鄙而弗道者哉夫所貴乎英君者貴其不必有能而所能者即必天下所不能不必有知而所知者即必天下所未知堯曰湯湯洪水方割蕩蕩懐山襄陵高宗曰夢帝賚予良弼其代予言夫岳牧未有言洪水者而堯已知之天下無人知有傅説而高宗以為得之夢見堯以數字寫洪水之狀痛於颺言高宗以一夕審傅説之容熟於舊識堯不必日游康衢此其得法以坐照者也高宗亦非必真通帝座此其詭夢以示靈者也故以二主之清微恭黙而萬里之遥不能欺以利害一介之賤不能遁以鬚眉後世之主苟欲周流六虛鉗控四逺有如堯高宗者亦已足矣而烏知其時不戮一人不求一弊比周則猶在側方命則猶在官三年以前則猶無言三年以後則猶無事而時雍不改中興坐躋協和無威主之稱赫濯有强國之譽以此觀之治天下之不可無術也章章矣術者道事之機轂也道無術輔天下必以道為愚而苟非術以制事事可勝逐乎詩曰伐木掎矣析薪杝矣蓋言務本迎機之易為功力也倪文貞集巻五
