body:
  text: 倪文貞講編卷三明倪元璐撰日講惟暨乃僚罔不同心以匡乃辟俾率先王迪我高后以康兆民鳴呼欽豫時命其惟有終此二節是高宗要傅說率屬盡忠始終如一的意思暨字解做及字乃猶言汝也乃僚是言傅說以下百官庶司乃辟是高宗自稱不說是我之臣僚而曰汝僚不說是百僚共戴之君而曰汝君何等委任何等責成先王指商繼世諸賢君說高后指成湯說時字解做是字高宗又命傅說說道相臣以人事君凡百官庶司有一人之不盡其職者皆相臣之責也汝既作相則自卿士以下皆汝僚屬汝當身先倡率與之同心協力匡正汝君有善必陳有失必諫俾我處心行事毫無過差得以率循我先王太甲太戊祖乙盤庚繼述之道踐履我高祖成湯已行之跡于以保安萬民使無一夫不得其所如此庶我之君德無沗而汝之相業亦光矣高宗既命傅說猶恐其奉行不力有始無終乃又嗟嘆而申誡之說道臣子親承君命即如有天帝明神臨于其上一般豈得不敬本此敬畏一念提起精神便做得許大功業出來如前所謂納誨輔德啓心沃心之言與夫率屬正君法祖安民之說諄諄命汝者汝當一意敬承恪共其職又且時時思念愼終如始毋以末路衰懈棄其前功斯于輔相之道無有不盡而亦不負上帝賚豫之心汝其勉哉據此書詞可知帝王制治之法最為簡要只是認定一個宰相宰相得人自然正已率屬同心集事賢才輩出治理日隆矣然而百僚之中意見不齊議論紛錯若要相臣一一與之同心誠有甚難臣謂惟在相臣以虛公之心審别邪正而已蓋其人是個正人雖或才有不逮可以忠義激之力有未盡可以功令懾之黽勉同心無不可者若其人是個邪人或敗名喪節不顧廉隅或附逆保奸敢犯公論者如此之徒雖欲與之同心而彼之所志必不在君父所營必不在職業勢必至于欺君賣友亂政殃民豈可槩示休容惟有决計去之耳昔舜相堯一日而除四凶孔子相魯七日而誅少正卯今日執政大臣必須有這等手假然後可以救時致治臣愚敢以知人善任望之皇上以抑邪扶正望之二三大臣每䝉皇上申誡諸臣勿狥情靣勿持兩可惟於邪人不狥情靣斯於正人有同心之功惟於邪正不持兩可斯於君德有匡正之益二三大臣果能始終敬承明命追踪傅說又何難哉說復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命此傅說受命為相親承訓辭第一件敷陳惟望高宗屈已從諫蓋欲把高宗求言若渴的虛懷引之不替然後他的輔相能事可以漸漸展布出來祗若是敬順傅說復命于高宗說道從古大聖人學問只是個舍已從人譬如木理不是生成便得端正惟依從著大匠的繩墨則可以削其欹邪而歸於端正矣人君也不是生成便是聖人惟聽從著臣下的忠言諫諍則可以格其非幾而造于聖人矣吾君果能克成聖德則凡諸臣子爭思靖獻就是不命他說他也要自竭忠讜以承之矣况今之王命臣納誨啓沃如此惓切誰敢不盡言無隱以敬順吾王之美命乎忠言苦口投于拒諫之耳則曰戇曰逆入于從諫之耳則曰敬曰順至于諫曰敬順而其美盡歸于君矣王其念之臣愚竊謂惟君臣一德然後有逆耳之言若務為面從其心必異蓋此輩只是保守富貴全無忠君為國的念頭一旦緩急何足倚仗敢諫之士人主每疑其有意沽名不知人臣以諌立名皆是末世之事如遭逢聖主有言必從犯顔攖鱗本非難事如何取得名去况用言與用人不同用人必求真品真才用言惟取其言不必問其他也國家諫官皆以七品小臣為之正欲借他一畨朝氣彈駁不避足使小人知畏公論有歸所以其言果當便須聽從其言不當弗遽加罪也臣又觀古今諫官邪正皆隨時勢轉移昏濁之朝權幸用事每用臺諫驅除善類若聖明之世天日皎然小臣不敢萌攀附之心大臣不能施要結之術公論還歸臺諫惟在皇上審察而善馭之耳惟說命總百官乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民此傅說論治道之原欲君臣相與循省職分乂安百姓的意思亂字解做治字傅說既受命於高宗居冡宰之任總領百官乃進誡于王先歎息說道夫一高一卑之定其位一星一野之别其區風雨露雷之各司其事天之道也古昔明王奉順這天道以區畫九州大建為邦國小設為都邑於是乃立一人焉以作之君其主為天子列辟為諸侯而又為之置屬以承之上之浚明有家是為大夫下至鄉遂亦皆有師都鄙亦皆有長尊卑等級畫然如此者誠非欲以天下奉一人安樂其心志已也正以君代天而臣佐君主輔相承臂指相使惟期共圗治理以教養天下之民使之歸於寧靖焉耳以此觀之君不能代天治民即為虛位臣不能佐君治民即為曠官可不交相警勵乎臣愚仰窺皇上憂勤愓厲而今海內之民日窮且亂者其故總由于有司之不肖夫不肖非僅貪吏也如催科有常法而惟事嚴刑正賦有常供而又加橫取昔兒寬牛車之輸不關鞭朴即冉求賦粟之倍非為私囊而今不然此是不肖也又如地方中豪强激變始而豢豪强如驕子既又畏亂民如大敵昔唐溫造以一儒生定南梁五千甲士之亂掩捕無遺况此白徒豈難坐制而今不能又如流寇之興延今數歲既稱就撫何又拚飛昔宋張嶽諸將招降大盜楊么曹成等動數十萬或散遣歸田或選籍為兵安頓牢籠各有其法而今又不能可見昏憒妄庸肉食無謀之輩皆不肖有司耳今日誠使有司得人則必無窮民大吏得人則必無亂民皇上惟以甄别有司責之撫按選擇大吏責之銓衡有司必舉其廉明豈弟而有實績者大吏必求其正直靜沉而能任事者撫按無以喜怒混淆吏治銓衡無以愛憎顚倒人才庶幾知人安民之道盡於此矣至於廟堂之務惟在提綱挈領端本澄源平政刑修教化恩以綏民尤不可以急于見恩而長犯上無等之風法以威民尤不可以急于伸法而啓告密紛紜之害本計既得令行流水如是而民不大治天下不太平臣不信也倪文貞講編卷三
