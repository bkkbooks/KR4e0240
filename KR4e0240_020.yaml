body:
  text: 倪文貞集卷二十續編三明倪元璐撰書牘與楊機部廷麟戊寅一别遂三周歲籥昔人云邈若墜雨翩猶秋蒂足徴此况矣投林以後惟有山中白雲堪自怡恱而中外交閧每一念及輒如轆轤上睡醒夢俱牽恨不及見褒鄂雄姿開其眊矂也台兄以沉經博古之才而熟聞軍旅之事主上破格用人授以贊畫壯猶貞律正吾黨立名閫外時矣惟是往者兵氣不揚將窳而卒惰先事既無守備之方臨事徒有恇怯之習台兄當與督師奬帥三軍鼓倡忠義使行間有先登效命之心而不徒誇緩帶輕裘之度頗牧出自玉堂豈不足上慰拊髀之思乎昔裴中立請以昌黎為行軍司馬而栁宗元責其不承史職夫宗元固不知史職耳天文壁主圗書奎司武庫二者相比如繩之連故曰好以暇好以衆整天下事固非肉食無墨之徒所能辦也台兄運籌淵祕坐掃欃槍斯則不負吾君不負吾學者逺勝文章報國矣跂豫望之僕將藉以生色焉與姜如農埰庚辰臨軒闢門卓越千古門下遭盛典而入梧垣感恩圗報度如箭激火騰矣顧今人通病在議論多而成功少談兵于紙上則辛棄疾之車旗聚米於圗中則蕭鄼侯之轉輸又或求深一層置國家之緩急於度外而泛援迂逺之論以入告言之則可聼行之則無從下手使已享其名而君父不獲收其效想門下之目笑久矣夫必有任事之才而後有議事之識故欲靖寇則必先養民欲養民則必先蠲賦欲蠲賦則必先節餉欲節餉則必先省兵欲省兵則必先扼要害而清浮冒國家疆事朝事總壞於有空文而無實效破的批肯潔領提綱斯盈庭之志氣䇿力亦渙然呼引日出議即益少功即益多願門下亟圗之節足一宣足使啁嘈結舌耳與左巡按光先辛巳敝郡貏豸自清霜法雨一畨澄濯駸駸乎可稱樂土矣惟所最苦者壩稅而外無如欽賘扳害一節業䝉台鍳動色咨嗟將為抗章請命旋聞奉有明綸踟蹰且止旬日之間接得舍親金楚畹道長及諸老手書並稱聖明自憂旱以來求民之瘼惟恐不及如清獄一詔出自睿衷一日而疏滯獄數千人省豁賘銀無算歡聲動地然德音未已尚爾旁皇由此而推明主忠言此其時也欽賘之纍至今已極循此不已必有大憂然自始禍至今從未有痛切為聖明言之者頃讀明㫖責成邑令仰見如傷之心然而不塞其源流將日濫今嚴文日下於兩臺兩臺安得不行之所司以及于令令又安得不出票拘提才一拘提無論果否寃誣有無株纍而其家已破蕩無餘矣此雖召杜卓魯亦無如之何况乎本犯所扳之人與産盡屬子虛又安得真正主名不株不波灑然應明詔哉向見有里老公呈未投稿子嫌其未暢聊録奉覽如老公祖以目擊之痛皂囊直上尤為徑便耳其二伏自奸商積猾冒支國帑官銀入手任意花銷及至事露窮追牽扳四出日甚一日以至于今何草不黃無家不蕩其所扳之人始猶及于親族繼漸遍于逺支始猶止于同宗今則廣延他姓其所扳之産與贓始或以賣出為現存今乃以子虛為實有始猶云曾相通貸既且直云同事朋分其所扳株轉折在部文不過一二主名至地方不免以一生十部文據本犯所供地方惟犯屬之口所以本犯以囹圄為福堂親族懼其扳牽輦金求免犯屬以欽犯為竒貨鄉黨少攖其意嫁禍立加而無辜人户無端承禍逃亡死喪日日見告小民瞋目歸咎有司某竊思今日之事無良有司不能救遇良有司亦不能救有司不能申理民怨有司能為民申理民亦必怨此何以故蓋有司雖良豈能庋部文于髙閣而事關欽件名勢重大才一拘提家已半蕩或偶有昭雪得之于兩臺未必能得之于部再承嚴駁禍事重興此所謂雖遇良有司不能救者也凡所扳賘如果十無一實雖有司明知其寃豈可盡報平反只就稍支衣食者勸使强輸具文以上民謂有司既已明知故入疾視彌深所謂有司雖能申理民亦必怨者也循此不已大亂將生拔本塞源是在廟堂之上某竊惟追賘國之常刑交易民之常事正使本犯家有餘産何煩假力朝廷若其必藉官追即是産非已有觀今百無一實從前及後可知伏乞祖臺一面詳查産户有無虛實一面題請聖明自今一切連賘在內只合嚴追本犯在外拘繫其父母妻子有産理無不完産盡另希解網庶幾垂絶之家可重生矣與吳磊齊麟徴壬午讀大疏道學經綸俱備天下如此才數百年中一二耳每頌池塘春草附通魂夢則友其兄而難為弟辱荷手書其言愷切詳明真朝賈之匹也某莝質伯氏所明投林以來小人有母舍側橫一小橋比于虎溪每送客未嘗過此然而中邊之交閧殍殣之載途中夜傍徨澘焉出涕屈指當局諸公未知誰堪勝此任者幸兄昆玉好為之即一日上求救時二難並轡於天衢我聞一笑墮驢矣病中率復别狀非報也復張天如溥壬午自家兄去江南而議論之喧豗益甚矣顧甘陵南北黨部紛岐名節之盛莫甚于東漢而曾無救於衰亂之相尋則清流標榜固君子所深憂也方今天日晶明台兄真實學問即著書立教自足千古厨俊顧及之交何妨概為謝絶至若小人之噂沓又何足慮乎宜興出山比於溫國之復相來教謂向以第一流聲望相推許不知鄙性硜硜不可為依草附木之小人亦豈可為游光揚聲之君子猿鶴沙蟲各自存其本相耳况弟臃腫日衰只八十一歲老親縈回胸中遂無復抵掌掀髯之氣先生其以顧長康畫謝幼輿可乎劉念翁望典型風道自言嘗夢尋比以病避客見必誦先生此言此老在位必有學問耳答史道鄰可法壬午時史公以淮揚巡撫改視漕政軍興蜂午庚癸四呼飛挽無神嘯聚時出時事之危未有如今日者非台臺以壯猷絶幹租荼鞭履其間則江淮南北不知作何釜沸台臺之身非特宗社所憑即白門諸君子一夕之安亦九里萬間之賜也弟最蠢愚獨於台臺景行最切今赤眉黃巾敷天共憤使以台臺入典中樞出聲天討以紀律勵將以義勇䇿兵勦撫並用指顧間耳天津橋上人云俟此人為將淮西可平非常之功倘必有待而然乎伏承明教下詢瞽矇漕鹽通變諸議皆老謀碩畫聚米畫沙而談者顧有治人無治法古今之通病也惟台臺有論事之識亦惟台臺有任事之才望即以淮揚為端推行于邊鎮上慰宵旰端在此矣倪文貞集卷二十
