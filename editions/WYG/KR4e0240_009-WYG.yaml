body:
  text: 倪文貞集巻九明倪元璐撰墓誌銘封少師兵部尚書仰思朱公暨配贈夫人趙氏合葬墓誌銘夫淳龎之氣近福英達之分依功功者積情之為福者因性之報至人治一室而吉祥止教一人而勳能畢蓬駕連道室畬貫謀外蒸同風内諧齊徳世儀人瑞無若朱公公諱璘字文玉别號仰思越之山隂人其先積義代有聞人祖篪擢甲科官監察御史父以京為桞州郡倅攬轡慨然之氣飲泉不易之心循職致能亶其父子桞州生二子公其冢允也生有異徵弱不好弄讀書强記等身十行江夏之號無雙童烏之年九嵗十六補弟子員十七有室公既靜專遂迷馬足廢其家轄而鈐文心鑽厲致精名傾一郡八舉不第羽豐而鍜玉之為石凌陽無衛足之智馬之責牛孤逐有傾筐之感公乃喟然而歎曰嗟乎夫文章以瘖為徳時命以抝為權瘖不自理抝不人聴然則妍惡於誰其正窮達何為可爭乎葢至是公且倦遊年踰五十是為萬厯二十年嵗在壬辰季公少師遂以茂齡成進士公欣畬穫有悟張弓因棄儒冠罷摩烏燕於是蒐狩墳索之田游奕儒兵之坂醯醬百家之爼徊翔二氏之樊離剔穿串比類連徒五鯖七襄畢竭調纂遂成浩帙藏之名山暇或賦詩陶陶簡簡讀咏而外無有憂謀原公之意以為嗣者之才能貫其道衮褐所不相譏則功言可得分取也少師以命世之才無塵之體自廷尉郎出守嚴都洊更藩臬率多異政振柔宣隠決蘊灑煩左綜文條右握武紀平江之梗徒定以綸扇遐嶠之窳質載其鑪錘公時御板輿日形庭立當戸抱嬰則申害馬之誡畏明遏虐則詒拔薤之謀纎媚在傍則懼之以手目嚴貴在上則振之以鬚眉自少師之為吏二十餘年治民臨戎下交上事不競不絿不茹不吐名興節舉皆由義方於是天子以少師為能擢為四川右布政使當此之時西酋奢氏作難賊帥樊龍及其弟虎戕殺大吏攻墮名城師雄一吒以沸綿州李順四戰而撓劍閣逺近大震幾無兩川少師時以對揚輯瑞爰方啓行聞變回馭嬰城固守且保且鬭窮勇萃謀既三月餘賊遁圍解㑹詔下即以少師建節成都大聲天討卒獲厥醜俘獻闕下蜀亂以平當難始作公方里居道路之云日以洶藉即無蛙竈不沈之勢僉懐雀䑕同盡之憂公方慷慨夷猶還慰告者死兒分也顧兒不死及事既平人咸歎説以為天下忠智無如我公矣且夫義正者清流之巨碣明識者時風之五兩故曰衆惑不惑衆懼不懼芒者之憧然貞人所斷斷也少師既以定蜀之功比休韋葛三年有賞錫山土田而公屐笠方外與與猶猶華陽松風山有真人之號堯夫花輛鄉移安樂之窩如是數年無疾忽殞捐館之晨里為巷哭由公居體貞誠宅心醰粹飲人不螫之藥約俗無絓之繩庚桑太邱道存嚴慕風澤三百於是不誣矣公生嘉靖壬寅八月十日卒天啓丙寅三月十二日享年八十有五六承天澤晉封至某官天子又以勞臣之懐予祭葬逾等及其死也猶足以榮配趙贈夫人孝禮穆宣無非不忒天釐之曰女士九子以為母師誠黄中之備能后王所歸則也生嘉靖己亥十月十九日卒萬厯壬子四月十日長公十嵗先公卒十五年享年七十有四三子長啓元宰尤溪有聲次鴻瀚季即少師諱燮元今官黔蜀楚滇西粤五部總督左柱國少師兵部尚書兼右都御史諸孫為大金吾兆寧宫諭兆柏洎兆棟兆相兆桂兆柱兆宷兆宜兆憲兆宣凡十人尤溪晩振宫諭早騫並及公杖屨方康資歡飴蔗於是少師將以某年月日奉公及夫人葬某山之賜阡禮也誌幽之言顧命元璐先是公有女孫即少師冢女未成人殤者元璐方生五嵗猥垂相攸斯由中婣能明其徳有同李漢之感昌黎王曇之懐太傅銘曰有大人者功荄徳薈博求詩書靜治仁義九嵗已元五十未貴有學其學以志其志南人不反蜀道何異天子葵之曰必有自榮之哀之則靡不至至徳不孤天立厥配萊婦鴻妻亦從其類並斟太和登禧攬瑞玉氣月華素極而賁生國之賓没社可祭今尚難攀何況來禩封太子少保都察院右副都御史碧衢左公墓誌銘古之志士曰親在不敢以身許人由此一言即知其親不能以忠教子也若左中丞父母俱在而死忠無憾即知其父母之教之必以忠耳中丞以為惟死忠可以順吾父母又何憾哉葢中丞父曰碧衢公者名出頴字韜甫别號碧衢系出唐難當公以功王涇入明曰長二公者始徙居桐長二公美髯而好行義桐人徳之五傳騏嘗捐金數千為其邑之貧人輸賦義更多於長二公生三子季軫即公父績學數竒舉丈夫子五人公居四生而秀整文譽鞺然而數竒亦如其父也公既久不得志顧視諸子皆長乃泫然出涕曰昔者吾一試有司吾父手刺芨作書必曰朝聞汝一第夕即死可耳不爾何由瞑目念此心坼孝子之事其親誠至而力起志立則事應豈必皆由天命乎吾負吾親顧吾幸有子吾以吾所聞詩禮日一待而等於庭即又不效請從皋魚矣諸子聞之悚然願受教而中丞竟以力學薦庚子第十一人越八年又以第十一人成進士筮授中書舎人三年擢監察御史㑹爭移宫諤諤聲振天下久之遷御史中丞而逆璫魏忠賢者方張亂政中丞憂之日與楊公璉謀擊忠賢納一疏懐中痛臚忠賢三十二罪當斬須楊公疏上三日乃奏之俄為家僮福生者泄其事忠賢因得先計斥公並楊公俱為民中丞既歸服褐衣拜公膝下公笑慰中丞曰兒安得是斑衣而舞之真吾兒也中丞心知璫禍未艾無免理一日置酒使小僮於公前作樂為商聲歌舞楊忠愍忠愍者楊公繼盛以劾奸嵩得罪死都市者也公已曉中丞指慨然歎曰楊公丈夫哉即不知楊公父在何如者且夫范滂母婦人也尚爾鬚眉吾安能娖娖巾幗乎已而逮者至中丞使人觀公容詞坦施不改常以是心益定其在檻車也洒洒然中丞既用栲掠死所司承望風㫖徵贓甚急而公配周夫人以慟中丞死長嗣光霽以憂死公應之警舒適節宗姻皆賴之時年已八十一矣而其明年今天子御極殛璫及其黨於是以廷臣言詔贈中丞右副都御史以為未足再贈太子少保上褒三代官一子贈祭葬有加祀之瞽宗於是天下以為方于以來死事之忠未有如楊公左公者也當禍始發里中兒之矒及心覆者相與踦閭姍公乃翁動矜教子今更得禍迨夫日旭雰清華綸雲㑹歌唱四出飛走俱喧異時為兒語者皆咋舌自悔曰嗟乎人何可以不務忠孝哉葢自中丞之赴逮以至其死公雖心哀之泣下數行而已而至是以天子命發藳更葬禮成乃始仰天大慟慟已又笑曰吾志甚遂今可以死忽端坐瞑目遂卒識者謂公能知生死當中丞始第公讀史至漢宋黨禍手輯成書名曰閲史唾餘以授中丞至誠前知信夫公生於嘉靖乙巳十月九日卒於崇禎戊辰五月二十一日享年八十有四封如中丞官葬於桃灣之陽銘曰窮不替賴其教哀不傷貴其道讀史而徵禍於未兆觀樂而通神於不告是故其子之逺從元禮近比椒山天下不徒以為忠而謂之孝封中丞范仁元公墓誌銘先是十年余鄉之苕人自衣冠至負擔皆歌范公既又數年范公之子吏部今少司馬景文有盛名以避璫里居余時奉使至呉橋未至呉橋四十里司馬特使使迎余至其别墅曰瀾園者出斗酒慷慨定交初無相識而司馬延攬善下如此既道義締結不能别留三日乃行既出門自呉橋至濟三百里内衣冠負擔又無不歌范公父子者有一騶前導余漫問之曰若識范家乎騶合掌呼佛名云是吾處佛子豈不知余以是歎人之不力於其官而無徳於其鄉者真愚夫也常欲為文紀其事不果今范公没司馬以公及其母恭人行事屬余銘之余方以病焚筆硯然不可辭蓋公諱永年字延齡别號仁元其先自河内徙呉又自呉徙齊居齊數世至處士徳始家呉橋徳生理理生祥祥生玉玉生鑑鑑生桂是為月山公月山公生二子次汝河號㑹川㑹川生公公生三年㑹川公没公既㓜失怙恃其祖云生而竒慧讀書不再過月山公嘗驕語客是兒五經笥也客雜舉五經語難之不失一皆大驚年十三月山公没公為之孫有子之喪泣血三年而讀不廢十五服闋補弟子員文譽崷崪辛卯試京兆主者為琢菴馮公琦得其牘歎喜判予第九人將發覆矜慎又繹吟其文至再三忽疑一語嵯岈倉皇置之竟落然其名愈彰裹糧問竒者日益衆㝷以明經拔萃禮部為鋟其文以式天下自畿南北及齊魯之士皆靡然從公之為文而終數竒於是少司馬以弱冠成進士理東魯三年奏最當封父母公泫然曰人各榮所生耳孺子能子吾無父母乎因謝不受裂儒冠謁選得通州倅之官寧澹宜民州士宗之三年擢湖州别駕時為湖之大苦者二曰白糧曰織造白糧者召民使將之從江南歴途三千四百餘至於潞河率五鐘而致一石官以法致民不得脱比竣事顧已傾家官亦不之惜也織造者上供邊賚於是乎取之抑中人之外府也誅求百出民不勝苦公為之二年而二厲俱息其大端本於無欲而敏厥事無欲則能察下察下則吏不漁敏厥事則無滯時無滯時則民無支費而其制中人時詭時正詭則狙弄之正則使其氣奪湖之人以是大徳公而更神之當此之時妖人葉朗生煽衆為亂公佐守謀卒擒誅之所波株千人悉置不問逺近大安於是當路益以公為能交章薦公遷松江郡丞旋晉南京督府叅軍已又晉南京工部營繕司員外郎㑹有奉先殿之役中人之食指動數目攝公公不顧剔濫梳浮鼠不得跡中人乃大恚揚言曰郎妄甚吾告殿爺時逆閹魏忠賢方用事殺人凡中外媚子皆曰殿爺殿爺云然公愈堅持璫亦竟未有以中之也久之拜粤西南寧郡守自公判湖州至郎曺凡三命並封父母如制至是囅然曰使奉先家於其官何以明捧檄之心乎上恩我大為報其親至矣吾何能為蚤虱噆不已遂堅辭不赴當是時司馬以舊吏部勲由太常擢大中丞持節撫汴以公之辭郡也亦囅然曰吾今其亦可以子乎因乗閒上中丞制詞公欣然拜稽首對揚受命公之稱封公自兹始也㝷就板輿之迎居常訓司馬曰廉辨以率僚屬公嚴以杜干請誠信以撫將士勤敏以蒐軍實詰戎備庶幾能報稱乎已而司馬奉命節制通昌以建儲恩晉封公大中大夫又二年以微病卒公之為人大都盡於司馬所自稱述雅量類黄叔度謹厚類萬石君窮經類鄭元成吏治類黄次公清節類胡質勇退類陶靖節觀化類白香山正俗類王彦方固不誣也當司馬之為吏部嚴絶無蹊公時家居人之嚴之乃甚於吏部然而其鄉及宗之藉以舉火婚葬成就者即無慮數百家其智與福則其鄉之人以為其源泉宇牆資而怙之前年有叛卒譟而過呉橋者謀攻城洶洶公出竒禦之賊不能入忽有負薪叟荷擔睨賊大呼曰若不速去范封公殱汝賊錯愕遁去臨去謂其旁人曰吾望城上紫光亘天巨人長丈餘矗然可畏城中得毋有異人乎其通神明如此所著書有薈竒類編思本堂稿水部草海畔吟山行雜咏藏於家配馮恭人與公齊徳剡麻考縷佐公讀三十餘年司馬貴理刑兖郡恭人從之日問平反如雋母司馬為吏部則教之正直忠厚是時逆閹干紀進退天下士如其家監司馬正色爭之恭人曰如是將殺身不如引歸司馬頓首受教即日投劾未幾黨禍大作司馬為正人之望而脱於羅者恭人之明也先公六年卒於是合葬而銘之其辭曰功民歌氣權折清獨知惠羣歠其邦曰神其鄉曰佛展如之人兮匪與同徳曷與同穴陜西按察司副使頃陽劉公墓誌銘葢余觀東魯數十年來先民典刑猶及見於頃陽劉公公之節甚竒功甚著而年又最永故世無不知公賢而信之者此不需葢棺定也今既没而令子宫允屬余藏記宫允以為余將能發其幽光然余所為公稱説者又什九是其居官世所共見夫孝子之情哀而易徇文人之載豔而可疑宫允與余則豈為之哉葢公諱一相字惟衡初號靜所以夢易為頃陽其先世有隠徳由始祖善興歴七世至公父諱天賜以公貴贈承徳郎修潔孝友稱於里閈㑹病早逝時公方舞勺承徳公與其配太安人高訣曰是兒千里駒也當用詩書炳吾壟吾為父不竟恨恨而幸熊丸朂之太安人悲泣謹受教於是延師課公讀甚嚴既窶􅉡無所得束脯乃出耕牸市之獲金五環以供人謂太安人陶侃母也公沈凝攻苦為文湛思抉微我竈自熱弱冠試第一補弟子員領餼然益務苦讀常冬月結茅為塾新木生火火蒸汗下侵於肌理至於龜坼足隆起墳然弗歇也遂以庚午鄉薦又七年丁丑成進士兩捷俱第七人文價翔上其年授山西高平令騰原田之誦然其意以去暴則民安里豪某子甲者虎挒邑前令惕息不敢問公至縛其横奴數人置重典豪大懼始戢時尚久任公治髙平者六年始以上考徵當衡計定授公北垣忽中蜚語改為南吏科給事中人忽為公怏憤公顧夷猶曰即天顔逺將不得言天下事哉既入留垣封事凡十數上直聲大振時江陵相既敗餘黨游環自存公挺疏掊擊之别白某某如鼎列魅顯皇大悟欲盡黜譴如公疏中指者以當揆力解始罷然猶降詔切責詰旦免冠謝闕下者纍纍也㝷擢隴右僉事有惠政先是秦州例輸西鎮飼芻率千餘金致芻千束民以為苦公為條諸不便狀上之中丞得更定嵗止輸七十餘兩秦人於是歡呼更生然忌者蠭涌異時所稱邑豪虎挒邑者免冠謝闕下纍纍者矢石攢射丙戌之役遂以前縣令謫閒散聞命之日秦人則又悲號爵踊軍民各為畏壘之祠治兵使者之尸祝於秦自公始也自是里居數年而始補茂州衛知事又一年而移稷山令大都遷客牢騷不任事而公治稷居居究究如其治高平者擢南駕司主事理艅艎之政爬梳剔釐清嚴明盡事詳船政要覽中亡何播州酋楊應龍拒命有詔命少司馬邢公价視師西川邢公乃上疏請公贊畫如裴中立請韓愈行軍故事報可時廷臣持勘𠞰二議未決公促駕冒雪從楚夷陵閒關抵重慶探知酋情甚確齤然曰穴鼠之鬬龍戰何為乎因力主勘議邢公然之遂以屬公曰非吾相如不足定西南夷也公慨然率諸道將挺身入酋巢據其安穏驛召酋來酋乃謬為恭敬而隂令其妾田擁勁兵數萬擐甲俟閒公知之弗怖伏酋墀下名呼使前開論禍福侃侃酋乃感泣蛾叩仡仡不已立獻元憝十二人贖金四萬又留質其愛子可棟明不復反而勘局竟矣快馬健兒則何如公單詞哉然以公不自功無功之者踰年陞比部員外郎而朝議始敘勘播功上命司勲酬公正郎仍賜白金如干兩㑹倭躪朝鮮南省臺交章薦公才可任將帥冢宰以衆望表公為職方郎中適有中尼之者不報於是又淹疎西署者三年而播事以當事持之急酋志中變遂稱戈犯順綦江而下所在殘破天子思公往勩又曉酋情乃擢公右叅議奉專勅備兵漵瀘公至則捐貲召募土著數旬之間合兵五萬餘衆檄調永寧鎮䧺諸土司兵分屯瀘合使酋無北突者資糧扉屨之供皆因之諸土我無飛輓之勞斬周熊二悍將徇諸壘一軍始肅師次合江時霪雨連旬公指麾暇整兵事畢辦當是時三省八路合力進攻遂克海龍􅋭然公所率合江路戰功為最方􅋭既破酋搤頸自焚合江將士􅠡酋尸出之烈燄所俘獲酋拏屬無一脱者於是播平而當事又以力清水藺侵疆致二司大譁公抗言曰干戈甫定利用輯寧夫安奢竊地於楊氏而我索之其將不應且不慮獸窮則攫耶由是議與同事不協則有摭無何語㸃灼之者㑹大計竟闌公拾遺疏中得調簡故曰銅柱勒薏苡興銅柱甚著而車中之珠甚幽茫而難測也然人且疑著而信幽病癎發譫者不見人而見魅有珠之心豈復見銅柱哉乃公則曰人情固然不自理而歸彈琴著書用為娯樂久之樞部覆敘平播功以公名上詔又賜白金復其原官使叅藩貴竹未至改商洛道關中故并州㑹臺寮落落公兼筦六篆剖決如流案無留牘老吏皆舌呿不下尋陞臬副清軍理屯簡核郵傳稜稜不少假貸立法通商市無折閲者討軍實蒐騎射興氣幹之士秦人戴之不減秉僉隴右時也於是高太安人年九十老矣請歸養不得㑹以呼嵩至都既槖中歴落無可得蒔菰線香贄京貴人京貴人或就問諸寮屬殿最請疏姓名佐明年黜幽者公漫應之曰只關洛道衰庸當斥耳他無所知當事滋不悦明年竟用老例勒致仕公捧計牘喜謂人曰此不足當吾陳情表遂初賦耶浩然歸山入則斑衣侍太安人出則野服與諸野老往來詩酒追香山洛下之風而長君宫允鴻訓時以癸丑上第翔於金閨公喜甚朂之三無負益用觴咏釣遊為樂如是十餘年一夕夢牙纛自雲中下仙吏持手板迎公甚肅又夢人題四四兩字心知大期將至然誡勿令兒輩知之時宫允以史官持節東國解裝病作遂止里中政府以為大勞就家遷今官故事無有也宫允以為公老意不欲出公厲聲責之曰今冲聖龍興左朝右講不一覯其盛守牖下何為且上及秉成軫汝勞不難破格若奈何以我故重辜高恩我杖屨尚力何患也宫允辭不得洎達春明三月而公訃至矣時為天啓四年四月十二日四四之騐也革之夕神采煥發含笑呼好好葢全歸無恨云嗚呼如公之死則真無憾也文章以致其身取上第猶掇矣為吏得治民又為諫官澤施一世嘉謀達於天下武功濯濯足以鳴雄鼓壯存則夀没則考終命哲嗣之業光於甌鉉植槐可俟也如公則又何求哉公儀貌竒碩脩髯尺許發音琅琅如鶴唳性至孝太安人捐世時公已七十猶呱呱孺子泣無已心非戴記食肉處内之文以為不足經也居官廉峻所入贖鍰悉充其地公費或封識遺後來者無復半鏹入阮孚囊遇事慷慨有氣決致身之忠不獨夕郎時為然其在西曺值兩宫三殿繼災上疏極言猜疑日煩刑罰日峻誅求日急三事幾蹈不測葢其讜性嚴骨如此文追秦漢詩格遒逺並為時所宗所著有詩宿若干巻行於世配孟氏以宫允貴遭覃恩晉封恭人年十三歸公事尊章備極婉順諧於娣姒公既貴積俸遺置數椽十甽輒推腴華者歸其伯氏葢君之少君徳耀也又有慧鑑品人賤貴脩短不失累黍人又比之魯伯宗妻云銘曰出則彪炳處而懐之允其道也光生則齊徳死而從之允其交也長始則卜吉終而安之允其藏也臧巡撫應天都察院右僉都御史立宇王公墓誌銘自嘉隆間稱望族延茂至今者在東魯惟新城王氏耳王氏四世為達官者九人冠緌相望其人大都沈逺能任大事篤忠貞死而後已故自太僕以平蠻死勞貴竹觀察以治水死勞淮陽而今中丞又以治兵死勞呉閶自中丞没二年葬有日矣其介弟考功君象春以所為狀屬余誌夫揚忠紀伐固余事也夫按狀公諱象恒字微貞别號立宇其先諸城人始祖貴徙新城貴生伍伍生鱗教授潁川麟生太僕公重光世廟時以死勤事賜祭及贈其季曰之猷即公父也成進士歴官至觀察使治水䕶泗陵有功䝉恩録觀察生五子長即公公生時母某太淑人夢神人抱持以授當戯鳩車便峻整如成人戊子舉於鄉猶弱冠越八年乙未成進士授祥符令祥符繁囂難治公峻其繩而民服有吏陽鱎及上官承舎長楫謁者並與痛杖遊客恃直指肺腑乗傳騷甚公怒檄上之直指以是反益重公立法催科民稱便直指以為良行之他部他部之民又稱便其言曰官不脂羨則大户不重困民官以羨佐公則不重困大户置倉曰耕餘其法以秋登實榖其中嵗得數千遇祲民無殍者自公蒞汴甫期而譽鞺然其人嚴之即曰吾汴世有包尹也㑹以觀察公叅藩其地改曲周嵗餘憂去服闋補盧龍公治曲周大都如祥符而意專鎮靜治盧龍亦率如曲周而術主拊循皆因俗為之曲周則又條行八事徵收不害治河竇公堤無遺策使世世無歴陽之懼盧龍則大修武備罷棗貢及數事厲民者於是以循良上第徵待詔三年授江西道御史公既中朗炳天下事又以三年靜觀察時政所最先乃上封事請上視朝下章奏其詞剴至又請賜環趙公南星等不報隨奉命按江右未至而其伯兄霽宇公象乾以少司馬督師薊遼引例歸家食八年洎司馬返初服而公始以河南道起視京通倉至則又極言時事時西陲大柏油之敗視師大吏不以聞顧得功賞公論劾之大風折正陽坊火焚隆徳殿公上疏言時政得失六弊誠由六弊致此二災欲拯二災當反此六弊又云風之義主散散則思聚而聚莫急於聚人火之義主鬱鬱則思散而散莫急於散貨時稱其納忠有體奸胥賄巨璫盧受與其徒没天津税金六萬餘公得狀接追如法受恃寵用事有危公編虎鬚者公不為動年餘改按北畿旋掌河南道領計事正色持衡嶽然喬松自處不附人人亦不得附也㝷擢冏􅀸晉右僉都御史出鎮應天時邊疆多事而江南財賦陸海徵輸脂盡戎伏莽者蠢蠢然公至即條上六議選營兵精健益以州縣民之通騎射驍果者合為一營大飭壁壘甲械又於京口設叅遊采石設守備分屯互翼聲勢振起又城安慶改折溧水丁糧釐留都冏課為嘉定等三邑請命免布征三之一而織造之為江南患也葢吾浙之與三呉驤首而籲二東之哀久矣而織璫李實者曽奉上潛邸得上心負嵎逐逐公切詞乞弛額至三四不已實恚甚則遷怒松守張宗衡蘇佐楊姜誺詞激上怒並得嚴譴公上疏言二臣何罪李實可斬也時論壯之妖人徐宏儒之蹋鄒滕也聲言南下公力圖備禦於京浦安慶各増兵千既以北堵又可西障沿江渡口多設砲臺營房可藏兵跳擊凡諸攻守之具既備乃戒賊即不敢南向引衆而西長洲朱士逺輩為妖煽反狀已具公知之授秘計道守獲其魁四人正法餘悉不問弁賈祥統兵道呉横甚公箠其奴數人驅出境無敢譁者葢公之為定亂才如此公自按畿迄今先後五年間枯髯灼肝頭如蓬葆病咯血二十日竟卒銘曰世之命死者三物耳惟法彰殛公諫不死惟權隂賊公抗不死惟㓂獷擊公任兵不死死軍容之蒸蒸而河水之瀰瀰嗚呼刃剡其胸憂攻其裏均為致身忠一而已南京吏部尚書趙汝泉公墓誌銘當萬厯之初年大臣用事其時仕於朝者亢則取罪以去不能究其竒容容為福者取高位而已又無竒可見於天下其恢宏見竒積功以崇位身不中忌而人莫能凂之當時不免疑其跡而日久論定皭然不滓者則吾以歸吾趙公汝泉矣趙公諱賢字良弼汝泉其别號也家汝之董村弱冠成進士起家農曺徊翔郎署者六年守順徳再守荆以三品服視荆篆者五年撫楚再撫齊魯者八年領銓四年先後家食幾三十年此其出處大都云當在農曺於金榖之務則憴憴然曰把絲易紛處脂易膩也督清源儲發羨鏹以賑餘則封識遺後來者出守順徳以繼母張憂去補荆資糧厞屨供支羅之師荆不癉樹隄濬流理陽侯之怒荆不魚盜楊徳勝輩剽江湖間公曰無鬨單車闖其營諭解之如張綱之於廣陵裴懐士之於始安也遼庶人横則佐臺使者暴其罪於朝徙之易置悍宗武岡楚無國而有國於是天子以為能晉叅藩政而以荆人之慕仍使視荆葢異數也㝷罹公父望菴公之變服闋以兩浙觀察使擢御史中丞撫楚至則條便宜十事及救荒四議上之皆鑿然可埀永久猺跳懐逺江中之黠少年舞戈牛角公厲兵設竒盡殱焉人謂公向者輕身投虎穴弭虎耳今奈何兵兩兇豈徳不曩若也是不然善用兵者審彼己之情如龠之量物當楊賊發難楚之大兵壓於支羅賊既震鄰盪駭其情易動譬有鷙四擊則鳥竦身而投人袂中者勢也且撫臣嚴之守故弛之度賊不能戕守操蛇者不捽尾畏其首擊懐逺牛角之盜内負絶險外無驚弧其心噩然目瞰全楚故不力屈必不下子儀涇陽之役單騎免胄靈州之戰俘馘千計兵豈可一端盡哉亡何召入内臺晉副都御史撫山東化行如撫楚時平度之妖僧徳平之妖婦魚臺歴城之妖民以次就擒而左道息為漕計者二曰開泇河曰鑿膠萊又増堤植堰束徐北積流使水不為害而為利而乃檄登萊守者使大備艨艦曰吾懼釡山之鯢振鬛於祖洲也則又通海商開島地置屯田於是乎防者不枵餉者不勩逺控外藩近扼逋宼葢其後十年日本躪朝鮮即不敢睇山東而啑非徙薪功誰功乎當是時神皇帝勵政急用人曰孰與我擇吏安天下者其銓衡乎乃晉公貳天官公區分清濁如刀畫塗口絶臧否而銓綜不失識者方之徐勉云遷南太宰時中外方望公統鈞輦下而時宰逺之故有是命然而公秋風之思決矣力請骸骨凡三上乃得報公歸而訟遼獄者蠭起以公承江陵相㫖驟柄用鐫公官不知公於江陵齗齗無少借特江陵愛惜人才以精明鍊達重公何與公事遼之獄為荆民請為故相乎哉久之事白當事又交章薦公賢者詔復原官致仕㑹覃恩進資徳大夫正治上卿樂道著書又若而年而卒公天資醇茂篤於倫常居喪三年不見齒鄰嫗似母養之終其身事兄比泉翁甚嚴所交必端士没則綱紀其喪而撫其後性淡約不喜聲華自釋褐即從羅近溪曺貞菴諸先生遊深求性命之理晩而益進其學以無欺實踐為至疾革啓手足示人蕭文宗鳴鳳謂其不愧曽子良然銘曰四嶽之宗有高曰嵩為周降甫為明降公爰發其跡始於金倉否者失之金粟馬羊歴典大郡雲行雨施羔裘孔武緇衣是宜此孱者提彼豪者抉帝曰懋哉乃授之鉞威霆畫擊明霞曉班吞湘七澤浴海三山陟於小宰則靡不辦銓綜萬流無蹊有鑑尚書之崇斗樞喉舌人望猶登公棄如剟一賦遂初廿年松莽魚符俄下鸞驂忽上在孔夢楹在曽履薄其年與事如契斯約豈弗尊榮亦既壽考正學無欺完名永保中陽之封馬鬛隆隆以我刻辭賁爾幽宫誥授中大夫太僕寺少卿米友石先生墓誌銘吾於十年以來之事有二慨焉逺六七年權閹用事忤者必死然非曰媚之而後生也而人不能不媚曰不媚即死文其求富貴之謀為救死此童子之智而昔之所稱持局之傑則皆為之此一慨也近一二年兵事孔棘誤者必死固非曰我不肯死即得不死也而不能死者曰不死将有為文其畏死之情為冀功名此不可以欺童子而今之所稱救亂之才則皆為之此又一慨也嗟乎富貴如此其可欲而死如此其難是故吾於米友石先生夫婦之節樂得而稱之矣米氏在宋以南宫顯入明曰虎者由晉陽徙關中累功官金吾尉數傳為贈公文學文學生贈公玉即公父也並以公貴累贈至中大夫自公父始由關中徙京師生三子公居仲名萬鍾字仲詔以好竒石故號友石云公生有異徵及長孝友備至於書無所不讀自其少時文章翰墨之譽已流天下然益務精苦夜讀必達曙贈公戒之休不休也遂以甲午魁本經明年成進士筮令永寧永寧民悍喜爭多睚眦殺人者公以仁義化導之其俗遂變時贈公就養於官未幾病卒公當奉喪歸永寧之人如失其父奔哭執紼者千餘人重繭相隨至都門升其堂哭踊乃去服闋補蜀之銅梁時播酋既殱遺種猶多盤踞為患公設法盡擒獲之根株於是蕩然矣久之調六合值税璫哮掠江南北横甚公縛其黨數人立榜殺之璫甚憾恨顧無如之何凡公三仕為令並以卓異旌乃當衡以公崛强無意大用之量移公廷評公安之無愠色其在廷尉多平反者旋遷計部奉命分𣙜河西務大疏梗塗行人呼便所節省金錢如干又以其羨築河隄為畿輔永利㝷改繕郎視陶清源爬疏積弊殆盡天子才之擢叅浙藩分守金衢道多異政嚴溪有八虎幻形為祟公移文禁之遂絶擢江西觀察分守江饒於是逆璫魏忠賢矯竊擅政黨禍大興而江西為甚先是黄奉常正賓以甲元疏請緩刑小人以為此熊江夏説客也忌欲殺之至是褫冠即訊當公司讞公曰今欲不死黃公無直黃公直黃公則黃公死乃故曲列其辜纔下死一等黃公卒以是不死久之以資遷山東右布政當是時璫燄愈烈公居京師與璫鄰璫目不知書而浮慕名士求公書翰再三卒不應已又屬其私人謂公即少却曲上卿開府可得也公笑曰乃公即要富貴少年時稍垂項没肩上卿開府遂已十數年今老矣豈有三十年共姜垂老獻笑者乎拒之甚力璫大怒然未有以中也㑹公從江右歸道經金陵時中貴人守備金陵者方為璫搆祠祝尸聞公至使使奉金帛求數言彪炳上公公怒罵其人去中貴人恚甚以聞璫璫怒益甚乃嗾其黨御史倪文煥疏叅公黨人魁也削籍為庶人公遂不敢居京師當此之時璫怒未惵其黨日夕謀殺公更亟㑹上登極璫及其黨相繼伏誅於是以廷臣言起補公太僕寺少卿理光禄寺寺丞事明年春上朝日於東郊公將事有恪時公望重主爵期大用公而公已病杜門月餘一日蚤起呼水盥潄索所蓄竒石兩枚怡弄許時忽起端坐遂卒公先配淑人李氏蚤卒今封淑人陸氏其繼室也陸有士行當公以避璫禍變服浪遊留淑人清源公長子夀都以應科試抵都奸黨為毁室取子之謀者中夜奄至夀都踰垣得免潛歸清源泣告淑人懼一旦禍不測淑人夷猶曰若能為卞壼子吾即范滂母夫何慮哉聞者異之公病時淑人日夕呼天號泣請以身代革之日一慟氣絶既甦諸子及親族泣共慰之淑人瞑目不語曰吾何能獨生再慟遂絶嗟乎人亦有言天作之合豈不然與倪子曰畢萬死於牖下公履尾亦不咥而有千年之譽美新祝釐之徒安在哉若淑人之殉烈吾以其為命婦故難耳今或以其為命婦故易之世無通論如此巴婦享其千囷不能死猶以清旌況淑人乎銘曰其時閹濁道在鬚眉彼一君子其生有為其時儒懦道在閨幃此一君子視死如歸於都偉哉倪文貞集巻九
