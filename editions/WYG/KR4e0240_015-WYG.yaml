body:
  text: 倪文貞集巻十五明倪元璐撰記䟦成樂軒記制於翰林院置館錘鎔庶士簡耆碩為之師其讌室則師弟子退而求之之地也有軒軒然疏寮同牖命曰成樂葢聖人之言曰成於樂樂育者徴德焉故名之也予惟今世之士以小技進於廷天子於其治人之材未嘗有所試之也然即不疑而授之任外者民社之大内者錢榖刑名之重即聽其自埏自埴未嘗為立師以導之也庶常吉士則天子所選雋焉以為此其英多而秀出者然又使為經生而立師以導之若是乎天子之於羣士以通材待之而於其所選雋者顧以童子老生畜之則何也嗟乎此天子之意之所以異也夫天子以一節之長畜羣士而以成材待其所選雋者則已明矣何以言之夫一節之士在於鼓其鋭以致其用故其所鼓吹於世有若咿者有若吼者有若噭嗃者劍鳴石裂霆布風號可以為聲而不可以為樂聲者於六律之和各執其一體而不能以相為故宣慈布闓之官宫之屬也飭法振紀之官商之屬也命生敎聚之官角之屬也經洪緯纎之官徴之屬也辨物審器之官羽之屬也獨宫獨商獨角獨徴獨羽不可以成音一節之士不可以相天下相天下者其大在於平天下之情達萬物之和而其微至於格穆清之幾轉元化之籥而其妙極於不自知金石以動絲竹以行匏宣瓦贊革木節之八者叅劑發響此非鼓鋭者之所能為而一節之效長巳也䕫曰於予搏石拊石百獸率舞庶尹允諧舞百獸而諧庶尹者樂之能而相天下者之成也且夫古人之為學也十年而學幼儀十三而學樂誦詩舞勺成童而舞象二十而學禮惇行孝弟三十而博學無方孫友視志春誦夏絃秋學禮冬讀書其為學之科條如是其詳且備也而至語大學之成則必俟之興詩立禮之後故曰非得乎道者不可與言樂也今夫方廣之地尋丈之宮握鬯者寵焉秉鐸者式焉横經者禀焉登其堂天語琅如離文戞石鐘鼓之靈也入其室靣耳互發玉石相攻管絃之和也進而奮踔經綸在手元氣在胸獸舞鳯儀之容也退而圗維不負君不負師不負吾學廣大清明之象也樂之為觀盛哉材于是乎成也巳軒成于某之歲董其事某命之者某追而記之者某郡侯王公築塘通江生祠碑記上虞之為國以江海為外懼而内親湖湖曰夏葢方廣百里溉田一十四萬有奇挹拍溪江而歸墟于海往江繇白堰屈曲二十五里弭節塘角自狩其郊未嘗過湖而問自頃居民規便抏弓取絃使水奔怒激射㨗走而嚙上陳之塘上陳塘者湖江之所表限也時則名田千計奄化為江自是以來塘歲一决至崇禎九年秋九月潮乘颶威吼决葉家埭塘以尺計三百有六十沸洲連山逆行羣飛海湖疑戰溝㟁移奪廬墓徙宮於馮夷桑田歸魂於滄海自虞注姚至於甬東凡淹沒成禾千萬邑人大號其時上下􅌓眙無能治之者治之則益甚於是毘陵王公以南祠部郎來守越州余季父封侍御晉源公仲兄侍御三蘭方與衆踦閭齎咨聞之大喜至足躍几上曰虞不沼矣吾聞王公節警而思深節警則能决謀思深則無墜計乃率七區之衆跣籲王公王公應聲顔變投袂起曰事有大於此者乎下令亟築塘既循衆願計區徴輸又請之臺使者發鄉社榖如干濟之資用無絀遂以其年十一月築新塘明年正月築備塘塘成邑人皆賀王公曰不然夫以禦㓂治垣而宿㓂垣外垣之命猶寄於㓂也不如逐㓂使無睨吾垣者而垣安今江不歸而睨湖其勢不吞湖不止也乃又下令求江故道所謂塘角者躬乘樏橇履波蹴濤審端究歸盡得要領而慮餱糒之不供為出歲俸什五曰倡輸者於是乎致材石簡斤鍤募丁徒立長督治金鼓飭條貫信罸賞十千維耦如雲如風心串力屯爭水猶鹿排壅决塞循腠趨肯神人靈恊灕然應謀自四月甲寅至於五月壬午江通萬情奔悦敬告厥成王公意未慊顧命更築上陳衆罔測亦勿敢違益功致堅謹治如敎又相湖要害江海咽喉如干所疏者益磧靡者益􅍻視䕃之軰譏為葸謀居亡何龍躩於江大風揭石高岸四隤木圍五尺以上者悉㧞而塘無恙衆乃愈神王公當此之時疆隧阡塍可得而辨耒耜榖芨可得而求農謳於野婦笑於室蹙者踊病者起於是其父老以為宜如制稱有功德於民則祀之其地而其士之髦者乞余為之記余於是作而嘆曰嗟乎天下事曷有任之不成者哉以其誠則必得之以其計數則必得之誠者天人所際計數者神明之歸也雖以申韓挾術計桑挾權自其為之必有其誠雖以姬公持禮孔子持道苟無其計與數亦何繇治天下乎昔者禹受命治水不敢曰有知三過不入子呱不字面目股脛著其勤愿不敢曰有不知順用疏瀹逆用排决淮渦桐柏致其神靈禹以聖人之才而不貴無勞之功以聖人之德而不貴無術之道是故禹者萬世之水師也西門豹則之以治鄴河李冰則之以治岷江王公則之以治娥葢之水夫水浮天而載地守地之貞行天之化故其人知貞知化則皆知治之也當王公之始事告之棘則棘告之憂則憂告之發號則發號告之出粟則出粟跦跦粥粥惟狥衆欲及其終事准權握機占㣲察逺流思周變神明無端人謀鬼謀咸有所不逮矣故曰懼以終始其要無咎西門豹之治鄴河也始于投巫終於鑿十二渠李冰之治岷江也始於立三石人三石牛終于分三十六江王公之治娥葢也始於為德于湖終於為德於江投巫者使民不怒河鑿十二渠者使河不自怒立三石人三石牛者欲以力制江分三十六江者使江自制力為德于湖者使湖不畏江為德於江者使江不夷而為湖莫不本諸至誠益以計數近取諸心逺師神禹故夫西門豹李冰王公此三君者天下之治才也繇王公之道以治兵用衆不出一年中原之㓂可蕩然而人有不能者悲夫巧者貫楊拙者失墻洪水之難謀冝必甚於盗賊王公為其難而天下不能為其易豈不痛哉王公名期昇毘陵之義興人舉崇禎辛未進士美姿容鬚眉華悅其為人無欲有氣治其民慈健並行民受牒入對者無問絀信皆翔舞而出頴川南陽之流歟雖㣲兹功亦當祀也祠枕上陳而望塘角東去虞城三十里西距會稽境二十里先是富順湯公紹恩守越建三江閘利越百世越人祠之三江其祠翼然孤跱百餘年至今而偶云三做堂記堂為大司農署額崇禎十六年癸未歲五月十二日上面諮臣元璐司計經畫臣璐奏陳三說一曰實做一曰大做一曰正做實做者期與樞部通盤合算先凖餉以權兵因凖兵以權餉被㓂之地餉多虧折敗軍之壘兵亦銷亡彼此相權則數清用足而浮冐之弊剔所謂實做也上曰樞臣馮元颷户兵合一之說正是此意臣璐又奏大做者小生小節無益於數求一舉即可得數十百萬又必為利于國無害於民者悉心講求以圖有濟此所謂大做也上曰總是生財大道四言盡之臣璐又奏正做者以皇上堯舜之君而責治平之道於司農又選擇儒臣講官為之凡所設施豈可出於掊歛權宜之陋策臣必將以仁義為根本禮樂為權衡苟政有厲民者臣必為民請命凡皇上所命蠲必蠲命賑必賑昔年加𣲖勦練諸餉可裁者必裁臣必不敢以時詘强爭總奉皇上安民一言以大昭聖學於天下於以副皇上宵旰之憂勤而畢臣鞠躬盡瘁之素志上曰卿此言甚是真根本之謀聖賢之道欽此經筵日講官户部尚書兼翰林院學士臣倪元璐恭記并書董元宰宗伯書山隂令王念生勑命冊子䟦夫雨露竭澍而漿百昌之能雲霞極姿以贊穹元之色故征和九䇿端蒸都尉之閭太學五經光發中郎之篆何則瑟瓚黄流取殊榮之相報明珠華櫝亦聖言之所資也有番君之匹亦召父之流禀其孤清唳絶華亭之鶴出為騰踔啼遏會稽之雞畫界蝗遷行車禽擁劉元明之第一徐聖通之無雙不其然乎屬以虞瞳逺矚察姑臧之絶蹤漢詔華飛役許燕之大手十行星爛條廉署能三命風申旌庭策閫如綸之致可得而觀焉夫物䕶甚則錦承人銜深者絲繡于是乃使鍾索之彦起而拏騫顔柳之英致其奔抉觀其體凌撥鐙法極懸􅁫慓慓如臨鄴下凌雲之牓飄飄欲舉綘州碧落之碑斯則唐宗之所以醻妙于缾盤魏后之所為躭佳于壁帳也垂于覽者其道無方可識皇謨並資吏範大則天球之貴小亦墨池之娛則知七寳合成月姊之宮有為璞鑿五方轉換天王之目隨在摩珠呵以佩刀誓于淮水驚其神物渡延浦而龍翔考爾世珍對岐山而虎拜云爾姜鳳阿宗伯制詞䟦鳳阿先生正學嚴節修能稔功昔在留京先子所畏既五十年風道彌章如制所稱非有溢說觀乎天文愈知地紀星野相昭則有然者起喜之心敬應之道功言之致名實之歸循兹渾噩可得而求焉記曰王言如絲其出如綸王言如綸其出如綍此言以其㣲詞著其大義也周巢軒太史褒册䟦敬誦天章斯知聖學也天子方表崇孝經興勵庸德得一士篤行至以刲股救親聞者如獲龍馬天球矣高皇帝之令民孝割股者有司勿以聞以為其事猶或可為而好名者將爭騖之若如封史之務為極難以為其孝者其始不回等于騃竪其終獲濟有若神明即有甚善疑人者豈可以比干刳心宏演抉臟為是殉名負氣好事而然制所􅃩稱詎非睿識乎且夫封史無他求捄吾親而已然而天下儒者喧之以為其世瑞其子史公秘之以為其家珍孝之敎忠子之學父斷有元會致于精㣲又非徒奉先捧檄之情桓榮陳庭之義事非衆著理絶名言維帝知之當通夢賚也王季重觀察􅁧嚴封公墓銘䟦封公子名起恒嚴先生之人王先生之文會稽竹箭東南之美也嚴多行義以富王先生之材王極致精以壽嚴先生之命天之所配豈得離乎若乃必得其文則幾欲操刀必傳其人則不以索米斯又可明姻婭之極義孝子之永懷矣故曰越有三仁焉仲兄三蘭學使射書䟦後夫射以考藝而觀德焉戴禮詳其法周官悉其儀易云弧矢之利以威天下葢由來逺矣高皇御極之二年詔天下府州縣立學校即以禮樂射御書數設科分敎三年旋定射儀二十五年復詔習射於射圃煌煌聖謨偃武而不廢武如此爰迨承平上者正裳笏坐堂皇雍容禮樂次者􅈄獵經史握鉛吐藻鼓吹休明六弓之設五射之辨八矢之調委庋高閣鮮有過而問者主上神武拊髀而思頗牧因可臺臣奏徧詔海宇習射祖制湮而復舉樽爼折衝於是焉在甚盛典也仲兄三蘭文武兼姿銜命視學豐鎬課較之餘時進諸長吏及博士弟子咨諏方畧籌策綏靖日夕懷射虎射蛟之志而尤惓切於新令之遵因採古今名將射要射病等言編次成書付剞劂氏孟子不云乎工者不廢繩墨射者不廢彀率是編固彀率之助也雖然兵法無過孫吳穰苴淮隂諸家今其書具在學者有能窺其㫖否驃騎敎之而不受馬服子讀之而僨軍其成敗判若天壤然則書又何可泥也射伎也而道存焉語云巧者不過習者之門神而明之存乎其人願多士交相朂於簡牘之外以上報當宁則是編即筌蹄棄之而予兄弟與有榮矣倪文貞集巻十五
