body:
  text: 倪文貞集巻二明倪元璐撰制誥東閣大學士禮部尚書劉鴻訓制曰夫台文上耀則三階之象平鼎實中宣而百族之膏聚故平成府事虞嘉永賴之功秬鬯明禋周報孚先之績凡兹令主咸有隆施所以章勸崇勲樹型列辟爾具官某男子生自魯國氣象如其泰山立言有章奉使不辱洎醜徒讎正此輩之謂清流直道違時彼譖以成貝錦登州一逐玉局為空屬朕纘服更新用人求舊跂軒皇之六相懐秦誓之个臣而爾夢應吹塵兆占畋卜首探枚而得何上帝賚予之奇自射䇿以來知太公望子之久甫參密務遂著嘉猷咎繇敬撫五辰以凝庶績少正快誅七日而絶詖言朕喜肱良民歌距脱猶且蒲宗孟不滿司馬豈有宋藝祖而信徳驤斯明任功之難聴言匪易爾益謙形疐尾誓存鞠躬盡禮之心知其非諂犯顔之義本厥無欺顧嘗靜居繹爾良誨規逺執要者政蠧之芳芸久任寛征者時疴之切藥朕雖不敏能無憬然兹用覃恩授爾某階錫之誥命嗚呼今世晦而明譬木顛方蘖而兵革不息禮樂未興上無成謀下有伏莽災祲日出哀嗷四聞令示人可從而從者少法使民難犯而犯愈多可曰已安益期匪懈若用汝舟楫霖雨罔不同心以保我子孫黎民尚亦有利兵部右侍郎唐世濟制曰夫威先制人則齊爼操其勝氣智存應變則漢箸薦其上謀所以圻父時呼丈人終吉惟坐籌者貴所重司戎若比竹而吹彌難簉乘具官某出飛慈雨入凜清霜隨所致功歸於濟國鄭僑有乘不及杠梁馬隆能車動成圖陣章江巨鎮方叔壯猶人賦新田碑傳峴首旋因衆望陟貳中樞坐席未温藪羅俄及時則司分南北謁者兒多血判元黄同文獄滿忌爾鮑宣彊直忽傳賜玦之辭亦為梅福先機適愜掛冠之願洎朕御極博采遺忠僉曰汝能召仍舊職屬者羽書旁午戎事頹阤雞蟲之孽逺擅西南赤白之丸時飛秦豫維爾引慚多壘樹价維藩竭志畢忠出奇制勝姚崇暗記王庶口陳周練明通庶㡬其匹矣兹用覃敘授爾某階嗚呼却馬以糞斯為有道之郊隠豹能威所恃在山之勢今兵驕不戢將懦無能驅戰市人呼糧匱槖皆為敗道未有勝形冀爾竭能為予宣力倘飲御諸友有吉甫燕喜之時則拜命岐周即召虎對揚之日總督三邊兵部右侍郎兼右副御史楊鶴祖父制曰瀰天之霖蒸於膚寸連雲之搆托於崇基故夫來哲有興則椒條賦其蕃實前徽未墜則瓜瓞追其本初未有孫謀不由祖烈爾楊兆瑞乃具官某之祖父宇晶襟靜道周徳全洗馬神清少嬰羸疾夷吾體正弱無弄心若乃義報其天道棲於貴鄉署高平之里家題花萼之樓雖使黄童扇誠於江夏伯淮被義於天水子騫孝已連趾而趨庭馬況繆彤聚廬而發鐸方斯高懿未或過之至於宛彼鳩鳴月斯征而誨子振斯鷺下嵗有穀以詒孫軌既以端澤亦逾逺今爾孫萬邦為憲价人維藩召虎之功興哦江漢温國之望喧動邊陲欽楊傅而思伯起之賢拜陳羣則表太邱之徳譬之嵩高仰嶽瀆祭先河是用追贈爾為某官錫之誥命亭舊思賢望伊人其宛在陵新下馬識華表而歸來祖母制曰夫詩咏詒孫易占遇妣此言開宗之業下引而彌長胥宇之功中襄而始大所以晉王母之曰福烝先祖而孔偕爾劉氏乃具官某之祖母於女則師維士不櫛當其笄髦未字已貞匪石之心及夫縏袠致䖍獨竭和灰之孝郝鍾禮法秦石詩書遂可封署宣文謚加誠敬而由房之樂宜爾家人徙舎之功施於孫子雖賦詩送朴能偕鹿隠之高而抗表報劉已發烏私之義矣是用追贈爾為淑人嗚呼歌六月之詩所期吉甫徴三世之教宜旌泰瑛翰林院侍講蔣徳璟勅曰國家顧不以吏事辱儒臣其道則使之守氣湛㡬棲於至上而今則由之以循牆姍歩多畏而寡持譬之導引然使之瞑目以求之而乃頹然而取寐此可歎也爾具官某匹錦探懐今之江令逸珠盈椀有如盧諶舉首宏辭俯瞰列宿中遘凶閔經久淹疎當藹多抱槧之年則逆豎張羅之日維時奔走之輩池鐵並飛功名之徒囊錐畢見而爾獨不求署職悶然草元洎朕膺圖始班禁近初以金門為避世之地終焉天禄有燃藜之光朗識不撓孤標自拔比於范滂抗節梅福遺榮雖菀枯不同而風道何異所由知爾則以是哉兹循覃典授爾階承徳郎錫之勅命嗚呼以子為豫章之木七年已見其材矣以子為艾後三年且用子子益務矯勵恢宏以需物色即帝告朕不如朕自見子之明也妻勅曰朕讀洪範之書曰使有好於而家先王以為使人之情遂諸此則可以責其功矣易則有悲焉曰入於其宫不見其妻此以其藜石比貞耦徳而岐命也耦徳而岐命聖人以為天劓刖之矣雖赤紱在後猶以為甚困嗟乎伉儷之重不其章歟爾具官某妻張氏在婦稱良與夫齊徳當其蓄當冬㫖雞以宵鳴使仲卿輟泣於牛衣樂羊就功於蠶繭斯已難矣迨夫杜羔既第荀粲彌傷雖富穀可偕而困藜早據牧犢朝飛之歎川魚中拆之吟循覽前人並同斯感用贈爾安人詎釋笱梁之怨已醻紱佩之盟繼妻勅曰天下之智者必近取物也造車輪者觀諸秋蓬欲為人臣取諸人妻之道今為妻之道曰相之而已故取相業於妻猶為取影於臬詩曰伐柯伐柯其則不逺我覯之子籩豆有踐此之謂也爾某官某繼妻朱氏聲聞於外美在其中曰孝曰勤不亢不妬凡此四者可得言矣然而張仲道存孝友姬公勞著租荼柔嘉令儀山甫之徳有容無技秦誓所稱爾行雖微可以鑄大今爾夫鼎鉉之業鑪鞲以時使其以爾為師顧而相問豈不賢於馬蟻勝彼棘童哉是用封爾安人既章美於副笄尚加功於雜佩父制曰國家張官如畫方畔馳驅之吏播其宏勞文學之儒持其靜理參辰異居不相顧問然而父子至誠精氣相取釣御通教如蚨往來爾原任廣東布政使司叅議蔣光彦乃具官某之父居沈取壯孤體絶侔昔令須江健而靈見縱囚休返囚以期歸虞延曹攄彌非俊物威蓄霜斷璫虎戢􅡟使姑篾之金不入天府仙霞之山有其地脈致命遂志績溥道光東甌之功又史所贊時盜蜂􅂸禍出肘趾顧張高筵坐客言笑而歘然縛舁飲酒獻功斯知狄青宵飲未是通靈張綱單車猶為注險矣洎於藩參百粤威行九真名酋坐俘偽稱以褫嗣功馬援題柱有赫興鑒李廣殺降無尤申錯威惠如錦相宣用兵之長未有過者嗟乎朕今者安得其人而用之哉兹晉爾某階爾教不墜下將機雲以爾精氣傳於爾子乃為棐迪朕學甘盤爾徳之舊今猶食爾行相王旦酬爾堂槐母制曰朕觀詩書繁稱以求士行其於婦徳則不欲責之甚詳然責之已詳矣樛木之詩曰豈弟君子易曰家人有嚴君焉栢舟曰母也天只此皆離其事以命之欲使天下之笄縰者盡廢其所卑持而以大廣其道是難能也爾封恭人陳氏乃具官某之母自朕所聞靜婉之貞著於錡釜而爾夫賴之以徤正而能其官自爾相爾夫以共武定亂而教爾子使之湛然英華以有其黼黻文章之事是則爾以柔命徳以剛命才持將與夫持相與子爾亦猶龍不可方物用加封爾為太恭人爵其已貴涣所未頒彌章學旁爼豆之功遂極王畿板輿之樂翰林院侍講王鐸勅曰朕聞之揚子通天地人謂之儒儒若此則可以為大臣自朕即位不遑暇食以旬三日視朝時則召對大僚以下日以朝受古昔先王之言夕攬決庶務然皆樂與儒臣共之朕以其所持沈閎浩逺可以規大若乃縱藻揚葩朕則不貴爾具官某學洞根宗才凌祖搆竿翠逸珠積於尋椀春華秋實兼有劉邢典册高文知長卿之當用軋茁刺刷格劉㡬而不収斯於宏辭庶稱巨擘若其至者又可得言夫侍講有真伊川主存誠之學執政不足安石乖遺鉅之才而子載其敦龎游於廣大既已追宗洛下邁跡臨川決子鼎鉉則猶蓍莢兹用覃叙授爾階承徳郎今國家相業並束而歸諸文學之吏此猶取火必於燧也朕既甌覆子名發且有日子尚以其時益修體用之學鬭而鑄錐則豈有及國子監司業陳盟勅曰以士測治亂譬以葭灰測氣也今學官之所厲莫大於辟雍然其道固不可得行矣夫本興士行而遷其術於理財明珠彈肉其得不復今既不可驟更而教者之心夷然日遁是故朕欲得韓愈陽城而用之爾具官某存誠之學能致其才玩物之功不喪其志氣義激烈風體孤騫當逆豎掉尾雄行致諸賢駢首就戮爾雖外存澹逺隂竭周旋足使甯武歸愚朱家讓俠寧履虎尾㡬罹雉羅所不淪胥殆有天幸朕既即位擢貳成均鐘鐸所施雲霞為焕自間者美新之論極於子衿畏罍之楹上侵孔壁三光黯没萬類湮沈賴爾滅竈更絃漂新發采蒸變之象可得而觀殷序周庠道亦不逺也兹用覃恩授爾階承徳郎嗟乎匪獨兹士維朕則亦受學於甘盤尚宏迪棐以輔台徳於兹小誦不其徑庭父勅曰朕循覽史傳或譽嵇紹曰君復未見其父蘓頲之才曰瓌有子斯知父子之道如土圭日景可相測而得也爾原任西安府通判陳進乃具官某之父博物窮通居體致才秉鐸雲蒸知楊震講堂之徳分符霆厲歌王祥别駕之功至於力抗豪狷威行彊族董宣貴項陶令尊腰氣激義成位沈名奮凡爾子之嚴正凝蹇著於宏文皆其於爾取型有光無墜者矣用加贈爾某官三槐庭茂可知獨立之心五栁門清不没如生之氣南京國子監司業文安之勅曰國家二雍祖南而宗北高皇帝之教千世不衰也故天下之士蓬然而從之然至於今者美新之文反或蓬然而從天下嗟乎自漢宋之陋代有劉陶陳東而高皇帝之教思不三百年而竭者何也朕思士猶汞然敗則滅爐而更鑄之其道甚微言告師氏爾具官某出自漢守張其楚材升賢鄉國則以五際明詩拔萃宏辭則以三長治史侍從之選啓沃方資而爾寧徙海而溟捐槧作監是使歎興宣室忙遺紫薇然朕之意亦惟言念豐芑有愾陵莪藉爾九徳之歌振彼八風之舞乃爾鐘鐸無閟杖鼓相將遂已天廟光迴石頭秀出唐閹既殛楊琯極選於名儒宋禁方張汪逵抗爭於偽學成均簉席今古同揆兹用覃恩授爾階承徳郎嗚呼朕則使爾往而學焉豈曰教之哉記曰師也者所以學為長也爾益務瑞軌飭躬譽髦斯士而既效矣朕則旁求户科給事中瞿式耜勅曰朕聞之書云有言逆於汝心必求諸道夫古之君臣貴直言如此也堯舜之世其臣皆不及其君而四岳則必與堯爭四岳之與堯爭鯀是四岳之智不如堯也然堯甚賴之天下亦無有疑於其都俞者爾具官某有其祖若父之文章政事而騫為氣節篤其忠貞向者令永豐豐之人化其徳今朕即位寘於掖垣數月以來子則為朕糾奸剔邪章忠發滯條區兵事經量國計味子之言如箭激火騰蓬勃而出是則子以堯舜期朕而將與朕爭然無有如四岳之墜言於鯀者彌益用貴矣兹以覃恩授爾階徴仕郎夫子於職可無不言而領金倉為專務今羽書蠭午飢軍四呼積貯之為大命甚審而自朕察之疑其侵細司農但曰仰屋執政以陳平之言為體要朕不知所衷尚冀子殫忠竭思以大道治平之經紓朕愾歎子之言藥也朕則必以為醴而甘之妻勅曰訓婦之道内則女誡有其專文使無多聞識然而曹昭左芬宣文君之流何其藴也自朕之見誠使天下女子得盡讀古先聖王之書廣其志行深明理道以相厥夫子豈不亦猶朕之有諍臣歟爾某官妻孺人邵氏中郎之女能讀父書聞其握簡敷編酣忠飫義興慕發歎氣溢膏鉛斯誠儒者之雄可以巾幗朝士凡爾夫之所以修正嚴鯁出稱循良入為名諫者其資爾内助甚明矣詩曰窈窕淑女琴瑟友之此言齊徳之砥比於良朋也兹用覃典仍封爾為孺人凡諍之道為人臣及妻則皆得取之爾既女士豈能復為妾婦乎爾夫鳳鳴之譽赫矣女曰雞鳴尚無替諸父制曰漢書最稱石氏家法揚雄曰石奮石建父子之美也要其所持以馴行為貴其父所甚責子者惟坐車入里門其子因之馬書尾五致其畏慎而已朕以為是父子可居里閭不可立之朝廷之上若乃萬年教諂子咸不承阿鯁異持道固可怪爾原任參政瞿汝説乃具官某之父有王章唐介之直官郎時能以其職抗璫使矯䖍坐戢為國守憲為帑節浮歸於氣道之用夫人氣至則業光道立則能見是故能神明飭吏蒸變程材爾先臣景淳以英華道徳為國球訓而爾子式耜今又以彊直敢諫佐朕新猷譬則其筠也繁生而不墮其節此可使奮建羞同年咸憾異已嗟乎朕安得與此人同時哉兹以覃恩進爾某階雖無老成人尚式典刑於爾子昔之人主興懐舊徳笏則猶將愛之況其所教誨而似者乎即金鑄爾不如寘爾子於側之不忘也母制曰夫有妻之道為母之儀莫著明於律律曰同類娶妻言乎金之贊金木之贊木也曰隔八生子言生於金者之仍金木者之仍木也凡六律相配其徳無不可以下生爾贈恭人施氏者故某官某之妻今某官某之母也以爾之左執詩書右操禮法而爾夫取之則公正而能其官爾子取之則忠篤履方而有諤讜之聲於天下爾之徳猶淵然酌焉不竭為人妻及母若此則可謂特逹者矣爾子既已通顯崇積名行而爾元壚閴然朕心甚惻用仍贈爾為恭人夫爾子之不忘爾桮棬也朕則何有於翟禕爾其祇承亦尚冀爾子使無棄前勞爾丸熊之功則亦豈有墮乎刑科給事中王繼廉勅曰朕求言甚然今者議清於下聴專於上使言者知其論之必有歸而觸亦無罪則朕無以察之矣天下之善察言者必責實責實必期來效期來效則不如返而稽其往功岐黄既起死而其書乃信爾具官某神懐激朗風議健持萬石家聲伏生經術祥刑之政皎若清霜大江以南哦猶吼霹夫制刑之道本諸精微故哀敬竭則中淫明清衰而物遁此雖使皋謨吕誥齊喙而發箴於尉釋之其曹而察麗猶不能以執其倫要孚彼成輸若爾審克之能已絶浮頗之聴朕嘉異政擢爾禁垣而爾蓬勃鼓忠㡬深選識坐席未煖諤論已攄陸語輸新賈言失至藴崇始發莩萼見端夫威鳳片羽然明一言斯可騐其九苞徴其百折矣兹用覃恩授爾階徴仕郎朕以爾能刑仍俾爾刑即以爾之能言繁稱廣説旁極百端猶以刑為大氐耳今法紀未張而徳禮微絀寛苛並譏猶梗偶相笑也夫士師不能治士朕不能治其喜怒資爾鯁固是用大諫爾無面從朕敬於刑福建道御史馬如蛟勅曰欲治平甚今天下甫脱璫燄觀聴瞀惑如燎方撲迷於聚烟夫紀綱不立刑政不明雖堯舜不能治天下是故朕心如焚嗟乎與我共滌六宇者其臺諫臣乎爾具官某晶心靜明正骨彊立昔令山隂惠政挺紀雲垂風抗童禽㑹靈是故朕以豸冠旌其鳬舄火正廟之曰壯霜當秋而取嚴而爾鳳不難鳴鷹始下擊首則為朕抉形鼎魅聲罪窮奇快少正七日之誅暴商英十年之憾時則同文解獄元祐仆碑而爾又表薦遺賢抗陳滯罰欲以郭隗致駿宏羊召雨膽目明張風㫖搴壯而又為朕剔贅釐浮條單䇿弱大搜槖鼠遙算波鯨自爾入臺方踰百日而諫書雲會讜論飈興是知陽城七年寒蟬之日久谷永累牘器鼠之忌深如爾忠能可曰遒上兹以覃恩仍授爾某階嗚呼朕博稽官制察百爾之所持補闕拾遺道存論説若爾御史入則執囊出而攬轡高岡一噦未謂來儀白筆不眊豈當上節繡斧佇授山岳待搖期爾勵此初心要於底績倘懐孟博澄清之志彌章文通獨步之名廣西道監察御史倪元珙勅曰夫囊斧在握鉊鐸四下怯夫奮心舒壯頄舌斯不難也若乃董宣洛令崔發鄠宰項彊貴主威行猂涓事之難為有如超海且夫氣持則法立也朕求法官必取之健吏以為擊物無缺惟純鉤湛盧為可恃耳爾具官某家起新都禍期逆豎時則匹夫懐璧較尉摸金元禮受告密之封朱勔領應奉之使湘山可赭厯陽㡬湖而爾乃奮身以持致命不顧當此之時爾視湯鑊則猶冰泉卒使虓虎坐馴驚魚不害朕是用報以執法資其讜忠爾則糾奸遂良梳疑剔伏至言新語轢賈凌山以其前有履虎之貞固當不難嬰龍之論夫爾之鯁固比於原泉有本而不涸也兹以覃叙仍授爾階文林郎錫之勅命今朕之意欲使天下祓滌著新如日火顧惟御史埋輪攬轡可得為之然使爾以今曩之注分於鉤瓦則道不行矣故曰剸足適履毁方為圓言墮趨也爾豈以潏井而羸缾哉朕勗子則以羔裘之詩曰彼其之子舎命不渝雲南道御史毛羽健勅曰朕力追止輦欲以厲諫官之氣而使與朕爭然而以為臣軌則不可也且夫氣者諫官之所自治今欲自朕厲而有之此豈可恃乎譬之革鞠然其氣甚盈而觸物則隤然墮爾具官某骨正以堅才雄而決當瘡痍兵燹人歌蜀道之難而弦誦桑麻獨撫宓琴而治是用嘉子擢於西臺爾乃引吭長鳴剖心極論一揚節足坐剔䕫睢凡諸條上之章盡屬憂危之論斷鞅守閤未足為奇史輶王章差當比直昔漢文方盛而賈誼陳痛哭流涕之書元祐既昌而程頤抗宦官宫妾之議則豈可以廟謨無闕遂簡諫書廷斷已章不厪至計昌言可拜惟爾有之用以覃恩仍授爾某階嗟乎爾氣遒上朕則猶慮其竭也夫人莫不貴其朝氣朕務與爾共守之冀爾之規朕其亦以是言曰庶無暮氣而歸乎吏部文選司主事晉淑抃勅曰朕奮朝氣捽摑天下然視天下如敝笱然穿罣百出今條奏如雨良䇿日聞使朕日行一言足以致治而今不能是則非法之為也記曰為政在人苟惟其人朕固當與主爵吏謀之爾具官某清朗不疲彊直自遂昔佐大將作以辦洎遷小司馬而良遂以精能陟於銓選淹疎既久奮熙於今而爾條貫無蹊夾袋如鑑棘籬金練治以公清雀燕鳦鴻章其平察以今奸距方脱黨禁初開鷺羽振而未充於庭麋夢安而猶棲於澤藉爾協贊濟之名通是故使薪積無嗟河清不怨山公之頌豈不諒哉會逢覃典用授爾某階嗚呼昔在皇考登用耆舊熹皇初載端士雲蒸時則公忠之臣握銓秉照荃蘭菉葹辨若蒼皓苞苴竿牘駾而千里會遘兇閹致興黨禍然徽猶可尚前事當師是爾司南非為覆轍爾務懋勉朕有顯庸禮部精膳司主事閔心鏡勅曰夫義禮相麗猶革骼之相附成體也朕新即位慎簡春曹無所取之取諸其彊直而不回以為義立則禮行也且夫波流之會特立者貴爾具官某識尊氣昌無媕阿之意當令崑山罣於權宰時則視爾猶蟣螘然而爾岸然不屈如卵觸山旋致貶遷㡬於糜碎董宣彊項今又見之朕是用嘉爾擢爾司儀爾乃周旋無闕美聲上聞本諸其彊直之志固不墜也兹用授爾階承徳郎昔唐李翱為儀郎以鯁峭忤時宰為時所稱當爾為令道固有難焉者抑古人有言曰人不躓於山而躓於垤爾盍務懋勉有終人之操行則亦猶原田也不殖將落父勅曰才徳者天人之所共報也報才者與人抑有遁焉者矣報徳者與天雖顯潛異遘淹驟殊期要其致歸無或爽焉夫身沈而名飛未為失數也爾生員閔某乃具官某之父鄉宗稱孝江海方才而身既不庸命亦隨盡公明不夀飄零清酒之談輔嗣無年寂寞雞忩之語如可贖也人百其身今爾子鸑鷟飛光豫章挺秀出為健令入典清曹蓋觀橋梓之相承足齊彭殤於一致矣用贈爾某官日月其除風猷不逺其祇嘉命以蕃國華兵部武選司主事杜其初勅曰朕聞謀臣盛於内則威武形於外此猛獸在山之説也故善戰者戰於尊爼夫有儒雅雍都而能佐箸出籌屹然干城之重使機能内握勝心外焚者斯亦國之寳臣已爾具官某學非私利胷有甲兵束髪讀書蓄請纓棄繻之志策名登版表處囊脱頴之能修䖍太祝選雋司戎爼豆既所嘗聞軍旅豈曰未學飲冰始事聚米成謀辛公義策榦鳩司流竭忠之譽裴光庭宣猷牧監著修整之稱而爾兼有其長可謂英能特達寡雙鮮二者矣用晉爾某階今秦中不靖黔難未紆朕新即位悼前事之失奮然有為建旐設旟勵成斯志討賊之計朕則一以責之大司馬以及其屬爾其懋哉四郊墮壘則惟爾勲行人司行人姜應甲勅曰朕欲周知天下使萬里之形章於洞闥是故慎選輶軒之使而歌皇華之四章予曰有奔奏抑亦蹶生之資也爾具官某孤神絶照棲於至清應時開昌天䍚肇獲所謂般般之獸擾我文囿者與朕以其精能署之使職屬者天下甫脱焦炙神液未聚徳澤教化隔於帷牆牂羊蜚鴻所在形告山澤之盗憑嘯不時朕慮志意之不通壅川取潰若子大夫之能斯必有每懐之誠形於六轡不遑之義托於翩鵻者矣詩曰旅力方剛經營四方此言廣塗之可遵初功之未既也兹以覃恩授爾階文林郎古者行人之官取諸機辯捷給以口支天下今則不然誠至為貴耳夫士懐欺則其能不出自朕即位所暨殄澄剔既命爾矣吏之初試亦猶䝉泉也養而日濬父勅曰朕所欲禮者二道徳之士湛其元修耆宿之儒章為人瑞此二者有道之主之所甚尊也今既已視學乞言乃二義未行朕心内媿夫輪轂不望於野更老不立於庭而以為世甚盛朕不信也爾生員姜立心乃具官某之父學道守已行為人師被服造次必於儒者漢濱柴桑同兹深隠周老漢皓比其龎宿如此則可以當興朝之物色矣況於教誨爾子鬱為國華雖不吾以猶有達其道者乎用封爾為某官以爾善善爾子以爾子貴貴爾如酬酢然豈不宜哉嫡母勅曰以裴秀之才而其嫡不以其故改妬彼婦則有然者也且夫義固得而母之則固其子也而笄縰之愚畔畫裏毛區判呉越夫是世故多孽子矣爾具官某嫡母胡氏由其不妬而秉心均所以江沱可歌蜾負能似今使在位以之推賢長吏以之字氓則僎可升公而堂皇之下皆吾子矣春秋曰紀季姜歸於京師此聖人欲以婦道化天下也是用追贈爾為孺人今才爾子則必賢爾曰無忝爾所生豈有間乎子固其子也而名益彰生母勅曰朕讀詩至小雅四牡之篇乃廢書而歎嗟乎古之君臣其各厲其義則有如此也其臣之勩則曰王事靡盬不遑將母其君之體之曰是用作歌將母來諗蓋先王之錫類也於使臣之母抑若有加焉爾具官某生母朱氏靜正有齋柔嘉無遂如月㡬望娣袂其良維風及頽婦茀之得啓厥令子華予使垣知伯仁所自生宜毛義之有喜用封爾為太孺人嗚呼闚觀女貞不必正位家人嚴君不必其父勿替爾教永終令名浙江湖州府烏程縣知縣胡開文勅曰國家故事即大賚亦若齗然有靳於郡邑吏需時再期臺使者以其績上后乃司封以請祖宗之意以為畀之太易彼必將大忽吾民耳今朕即位恢宏斯道自士釋褐受選者罔不褒朕以天下之才皆可鼓勸而出則使漢金璽其後而朕綸綍其前未為失計也凡朕之意亦以為吾民而已爾具官某良劍飛江神則必發美錦登廟華而可尊造車七年發硎百里以靜觀之久當更始之時度爾必能出漢吏之廉平體周官之能辨夫威鳳之噦知其九苞名驥未馳決其千里遂以覃恩授爾某階頃浙大吏上言時則五郡大水㡬反而湖爾菰城之民亦什五魚矣朕當食失箸豈朕之不徳致之歟今田禾盡漂饑又將至爾其驅車遄邁為朕拊循其效即太傅封侯朕豈有靳倪文貞集巻二
