body:
  text: 倪文貞集巻十六明倪元璐撰題引題元祐黨碑此碑自靖國五年毁碎遂稀傳本今獲見之猶欽寳籙矣當毁碑時蔡京厲聲曰碑可毁名不可滅也嗟乎烏知後人之欲不毁之更甚於京乎諸賢自洓水眉山數十公外凡二百餘人史無傳者不賴此碑何由知其姓名哉故知擇福之道莫大乎與君子同禍小人之謀無往不福君子也石工安民乞免著名今披此籍覺諸賢位中赫然有安民在題楊維節藝文字一番開山即為世人首過以其人皆學之久而成蹊後賢變法便復聲禁厲誅謂不得復為某氏之學故豫章之務為竒文者不一日而奔走天下不十年而幾受坑焚今維節此文余謂其開山之功倍於前人而過決無有自余所見前人之享大名者雖甚孤竒畢竟以光鋒誨盜今維節之竒乃在神性雖盜狐白裘手豈能負之趨乎即使後有慧業能為之者亦何可指神性為某氏之蹊如其不能雖更百年維節猶孤行也往見維節文狂喜題頌如維節所自叙云然大都以豐城劍辱之耳今既六七年余言始騐雷令自天生將張司空亦可得而優孟歟題曹秋水藝里中與儕輩平虚數其𤣥士如秋水行誼便是陳太丘其文逺攀震澤近驂會稽以僕論之正可兄事疑秋水不許也不悟因緣辱之兩廡不疑升階劉巴發忸眉山入室廬陵歛容固不誣矣且夫考德辨行未有不以文章者自秋水領解來四五年間文章一事飛瀾驚沙而秋水我法自貴寧不得珠不欲中誘則其人豈不可知哉古之立大品致大功者皆由靜定此二字符比於麟篆入葱肆必飛去秋水慎之仕途彌多誘商丘雖得珠無解惷愚況未必得珠且將失商丘乎為林浴𤣥司臬作圖并題林浴𤣥使君者道器之總輪法葩所歸鞬也治越三年而有千年之譽然間者使君方賤陽鱎而尊隱豹余亦且親虎溪而疏龍門如木孔蟲不知天日亦藉雨露居然以肥既移歲星觀乎桐柱姊子徐生允臧等攀轅自崖鄭重惜别臨岐之訓興歎山麋賞及臨池而咨襪坼于是一年矣徐生懼乎徙遠日墮揭笈而從為有光風不憂瘴雨因徵蠅㸃取塞前謀余不能辭道在戲謔耳昔周茂叔辭張載曰平生不識畫固哉周子也周子不知畫所從來由于龍馬周子承不識畫亦肯承不識河洛乎是故畫有𤣥理而余不能知其所微通者丘壑雲烟而已題徐師一孝廉近業燕公論富嘉謨之文濃雲蔚興震霆俱發誠可畏也施之於廊廟則駭閻朝隱文靚粧􅃩服趙舞燕歌觀者忘倦施之於風雅則譏斯言形物可謂已至然使軯訇之音托於鐘鼓則亦不駭矣天人之容正以環珮則亦無譏矣今世之文皆以迂救仄以怒救迂以厲救蠕以嫣救厲而吾友師一氏猶然笑之師一氏以為其救若此不如無救也其所以自治其文章者骨起肉隨色敷體立豪不役魄妍非弄姿升雲雷于闕廷薦歌舞於名物嘉謨謂之健卒朝隱呼曰婦人凡儒者丈夫之為文章則必如此矣非其人之靜凝澹遠誰能為之者乎題張肯仲藝闈中以五策識張子士既第固且經世即偶為文亦皆為經世設也取士之法上觀三年下觀百世瞳光所注大都什九射其方來耳今張子特以其舉子業自崖攣攣夫由張子之道以敎天下舉子之為文使必為其專氣足理奔才而不叛者既以功已必能福人是亦安可沒哉張子未遽服官余告之曰即一歲居無所事事必益治其文章柳子曰感恩報國惟有文章非曰國華也道之可以起智造力無如是器良者苟致專積久為之忠孝悉出豈特力智乎張子問余為是經世文耶抑舉業也余曰無不可為潘安祖題文衡山先生畫巻先生楷書為國朝第一畫如其書遒疎嚴貴由工人物亦繪家楷聖也此巻體切諸家各能得其神理要於我法自見為可貴尚安祖投余索題且半年余愛之故不應命比于投轄冀得久周旋耳今將别去不得不歸既别安祖又歸此巻旦夕情懷正如中酒因歎今人之致定不如古人今欲為禠帶卧觀則能之為扳舷欲墮則遂不敢何也題曹方城靖海一籌馬稜為虞詡曰君儒者當謨謀廟堂乃在朝歌吾甚危之斯言誠不識詡亦豈為能知儒者乎凡為儒者必明吏術明吏術則必辦賊尹鐸但自任不為繭絲耳不知其能滅智伯牆銅屋矢妙通其數年前前人神明之事此非幾倖適然為之者也天啓崇禎之間置一曹方城於閩同而閩同大治海㓂作而不害綸扇韎韋迭御堂皇籌之五年勦撫俱効今讀其言畫地聚米應鏃投捩守距環脫動口鈐符夫以韓白在壇留泌居幄即多秘計要其鑿然如斯而巳自是遂以召入禁中計天下大事連奏劾大將之否不律者人雖危之益貴其識皆曰使其秉樞坐籌殺天下賊當盡今且以譴去投之瘴鄉嗟乎今天子之治豪傑有如漢高顛倒之而後盡其用豈可以一端見乎吾固嘗懷二策未之敢獻其一曰今天下之賊皆庸才奈無殺賊之人其二曰今天下之才皆勝賊奈無任才之法撲賊久不滅與其責將不如責吏用尹鐸一策也激才久不出與其求功不如求過赦魏尚又一策也題王懋遠孝廉近藝與王予安孝廉石交三世前三年始相謀同巷居籬壁連互既鄰切晨夕深歡素心而顧心嚴是父子奥學强才自此亦不復能有酣呌李雅百萬買鄰僧珍顔延之胡床隔籬一聽張鏡之譚頓失豪舉余于二王兼斯二者懋逺之文精湛如廼公而别有昌華騫其氣采假以其文章為之書法而曰獻不如羲此真外人豈得知也懋遠今歲纔及終軍棄繻而羣越之名彦老宿拱手而讓之牛耳者已八九年怪天下有才蚤慧如此以懋遠視余未止上下牀其摧鸞姿游燕宇者謙謙也抑不可不服余知巳毎小戰射其名必第一或得第二今秋以意決之必第二又得第九人人瞳光大都不相逺必如曼倩發謎亦正難耳然余甚貴其人靜凝使持天下事不必不如廼公健決也若以其文章之力恣其情才處承明之廬正堪作賦追乎漢人必及枚左使懋遠不作賦七發三都竟當單行也題徐漢官孝廉近藝漢官徐子之文之可尚者以其氣靜而體安靜使氣靈安使體變主其靜安而天下之鋒力才態皆可磁引燧呼而出之也故以徐子之文置之金轝玉馬之側愈見華處之土鼓陶匏之間愈見質是則天下之華質無有能過乎其文者此由其讀書多也徐子讀書日夕與秦漢人卧起雜賔即是徐庾下令逐客元白歐曾亦在逐中矣其宗多名卿鉅儒有所取友揭笈太平之山問竒獨往子獨往子者吾同門友一我儀部投簪石隱自矜為林下一人者也以彼之孤神岸節取而為之文章烏得不有其磊落英多者乎諸子或問以徐子任天下事其將濟乎曰必濟何以知之曰其骨强骨强則志立志立則材聚也評徐止吉時文徐三甥之為文長云吉刻峭季謙吉道凝而仲止吉特以明華澹逺執其中權兄弟自相師而情操互出如此故人謂徐氏多才足致柳鳳也然大戰或失吾有三說益之長甥欲車轂轉宜治以脂季甥欲縱玩鶴飛宜養成其翅而仲甥欲書法精宜使入木三分苟靜氣專志求之皆可得耳仲甥勉之并以吾言告二子題何立夫程墨大雅吾門士何立夫者藝壚之崇帘才機之精縷其意欲以舉業治世王鈇治文以為錙基讓時衣裳取嫁雖有屠龍不如摩烏矣夫今世之才極于巷戰巷戰者之所為騎危涉淼意亦凌噩道既出於青蠅弔客後世子雲之謀顧其心所射乃在三年三年不得不泣則歎此為執彈招鳥手悖其情立夫曰吾何可以不正之哉刻程墨大雅題徐云吉詩草鳥鳴有取於鈎輈格磔劍舞獨貴其渾脫瀏灕凡天下之好音在抝危器能歡物固有之詩亦宜然矣吾甥云吉天才獨高初未嘗為詩纔一為之便追作者愛其聲好而幽仄難尋當其鋒怒則姿華愈美此百篇者吾無一字王融謂其甥孝綽曰天下文章無我當歸阿士今天下之詩慮夫有我而又歸云吉也題素盟社刻士各治社相尚為文章此即文運之升以為道取相勝不極才窮量則不止也越多文社而吾門士王子毓􅆱英竒自命别以其聲氣集同人之有才者凡十數士鍵鏤鑽貫俄成浩編跡其所持大都以異制凡以尊制異是其氣正可以其社霸矣其曰素盟此言其願篤道同也然更願諸子循此志氣務為經制又進之為道德經制之勝文章道德之抗經制是猶孫田上駟之逐下駟康段西市之壓東市也若夫文人相攻自古已然魏文帝曰傅毅班固伯仲之聞耳而抒論侵譏是固不足治也題史生復之游草馬季長貴鄭生吾貴史子史子者其人驟交不熱久交不寒其學事古不愚事今不謟其文正視不詭仄視不平其遇小戰不退大戰不進從吾游三年吾不敢處之兩廡吾使諸子從之亦三年承唾俱進一日忽感吳立夫之言慨然曰眼中不見天下名山即胸吞萬巻安能脫兒女氣耶遂欲仗劍出游直趨大江而北臨發來别刻其文十餘篇求敎余無言納其奚囊史子問曰何謂也余曰以子好游語子游題李蒼嶠近藝李子之在吾門恭誠靜凝嚴著其骨吾雖甚親之亦必引為畏友其文特矜體持才賤同貴獨凡時所最騖則必棄之其所取者時彦皆以為不及也觀此即其所居身用物者可知巳吾固嘗語人文章制時不過二法無或悞取無或悞棄棄人羣騖譬諸鬭師懸拳伺虚承後者勝取人未爭有如奕者讓路趨利得先者雄天下之道一棄一取一後一先而已題卓左車集根天極人鑽宗貫德上有盤庚下至眉山而止其情與法無不取之今世膚言求解老嫗奥學矜負牛蛇二氏至死不相往來然不知世間牛蛇老嫗必知老嫗所通牛蛇必伏特非白香山諸賢可辦古今二才子長左車耳題朱宗逺畫冊宗逺所倣諸家人不可及者葢有四傅以性靈傅筆墨以繩尺傅才力以學問傅意思以道理傅興會凡畫不性靈不法不繩尺不創不學問不空不道理不怪此皆以其小離為其大合世非宗逺誰可語斯凡宗逺之為人與其詩文皆如此不獨畫也題節孝祝母褒冊夫地德曰貞女艱著節昔者共姜矢死則有栢舟之詩巴婦秉常是表懷清之築然而穠華顯衛豐貨雄秦不知青宮貴匹欲改何庭豈有丹穴素封更謀西宿故雖晶志非必竒能富貴之資易為名道若乃縞綦致淡簧翿變哀席石岸然今惟祝母祝母者治閨之砥繩持世以笄縰跡其遭遘有甚共巴卓厥我儀實惟寒士慘斯在疚方丁妙年當其禍汎舟河樂移琴鼓天橋夜坼雲翼晨摧生民至艱茶毒極苦華杞善崩城之慟魯陶凄離鵠之歌怨影懟空衣徽食棘雖禮夜不哭而天晝為昬徒以藐諸未亡而已既乃收魂約痛署孝承嚴雖畜不卒我即其父雖庭無立我即其師雞黍絶甘用激捧檄熊丸煉苦誠冀庭烏相彼枲麻以興操績之敎守其環堵而有徙舍之功是使龍文騰其虎氣觀夫文學鬰為名儒陟彼屺兮毋也天只既年六十聲聞于天遂有王言如絲􅄔星若鏡字褒紀季號亢宣文閭巷聚嗟以為盛事當斯際也不其康哉嗟乎天下名行墮於鬚眉皆以肉飛不知骨立即為情盡詎有義存宜死而倖生則無倫紀宜生而倖死則無功能所以王魏之賢亦皆易主張陸之烈亦不存孤若夫同穴之慕篤於匪躬握手之言嚴於顧命茹荼之義烈於吞氈鞫子之謀懋於定策衣冠靈盡道在婦人宜尊太君謂之聖善也于是里士社朋華文綺論霆訇雲薈塤引箎隨雜以笙鏞壽諸金石當在昔者致極悲悽不意今兹以為歡􅃩斯知雍門曼聲適催淚睫清徵哀曲反召翔禽聖人以致遂之業謂之榮華先王取幽怨之音被諸絃管有以也夫有以也夫題女史素心畫為陳赤城給諫意山而山意水而水亦似雲行亦似雨起别有天地非必畫理女媧以前想當然爾坡公有言不在形似管夫人云倒好嬉子吮毫之徒未有明此是何健婦膽男兒偉畫亦有史女亦有士樂彼素心隔幃有咫秣馬秣駒江之永矣議建全浙會館冊引夫百人之聚亦有叢臺小國之儒能謀稷下況依宸輦最號雄藩而蠻觸分蝸參辰别宿冠葢之氣散若星氛車馬之蹤隔于河漢維旅𤨏𤨏既為燕宇鵠游如肓倀倀時或鵲巢鳩借龍襲非穴廼亡其光鹿奔離羣而伎其足致兩已之戾黼黻甚三物以詛塤箎惟十一郡志意不咸亦二百年衣冠之責也今乗聖作適際朋來議闢廣塲聿興共宇傍天尺五幾延牛女于太乙之庭縮地三千畧彷枌榆為新豐之築苟成斯役其便多端葢以小繫蓬飄大堅葵向退食而連紽緎同心之聚蘭金三十六輻共持車輪千二百人齊棲祇樹斯明同舟合轍不墮歸趨亦若長枕大衾期通氣味況夫衆擎易舉不過閣下之一朝豈曰紛議難成有如道旁之三歲敢諏同志母處後庚凡輸若干悉條如左請當衣餐適館之日大書福星在越之占倪文貞集巻十六
