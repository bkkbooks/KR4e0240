body:
  text: 倪文貞集巻六明倪元璐撰序江西鄉試録序嵗徳丁卯通其木火於是天子薪槱天下士七年矣詔使編修臣元璐偕給事中臣薛國觀徴材豫章顧豫章未易材也夫地力凝蹇風道遒揭標義鑽脈之儒嚴骨長幹之傑國靈所蒸肩踵相結矣當高皇帝聖作天綱肇張而金谿嶽然首先物覩今聖業中奮當又自其一方舉統類而應則天子將自舎拔獲之而翼圍其間使獸弩道合固難也且臣持槖不效重以持衡臣心戰然有如突釜既馳至則某官某監臨嚴毖而提調官某某罔有不共所辟檄同考官某某皆茂選也臣等乃相與祓心晶誓進學臣某所取士五千三百有奇鎖院三試之馬練虱輪眥力俱盡則得士百有二人鏤文二十篇以獻自五年會試所著令即式士文主者母血指主者固已湔欺而領逸矣然猶使得颺言簡端臣於是乎序臣惟國家以文章求士是措其令於道所甚貴也然且為之則不慊曰黄葉時踊兒啼止而其靈盡故今世之士其當官敗不必歸獄其文即主者盡可得隂拱而逃辟天下之論喜深文而漏誅於此者則不知文章之察也且夫道甚尊而物争敗之王者救之以卑名故詘聴於辟召則伸矚於科舉眩行於徳行迺旌膈於文章變徳行為文章猶夫易貌欺以情實今曰其於士不察是聞鐘鳴不可知其摦弇耳探珠於淵者謹循其光氣則多得珠士含珠肝腎而翔光氣於文章管幅相遭性命奔竭雖臣矇者則猶能知之也臣所不能知者三夫孔孟者萬世之師也師孔孟之言則疑而塗遇或迮然發奬猶諾於誓壇之下臣何由知其情哉其乂不可知者先民以繩簡箝姦雄禁無穴革庸人踡跼有守法之名魚潛鼠循吐絲自縛雖或莊士然臣既未見躧者良行則不能識矣其又不可知者詭於盛世之容使骨辭徐偃肉緩嵇康隱脈刓稜居無守氣固且得福然臣疑木刃似之亦不能識矣爾乃長爪利鉤梳疑剔理鳥飛隼翔思變決起蠖不没才鶻非播紀體經能靈謹謝諸氏此數者天下之健決忠臣之行也盈寸之毫方尺之牘苟致其誠屈役不叛則萬石之弓可左右握而十萬之師可統而横行也故曰姑布相表越人視裏張喉見肝握火而處夫臣所奏士牘猶吏之質也當臣受之齋戒而察至臣亦猶行考功之道耳於是臣當醮士臣正告士曰必無墮其文心夫文章之器非黄葉也而兒亦未止啼也非使士當官即亦不信今當官所共歎者神飛而上氣伏而下用其智則日生用其才則日死神飛上則芒下氣伏下則宄上智用以生故不肯以死千秋之業才用以死故不能以生一旅之師數者於世豈有銖黍致其文心者乎使天下懐此數者挈槧而走臣所必立取刷去然當官而或貴之者則是孟説有完臏而防風奔命無專車之骨也且夫聖智之名功能之跡華而可悦天地之所受藻也非足文於心苞采相勝固不能得之譬諸嘘冰無出熖者矣其不然固如嘘火易再曰含章言文心也於坤王事有終言致功也於姤有隕自天言天下之理可坐得也夫得寳母者壇奉以呼珍於海士守此寳母亦壇奉之足以提忠聚能坐躋皋禹故有益功而無遷術也墨翟公輸般帶牒坐投而攻守之變盡假令二子輼櫓而見城下又遷術乎哉自臣六七年所親見天子臨朝奮講煥乎昭回以為天子之修其文章而天子則由之以湛新天下雲漢之成如此矣多士觀乎天文其法最上其下者往數十年先臣涷宰爾鄉安成既以袒持故諫臣劉臺抵楚相譴去已又十年守爾臨汝定潢池之譁此爾鄉之所甚材也然先臣之為文章能刻深造思而其教臣朝則曰力爾文章暮則曰無亡爾文章夫先臣亦有取爾也臣學於君父即必以諗諸士臣實藉諸士免辟苟不墮諸當官則已矣戊辰㑹試録後序蓋易有之曰聖人作而萬物覩謂上章美而見光下著情而獻功如相見然故稱覩也易之言覩書之言霽也上古之䝉霽於二代堯之䝉霽於舜舜之接堯猶雨之合水也而其時則亦有若肇造啟闢然者此以堯有靜深之息而舜大見其道舜大見道是使四凶者不得不大見凶四凶者大見凶則十六族者不得不大見才也此十六族者當其席伊耆之暮氣而罣於窮奇檮机之繁妖如處襲石不可尋察而及其應運投知光氣勃發燦然華舒爛於卿景故舜者明新之大歸冒萬類之才而與之相見者也今天子極聖左握大鑑右操健斧以章奸鋤逆使嚴雰坐清大昏忽旦天子以為如此則天下必有矯挺而出其才者矣故使臣等洞垣而求之文字自臣所見士之能言者性命俱流思理並竭窮致極能凡士之奇則無有不見於此者矣士之能為此者運昌則氣發心開則力張去諱絶嫌則慮坦而其情易盡此物之善覩者也雖然臣疑士他日將或有遁焉者夫敝臣之遁其君者畧有五術漢之臣則皆蹈之漢武帝責吾邱夀王曰子在朕前智畧輻輳及連數十城之守職事並廢一遁也聚才以從其面退而解弛焉此一術也嬰蚡之訟武帝問廷臣誰是韓安國兩是之鄭當時是嬰後不敢堅一遁也詭於中虚以為無咎又一術也文帝欲任賈生絳灌之徒則曰年少初學專欲擅權紛亂諸事一遁也駭非常之原而託於安靜且以老成制年少以談笑奪痛哭則其説易伸又一術也文帝問陳平刑獄錢穀平曰有主者問其職曰理隂陽順四時一遁也逃實課而即於莽蕩以為大又一術也公孫宏對武帝曰臣誠詐使非汲黯忠陛下安得聞此言一遁也居身於謙謙之大美而使人主不可見詐又不可見忠又一術也此五遁者大巧之臣皆用之以捭闔其主漢之二主皆英主也然有不及覺者其情甚深其罪則與四凶等夫主甚陽其徳而臣則懐諼而棲於至幽此固流殛之刑所不原也故臣願士終顯白其意以與上相覩相覩則無回心無回心則無匿才君父者呼心之鐸心志者鍛才之鞴世顧安有負忠臣之心而患無其才智者乎且夫明主在御譬鏡之在懸也因鏡以正其容易而欲滅其醜難乘明主以致其功易而欲塗其過難況以上沖質而能大見舜五十在位之道使其年及舜必又出舜上而諸臣從之枕圭席瓚不為十六族則為四凶可不慎哉武會試録後序嵗辛未上急思熊羆之士屬當大試天下武舉乃更故格申命再三俾臣元璐副左中允臣方逢年往咨方畧事竣録文以獻臣宜綴言末簡臣惟論士之道觀其遭際則可以知其致歸古之名將三代而後如衞霍李郭之徒皆事中材之主今忻戴明聖文武之徳上凌軒姬一際也古者以將禮馭將極之設壇推輪猶為已事今創陳九賓廷見臚唱被以儒者之榮自詩禮之士誦周讀孔數十年不敢夢見者諸士坐有之又一際也此二際者古今之不常天下所大􅃩也故以此二者呼振天下使天下負志之傑心開力出蓬勃蠭涌雖復歐冶擊囊昆吾捧爐窮煅極鑄而規其成器無有如此之神靈者矣且諸士亦知上今者所由命科先技勇而後文章為何意乎臣愚仰窺上視諸士綦重以為是皆舉於鄉而來者鉛觚之能已見矣自往者縉紳道盛慙見兠鍪文士倚筆不自得浩然棄而説劍稍習弓馬以為文章之媒而主者急奬機謀盛循行墨上心知之故謂今士所不足非文也卒出不意而求之藝力當令初下都人士竊疑裘帶之風將詘於超距而不謂諸士取諸其身顧有以應握槊伸鈎霍然而出於是上心甚悦以五百士付臣等使試其文辭臣等既受命私意士蹶張如此其所不足又非武也將亦竊疑翹扛之氣必困於毛錐而不謂諸士取諸其胷又有以應摛華吐藴蔚然而章蓋臣於是而知上之神武知兵也以實徴才以虚作氣以武力士之所未備故猝乘之以文事士之所必守故不攻之以猝乘故盡得之以不攻故終致之自古帝王之精於韜符而善用兵未有如上者也諸士既已感激神奮而又仰參至精法其環變苟行三軍可以無敵故臣願諸士一以上指為師臣寡昧不聞軍旅無可益諸士者無已請即諗之以所素守經生之義則亦有三誡焉多讀書一也勵志節二也善與不爭三也郤縠詩書杜預左傳古之為將者皆右六經而左軍志戰陳征伐之事不與聖賢謀之則不能多算故宜多讀書也今賜甲科稱進士儼然士大夫矣龍雲始逢矜矯自貴旁塗曲竇儒生之所謹者諸士皆當守之羊祜不附中朝傅爕寧失通侯而拒中常侍趙忠曰吾豈私求賞哉故宜勵志也文武之權譬則其衡也曩承平抑武武墮今將昻之衡過亦殆諸士其務和衷無戾文吏文武不和則大功不成且不可使後世議藺廉優劣故宜善與不爭也以是三者傳於韜鈐益以計數苟行三軍則亦可以無敵今嵗且洊饑内盗竊發四郊多壘卿大夫恥之武臣不必然矣虎燕飛食而絆於時平徒悲髀肉起望堠烽則諸士之又一際也報主樹功既有其地果欲致則必致之又何疑乎兒易内儀自序漢人説易舌本强撅似兒彊解事者宋人剔梳求通遂成學究學究不如兒兒彊解事不如兒不解事也古今謡䜟多出兒口即易寄靈任兒自言必能前知矣夫易固貴兒所以藏身大藏藏巫小藏藏兒筮亦聖人兒天下也天下甚危之言以為兒為之則可無祻屯之次乾坤此易告難也繼屯以䝉䝉童是兒此易明言惟兒足支難耳子雲太元童烏共之童烏者子雲九嵗兒也兒易外儀自序凡儀所設皆易本情當其會心覺龍馬在側而顧外之者以其假圖召策假版陳圖不免枝遊近於小道又以圖象所涉意在明兒墨守先儒不敢自出而兒得之則生戲謔所以外之也内之視外譬立閨寢觀乎衢巷衢巷蕩雜不如閨寢秘清夫易之為道固為轉逐而外者也隂陽大義移而卜筮筮言取易卜言不取易而亦曰易爾其外至於風角鳥占青烏禄命亦歸易焉其外至於博奕之戲範圍錯綜亦歸易焉天下之敢䙝用易如此然即以為非易所有又不可也兒易内儀以説三聖人之易斷於孔子三聖人治體孔子治用治體握規治用握矩文周以前人皆任質明量取乎易者概必君子故貴以其圓神命易使人知化至於衰周權智日出苟使易兩在遷流則大賢大奸共用易矣大賢大奸共用易即必有非易之易起而亂易者孔子懼夫圓神敗易故尊典常矩易使方分設六十四者卦執一徳循能責用猶官畔然故大象之曰以者言乎其用也孔子用易如丹制汞使就財實用豫治樂豫盡卦皆歸樂用革治厯革盡卦皆歸厯用師萃治兵師萃盡卦皆歸兵用噬賁豐旅治刑法噬賁豐旅盡卦皆歸刑法孔子之使易也器之易之應之猶響也觀其周綜卦徳博串彖爻疑有神靈通乎夢見此由孔子制思微密誠察而其辭體要執術馭蹊斷以數言包囊全卦譬晷一寸箝攝千里夫子之文章其才大力多然也我不敢知曰文周所謀定由斯義而自孔子用之何必文周不為此謀乎是故學易者不可以不明大象離象求易即力竭而思不得盡矣夫易者千世學者之所聚爭也聚千世之材爭立一易寧有正易乎而又以抵程朱之巇為有罪今取諸孔子之義明不敢自用才以庶㡬不謬於文周而挾孔子令程朱程朱俛首矣是故其道得明而易行也選丁卯江西墨序繫今文於時固以變之道與之矣今文變則愈今雖邀龍馬之靈役典墳之氣使倉氏兄弟屈曲蟲鳥錯然而書之亦愈以明其今者已也故極今文之致為之三年則未有不腐者豪有力之士愧之以為是不可循於是乃棄其衡斗而舞帝江之干戚為此者其道足以亂天下而其器大毒天下飲之適如耳於是司命者憂焉以為非其人强魄則不能為也乃大索其類以厲誅於强梁而鑱其血性為此者其意欲以治天下而其器大毒嗟乎操兩毒之器以共制一文章世豈復有文章哉故吾於今文則有二懼焉毒造於豪有力者而使庸人承其禍此始懼也毒報於豪有力者而使庸人首其功此終懼也夫庸人不能自救禍而與庸人圖其功雖更千世未有能成者矣王尊曰賈人百萬不足與計事羅紹威以牙軍驕盡殺之而所部兵羸不可恃則大悔恨植其名而不足以著物貴其體以犯天下之不服則其叛之必速是使天下之二毒者相伐無藝也吾於豫章憬然欲變之矣然吾欲變之而不敢不握其才管夷吾欲變齊則握高國趙武靈王欲變騎服則握公子成高國公子成者齊趙之人之所大服也故吾為之制奇平華樸四網者不脱一面也然吾必一一吹之而察其才自吾之意以為察才之法存乎别贋夫文章之有鬼道者牛蛇無禁而黎邱不可尊也黎邱之穴破而四者之才乃始退而各守其宫子產曰鬼有歸則不為厲故文變則可歸也歸則不厲不厲則其才不疑其才不疑則其體立才非一的之招體非一鞴之鑄也奇平華樸苟皆以其才為之則其於體均有矣使四者各有其體則文之體正天下有此四正者則天下之二毒者止矣是故鋟其文而告天下以其故然天下必知吾為豫章言之也京房考課之法當時第使得行之本郡夫不憂其身之不免而憂考課世固以京房為愚人也已南雍課序雍制之可尚者二不使士自為功不使士自為命也不使士自為功者勤鐘謹鐸規蛾子以帝王之物天下於是不貴其家之縵絃而尊國之鼓篋夏楚不使士自為命者日考月較以窮其情士不得鳴一日之倖天下於是奉理叛數祠才鬼而疏福神故昔者高皇帝之意以為鑄才必於太學而今罣於桑孔治財之謀顧有不然者是可痛也今士既策名甚驕其誦讀而天子則不之信即一日功見譽流而天下或終疑之謂其幸與福會為今之才者惝怳而難恃如此苟必歸教太學還其本鑄久任師氏由誠盡材切以性命湛以經術實以榦濟華以文章不出十年將相之才可手掬而得矣自余從侯先生後咸股執隨鳴叩互遁然即以先生之為教至於疲鑪竭薪顧亦豈能信其中遂有將相才乎余故以為非自上更始大復高皇帝之制而厲誅桑孔則不可得為之也今其可得而觀者文章一端而已矣刻南雍課選翊富倉書自序或問恥曰人不能自食而倚天恥也鄉之人不能自食其鄉而倚國恥也今嵗大祲民多死徙於是公私上下皆以成周委積之義為當求其當事大夫規宏經逺悐然聚而謀其大者以求儲於官元璐繭存城曲以拘墟之見退而與其鄉之士大夫娖然謀其小者以求儲於社乃稽古社倉自隋開皇之制以及唐宋戴胄王琪所條參之伍之要皆有未協者以其資計威教悉仰朝廷蓋非鄉之自為功者也鄉之自為功者古今惟考亭一法觀所行於崇安之開耀鄉者綱綜粲然化裁道盡矣然在考亭自為之則良他人行之或敝繼此真文忠行之武安亦良其後人踵為之日益敝考亭不曰里社不皆可任之人乎所謂可任之人者能人義人慎人信人廉人天下苟不得是數者之人昔之碧血今為冷風悲哉法之倚人行也為法不能制人必行而倚人恥也元璐之法察鞬首機欲使雖不得數者之人而亦可不害則有五道焉曰託卑託卑者何也夫託尊於官即廢興由官官雖賢三年而權盡崇安之法之所以不復者亦以其後舉倉歸官耳今以土人世其事以中夀量之極其身三十年其子若孫親見其事習其所持各又三十年是則百年常在望也百年之法以官守之須三十人以土人守之父子孫三人而已家無繁令而安里有多言而憚此為雖不得能人亦可不害者一也曰居約居約者何也千人之聚有田者常數十人若以王戴之法畝責輸升是使數十人共執倉命也此數十人者必有數鵂焉必有數蟊焉今約之五人則尊俎揖讓定縱堂皇者五人耳其千人常在堦下其數十人常在壁上謀靜而專志咸則鋭此為雖不得義人亦可不害者二也曰絶累絶累者何也劉晏以假貸非福青苗直以貸禍即崇安良法後人敗之拘催不堪咸以咎貸是故以粟貸民求息則粟有再死民亦有再死民頑不時歸粟粟小死嵗大饑問諸鳩殣粟大死以法治民頑民小死春散秋斂五六月間價踴求粟不得民大死今就糴徴利以平為功金粟迭處不離其據此為雖不得慎人亦可不害者三也曰制欺制欺者何也大嚼者咋斷其舌左手持鍖右指愓血一身不可自信而況於人乎故鳴鼓雖公不救往過要鼎雖薄不形來愆今質入穀出以鍾易石是使受者不私私者不負驥駑同櫪不見驥亦不見駑夷跖並㕓不患夷亦不患跖蚨飛來去倚枕聴之周鄭交質之謀而有邃古結繩之化此為雖不得信人亦可不害者四也曰藏富藏富者何也過府而㦸指者希不有盗心執炙終日寧當不知其味乎寢處京坻而我無與焉不及十年庸人皆倦矣今以為其家之肥期而歸子旬而歸母後迺盡子囷子凡穀六千石受息千二百石計上田嵗入穀五石千二百石則凖上田二百四十畝是則五家子孫世世之業也富此五家而千家乃不饑食五家於倉而倉乃足千家之食自抱其珠誰得脱者此為雖不得廉人亦可不害者五也凡此五者皆古所未嘗謀自元璐以意創為之妄計雖甚淺疎斷可百年而上因著為説以諗同人今饑民習賑等於驕子更一年不登誅求富者必立盡此云翊富是為富者策救使不得貧耳至所寓意保甲鄉兵云然者安知是倉不為武庫耶或疑此法終難行者固也當考亭始議社倉時吕東萊規以任所難任恐不成功朱吕且然何況今日雖然請自隗始夫衆不可倚也自為之法不能身先之而倚衆恥也治社八子集序今天下多事天子急救亂使天下郡國之民團結保練户皆可兵人期能戰以為如此足以制賊然臣以為由其道可以得卒不可以得將也盡肉食之謀皆一卒之任若夫死綏制氣之事惟士為能士所持惟文章而法亦團保墨兵筆戰因社為肆是其所制將者也然而今之人不以為貴非徒不貴之已也又歸獄焉以為其習致衰其氣召亂篤古之士戒心驪稷强者捲堂弱者閉户魏子子一願一洒之乃集其朋大治觚槧號曰八子章鵠示人其法元究天人高舉禮樂敷算兵食鑽秘韜符時或悲歌小形涕歎風論四出褒譏霍然或懼魏子曰子其危乎魏子曰吾何懼吾父死於是吾兄死於是也而其朋數子曰建安七子之才而學道者不尊之由陳思之無義父兄耳若以魏子父兄之義收召聲類以極其材於應劉諸子何有哉余聞之氣汗縷縷出於冠上嗟乎居體致用以為之文章求聖賢之心以謀富强之事未應一命而爭致其身循此之情授之笏必擊賊予之五萬師横行塞上矣今求天下之鋭於鄉兵里甲而不知文章之社之有將材是則田鳩所笑不知適秦之路乃當由楚也天下之文章議論皆非一人可持朝數人謀其忠孝不可曰黨社數士治其文章不可曰亂小人無朋下士豈有社乎倪文貞集巻六
