body:
  text: 倪文貞奏疏巻十二明倪元璐撰殄宼大謀疏經筵日講官户部尚書兼翰林院學士臣倪元璐謹奏為敬陳天下大勢以成殄宼大謀事臣觀今日賊勢披猖急需勦禦之䇿夫勦禦實際只在兵與將耳此二者惟在任事之臣力為整頓無煩廟謨至於通漕輓措兵餉臣日夜籌畫有所見即以條答惟最関目前大計者則有三䇿徑具奏聞一首惠京師心膂畿輔以定本謀夫賊之猖獗至此者非賊之能也皆由人心渙離為賊作勢耳今日急着勝氣惟在固結人心詩曰惠此京師以綏四國請特降温文延問京輔疾苦並令諸司急察民間累苦有如臣前奏車户等弊害者立議更釐罪繫情可矜原及罰贖徒以下者悉行釋宥夫王道皥皥而在今日似近于讙虞者所以救亂也都城察詰奸宄防戢火患事事宜嚴然要在行之不擾其在内畿郡縣無問大小堅瑕宜預令本地在京諸臣確舉其鄉宦紳衿士德望羣推者一二人特各賜勅書使之聫結黨閭鼓勵忠義宼至嬰城并力固守事平之後察明有功破格旌叙并賜復民租一年以此握固勝于調援此一䇿也一特重留都肘腋鳳淮以通中脉祖宗兩都並列今日始知深心蓋以遷鼎燕都鞭長難及遥尊弓劍以繫人情今宜移變蕭疎還其赫濯凡一切官設軍容政敎法禁必與輦轂並重中堅屹然而外引鳳淮為兩翼臣觀鳳督一師于今獨壯惟淮揚兵少又文武二督並棲一枝此甚非計葢以漕勲之制今昔天淵昔之勲臣一總兵也事撫甚恭今之總兵非特勲臣也駕撫而上路振飛朱國弼兩臣者才氣悉敵而責任不分恐有牽撓漸成嫌碍臣請離居歸好分任責成淮撫仍如舊制撫寧侯則使專鎮徐州自淮以南至于江責之淮撫自淮以北至于濟屬之撫寧各務増兵踰萬練成勁師無事則俾之分治封疆有警則責其互相羽翼通漕䕶運即在其中此又一䇿也其一聚粤閩江浙為一氣肩背呉㑹以壯南維今西北不競宜用東南而粤閩江浙勢分情渙無復唇齒輔車之勢夫春秋同盟倚强與國就四省而論閩為中權以其大嶺在前負海為固水師方盛甲于諸州請改閩撫為督通轄四省一處聞警通盤調度輕則就近大則連衡就近者用粤援閩用閩援江用江援浙連衡者合三省之力併救一方不俟奏聞應時即發四藩鷄連而吳㑹得以虎視昔宋臣文天祥請分境内為四鎮而建閫于長沙隆興鄱陽揚州使得首尾䇿應當時以迂濶置之我國家全盛之勢逈異弱宋今臣此議既可以壯西北之聲援又可以鼔東南之義氣從此遏滅闖献不敢南窺此又一䇿也臣之所急者有此三䇿此外兵食之謀向操五説其一并兵其一海運其一免軍籍為民籍其一贖罪推于大辟疑赦其一給封極于三代罷閒内軍籍贖封臣所習言而皇上未之許然臣以為終不可易也如彼飛䖝伏惟裁擇崇禎十七年二月二十四日具題議恤車户疏奏為議更車户運米積困以奠輦轂事車户一害久厪聖懷通國舉朝為之吁歎去夏臣纔受計即欲陳奏而倉臣白貽清以為運事方興不及改作僅立為半救之䇿曰併倉曰橋支纔一併倉即省車户脚價二萬金一時小懽然不大解更絃湯火猶在臣自去年九月至今二月日進諸司劉顯績等車户湛得盛等反覆商論既有成謀臣豈敢以離局之身謝其事乎臣觀車户大累在于僉報僉報之權屬之郡縣里甲憑挾漁獵貧罹富脱擾索百家而報一户僉充一役乃朋十名至于積役科勒夫脚侵偷靡不破家甚至殞命京民慘痛莫甚于斯初臣議欲移運于官今思官仍倚力車户耳不如徑直為功請擇車户之久慣有身家者定為永役歴世不遷有若人之經紀舖商然者其後聽得子孫相承亦許募擇頂補如此則可不煩僉報畿民繇此其卧于于然矣然而運價不敷誰肯領任細察車户例所取資流商晉商票錢房號四項帮貼約一萬五千兩此外本部額給每石脚銀二分五厘統計每石四分今臣議增給每石五分每百萬石增銀一萬兩炤米入增减多亦不過二萬兩從户部措給朝廷歲捐此二萬兩遂出邦畿于水火使民謌舞以成金湯是捐二萬兩而有千億之用也自臣受部務以後奏陳皇上給賑粥米藥槥銀兩不下數萬于車户寧有靳乎惠此京師以綏四國懇祈聖仁英斷立勅新計臣傳習原議左司主事劉顯績雲南司郎中羅其綸督理大通橋主事賀久邵即日覆酌施行不勝願望崇禎十七年二月日具守禦遏援疏奏為急聞賊至敬陳守禦遏援之䇿事臣於本月朔日謝筦部務專供講職毣毣之誠未能解主憂而舒國恤中夜傍惶實深負疚忽聞賊撥已及舉朝驚駭伏想聖明彌加赫怒臣繞牀竟夜眦髪俱裂竊謂天下之事必揆之理數二者以理言之皇上惕厲憂勤絶私寡慾豈一小醜坐聽憑陵即賊智量不過近日之劉六兄弟鄧茂七葉宗留已耳初極兇殘近施詐譎以狗軰狐羣欲傳檄以定天下讀盡二十一史未之有也若以其數言之賊以今甲申凌犯此為自刑魏崔浩以庚午自刑料宋必敗此其明徴而歲星以四月照真定恢復自兹而始數以佐理未有爽者故臣謂賊今日犯都城必失利去不久當得滅亡臣今徧告諸臣往日不宜如燕雀之處堂而此時正當如在山之虎豹臣愚誓以慷慨從容之二死守之暇整然臣之所以報國者在竭其才智以濟國家之事而已今日人情實為危急在我應之不容纎錯譬如奕者輸局既急則愈宜審思投一閒子即失先下一差着必無救也若臣所持惟有四説今内則言守禦也夫𣲖城汛謹非常簡軍實申號令數者守之事而非所以為守其要在乎選擇將吏鼓勵軍氣安輯人心而已守將不拘文武几在廷之明敏果幹者皆將也宜勅府部各衙門推擇奏聞仍察曾經城守著績者不問紳士擢委一同調度事習則能贍志定則氣出耳京軍所闕月餉即與補給部庫不足借支内帑軍無反顧乃有奮心如賊果逼城須重懸賞格又饗犒時頒壺飱不絶要在鼔舞無倦人思致死然後退可以守進可以戰今京營十萬之衆用之登陴不為寡闕如其未足取諸衛卒不必𣲖役民丁動騷閭左通倉米粟速運入都牛車未足就令京軍負戴用元人董摶霄傳運之法數日可畢軍腹既果盜糧不齎而京庾翼翼于是又可以平價糶濟民間事平買補良非所難今人心驚渙首宜固結且益下原非損上僅一轉移間而坐奠金湯其一切轉輸則呼召閒民給以常直使累萬飢寒咸得衣食于官亦足内消隱患在外則言遏援宜速檄邉將吳三桂將闗寧之衆兼程入援三桂既至則唐通有所特角而自奮二鎮互相聲援并薊津之兵亦奮矣臣聞寧兵不耐鞿靮而吳三桂已晉封五等即非總督監視所得旁撓行間或扼或戰悉聽相機責人竒功宜脱苛令也稍緩則言恢復東急真定西急宣雲賊每得城即席捲輜重以去雖設偽官留兵不多惟使本地軍民䕶守圖此非難合以畿輔責唐通宣雲責吳三桂力圖恢剿仍察首倡開迎叛縛主帥者立置之法使人畏官而不畏賊然後天下事可圖也若夫要著大謀期于逺收平蕩近捄傾危俱不可望之西北必在東南盖西北多勇力東南尚氣義頃用邉兵之勇力而兵多從賊何如用戰士之氣義以滅賊故臣嘗奏請留都政令宜與京師並重近復密奏東宫宜撫軍南出以鼔東南之氣繫近道之心乃聖明守經以為不可今賊已逼京人心動摇益湏早决大計號召勤王事機一失後即難追宋康王不出磁人無所歸心不拜元帥宗澤張俊梁揚祖楊沂中之兵不㑹使澤次第進壘之説不沮于汪伯彦則汴圍立解何至顛仆伏祈皇上參覽前事早奮乾斷命皇太子統師而南選京營將校併精卒萬人擇廷臣有才望者輔之出于河間德州之間事急則帥天下兵入援賊退則前駐留都控引淮徐遏賊轉掠山東窺截漕路誠令兩京奠安命脉流通然後徐用東南以收平蕩又何難焉是四説者竒正並存少縱則逝惟皇上以暇豫之思决勇敏之䇿宗社蒼生實為厚幸至諸臣今日各以君父之憂為急凡所以固國勢而殄宼虐者務迅疾而弗遲疑一切迂愚之論俱當庋置高閣若復以文相遜以迹相䝉宋臣有言是猶拯溺救焚而為安歩徐行之計也臣謹昧死上言伏冀聖鑒施行崇禎十七年三月初三日具奏倪文貞奏疏巻十二
