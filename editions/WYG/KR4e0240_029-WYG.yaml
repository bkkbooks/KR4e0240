body:
  text: 倪文貞奏疏巻八明倪元璐撰餉部事宜疏題為恭承召對申奏餉部事宜事該臣等奏近設總督勦寇糧餉侍郎轄餉三百萬凡東南勦餉多經解㑹此因寇警部臣莊祖誨時或往來衡陽長沙之間即有言其不宜逍遥衡岳自便者疏下臣部臣思衡岳誠逺然臣實不敢遥定處所責之必前葢以餉與兵異餉部亦與督撫不同督撫與兵逼賊為功餉部與餉避賊為智臣頃徧詢楚紳皆云轉輸最便莫如武昌而今武昌破矣惟恐以規近而適齎盜糧所以未敢輕議又且道路紆阻時日躭稽呼應不時即憂他變左兵囂騷非無餉也逺莫致耳以臣之議自今各督撫鎭額餉皆由臣部酌量道里就近撥𣲖頃行江督已劄撥江西三府凖此類推禁旅則撥鎭江揚州秦督則撥川西陜西鳳督則撥應天和鳳徽寧黔督則撥雲南淮撫則撥全淮及割揚州十分之一皖撫則撥滁州太平池州廣德豫撫則撥河北三府沅撫則撥貴州一省鄖撫則撥四川川東楚撫則撥湖廣湖南諸府左鎮則撥截江西五分之一並聽各該督撫自馳檄使惟左鎭則隨兵所在闗白秦鳳二督行文所有錢糧著各該地方差委徑達軍前或遇軍行遼逺許交駐扎鎭所該道代為轉輸地方延誤者該督撫立行題叅加等處治解官竣役從優題敘賞罰既明趨事必速如此則餉部無所事事矣而聖衷慮此尤為宏逺恭奉面諭云撥餉就近最便餉部不必議裁葢為提攝考覈固須重臣耳今議餉部移駐南京居中控逺不特勦餉凡京邊一切錢糧悉照近頒聖諭責成撫按推官事理移文四促只藉文告為威靈其銜即宜改為總督催儹中外糧餉侍郎臣部亦實藉之分其猷念矣末議無當恭候聖裁崇禎十六年七月十三日具題奉㫖撥餉就近允屬便計各督撫鎭額餉著照依奏内𣲖定地方徑運解軍前一應轉輸題叅優敘等項俱依議該部仍將撥過數目若干詳行奏明餉部免設莊祖誨著回京另用欽此辭講專部疏題為敬辭講員以專部務事該臣䝉恩陛見之又明日即䝉欽命充補日講官臣時以樞部任宏而侍郎事少冀可補塞勉用祗承何意殊恩㧞司計事繁重填委坐困駑鼯臣私意朝攬金倉之司即夕逃啓沃之寄乃昨二十四日酉時忽接閣𣲖講章期須來朔進講臣隨詣閣力辭而閣臣以臣自承前命不曾效有一言且未奉㫖刋除例難逕行出缺以此臣宜自請恭惟聖明學問日就月將臣每入對殿廷必得飫領大謨而出此豈徒微忠欲竭抑亦顯敎宜承如臣苟可兼綜義必無容自外實以心計既粗無暇精言性命身匏有繋不能兼典衣冠望准所辭别遴能者臣不勝諄切待命之至崇禎十六年七月二十五日具題奉㫖卿學誼素優還著遵㫖供事以資啓沃不必遽辭該部知道宥罪錫類疏題為請行堯舜之術立忠孝之教以饋兵制用濟急拯危事今國用甚詘重之蠲額至五百餘萬而此外撫按察核續請者不與焉阻稽刼失解不時至者不與焉秦督淮撫水師之請增兵益餉者不與焉約畧計之少亦又須百餘萬而兵部所報缺兵不及三百萬臣猶恐邊人執言仍須補伍如此即是有虧無抵往者出入相准猶不足今缺額至四分之一此雖盡傾内帑不能應一旦誤事決裂非臣任其咎乎生節之效逺者五年三年最速亦須一年而今所急即在旦夕耳謀及權宜又多不可皇上聖明具超世之識臣亦儒者有守道之誠蚤夜竭思惟求得乎見諸詩書近于仁義而為之無已其宥罪錫類乎何謂宥罪葢舜典曰金作贖刑呂刑曰墨辟疑赦其罰百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百大辟疑赦其罰千鍰由此言之贖罪之議不起于晁錯而起于帝舜詩書之所稱也葢古聖王好生如天而未嘗不憂國用之匱故其術如此今請勅下刑部自戍遣以至大辟之稍輕矜疑者分别情由等差則數凡戍聽贖十之九辟聽贖十之一此在臣部以為權宜在聖恩惟曰浩蕩何傷乎是乃仁術也何謂錫類夫毁家急公者忠也顯名揚親者孝也今誠令外官四品以下七品以上歴俸一年無過者聽得捐俸餉兵四品五百金五品而下正印三百餘二百朝廷即欲報之無務加之職級惟請給予應得誥命使得贈封其父母此不同加銜復官于國家爵禄不費又其所應得惟早一二年耳于名器亦非濫也而使人子得早致其情于其父母風木無恨詩曰孝子不匱永錫爾類此為孝治天下敎孝者也此二者臣以為堯舜之術忠孝之教而可以生財孔曾復生必亦謂之大道矣要其行之不過二年蠲免罷亦罷幸皇上決計即日下詔施行崇禎十六年月日具題覆奏併餉疏題為乞併三餉為一餉以清餉源事臣于本年六月内具題前事奉聖㫖本内併三餉為一餉以便清稽兼省紊溷深得執簡馭繁之法以後各省直徴收民糧悉去三餉雜餉名色止開正賦兵餉二則依田起科俟事平酌減依議行其易知單式様併分𣲖省鎮司官即詳議來看至罷抽練杜耗糜自屬確論但兵還原伍作何操練責成著同兵部從長㑹議具奏欽此欽遵科抄到部除練兵還伍操練事宜即咨兵部㑹議具奏外又行三餉司官即議易知單式様併三司分配省鎮出入確規限三日内説堂以憑覆奏今據新餉司郎中張鳴駿邊餉司主事劉顯績練餉司員外郎陳扆誦㑹稱遵即公同酌議分配之法察三餉非出數不均則入數不一即配為三分而省直錢糧練餉已于各鎮皆有分撥因議併三司為二司將鎮之繁者搭以簡餉之多者配以少並易知單式様到臣臣復面集各官再四從長商確詳妥實可永行謹將兩餉改名左右二司及分定鎮分與省府錢糧配搭額徴蠲免各數目别牘備開仰塵聖覽易知單式一併進呈伏乞睿裁速勅臣部通行遵奉施行抑臣又有請焉臣按計冊臣部所定天下地畝正加錢糧皆有定額而今聞多寡懸絶自一錢三分以至二錢餘此必有私𣲖沿徴者矣私𣲖者如地方創為㑹計公費名色額外私加者是也沿徴者如本是間舉而沿為永科如榜紙只元年所用而歲以為常鄉㑹舉朝覲皆三年一行而無年不取之類是也請立嚴限勅各該撫按通取州縣開徴欵項數目一一開明報部對勘則百矇俱出矣又徴糧定以毎年四限則有節而民得以休每限定數四分之一則截然而胥不能惑具詳單式統候裁酌飭行計開兵餉左司每年出數薊州鎮月餉銀一百七十二萬一千九十一兩零密雲鎮月餉銀七十五萬五千九百五十四兩零昌平鎮月餉銀三十七萬七千四百九十五兩零柳溝鎮月餉銀二十八萬八千二百三十三兩零宣府鎮月餉銀四十八萬六千一百六十二兩零易州鎮月餉銀一百三十萬三千九百三十六兩零陽和鎮月餉銀五十六萬八千三百四十九兩零大同鎮月餉銀六十九萬七千九百八十兩零延綏鎮月餉銀三十三萬八千九百八十三兩零甘肅鎮月餉銀一十三萬七千五百八十八兩零固原鎮月餉銀四十萬三千四百七十四兩零勇衛營加增鹽菜銀二萬六千四十兩太監公費銀三千兩京營及御馬監牢役工食共銀二萬四千八百六兩八錢京營練兵日犒銀三萬兩京支各項銀七十九萬六千九百六十兩零内供雜項銀四萬六千兩京營勇衛等營料草價值銀四十七萬一千二百四十三兩勇衛京營官軍廩糧米折行糧銀四十八萬兩選練官舍銀二十一萬四千八百兩認還光禄寺一萬兩認還内庫銀二萬五千兩又該剿餉銀一百四十萬三千六百四十三兩零以上每年通共出銀一千零六十一萬零七百四十三兩每年入數浙江額銀一百五十萬三千五百八十七兩零廣東額銀八十三萬一百四十一兩零四川額銀六十三萬六千一百六十九兩零陜西額銀七十三萬四千八百七十兩零廣西額銀二十七萬五千一百四十五兩零貴州額銀四萬二千六百五兩零河南河北二府彰德衛輝懷慶開封府屬各縣原武陽武封丘延津額銀五十萬七百一十兩零河南五府開封歸德河南汝寧南陽汝州一州額銀一百七十萬三千九百六十八兩零此項全蠲訖蘇州府額銀五十六萬五千五百一十八兩零鎮江府額銀一十萬六千七百四十兩零徽州府額銀九萬九千五百三十八兩零池州府額銀五萬三千八百八十六兩零廬州府額銀一十六萬一千二百二十四兩零此項全蠲訖淮安府額銀二十四萬七千七百八十一兩零内除蠲免銀七萬八千一百六十四兩零外實徴銀一十六萬九千六百一十六兩零安慶府額銀八萬七千四百七十二兩零内除蠲免銀五萬一千六百七十九兩零外實徴銀三萬五千七百九十三兩零廣德州額銀四萬六千一百七十三兩零徐州額銀六萬四千七十五兩零内除蠲免銀三萬六千一百二十四兩零外實徴銀二萬七千九百五十兩零順天府額銀一十萬一千一百七十七兩零内除蠲免銀一萬五千一百八十兩零實徴銀八萬五千九百九十六兩零河間府額銀一十三萬九千三百九十七兩零内除蠲免銀四萬二千五百三十八兩零實徴銀九萬六千八百五十九兩零廣平府額銀六萬二百三兩零大名府額銀一十四萬九千一百八十九兩零内除蠲免銀二萬四千一百七十兩零實徴銀一十二萬五千一十八兩零延慶州額銀四千二百七兩零淮安等五倉新舊税并倉助銀八萬四千八百六十兩各衛陞科額銀一萬一千五百一兩零内除蠲免銀九百三十五兩零實徴銀一萬五百六十六兩零屯牧加科銀三萬二千兩鹽課額銀一百一十八萬七千九百五十兩零闗税額銀四十四萬一千六百三兩零以上每年共入銀九百八十七萬一千七百兩零十六十七兩年每年共蠲免銀二百一十一萬三千九百八十五兩零除外實徴銀七百七十五萬七千七百一十五兩零共計缺額銀二百八十五萬三千二十七兩零兵餉右司每年出數寧逺鎮月餉銀一百五十三萬四千六百一十九兩零山海鎮月餉銀七十萬七千七百八十九兩零永平鎮月餉銀八十七萬二千九十二兩零天津鎮月餉預計召買等銀二百三十三萬五千六百五十七兩零通州鎮月餉銀三十九萬五千一百六十三兩零山西鎮月餉銀三十六萬六千九百三十三兩零寧夏鎮月餉銀二十三萬七千八百八十四兩零登鎮月餉銀二十七萬九百三十兩零臨鎮月餉銀二十三萬六千二百四兩零鳳陽䕶陵兵餉銀四萬二千五百四十兩京勇等營草料銀四十萬六千兩扺還冏寺銀二萬兩勇衛營健丁鹽菜銀三萬八百六十兩京營勇衛各倉塲召買料豆草束銀二十九萬兩京營練兵日犒銀三萬兩京衛新兵四十兩月米折銀二千七百一十二兩援兵行鹽銀一百二十萬兩認還光禄寺銀一萬兩認還内庫銀二萬五千兩又該剿餉銀一百五十九萬六千三百五十六兩零以上每年通共出銀一千六十一萬七百四十三兩零每年入數江西額銀一百二十八萬一千四百六兩零福建額銀六十六萬五千七百七十二兩零山西額銀一百一萬六百五十三兩零山東額銀二百一十五萬五千六百六十三兩零内除蠲免銀一百三十三萬六千六百四十六兩零實徴銀八十一萬九千一十七兩零雲南額銀一十二萬八千五百六十四兩零湖廣江南八府二州額銀八十九萬七百三十一兩零湖廣江北七府額銀六十四萬五千六百四十二兩零此項全蠲免常州府額銀二十五萬三千一百七兩零松江府額銀二十三萬二千八百八十三兩零寧國府額銀一十一萬八千六百七十二兩零太平府額銀七萬三千八百六十七兩零應天府額銀二十三萬八千四百六十三兩零鳳陽府額銀二十一萬二千七百二十四兩零内除蠲免銀八萬一千六百九十六兩零實徴銀一十三萬一千二十七兩零揚州府額銀二十萬六千二百七十五兩零和州