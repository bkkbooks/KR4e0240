body:
  text: 倪文貞集卷十七明倪元璐撰贊銘關神像贊吾儒而吾彼氏即彼凡乎三教統資綱紀文豫文人武卑武士凡兹二塗咸曰弟子威爽禁非嚴於律禮吉凶前民疑乎易旨帝王宗之隆於五祀庶民奉之過其祖禰嗚呼開闢以來惟兹而已高忠憲公贊道喪之世忠者死爾上死死忠上忠忠死忠死之忠匪以死止死忠之死不虧國美京貫雞連鉤黨殺士士盡死者公大而禮為士煆榮同文之狴為國洗辱汨羅之沚疇並公忠信國文氏正反相明如車合軌當宋既灰敵墮其祀鳴烈取著所以燕市當明鼎盛閹干其紀避辱取晦所以止水燕市國光止水國體大人之死非苟焉已袁節寰大司馬像贊試之刑以觀其德其平在額試之諌以觀其氣其正在鼻試之賊以觀其謀其洞在眸試之權以觀其壯其強在項試之多艱以觀其力其硬在脊試之先幾以觀其介其高在態腹笥經文起胸庫武戈止手探驪不怵足履虎不嘻身恃之長城面望之景星鬚眉之謂男子衣冠之有精理嗚呼厥象惟肖是之曰照贊黃石齋宫庶為吳淡人太史朱圖松石壽其太君不輪囷不龍鱗不磊磈不偃蓋母貞姝子大儒初荼蓼終難老化霜花為月華書莫紀畫有史豔厥祥未飾蒼笙鏞奏情文茂能言哉吾石齋松何依依湘妃起大風怒祖龍赭之餘色如朱其骨強彌軒翔妃嗟異告姚帝帝曰咄勿翦伐後有娟保歲寒旌其概以斯賚石何家家女媧選五色抵穹隙煉不殘渥如丹其體正日堅定媧貴寶告太昊昊曰嘻慎持之後有賢才補天報其母以斯夀汪生洲司馬先德六圖贊經席一燈揚雄草元童烏旁悟廬陵賦成子斐宵護藜光雙炳太乙分臨是父是子愧彼向歆試邸共被薑肱大共􅀈鴒飛鳴孟宗廣連丁嚶友生父子道同則亦以類共處一衾各標一幟燕臺就祿崔邠脫帽石建浣䄖亦恆禮耳何足以娛隆德大儒傾都所競想當斯時景星如鏡黌署教忠陳留扶風鵝湖鹿洞不為一家不為無用莫慈狐突萬年已忍莫孝王尊王陽其隕左掖疏恩守閣斷鞅貴其嚴節畫箸聚米貴其偉説是有由來子謂伯魚誠寶天章無輕父書南陔愛日以藜藿事仲由嗟窮以要人事延之畏隆亦即顯名載其元致陔蘭陵華一日千䙫贊陳章侯畫夀兵憲王園長圖作古貴公衮冕嚴服立喬木之下臨水泓然旁列竒石石上紫芝數本釋其華軒而巡阡陌蔽芾翹薪將無召伯循兹渚陸以擬遵鴻衮繡赤舄將無姬公其必有圖牟彌夔州觀彼壘石將無武侯其必有侶東園夏黃餽以紫芝將無子房婁江張虛宇翁像贊情之著形譬火著氣處燧而幽附薪而熾雖洞重垣之目不能以疑其偽父之傳子譬水傳器注瓢而清灌鼎而貴雖辨淄澠之口不能以離其味是故我瞻虛翁廣顙敦頤淡乎無懷葛天之容而知其中之誠然我交天如奧學深文岸然天祿石渠之宗而知其生之有自封吏部新安呂紹中翁夀飲圖贊酒馨旁皇一客二主尼山之樽陳於矍圃公裘揚觶序點致語壺公之筵陳於樓廡麻姑倒囊方平劈脯東西各招呼得六則飲汝一飲孝事親二飲動守矩三飲道延嗣四飲超俗處五飲無滯骨六飲德機杜呂翁岸然次第以舉千人萬人􅌓眙耳莫或敢取馮禎卿諌議畫石贊石習馮子其端如士馮子習石其直如矢故馮子之出則崢崢入而諤諤者靡不石而石之小而堯堯大則學學者靡不馮子畫之為道傳神而已其一天祿晝眠支機夜怪米顛有云豈得不愛其二尊嚴擬丈盤固應侯鮑龍跽咏遏士致謀其三靜質嚴骨竒形正體得道以安其夀莫紀其四此老倔強與我周旋但揖之耳誰曰拜焉其五頑頑憨憨不可以仙叱之不起試與一鞭百歲翁商景莘像贊仁義拄其胸詩書皤其腹暖不染之衣飽無求之穀坐淡泊為窩聚歡喜為族經綸在婦麻笙簧在兒讀不入朝何憂不入市何辱田少吏不喧病稀醫不促循此之道離垢合漠可使安期扶輪羡門捧轂而僅乃百年及期而足者此亦由其逃囂保清心壓塵俗而其於世淡然不以生為可欲其二聞曰火滅修容恭必夀又曰敦其行其於言無所不信是以眉耉又曰遍為爾德則如松柏之茂又曰無勞爾形無搖爾精乃可以長生視久又曰聞道而色若孺秀蓋今觀於景莘先生而知是數言者則皆不謬矣題彭天錫像贊不可處之朝廷此非豢龍不可置之巖壑此亦非冥鴻孰謂詔使之可圖薑子而虎頭之能貌謝翁不林不市者以此御空亦衫亦履者以此遊通是故麋鹿之羣亦子之金馬王公之門亦子之牆東有五嶽之氣有九淵之容吾昨日揖其人歎乃生所未見今日禮其像如故人之再逄天下之難遇而易交者其惟是公朱龍巖翁像贊翁諱廷機龍巖其自號焉朱氏為姚江著姓世敦孝友而翁尤馴謹渾噩落落有古風娶陳孺人孝廉紹先女也文史相莊偕老八十有贏豈非先民之遺矩末俗所心儀者與某與嗣君京翰同鄉薦不自鄙其詹詹者為之贊曰德滿如其頄學廣如其額雲夢胸吞星辰手摘智何在在巖電之碧義何在在霜髯之戟銘師恭夀才任履屐百城之富禪其賢二酉之藏世其澤擬翁以地行仙人而不可得測者悉測之矣為此圖者殆亦荀濟周昉之匹與豳風八圖贊為蔣八公宫庶太夫人夀一章耕饁有見冀缺相敬如賔一耕一饁可以觀人二章求桑此弱女子西陵功臣中襄衣被下教絲綸三章載績敬薑朂勤漆室懷本得其道者彰施補衮四章纘武獵武多功獵文多藻不如獵德獵德難老五章室處智足逺患道在持盈入此室處是以攸寧六章介夀雙成奏笙飛璚擊缶胡麻青精何如春酒七章播穫穫播相環貞盡元起甲子十周周又復始八章鑿冰藏冰啓冰隂陽道浹請進一觥坐觀調燮夀胡母徐太君十贊有引徐太君者不櫛之巨儒操績而談道者也彤管日書不勝紀德絳幔如設可從受經迹其畫荻功成湔裙兆應煉華才以熊膽告成器于龍文聖善之能于斯已炳矣行年六十方猶始孩寶婺之輝連乎南極軒權之象正于西華閭巷方將宣引曼聲侜張廣論而元璐原無史識不善巫紛又以調奏高平未宜繁節風存靜穆取副徽音極汰千儀淡形十頌實不能發東野草暉之義助季偉雞黍之歡爾康爾長載歌載咢云爾其一太君父景雍翁茂儒名德登第之年太君適生里人謂之胎貴生數歲慧整不常執其麻枲組紃為本事而旁通儒典不迷指歸宗姻見者皆嗟歎曰此亦女士必至高位也贊曰珠含于胎而其岸榮是希有寶乘瑞而生乃生女子載弄之璋夫何以故謂其非常其二太君事父母婉娩盡孝事尊章如其父母勿逆勿怠大虔滫􅔱小毖唾洟人謂此曾閔也特戴幗耳或曰太君之道從熟讀內則來夫太君或未必讀內則而讀內則者必心慚太君矣贊曰曹姑著經以儀孔曽太君之學得其至精女必傷悲婦容和喜笄縰縞綦英人孝子其三太君年十八歸太公太公好修篤學太君佐之䌟􅀈太公以是成名儒太公不第窮困亦無北門之謫詩曰琴瑟友之又曰左執簧右招我由房此言同德者有同聲同聲者有同樂太君夫婦有焉贊曰鹿門蒙山謂之靜友先生太君干鏌之偶不羞椎髻道追孟光不泣牛衣心笑王章其四太君感月華而生聖遊聖遊出胎英著於啼其後聖遊盛文章矯名行蓋其兆見於此矣夫月者盛臣之儀體貞貢華宜著文節又月為天使故聖遊之官以皇華發軔云贊曰在月為華在人為秀蟾蜍匿蹤石麟乘候孔釋抱送虎氣騰上出胎已竒何必其長其五聖遊生而秀異有黃童無雙之稱太君教之倍嚴庭立聖遊既頴悟意似傲然不屑苦讀者太君曰學不加功終為天誤耳或謂太君母也何事嚴太君曰家人嚴君父母之謂也贊曰陶母截髢孟賢徙舍豈曰天挺匪教是藉逺援祖德近引父書母也天只良士瞿瞿其六聖遊弱冠以其戴經魁天下名噪一時授官行人奉使命便道歸拜太君膝下太君受拜已容色如平時徐徐問聖遊專對使四方往所誦詩今得力否贊曰凡有子者盡矜青紫女士母師志不在此使於四方嗟乎慎旃壯而行之詩三百篇其七聖遊輶軒遍天下盡職精能三年奏績上天子以為才下所司大報其自豫太君象服如山如河太君對揚稽首起顧聖遊正色曰致身爾職也即不然盍為而母圖報德乎贊曰天子葵之副笄六珈太君戰戰曷敢以夸孝治至仁永錫爾類教忠至言靖共爾位其八詔求諤士主爵臣曰莫如行人臣某才節第一請召為禮科給事中報至太君不喜曰此七尺非兒有矣已而忮者齕之中以危法太君不懼曰兒無罪天王聖明兒不死也贊曰有才鞺鞳雲臺所攀以憂范滂而不啓顔有讒哆侈同文可懼以信曾參而不投杼其九於是太君年六十矣堂萱護榮勝朋雲會或祝太君曰請得聖遊即受命入補衮闕畢其功能揚太君之聲於天下太君因是以御板輿覽王畿天子名堂公卿避路聖遊因是以益安意竭忠將太君所云報德者其在斯歟贊曰敬進一觴為衆母母帝曰欽哉豫有奔走追鋒車上宣室席前此關平治能無輾然其十或祝太君夀太君曰謹辭人曰不然德之取年猶燈取影故集千燈即得千影也太君苟厭多影何為益燈不已乎請得太君以河圖中乘之數六十其六十者為地行驪母使天下知有人瑞國華理固有之願太君母讓贊曰又進一觴聞曰仁夀理與數謀神足形守坤厚永貞亶其然乎姊呼戴勝兒畜麻姑周孝愍贊光祿周公應中女孝愍抗節死而不欲發籧施之愧君子以為孝也頌曰有健女子履仁蹈義蹈義者何死以晶志履仁者何死以冥事志晶道光其節之遂所以閔凶吾不得涕事冥聲銷其孝之祕所以籧篨吾不敢刺昔皇甫婦死豪強贄其詈申申弗之有忌昔秋胡妻死夫非類其嗣琅琅於何肯閟若夫尨也變從中吠若夫雀鼠獄將上治夫何言哉默然而斃嗟周孝愍千年寡二孰為之先曰清白吏以彼鬚眉照斯袿帨硯銘有序廬州許芳谷太守治越三年夜夢蘇文忠公晤論周旋旦起童子援鋤叩垝得石乃硯也題曰天然而其隂有文忠小像宛然夢中鬚眉云原夫東坡百世之士元度再來之人乘願現身秉道役器所以薪傳五戒石顯三生飛怪虹文奪竒風字通魂表相神明之交也知其象以徵廉亦比晉平之石見悟夫彼即是我祇為合浦之珠歸則有然者乎夫文通筆夢寐覺不可得持孔章劍華化去竟非其有豈若明懷其寶永挈為禎僧認李源灼因緣之可見奴依頴士欣奧博而不遷者哉是故異而銘之銘曰眉山之叟誓之來生爾覿鼎山之父識之前生我迹龍山之靈畀之是為三生之石開夢於先現身其北蓋夫考諸而不謬質諸而無疑百世俟而不惑五簋享銘飲食之事而有江河之憂我輩不救誰救之者天下豈有我輩聚會是飲食人詩云以燕樂嘉賓之心言燕賓宜娛其意也謹參往謀條為食律八簋裁詩三享廣易天數地數情文已極彼君子兮噬肯我適文以美名賞其真率一山一水清音下物德義之交文字之客主賓陶陶或飲一石其二生行樂耳匪師杜康胡謂珍錯羅列盈眶登山臨水曵杖褰裳興至則往恐驚十漿夫惟簡朴名美用臧朴則豐潔簡乃精良以少為貴豈作於涼五簋十豆惟酒無量安燕不亂守之以莊永朝永夕葛天之鄉倪文貞集卷十七
