body:
  text: 倪文貞集卷八明倪元璐撰序賀趙明宇巡撫晉大司馬序我山左一區歷世共奉明脂怒斤扶其大脈者也然以宅圖言之漢唐宋宅雍洛而我宅燕則已異矣故以山左之譟被於雍如喝左耳不必墮其右聰於洛如擊齒及舌舌掉可避也於燕即如按肩者頭不得起夫元亦猶是而稍殊焉元郛山左而闥盧龍我固反此矣且元之饋仰海而我專仰漕仰海則山左處臂仰漕則山左處喉者勢也往者天下之亂多起青兖動為妖弄孔孟坐其上而張角韓山童唐賽兒輩燈傳如此日者壬戌之嵗徐鴻儒飛一瓣香衡衆百萬蜂拚蟻結奪城邑盜名字時方左怵籬風右驚壁雨而火發自其中庭中外震恐豫憂宗恤緯既兩有之而抱危者二焉倘使賊釋鄒滕不攻疾雷趨兖振塵可下據濮有曺雞連汴孽西斷清源南塞泝海又以十萬綴於武定遏薊門之衝我援兵不得出涿鹿大江之粟不得入淮徐腰絶膂分全齊非我有也其次則併衆襲有萊陽負海為固我亦坐困二者幸不出此然遲之將必出此者勢大則握鋭時久則豢智亂人之檣豪雄所托載者也於是大司馬趙公仗鉞兹土則三年矣元老克壯丈人以貞霆擊飈驅層圍解鐵迫脅山鹿束於篅笯用使毒獅失據詭錫墮靈不度五旬執渠以獻昔者張角已灰火傳波渚山童既柞蔓發劉林斥蠁批萍應手旋合未有根犁株絶若此蕩然者矣當是時天子為之歌彤弓曰汝作朕司馬階於三孤延賞世世夫天子以為扶肩樹臑是使其頭不下控也而或曰㢮未雨不戒格白徒不武夫廣教召徒結積數十年此必決之勢矣毒藴於中善治者厲劑攻之使散於肌節不然不潰腸不止而曰白徒是畏虎暴衢不懼狐怪其室也往代之禍什九中盜一中邊耳靖康何局尚延十葉揭竿之呼大命隨去秦漢可知已故徐賊之禍其難倍於黔蜀且夫黔蜀之貫氣於山左猶一縷也今山左之息微微公在中樞猶當引為本計在還其所為明脂怒斤者而已賀王符禹中丞晉南樞序山左之罣於妖難也岌乎龍蛇之紛蕩而走陸矣賴上神武發其聲靈知人善任連獲虎臣初則大司馬趙公載斾而抗稜於前既則今中丞王公秉鑰而見休於後趙公定亂之才健奮以耆其功王公安人之略沈幾以作其敗何參相屬淹琦並歌要以坎既平而置叢道已濟而喪茀王公之時則有未易者矣夫病疽者毒盛內攻大命將撥彈銼之施快其一決逮毒出病已息微氣索餘蠱之威或散肌甲虛中弛扃邪隂竊發剔之精銷豢乃藴孽斯則圭針之所以處鈍俞跗之所為若怵也故以鯨鯢既蕩弓矢既櫜而任者之難則有四焉京觀之崇澤殣亦量弔戰場而欲慟賦蕪城而足哀新豐之未可驟規難一也訛言莫懲驚魂猶蕩築城駭南詔之騎持藁行西華之籌顛濤之未可猝平難二也邊關之饋徵米粟於絳河輶軒之蹤責資糧於楚館眢井之不可得汲難三也方勝之兵一日免胄則民畏賊已勝之氣日日擐甲則民又苦兵危關之不可得寢難四也此四難者修廢之功勞於闢昧綏愚之術艱於擊强掘鼠之供費於牛饗防下之情紛於慮敵然而自公為之既勤止矣條廬策井以定其棲區塍理陌以修其業收孥引屬以萃其類請蠲丐賑以蘇其息簡將飭士以壯其衛申紀嚴律以明其制左握芒黃右操鍾乳毒亦既盡脈亦既起於是乎鴻羽解肅鷹眼化憎流者以復居者以輯青燐化為白肉赤地載其黃粱商旅之赴其塗者無喪厥斧賓客之宿其傳者有授之餐視履之模還其有蕩冠帶之勝起其大風矣昔魏博恢既墟之城涇州歸已逋之戶濟屯之功不其然乎當公金城圖上之時亦有武賢異同之論或主大招流亡而歸其業或責窮搜逋賊以致其誅夫叢雀已定而召鸇致爭風鶴無聞而望鴉駭敵故衆聚則不可麾兵出而無所獲斯咻者之害成非公之所任也然竟以公靜安有謀轡銜無失故雖小沸洲渚不至連山此豫所謂安人之略沈幾以作其敗者與斨斧在東二年天子嘉之擢佐南樞使觀大江之風察大本之地然且促召公矣自豫素知公孤騫之節喬松絶援嘗昌言於朝謂公必辦賊而至東土彌嚴一介裴寬之鹿瘞於中園苟晞之牛不走都市靖共爾位屹屹而已夫骨立則失其程李道光斯誓於馬羊自負志之士赴功之英未有頤觀股隨而能成其務者也公既將得代其部吏藩臬諸使者共徵詹詹使揚其伐豫不辭固僿操莛發鐘亦猶是我東人章甫所已哦衮衣之習唱也賀許平逺兵僉晉督學序天子御極十餘年間任才求功道亦百出矣辛壬之際天子尚文許公應時飛苞躍采雲霞蒸煥河無竭源當此之時天下之文皆歸許公天子曰都可使治賦乃畀之節俾鎮甬東已庚以還天子貴武許公受事抗稜執律雷霆嘽啍海無沸渚當此之時天下之武皆歸許公天子曰都可使治士乃授之衡俾量全越嗚呼天子之用才神明若此者非聖人孰能為之乎昔者姬公明道使制禮樂禮樂既定命以東征東人歌之曰既破我斧又缺我斨畢公知兵使為司馬司馬既效屬以訓典康王誥之曰政貴有恆辭尚體要甚矣周之盛王用人之明也用其臣精微之心以除凶定亂用其臣貞栗之氣以範俗制辭是故戰必有功教必有造今天子亦不貴以武士治武文士治文前用許公以其儒者後用許公以其師貞丈人天子之心以為文武之道如燧日之相取也奎璧比躔而圖書文章斧鉞陳壘錯然參居不相忮害天垂象聖人則之吳子曰總文武者軍之將也推而言之亦可曰總文武者士之師也今許公方始受命鐸雨在握莪芷未敷而某推測小明大約許公之所務為功者二而已其精之必以其誠正之學其粗之必極為文章之謀且夫世甚急術而不以誠正為迂世甚急功而不以文章為末者此惟許公能明之也昔者考亭入對或謂之曰正心誠意上所厭聞考亭不聽曰生平所學惟此四字庸人必謂考亭無救於弱宋然即不知誠正之亦為兵略太公曰二心不可疑志不可此言誠正也穰苴曰慮定心强尉繚曰心動以誠此亦言誠正也夫不以太公之徒為拘方而獨非笑考亭可乎昔者史遷思托無能之辭見於後世桞子曰感恩報國惟有文章天下皆以史遷桞子放廢寄懷然即不知文章萬夫之力是為功能孫武吳起務為攻戰者也亦治文章管商務為富强申韓務為名法者也亦治文章夫不以孫吳之徒為廢務而獨譏薄史公桞子可乎且夫吏之文從一從史徐鍇曰此以言乎其致一學文以治人也是故凡吏皆以其學與文治人况學使者乎今鵝湖鹿洞輟講於下上林長楊絶奏於上堯舜以來之道脈典謨而降之文心不歸學使者將誰歸學使者不正士誰復能正士者然而他人之於道不必已有而文不必衆著即教士教之學為古人耳許公之於道與文身之也士之學為古人者皆得近取而學為許公學古人難學許公易譬之貌人者立其人於前必易為照於其仰思夢見者也是故吾量吾國不過期月文且大起更益三年將相大儒之才灕然俱出矣當是時㑹稽之郡大夫王公關公聞天子之命許公也奔告某使為歌誦之言某謝不敏既而曰詩有之矣乃歌旱麓之三章曰鳶飛戾天魚躍于淵豈弟君子遐不作人請益又歌江漢之亂曰明明天子令聞不已矢其文德洽此四國蔣楚珍司理奏績序蓋書吕刑曰伯夷降典折民惟刑蔡氏以為詰刑而援伯夷此明先王之以禮制刑也易噬嗑旅豐賁四象之設皆言刑也洪氏以為噬旅上卦為離豐賁下卦為離此言聖人之以文明表獄也由此言之刑獄倫要固非法吏之所能權也臯陶之謨禹曰在安民又曰天聰明自我民聰明天明威自我民明威蓋其事民之嚴也而其制為五刑墨劓剕宫大辟之屬慘深周設安忍導酷若自臯陶始者然而臯陶之為此由其至仁篤惻以為吾朝張羅而民暮罹之此吾自戮也吾以為其法攸灼必使民翻然逺之懸踵莫下若張空羅者故曰有刑民之獄而無陷刑之民皋陶之制刑也期於無刑世之所為明清審克者無貴焉是則聖臣之所務而非能臣之所為也以今泯棼鴟義日恣宜得邦禁大臣及郡國聽稽之吏力求皋陶之道而行之天下猶可得不亂也金沙蔣君為李官於台者三年既有成矣當此之時其民之歌原田者萬大凡曰惟良其屬吏之賦緇衣者百大凡曰惟察顧吾以為是猶區觀未測其際也始吾拔蔣君於雍其被服造次必於儒者既而天下竒其文章以為董賈復出以是臨政使之治民豈不有其道德精微者乎故以蔣君之司刑聽其言也觀其行事則有五道焉蔣君曰國重征則民多獄國重征吏因征為家則民多獄國雖重征吏不因征為家則罰不及下所以貴潔正心絶源一道也蔣君曰國叢蠧則民多獄國叢蠧吏因蠧為神則民多獄國雖叢蠧吏不因蠧為神則罰不及下所以貴著暴情見光一道也蔣君曰國尊豪巨則民多獄國尊豪巨吏因豪巨為權則民多獄國雖尊豪巨吏不因豪巨為權則罰不及下所以貴貞制氣禁非一道也蔣君曰吏不能教則民多獄吏雖能教而因教為厲則民多獄吏能教不因教為厲則罰不及下所以貴通貞志類物一道也蔣君曰吏不能富强其國則民多獄吏雖能富强其國而因富强為才則民多獄吏能富强其國不因富强為才則罰不及下所以貴大務本正謀一道也嗟乎此皆皋陶之道也禮也文明也上虞令吳五山德政録序天氣致嚴而作肅則歸溫於地德此君臣之義也舜以誅殛治天下而其諸侯揆事布教以著其善和元愷之德孝宣之震厲自漢盛時高文景武未有能及之者而其時最多循吏民用以安故夫漢宣之治非猛也有桐鄉渤海潁川河內之徒保障煦沫以厚施其鍾乳而廣饋粱肉雖大誅日出元氣彌蒸其民愈附今天子明聖以精强果遂之心滌剔天下而吾吳侯應之更用樂只以大治吾虞列國之長能達天子求治之心則未有如吾吳侯者矣夫天子之仁心甚充而靡有匱歉也而今者法紀中墜寇賊外興急兵兵絀急餉餉匱此雖使黃帝持繩老氏執矩不能不以嚴為本計嚴者天子之以治吏也天子以為嚴吏顧可寬民然今者吏畏嚴而遷嚴於民使民知嚴則吏之過也自豫所見魚頳馬竭鴻嗷鳥嘵幾遍天下而歸視吾宇桑麻不驚歌唱四作故曰列國之長能達天子求治之心未有如吾吳侯者也且夫謳吟者精神之致歸也天下之治敗於歡虞而緇衣之頌夜輿之吟聖人則登之於詩著之為教是故吾民之歌吾吳侯可得而言之矣民歌吳侯曰􅠡厥薤本撫我柔桑去其害馬馬是以臧此言禁强扶良也曰有劍鋩如剸犀截兕有繩犁如分肌擘理此言決察也曰不脂爾躬而脂爾土不塵爾心而塵爾釜此言至清也曰我臥于于我覺徐徐雖更千世無遷我居此言無苛政也曰東門之蒲其葉旎旎伐以為鞭民生其耻此言德化也曰鐘則以扣冶則以鎔猗歟文翁化蜀之功此言教士不怒也曰大鑑之懸孰或欺之大炬之燃孰或迷之此言握照燭幽物莫遁也凡如此者結於至誠發之無意余既得而聞之則必正告天下使知天子精强果遂之心托於循吏之政適為樂只如此且夫君子之事君也乘其朝氣以致功達其仁心以遍德世固豈有有君無臣者乎壽外母王母袁太孺人六十序夫貞剛之氣天地之所甚寶也其著於人為義節凡為男子而不必有婦人之態為婦人而有士稱者莫不取諸此所以天下之庸男子百不如貞婦貞婦之道主其隂靜以奮為陽昌此天地之備質純氣非一往之概一節之竒可得而為也是故其風足以維世其理足以勝數余外母王太孺人之以苦節著里閈垂三十年余幸得為太孺人壻習聞其內行嗟乎中材之士安所得骨升氣立如太孺人者乎太孺人及笄歸石穀先生先生篤行專讀不事家産挾策上帝京遂以客化當此之時太孺人年未三十琴鼓禍乖舟河淒泛鴟摧子室燕迷羽音荼蓼在前窞棘承後頺風恐懼隂雨漂搖天日晝昏鬼神夜泣顧復忍死撫存雙孤指挂手經取贍晨夕及孤稍長自為之師法律詩書因才而篤既各成振世稱二良故以太孺人為之男子是使荀豫歸忠嬰杵讓義賁育愧勇召管謝才而其在古賢婦人之間駸駸乎與共孟齊驂敬姜懷清而下盡可列之兩廡畜為衙官也蓋余又嘗竊聆太孺人所教其二子者其言曰無以貧士降其志無以卑寮墮其氣其教其女則曰士有諍妻豈必無違今夫志氣者堅士以為難持强諍者藎臣不能終勵而太孺人噩然著之為操績之切謀送門之密誡於是其長君文學得之以升華藝林矜矯自貴次公明府得之以搴壯從事廉健不撓而余婦王安人即太孺人季女當余備員史局中多感慨指畫所形動觸威責方草未發親朋知之者色動舌出撓禁千端安人初未知已聞羣譁顧謂余請得一涉指歸余示之草乃笑謂曰君語平平諸君何事須懼即如此遂爾驚天震地豈爾輩男子真僵蠅腐草耶其後余雖由此得禍乃更相欣一時聞者並賢安人非復女子誠不知其教之有由來也太孺人之教其子為男子必不敗之以婦人之慈教其女為婦人必責之以男子難能之事嗟乎豈不誠丈夫然哉於是春秋六十凡宗姻之揚觶而言者皆將舍貞婦而稱夀母以為歸貞於太孺人將必有恫焉懼傷其意余曰不然易曰苦節不可貞蓋言其心之以是為苦則貞不得成今其節已貞矣是必其心之甘此而為之也太孺人既已往否來泰而又舉其中心所甘者推端理緒而陳之此雖使雙成奏笙其前禮珠揚歌於側睍睆好音詎有娛於是者哉且夫天地之氣莫不以其嚴蹇為之凝翕强忍握固所以長生老氏以為舌存齒毁不知其肉殤而骨夀也詩曰如松柏之茂如南山之夀蓋言貞恆也不知其貞何由知其夀乎倪文貞集卷八
