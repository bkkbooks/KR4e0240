body:
  text: 倪文貞奏疏卷二明倪元璐撰救四纍臣疏為試典告成纍臣可念懇乞聖慈宏開法網以章至仁事蒙陛下鄭重武科創興殊典臚傳之後一時翕然以為得人最盛臣元璐承乏受命從同官方逢年後飲冰惴惴幸觀厥成昨者宴啓彤弓與沾寵瀝志意歡忭既復愴然則有感於前主考監試楊世芳等四臣之蒙繫未釋也夫四臣之罪則有之矣在監試余文􅀈馬如蛟不能特設科條而因仍已事在主考楊世芳劉必達不能細繹明旨而過拘小嫌若此者罪也然臣謂其可原即在此何者監試二臣所收之技勇非真技勇也由於刀劒跳擲隨武人所自呈而文臣不精武事苟見可觀不暇深求其實主考二臣所遺之技勇非以其不文也以其犯諱涉嫌為明旨所未及而武場拘以文例自謂敬謹不知反涉於違總之事當創始未易精詳若夫情弊悖藐則四臣所斷斷不敢出此亦舉朝所共欲百口保之者也廣場耳目共屬聖明毫髮難欺功令方新天威孔赫雖復至愚極頑豈其利害之形蒙於襲石軀命之事等於飄風而敢肆倒顛公行藐玩者乎即如主考二臣回話之遲亦緣誤認聖旨文武二字為監試而設不敢輒擅啓陳因拘成錯皆如此類耳況今陛下所特拔鼎元王來聘即前榜所收技勇文章四臣皆能識之亦豈可謂之不得人哉至於四臣生平如楊世芳劉必達之清謹端方詞林推重而監試二臣之在柏署亦錚錚有聲其馬如蛟又以按蜀報功方在敘賞之列伏惟聖仁如天曠然出之幽囚加以薄罰即欲懲誡而以侍從執法之親臣纍拘匝月亦足以示辱而人知所懼矣臣以承乏踵事頗知詳實冒昧控陳伏惟聖慈矜察崇禎四年十一月十八日具題奉旨本內事情已有屢旨俟法司問明不必申救該衙門知道讓官黃劉疏奏為學行第一詞臣宜留史局微臣自揣不如懇恩換職以全器使事臣聞常才易得竒士難求故席前宣室有吾久不見之言賦奏上林興安得同時之歎彼皆中主有此勤拳況以陛下理學文明首出千古龍雲道合適有其人而坐使淹沈實可惋惜伏見原任右春坊右中允今聽降黃道周學行雙至今代所稀觀其嫉俗多忤至清絶塵禁近十年日益貧寂瓶鮮儲粟厨或無煙此皆中朝所共知執母之喪廬墓摧毁里衆見者並云曾閔復生其學原本六經博極羣史旁串百氏而澤於仁義道德之旨所為文詞宏深竒典上凌數代西漢而後莫有其儔然又精洞時宜務為經世有用之學自天文厯算禮樂名法邊籌財賦往代今朝典常興革出其胸手悉有成謀陛下試以清宴之暇召見文華或給筆札使條所蓄自可倚馬萬言坐躋賈董此誠天下竒才天為陛下生此一人使之仰佐天章黼黻一代不可謂之偶然也在今日聞臣此言或以為疑所謂世人貴耳賤目耳若道周死後數十年天下之推重必有甚於臣言者臣雖愚悖豈敢以身觸雷霆過情奬物即陛下釋之不誅臣亦懼為後世所非笑所以推舉本由至誠且道周前因疏救舊輔錢龍錫忤旨降調未幾而其言卒行是則陛下之知道周久矣當道周抗疏之時同輩聞之並為危栗而道周以為惟聖主可與忠言侃然進説此誠至難臣謂陛下今日用人惟當取其伉直有氣節者今人多畏禍自顧其身家又間者中使銜憲四出動以威倨上官之體加於庶司臣懼海內士大夫之氣必化為繞柔陛下又可不式怒蛙重摧折之乎然自道周既獲罪而一時論者遂有摘其試録議及科場以其經史為子書以其精詳為孟浪此可歎也又臣仰窺陛下勞於求賢睿懷孜急曰安得不貪財不愛官不徇情面實心任事之臣而用之若以臣所知自黃道周而外又有原任順天府尹劉宗周者清恬鯁介其學行正類道周而宗周居尹釐之職則盡力尹釐道周守文史之官則致精文史以此二臣仰符側席猶圭璋之合也今宗周既以骯髒投間道周亦以蹇諤承貶天下本無人得其人又不能用則安望天下有為陛下奮其忠能者乎此皆諸臣之過非昧則忮不以告陛下耳臣聞制世之道非有他端其上用必當材使必稱器其下愚者遜智拙者推能則天下自治臣自量庸劣逺遜道周自道周蒙譴以來臣內愧氣失因其有科場議處未結縮默至今頃經部覆奉旨是臣披胸見心之日矣誠以臣在詞垣有如鳬鴈若道周者使之大承顧問小效編摩必有補益度越時賢陛下幸聽臣言還道周原官而出臣於外承道周所應降官級此猶棄碔砆得良玉也昔孔璋請為李雍代死栁宗元以劉禹錫母老願以栁易播今道周所遭不至死徙而其才又逺過李劉即臣自處亦實羞出孔璋宗元之下且臣自謂聖朝用人及史局需材之計非為道周惟聖明垂察崇禎四年閏十一月十九日具題奉旨黃道周已有旨了不必代為陳請該部知道乞歸省疏奏為思親患病不能供職懇乞天恩俯容歸省事臣本憃愚遭逢聖世翺翔禁近十有餘年清切從容莫如斯職天地恩重去此無家日月之光尤人共戀故從筮仕至今除中間兩奉差移未嘗一日稱疾求便獨今以屺閭極念奄遘沈疴百療不能乃思歸計伏念臣母太安人施氏行年七十有二體素癯薄不任逺行臣官京師十年之間凡再往迎不能一至崇禎二年伏蒙聖恩升臣南京國子監司業幸以去家一水然猶良久始就潘輿相聚既歡臣於此知古人捧檄之意不悟隆恩無極驟又量移時值聖明宵旰臣母子難同行止自合分裾臣母素賢通曉大義自臣偕計到今二十年間凡六七别率皆中坦歡顔獨於此行雖誡勉再三而涕淚已出臣既就道中懷攣攣凡十餘夜不得睡寐抵都雜以塵勞怔忡陡作自去夏五月歷秋涉冬肌肉日消見者憐駭然臣猶自恃中強勉趨朝謁延至新春寖增危劇不復能興先是有臣所知察臣氣色謂臣憂思拂亂不治將深初不謂然今已驗矣京師如海然獨無醫即幸有醫亦無治臣之藥臣魂逐親廬而求生都市雖使盧扁傾其上池亦豈有濟哉以臣迂拘木強不能逢時纂述舊聞無編摩之效感歎時事無論思之功即使其親未老其身不病猶當引分求罷以誡侏儒況負烏私命危朝露疾痛如此能不呼天倘蒙聖慈矜鑒立俞所請俾得就此春和生出國門生入里門一見臣母縱填溝壑靡所憾恨所有承派實録先經力疾纂修謹一面繕寫次第完繳無敢荒率緣伏枕間恭遣義男倪安代齎具奏上聞崇禎五年二月初二日具題奉旨倪元璐纂修未完且新補講員著照舊供職不得陳請該部知道再乞歸省疏奏為微臣思親無已積病日危泣懇聖慈垂矜允放事該臣於春初因思親患病具疏求歸伏蒙聖恩以臣新補講員不遂俞允臣感激惕息從此不敢言歸會值春講初開臣因力疾出而供事馬背藥爐時用黽勉延至五月八日已不能支乃始移文注籍杜門調理凡臣所患之症雜亂多端怔忡不已繼之脾淫脾淫所加甚為痰注然以臣悉法調劑積月之功稍漸寧脫深冀秋清爽然秋講又開此臣引吭揚忠之會矣不意七月二十日通體蒸熱若萬斛之火投於乾木頭痛迸坼如被斧槌如此三晝夜臣既昏然諸醫雜進測寒測熱疑實疑虛溫涼補㵼各隨其意復四晝夜有加無解家人環號臣於是屏藥不進又三晝夜雖外火稍紓而中焦藴隆彌積煩悶生死之事實未可知轉盼經筵臣復坐誤治以曠官臣亦當罷也伏乞陛下鑒臣真實放臣生還臣觀諸醫藥籠所有無不為臣用者而不能治臣臣之病其非湯尉所能攻明矣小人有母生死相依惟陛下錫類至仁惠臣大藥臣不勝嗚咽待命之至崇禎五年八月初六日具題奉旨吏部知道三乞歸省疏奏為天恩甚重臣病實深補牘申祈乞允暫歸就醫幸蘇殘息事頃臣患病哀陳徼恩下部吏部覆臣病真應放奉聖旨經筵史局需人倪元璐著恪勤供職不準回籍欽此臣從枕間扶掖拜誦溫文悚感涕泣小臣蟣蟻荷注諭留聞者悉驚以為異數臣自分即旦暮死忍更言歸既又圖回臣病多端而怔忡脾注為甚自客夏至今百療不瘳今年從五月杜門調理凡逾百日反致鬱火蒸騰幾即危隕近幸火怒稍衰而心脾本病乃彌沈劇自與人語至一再往復或小注思即悶煩中戰如鹿駭奔仰視屋梁動旋如蕩一燈熒然望猶黕漆臣心知此候非佳日抱憂懼然臣所以亟請求去既由思母亦以京師鮮醫自嵗餘來延召數十水石罔投臣鄉中有名醫孫一臨凡遇艱危之症應手即除今其人老矣冀及其未死就與之謀苟其刀圭有靈臣事陛下之日甚長也故復昧死從陛下乞一年之假臣遭際聖明備員侍從論思啓沃出則徼有事之榮偃仰棲遲入則享無事之福自盈朝鞅掌奔命之士企為仙曺身非土芻胸心並具獨何為背違明主厭薄榮名釋其鳳池之安而波波道路乎哉陛下仁覆天下其於文學近臣諒尤軫體必疑臣假託請令詹事府堂上官公嚴查勘果為欺罔規便雖承大戮所不辭也緣臣虛羸不能車馬舟行蹇鈍轉眼河冰所為急呼亦慮窮途之哭伏望聖慈矜惻俞臣暫假就醫從此餘生皆陛下所賜臣見經筵林列皆賢者又臣所承派實録既告成繳閣纂修之事亦不需臣臣即留不過保殘視蔭縻大官之俸已耳臣不勝哀切待命之至九月初三日具題奉旨倪元璐既係真病著在任調理不準回籍該部知道四乞歸省疏奏為講筵暫撤子舍久離申籲聖仁錫類歸省事先是崇禎五年臣以母老身病疏求賜假省親就醫自春涉秋凡三瀝請終不蒙允重以溫文臣感激殊恩遂且抑情忍死冀踐一期乘間補牘不悟昨嵗日講缺員閣臣據資以臣名上奔辭不逮旋奉俞綸臣自惟碌碌簪筆十餘年無所效誠得稱引古昔攄竭工瞽或亦臣母聞而喜心以此矯勵少紓明發今歷春冬講席再撤而碌碌猶初是則臣智識淺渺納誨無能之明驗也既自慚赧烏私益深當臣始陳臣母時年七十二衰矣今又二年豈反益壯又臣向以離養三年鬱陶病困幾至危殆今積五稔豈更泰然前日陟屺叩閽之心置何地乎臣嘗讀詩至四牡之章其臣不言而其君則為之言曰是用作歌將母來諗春秋左傳穎考叔懷羮遺母稱之曰純孝由此而推使其臣自言必益軫體而有食於君側不思其親者聖人之誅之豈待問哉又臣觀唐臣陽城為國子司業引告諸生曰得毋有久不養親者乎明日告歸者二十輩三年不歸侍者黜之魏公子無忌率師禦秦令其軍中曰獨子無兄弟者歸養夫二臣之志本在於徵材集衆而其所令適便私謀麾驅使去恆人觀之竊疑其舛然二臣以為人苟不懷其父母寧復可與學道圖功若其有懷中亂又縶維之學亦不成功亦不出夫勵世之術以忠孝豫人以功能歸國二臣皆有取爾也遭逢陛下聖明興勵德行所求乎天下則豈可不自近臣始乎臣敢逺引前講官李明睿近援左中允李建泰為例仰冀同仁苟荷矜俞臣母子銜結何紀臣不勝惶悚待命之至崇禎七年十一月初九日具題奉旨倪元璐講筵啓沃著照舊供職不必以私情陳請該部知道倪文貞秦疏卷二
