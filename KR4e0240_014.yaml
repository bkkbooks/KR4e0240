body:
  text: 倪文貞集卷十四明倪元璐撰傳周來玉先生傳公名宗建字季侯别號來玉蘇州吳江人生有志槩七八歲時嘗侍其父文林公文林偶與客言楊忠愍事語未卒公遽起問求詳文林因為悉言忠愍忤鸞嵩及得罪以死狀公拍掌大笑曰是大好死彼鸞嵩安在哉文林悚然驚異之既為文章名噪一郡弱冠舉於鄉越八年而成進士授武康令有異政調杭之仁和晶敏慈惠民大戴之嘗攝德清三邑之人皆立祠生祀公尋以卓異徴拜監察御史時為哲皇御極之次年逆閹魏忠賢者時猶名進忠方用事與上保姆客氏朋倚為奸然人猶以為易與云此壁鼠耳無能為也公曰不然虺巳為蛇乘霧則不可制㑹天雨雹公上疏略云今四月為盛夏陽長之時大雹忽作推之人事豈謂無因近見朝廷處一二章奏外廷咸疑有物憑焉臣即不敢盡信而千人所指如魏忠賢者目不識丁心存叵測借皇上之震疊以肆機鋒假竊蔽煬邪正顛倒朝端之上壅蔽將成聲影之通毒流何已甚而巧立虛名上無顧忌離間起於蠅營讒搆生於長舌其為隱禍大可寒心疏上忠賢恚甚㑹上御經筵講讀竟忠賢睅目語閣臣即御史疏千人所指目不識丁此何語也時首輔為葉公向高從容言是言官也豈當深咎忠賢意稍解尋又傳㫖豫重謪葉公又具揭力救獲免居久之上似心悟忽遣客氏出宫朝臣方相賀其明日復召入寵顧如初公又極諌請割小恩以慎大防凡千餘言語皆危至有詔奪俸三月然忠賢愈怒不惵隂與其黨户科給事中郭鞏謀逐公時正人尚多在位忠賢等謀悉去之乃援進黨徒彈擊四出公患之曰羽翼既成禍不逺矣吾不惜死因復上言臣觀先朝汪直劉瑾其人雖皆梟獍然幸言路清明臣僚隔絶故不久終敗今乃有郭鞏者結連膠合取㫖如寄權璫之報復反借言官以伸言官之聲勢反假中涓而重數月以來一斥熊德陽江秉謙一斥侯震暘一斥王紀滿朝薦一去鄒元標馮從吾一逐文震孟鄭鄤近且欲厄孫慎行盛以宏而棄之摘瓜抱蔓正人重足舉朝各愛惜一死無敢明言犯其鋒者而忠賢且橫行愈甚奸謀愈深臣若尚顧微軀不為攻擊將內有忠賢為之指揮旁有客氏為之操縱中有劉朝等為之賣威而外復有鞏等從而蟻樹蠅集內外交通驅除善類天下事尚忍言哉因請誅忠賢甚力忠賢既憤且懼乃率羣璫環泣上前至請自髠以激上怒遂得㫖責公回話公復申請不屈傳㫖廷杖八十又以葉公力持返詔改奪俸一年於是公履尾不嘻者再矣人謂公君義形能見雖更數月無語未為寒蟬也公厲聲曰即日者遂死杖下安得聞君是言乎上實生我不敢不以死報時聞忠賢欲使其徒劉朝等典兵行邊議既定需期發詔公曰俟詔既發而爭之晚矣既力陳內臣典兵有三不可九害疏入不報然其事竟寢已而奉使按楚尋遭喪歸當是時忠賢益矯䖍無忌黨徒日益進於是僉都楊公漣左公光斗等交章訟言朝賢多和之者即所引稱皆以公曩疏為權輿忠賢以是益追恨公未幾楊公等並譴歸於是忠賢大樹威撾殺工部郎萬公璟公時家居嘆曰是奴戮士矣既手滑吾屬寧足復留種乎其明年春舊吳江令曹欽程方為工部主事希忠賢㫖誣奏公并及張公慎言等四御史並得㫖禠職追贓亡何詔逮楊公等六人尋即逮公當公未逮時語人云璫求首禍必及我我安逃死即不然我必伏闕為楊左諸公死爭既聞緹騎將至乃謬為他之入别大夫人身自詣郡聽宣詔巳夷然就檻車時道路觀者皆憤激即云此璫矯稱不當奉詔洶洶欲掊殺使者公大聲諭止之乃稍稍散去吳人既蓄憤其後一月乃有周蓼洲吏部之事云公至京下詔獄嚴訊承刑甚毒至肉節縻拆抗辨益厲奸人司讞者無如之何竟以意煆贓五千餘金獄上忠賢意未慊矯㫖再訊承刑如前義益贓七千金掠比無虛日一日下片紙付獄吏趣入黑室中夜半埀石其胸立斃時為六年六月十七日其夜朝天宫災先是公逮至之日都門地震初鞠之日王恭厰災再鞠天大雨震天之應公如鼓桴然可異也公卒之明年熹廟崩今上御極戮忠賢客氏并其黨誅竄有差遂以廷臣言贈公太僕卿大中大夫豫祭葬祠祀又歸追贓金五百其又二年郭鞏以事被逮云大宰梁鳴泉公傳公名夢龍字乾吉其别號則曰鳴泉先世山西蔚州人始祖名聚者自國初徙家真定良久聚子整往田間見蛇兔相握起逐之無有心異而識之聚卒整遂以地為藏藏聚曰吾後世必有興者蛇兔告我矣自整傳三世而生公公始生時公父贈君怡菴公感異夢因名公夢龍公出胎便具英挺五歲能咏詩在怡菴公抱中輒請得即日就師學怡菴公紿之云今破日不佳耳公應聲曰以破吾愚豈不佳怡菴公大驚喜每語人吾斯知項託黃童非俊物也年十五試有司第一補弟子員二十五鄉薦明年成進士是為嘉靖癸丑尋試宏詞高等改翰林院庶吉士三年出為兵科給事中公文譽崷崒當留編修國史㑹其時同舍郎朝君東吳病不樂去金門然故事無並留者公遜謝乃出既入諫垣則慷慨言事無避忌劾先後兩冡宰李公吳公行私黨權時論壯之久之擢為吏科都給事中大計天下吏鋤稂汰秕人以為公不怨當是時肅皇帝頗崇壇祝學士袁公煒偶為上草青詞稱㫖上傾心大用之公偵上意上疏略言相臣宜舉學術純正無輕掄選俾聖治不光上覽奏怒賴首揆華亭徐公從容為解止奪俸半年而學士卒入相亡何擢順天府府丞㑹河決沛縣行河重臣議開新河請才監司甚急輔臣修郤者輒言莫如京兆夢龍因出公副臬河南領河務公之治河也考箕誨鍤與卒同力晝不敢廬夜枕幘席衣而處河上大暑疫作則出俸買藥飲諸役徒活數萬人於是功成擢參藩關內旋遷山西按察使是為隆慶二年於是户部尚書馬公森等奏薦公異才可為邊大吏遂以其明年遷河南右布政使又明年遷都察院右僉都御史鎮撫山東時山東以催科重急農失其業探丸四起公為除苛令明舊章民由是投刀秉耒先是嘉靖中遼大饑遼人避役跨海廋登菜島嶼中者數千其始耕捕救枵而已久之海濵之人嬲之始出沒抄劫無虛日更數撫莫能定公奮然乘舠海上相機宜條上招安三䇿八事已而河塞宿遷口覆運艘數百蕩糧數萬鍾朝議通海運則又以屬公功成加俸一級尋遷右副都御史改鎮中州中州盜賊蟻結所司以獲盜為上功公曰俟盜起獲之訌吾民矣法當使無盜乃畫九議行之不數月户可脫扄卧也久之賜白金文綺時神廟新即位江陵秉政以公為能召入為戶部右侍郎尋改兵部右侍郎值三韓王杲城捷上天子命公持節服麒麟服往賚官軍巳丁繼母憂歸服闋起兵部右侍郎尋升右都御史出制薊遼至則首問四鎮軍所疾苦為剔除之因是以簡軍實修馬政築城壘謹斥堠慎擇將領以忠勇勤為上無取恢然者曰猶之相馬不舉肥也而其時昌鎮黃花路薊鎮古北口邊墻報成遂晉太子少保尋有㫖召入視部事時司馬堂無督塵封久公入則樞帷改觀於是乎除種馬之令國初戰馬官自牧既以授民歲徴駒焉駒不可戰官為罷駒購壯然尚沉種馬民間則民大騷公請得盡鬻種馬稍徴芻佐官買馬者令下民如脫重負者㑹吏部尚書缺廷臣以公及某某三人名上上覽公名顧為輔臣曰是非曩時抗疏摘兩冡宰者耶必良冡宰遂用之公為太宰銓綜萬流無蹊有鑑然謁不遂者輒憾恨有為公所善某子甲者從公求節鉞公大驚曰此豈餅飥子可乞得耶其人慙怒而去於是江陵相既沒繼當揆者素不善公異時難公鐡靣者又為蜚語怒當揆㑹御史某將有封事奏金吾徐爵奸狀當揆聞之召與語使飛波灑瀾及公某事公夷然上疏微辨因請骸骨甚力凡三上始得俞㫖歸公歸時年六十餘矣猶得事怡菴公三年又十四年而公卒公所著書有賜麟堂集讀書日録各若干卷自公之歿又十四年而其冡孫維樞以雋才薦賢書腰裊初躟不知其屇也史氏某曰公固江陵所拔士也又受知深終江陵之世公用條茂而是時有御史劉臺者亦江陵士以請劍得杖謫死故當時之議以公守雌不如臺毅抑猶見隼之飛下誅馬走非至論也自江陵之身功過離擘如人見其靣瘢肉並列故憍中足智戴威震主者過也錘邉鞴吏快賞決罰陶鑄天下歸於湛新者功也過已墮其家矣而功揭於國雖加利銛益以健爪不可得剷焉二子之遭幽章異歸迹其所處各有其際矣夫諫者之情必借物以發其氣則與其過際分城守障之吏得因權以極其才即與其功際與其過際則不得不死與其功際則不得不致其勳名死之與勳名皆有不得不然者驅之豈早定哉或曰入則際其過矣又不去與終始焉昔宋荆國變法諸賢欲引去謀於邵雍雍力止之謂當乘此戮力引濡救燒投劾無濟雍潛士命人如此然聞之故老公佐樞時江陵握厲針公進平飲多所救江陵母死廷臣連章勸留數十輩公時在朝無公名由此言之公非苟同江陵者也王諫議傳王諫議者名元翰字伯舉别號聚洲其先南直鳯陽人也高帝時有名珊者從征六詔有功世其官於滇遂家焉數傳而至諌議諌議祖尚絅父寀皆有志行諫議生而嶷偉目光灼然如巖電為人磊砢著節敦尚倫義自童時已然七歲喪母事後二母如母父病刲股號天請代里人謂之聖童孝子年十四為文奇播或告之鴻文無範是為恣諫議意不屑曰吾氣至才出皆範也老生行墨何能為或聞時政過舉輒繞牀行徹旦既而㦸手長嘯曰秉成無人其父兄聞者皆異之弱冠舉其鄉第十一人纍上公車不第貧甚求署教楚之竹溪益復博覽專研夜聞魚觸荷聲有悟由此詩文大進辛丑成進士應庶常選四明沈公見其文奇之以為眉山復出拔填第五或以告諫議曰相君知公甚矣公何以報相君諫議正容對曰他人不敢知苟出相君某知報德矣羅彛正之於李南陽非報耶四明稍稍聞之其後遂出為吏科給事中當是時顯皇以黃老治天下時宰因之隂詭持祿斥逐端人而與公論爭長諫議疾之首上言時政五事曰責法令曰專㑹推曰慎名器曰廣賜環曰嚴奏辨已又疏劾首輔一貫顛倒是非譸張亂國有愧鼎鉉久之上卒罷一貫而次輔鯉同日并罷諫議又上疏言陛下一日并罷一貫鯉其當罷與否舉朝不敢為鯉伸一詞夫是非可否能使舉朝不敢言陛下不得聞此豈有國者之福乎既又力言枚卜宜慎因劾新參李公廷機局幅褊淺非宰相器恐其以敝車羸馬誤天下疏上不報然李卒以是引去諫議既以有言皆用愈益奮激㑹遷工科右給事中巡視庫務劾奏庫璫楊致中王道剝商婪賄請按其罪時秦稅使怒咸陽令滿朝薦彊項誣奏朝薦劫貢殺人上震怒逮治朝薦諫議抗章救之語戅甚上皆不報亦不之罪也一日有詔經營三殿諫議以為殿工費浩非責協濟於省直則坐𣲖産木地方國家自有礦稅以來天下之財半入大內半歸羣小豈可又興工作重纍吾民乃上疏極論議卒寢已又上言時事可痛哭者八其大略云陛下臨御埀四十年靜攝居半近年以來精神别繫厭玩士夫於國有不聞於家有不見輔臣朱賡辦閣三年尚未一瞻天表人失心膂厥疾為狂可為痛哭者一也六卿强半成空懸缺數年不補或一卿二署篆兩曹在外則監司手綰數符知府攝自佐二人失股肱厥疾為痿可為痛哭者二也南北臺省寥落而被召者積年纍月不霑一命夫既召之又姑置之必待喪氣而後用之陛下何見而出此御史代天巡方風厲一時報命則相代無人重巡則故無此例上下紀綱陵替殆盡人失耳目厥疾聾瞽可為痛哭者三也廢棄諸臣淪落彌歲奉詔起用未見彚征天霽無期河清難俟更復數年不起竊恐壯者老老者死人之云亡邦其殄瘁可為痛哭者四也九邉糧餉缺至八十餘萬告急轉借內請不應京師十二大營十萬餘衆計餉每年二百餘萬陛下試問此十萬衆能戰者幾何不過數百而已其餘則班役市棍負販也或以空籍支實糧或以一人冒兩餼卒有緩急可驅此輩為陛下出死力乎可為痛哭者五也陛下深拱天下不得望顔色數年臺諫封事一切留中夫封事者發奸破蔽之利器也不行則不利一旦有奸人朋比臲卼誰為陛下橫口談事橫身當事乎可為痛哭者六也𣙜稅之使遍于天下民間轉壑炊骨賣子市妻怨氣上蒸災異迭見方且指三殿以為名借停止以悅衆是天以回祿驚陛下陛下正借回祿以剝萬民可為痛哭者七也郊廟絶跡講席生塵隱禍伏機壅閉已極青宫講讀經年不舉親昵宮妾踈逺正人古今未有如此而能久安長治者可為痛哭者八也時災異數見又上疏極論大臣某某奉職亡狀又言鄒元標顧憲成高攀龍趙南星逯中立等皆經世才誰秉國成坐俾淪落選司間一起廢清節如于玉立劉元珍等皆不得列名輔臣好惡拂人之性傷割天心此災異所由來也當此之時諫議直聲振于天下其用事大臣皆不悅羣小阿附大臣者爭欲得諫議為首功初給事中王紹徽為其師翰林宣城湯君營爰立甚急以諫議重名謂諫議曰公語言妙天下即一札揚湯君湯君且為公死世間如湯君可恃也諫議厲聲曰吾何敢恃湯君謹辭給事由此甚恨至是乃與其徒共組托諫議暮夜受贓盈數十萬巡厰庫盜庫金無算為成奏以授御史某子甲上之諌議素剛聞之憤甚立集五城坊吏悉出裝裹琴書數車陳之都市因向闕大哭曰臣以職任糾彈不敢塞默以負陛下御史顧且誣臣贓跡臣無顔復入瑣闈即日掛冠策蹇徑去於是給事中胡欣御史史記事南有臺假然周達等相繼上言元翰鯁固觸邪御史戴豸冠為柄臣報怨不忠之尤者也不報而司計卒以擅離職守鐫諫議官諫議喜曰吾生平不能去心者道義知巳名勝山水耳今而後寧復匏瓜乎於是東泛滄海西登泰華南渡金焦謁顧端文高忠憲諸君子於東林低回講席者歲餘始自吳歸滇其在滇惟閉門却掃興至則出游昆池雞足之間如是十五年於是高邑趙忠毅公為吏部尚書矣奏起湖廣按察司知事尋擢工部主事方受命戒途而逆閹魏忠賢矯䖍擅政趙公且得罪去他御史承風㫖劾諫議為趙公私人有㫖豫閒住而王紹徽者方起田間得璫意驟躋冡宰修怨申衊云云於是又削為編氓人猶慮有後命為諫議危諫議獨夷然曰吾得從楊應山高梁溪地下足矣然自是遂不敢歸滇飄浪大江南北薪炊時絶或常僵卧邸中歲丁卯今上御極忠賢伏誅其黨論如法凡被璫禍者悉得湔祓還其故官於是京兆尹劉公宗周吏科都給事中宋公鳴梧等訟諫議寃章下所司冡宰故璫苞蘖尤畏惡諫議力扼之諫議竟以病卒於白門卒之日囊無一銖廣陵范吏部鳯翼黃尚寶正賓等經紀其喪當諫議革時諸公皆􅀈噓諫議爽然顧謂諸公曰幸也死於二三友朋之手不然千年之後誰為知我心者乎舊史氏曰自神祖中厯以來三四十年之間朝寧之局則已三變其始天子靜攝聽君子小人之自戰而不為之理所謂鼠鬭穴中將勇者勝耳故其時君子時勝時敗然君子雖或不勝而其助亦不衰也其既凶寺擅權小人處必勝之地君子即亦戢心搏志而甘取不勝不復敢言戰小人亦不曰戰直曰禽馘之耳然其時君子雖嬰禍患其心愈益喜曰吾君子也其後魁柄已振握照明法君子小人皆怵然不敢窮戰而隂制以謀故其時氣戰者敗謀戰者勝謀陽者敗謀隂者勝凡明主所鉗鞬以繩貪人宵類者小人皆借之以穽君子其君子既禍敗即無可自解曰吾君子其小人亦不靳歸名君子而但使其無救于禍敗又可曰非我也法也是故君子之不幸未有甚於此時者矣雖然自其卒而觀之世之所稱東林君子與翼東林者不十年而俱盡固也若其始泰輪帛四馳萋菶拔連道亦已盛所獨不及者惠司馬元孺方侍御孩未及諫議三君耳朝賢之爭司馬踰十年方萌俄遏而侍御終沉諫議以死此無他故今人固畏君子尤甚畏此三君以為此三君才氣獨出其出必將大治小人即一日能見於上又未易得敗耳余未見司馬稔知其素侍御出獄識之京邸余官留都得交諫議其人皆英照奕奕論事如刀劃塗以彼其才氣不問何賊皆能殺之此世人所由甚畏之也甚畏之者其心固亦甚貴之矣嗚呼三君誠人傑也哉張洪川先生傳張洪川先生者名仁聲其别號則曰洪川河南之磁州人也先生仕為令得稱明府以長君司馬鏡心官諫議時承封諫議得稱封公先生皆不許故人但稱之洪川先生云先生生有至性從父無子子之先生婉媞致孝得兩父歡心兩父殁皆哀毁骨立廬墓三年弟夭遺孤惟一女撫之過其子人以為難故里中稱孝友者必歸先生為諸生有聲十舉不第卒以明經謁選授蜀樂至令時邑經奢氏亂民盡逋逃吏持空牒無所責賦先生下令招撫宣誠布寬民由是歸之如流水不期年户口大充乃進其民約曰耕田多者為上氓吏卒入鄉􅀈左趾即禾未熟稅者令非人聽民唾令於是民競奮力田秋登牛車輸者恐後賦盡如初民故獷喜訟鬭先生曰民剛矣以剛制剛非策也束右以葦不以石吾務以柔勝之耳故其聽訟不御鞭鞔或有疑獄他吏務為恫喝張威取情先生獨與往復言笑如鳴叩然即折懾之不一二語民皆涕泣叩頭請死以是邑人大悅他邑質成者麋至或謂先生曰子治亂國法宜嚴顧矯以寬寬中有敗不聞子産之說乎先生曰不然是乃所謂嚴也善馭馬者恃轡勒不恃鞭策鞭策之於馬疑之而已今以其疑馬者畏馬畏盡則怒出怒則害大是故不如謹轡勒鞭策怒馬轡勒服馬也吾之治馬苟使轡勒無失頤舉袂揚膝振股起皆足進馬矣何鞭策為且夫長民者决綱斥紐木偶叢神權不自執此豈吾所謂寬哉言者於是始服然先生性故剛未嘗懾彊禦里有大豪為奸者悉捕治無少縱有撫軍所使使傳檄郡邑挾威雄行他令事之甚謹至樂至先生目懾之愈益橫乃大怒曰鼠子何恃使卒捽庭下械繫之明日正辭以聞撫軍撫軍不能違卒論如法故其時為之語曰謂水為柔水則不柔播山如流於是治行為全蜀第一尋以今上御極恩封父母如其官又請以其封貤生父母既得命先生大喜曰是吾所為折腰者乎而既遂矣復何求即日稱病解印綬去當是時司馬鏡心已成進士治泰興高等徴為吏科給事中矣先生之教子自為之師不使就外傅故司馬早成先生既歸田自稱野老性儉約自其少賤至今既貴且老無異持先是數十年海內方盛司馬年舞象髮鬑鬑然先生抱之膝上謂之曰聖人之道寶儉而惡侈吾見今世士大夫急游宴好華飾金玉綺紈奴僕輿馬喧閭溢巷皆前二十年所亡有此非吉祥不出十年天下其將亂乎司馬心識其言其後嘗舉以告人曰吾父真聖人也自先生居里里中人恃之甚其長牧凡郡邑大舉民甚寃者先生雖矜岸必為其長牧訟言之歲壬申寇潰晉數十萬突河北縱橫磁鄴游騎至城下日數百城中人大懼先生率衆登陴為守計甚設邏者獲賊偞守以請之撫軍先生曰不可寇已逼城而宿奸其內此危道也度報文往復旬日猝有變奈何守悟立誅之懸其首示賊賊乃遁去一時稱先生知兵能應變非徒儒者也大都先生為人靜正不欺而好行義然以中坦無宛氣以是能壽行年八十神明卓然如五十許人執筆能細書日行不御策往返十餘里不倦夜飲至宵半以為常蓋誠異人云戴子曰竟其德敦其言於人無所不信是橋大人也常以皓皓是以眉夀其洪川先生之謂乎舊史氏曰余兄事司馬幾二十年當其宰海陵大江南北歌為神君余時為詩十章紀之即不知其有教之者洪川先生之治樂至者其師也故曰傳琰治譜言令之教令也若乃司馬之八為諫議世歸彊直出鎮百粵蠻夷來威此非有教之者然以余所聞先生行事彊項甚剛拂衣甚决登陴甚勇慮變甚智苟取其意而厲持之可以秉簡為諫官亦可以執貞律為丈人長子是故天下之善取者莫若司馬也司馬善取可不曰先生善豫哉馮二酉先生傳先生家錢塘少英秀為錢塘諸生有聲纍舉不第遂棄去益讀書博覽自典墳迄梵野無不涉者文近江庾詩介柳韋尤喜為小詞歌曲中多閨思宫怨情艷之言所著流甚侈凡其地之當路巨公皆傾心願交先生先生率情應之簡簡然退而雜山僧野老間則言笑甚濃文章日出如露降荷盤無所膠附而瀏灕渾脫見者熹心家甚貧厨嘗絶炊吟咏自若有餽之粟者不妄受受亦必圗報之稱施而止與人春敷少譏多奬而綿針匣劍骨鋒湛然每聞冠紳忠義閭巷節烈及是非所繫世論不平者即㦸手鬚張霜虹滿靣人以是窺先生骨嚴中朗其於世雖甚無忤諾之而已非有唯阿諾之於唯相去萬里也今行年八十有六猶辨蠅書所居三聖橋嘗雨中乘屐至於津頭往還三十餘里喘汗不作有召之飲雖甚久不告休時或瞑不語人竊相謂曰先生疲矣先生聞之遂張目訟曰吾不疲也呼酒酣歌多至達曙神明矯然蓋五官甚茂惟眼嘗淚為缺陷云倪子曰余後先生四十年與先生遊最久嘗欲生諡之一言纍思經旬竟不得也以為才士有其德以為恭士有其風以為華士有其誠以為介士又有其俠爾昔者錢塘之彥和靖清舉近枯昭諫華飛似放此二子皆不可名先生吾聞錢塘故蘇白之所治也先生者香山氏之朋與眉山氏之朋與楊夫人傳楊夫人者李太僕慕劬先生之配宫允紹賢之母也年十五而歸太僕二十二而太僕成進士十七而舉宫允五十八而宫允入翰林三十二而承譽命七十二而以病卒天下歸富貴壽考終焉其為人柔令通曉大義太僕未第織紉襄讀及既貴不改縞綦太僕凡之官必迎兩尊人夫人修養無方太僕以是專意能其官太僕既入為給諫危身敢言夫人不懾及貶官乃更益喜人問其故夫人曰子不見蔦蘿之依松柏乎其上浴霄氛食霜氣其下乃始紛披旑旎以為榮華人臣為諫官不敢言脂韋以豢其官若瓠子而拳縮其身則如繭蝟中女且羞以為夫吾誠不以彼羞易此榮且子以為士之榮妻為是被之象服云爾耶聞者悚服蓋其有士行如此教宫允兄弟甚嚴宫允之在翰林有大名顧特端整進止嶷然世以是歸功操績不誣也畜諸媵及媵子不妬有恩人有為之咏樛藟桑梅云倪子曰余嘗有言不備龍德不可以成婦儀以其不可見過不可見才馴其氣若嬰兒而當其履艱遘危則又必責之壯男子難為之事故曰婦無百行者非通論也若李母楊夫人者豈可不謂之猶龍乎劉烈女傳劉烈女者錢塘人也居江之滸年十九字諸生吳嘉諫未歸其父元輔舊常將五百人禦倭海上中罷家貧所居淺隘與少年張阿官鄰阿官故逋蕩窺女貌都狂發夜躍上樓穴窗入逼女女大呼賊踉蹌脫走元輔驚起禽阿官縶而髠焉未及旦阿官兄子養忠知之遽糾黨斬門謀奪阿官且鳴金號於衆曰元輔實以女倀而又穽之女聞之拊膺長號曰天乎辱人至此當是時女父母專外禦不能中顧及事解散登樓見女投繯奔救巳氣絶乃以聞於郡有訟梟曰丁玉蘭者為阿官謀賄元輔金當讞元輔顧訴女承汚若為奸露然者時郡守河南劉公有廉明聲顧念即如父言囚無死法然心固疑之乃故軒其獄而隂使人四出物色數日盡得女潔烈及元輔受金狀復請之臺使者檄同從事北海劉公雜治之一訊吐實於是阿官等悉論如法闔郡譟呼有為之謡曰兩劉哲一劉烈江河海流合江河海者指女及兩公所居地而言先是女死之三日嘉諫往弔時六月溽暑女面色如生嘉諫又以法驗女眉實處子乃拊尸大慟女眼中忽迸血激注嘉諫面縷縷如含噴然嘉諫手拭之乃已而丁玉蘭者一日白晝忽見女立其庭自搏叩頭立死一時驚異以為神明云舊史氏曰女不幸著烈猶臣不幸著忠也石擊則火出性激則氣騰性氣相搏則生靈怪天地之性循常喜安而當其變生氣作則躍為雷電播為風濤其固然耳今夫高䕫伊周非必奇鬼而萇宏著其碧血伍胥馳其素車皇英姜姒不諡靈妃而曹女沒而戴尸李娥烹而湧鐵此非為聖魄悶然傑魂狡獪由夫循常者神靜嬰變而氣翔也故曰多所見少所怪使儒者閉門枯坐讀古人書見萇伍李曹之事必將心疑以為荒誕今觀於錢塘劉女者則豈不然乎倪文貞集卷十四
