body:
  text: 倪文貞集卷一明倪元璐撰制誥原任吏部文選司員外郎贈太常寺卿周順昌制曰夫孤情之所獨抗得死而成正氣之所不徂造生彌永所以屈平嫉俗轉快志於懷沙萇宏殞身遂飛華於化碧資其扶世寵以教忠爾具官某希聖得清擇節取苦伍羞絳灌哭是賈生之才兒命融修罵亦禰衡之氣當其出為從事入典銓衡並以晶心章其茂節會當龍亢馴致蟲拚時則指鹿之惡浮於望夷出彘之威極於北寺來周羅吉箝網四張喬固膺滂梏􅎂相結焚原蕩嶽不可邇親固有懼禍之夫閉門而拒岑晊知幾之士築室以擬袁閎而爾獨持虎執獶冰湯席鑊班荆悲咽尊酒豪攄俠亢左儒義依鄒浩忍捐愛息以狥纍孥本有荆軻湛族之心不止郈成分宅之德於是飛章告密檻車下徴而衆乃成城吳幾為沼至於焚香進食以禮御囚飛甓投竿而殺詔使魚驚獸亂釡沸波翻詎止廣漢被收吏民守闕鮑宣下獄生徒聚幡而已哉然而磯激難平虎騎不下卒不得脫以罹於凶而爾對簿不屈絶命彌雄雖復漢尉銜鬚唐臣嚼齒未有並其慷慨儷此從容者矣今捩軸既旋衮鉞並設碑踣元祐大升公正之羣墓顯湯隂恍見孤忠之氣用特贈爾為某官錫之誥命國家謹嚴近寺培養人才而在旁之奸烈於二正嵗寒之節見彼前賢要以道極一時義激天下明興以來一人而已嗚呼學聖人之中寧存狂狷睹忠臣之報彌愧奸回妻制曰蓋聞一往之心不謀妻子亦有百折之氣而牽帷㡩若夫彼則刑于此為順正相期遂志並可流聲其死也榮未亡何憾爾封宜人吳氏乃具官某之妻當其始盛多所中襄激庭謁小生之羞而抗趙映具墉視人倫之鑒以佐山濤至於鉤黨獄興清流禍作而爾夫以不懼虎尾遂罹雉羅劉陶北寺之凶楊震西亭之慘將恐將懼惟汝惟豫賈妻封髮已無開沐之期阮婦作糜永絶歸還之望當斯之際不亦悲乎今忠邪既辨庶幾小往而大來存逝何殊猶夫子紱而我佩是用封爾為淑人錫之誥命豈必相從已爭光於日月雖乖偕老尚表度於山河祖父制曰天象之主魁文以生杓而育斗先王之制川祭每後海而先河苟美孫謀必推祖烈所以范馨留硯而券後魏謨獻笏以章前爾原任平湖縣教諭周冠乃具官某之祖父學本一誠經窮三絶才名足刖彌貴隂德耳鳴自聞蓋以劉蕡下第深愧李邰而以魯男閉門善學栁下淡凝之致於斯可觀逮於鱣升伯起之堂愈堅士節麟見陳羣之角不墜家聲凡兹為臣盡命之忠誰非率祖攸行之德是用贈爾某官至三世而莫京自天申錫若九原之可作微子誰歸祖母制曰夫翼子者貽孫忠貞所以不墜過祖而遇妣蒸畀之曰孔偕豈必桎梏而死舉非正命之徒若推瓜瓞所由抑有初生之配爾韓氏乃具官某之祖母名閨育秀碩士嫓休著孝衣衾簟席之間得意簧翿房敖之外是使灞陵椎髻伯鸞有耕織之儔䝉山棄薪萊子無功名之患而於焉播穫受菑畬之澤偉績成黼黻之華粵有文孫章其義問發地下三年之血疏民初百世之榮用贈爾為淑人取忠義以報劉何如令伯攬實枚而頌魯時維姜嫄父制曰蓋聞萬年教諂不能回觸屏之聽郗愔竭忠不能弭發篋之慚原彼貞邪乖於父子若乃鄭慶敦倫子涵著直天彛內茂高節外搴雖衮褐塗殊而弓箕道合爾贈某官周可賢乃具官某之父維孝友于因心慶篤硯耕力穫資為三釡之歡原歎永懷發彼雙荆之潤曾操甘以娛志薛推肥而解憂義報其天有足多矣詩曰教誨爾子式穀似之夫輪或師蓬釣可通御取爾孝義教彼忠貞泂酌注兹豈有異乎用特贈爾某官揚名顯親之道無如死忠闡幽追逺之文所以教孝嗚呼爾父爾子國靈國榮母制曰朕聞鮞胎珠於身而其鱗即紫虎襲氣於母而方生已超故夫毛裏相資亦若主賓交酢況於干逢俊物以顯臣忠詎不李杜齊名而徴母訓爾贈宜人張氏乃具官某之母斯饑以明季女正位之曰嚴君所求乎子可得而識也夫人中材咸資鼓勸若乃道德所蒸章其氣決剛大之塞垂為彛常誠孚魚豚聲震天地如斯之義豈易為功原夫生即天生知其教必胎教非徒丸熊畫荻勗以微名詎若却鮓麾金由於驟激以是奇爾贈爾淑人君子人與狥國艱貞之節母氏天只倚閭忠孝之心融泄黃泉光輝彤管原任吏科都給事中贈太常寺卿魏大中制曰夫光嶽凝翕是生忠義之臣天地晦䝉彌表艱危之節故劉陶殞貞北寺楊震殉烈西亭並以禍極一時聲流千載爾具官某其生有自視死如歸原其至清絶塵大剛制物可以貪繩蟬蚓肉視虎狼故纍百知一鶚之可尊嫉邪如神羊之必觸爰自輶軒之使陟於鎖闥之班洊厯清垣旋臻天掖鋭心平治極論興衰節足相宣夔睢坐剔時謂司𨽻陽球之既陟此輩安容假使銅鞮伯華而無死天下其定而會以相分公媪當蔡京童貫之時士亢君宗開竇武陳蕃之禍惟爾壇帷逾峻尤為矰繳所先貝錦一成雉羅遂及詔求鉤黨獄署同文膺滂碎首於黃門喬固暴尸於城北三光黯沒海水羣飛當此之時亦云極矣今者世灰大滌天宇重晶朕是用章闡幽忠崇敷顯秩雷震一夕已踣元祐之碑解澤重泉大表比干之墓特追贈爾為太常寺卿錫之誥命以爾臣忠章為子孝洢濂之義生死同揆卞壼誠奇王裒可念嗚呼位於箕尾識歸天傅說之星炳彼丹青寶入地萇宏之血原任都察院左都御史追贈太子太保曹于汴制曰夫道承危而章亢形至敝以得完所以松柏寶寒淵冰幸盡茅焦當鑊則有愈奇之稱史鰌既尸始歸直哉之譽爾具官某尊其性命學為聖賢窮理存誠養氣得浩沈默寡語而諫舌撓霆和簡近人而嚴骨料虎君宗領士朋黨著碑貞十年而褫終朝來七日而凶八月會逢鼎運召入中臺之紀之綱以為燕媚不茹不吐而無畏侮惜用不究其人已遐斯歎三彭不遺一老朕以天下功效不立治平無期咸由詩書教衰廉耻道喪朝無耆舊人昧典刑是以漢師無功則思法直唐律既否乃歎魏徴先見興愴於曲江奉公隕涕於征鹵以今視古何獨不然兹用追贈爾為太子太保錫之誥命依其蔽芾宜興茇憩之思望彼鬱葱即下樵蘇之禁吏部左侍郎張鳳翔制曰夫流波衆逐則知碣石之功烈焰胥焚乃表靈光之福故論先事定瓜必潰而何包身為國留果雖碩而不食具官某包國之元氣為德因人之精神制才昔者妖弄潢池亂成張角東連曹兖北震榮商雖滹沱恆嶽接趾之間亦封豕修蛇飛肉之地爾時擁旄卧護啓乘聲援犄角為功敉寧以奏獻囚矯虎晉秩雎鳩於是龍亢膺滂雞連京貫繄爾嶽嶽罣於狺狺夫有破柱之勇而怯者揚辭而表閭有請劍之忠而佞者呈身而入幕表閭等之修墓入幕甚於望塵豈爾剛腸所能曳尾宋璟絶言而鐵石張彖興歎於冰山而鬼彈星飛獸機飈發大官頒饌無命食亞夫之心中使銜綸示行誅寇凖之狀洎冥鴻已舉而藪澤猶羅竟題元祐之碑幾入同文之獄今者天心悔禍逆首膺誅朕用是顯爾孤忠陟於小宰姬旦鴻遵而歸渚悟啓風雷召公鳳翽而鳴岡諷存車馬願因舊德以集羣材用晉爾某階嗚呼今一陽乍復百效未臻如琴瑟之盡解以張譬鳥獸之方革而氄冀爾知人之哲底績為期尚勵初心益堅晚節彊直已效詎首陽拙而柱下工勵翼不迷庶天保內而采薇外妻制曰蓋聞據勝五陰之上者士有得輿取償七日之間者婦無喪茀衣當笥發鐘亦宫聞惟否往則喜來故子紱而我佩爾具官某妻淑人丘氏主婦莫莫形為室牖之儀君子陽陽偕有房敖之樂誠靜之譽所從來矣洎爾夫翺翔中外鞺鞳聲華可謂曰能則知其助意必有窺狐趙之識謀戎蓋之忠而況直道再違離憂獨賦艱難險阻惟爾共之今蠖屈方伸乃鴛戢宜福王仲卿既貴彌念牛衣辟司徒之妻應酬石窖是用仍封爾淑人於戲義比王臣亦有仔肩之弼時當有道無忘負戴之心户部右侍郎錢春制曰大學以財用歸諸性命周禮以會計明其純王斯知阜民儒者之能足國上臣之務所以農父若保極選名賢若夫小徒建邦彌難倅乘具官某昔者霜驄坐振白筆不眊羽翼吾徒紹明正學陳瓘國是之論取忌商英范滂澄清之名幾從元禮而京房魏郡汲黯淮陽淹久蓬飛旋當茅拔方道光於卿月詎禍極於閹氛時則龍亢君宗雞連京貫詔求鉤黨獄署同文忌爾嶙峋不同䝉落禠衣未已懸鑕以須所不淪胥殆有天幸朕既即位章顯忠貞命龍汝作納言抑由可使治賦維山甫喉舌之既效知君牙邦國之所依而爾左握五典右操七策法參平凖道本流泉蘇轍勵圖報於瘡痍李絳絶徼恩於進獻偉兹版二何赧前賢用授爾某階錫之誥命嗚呼今國比空鐺議同木胾羽書蜂午一井竭於五瓶籌箸盈庭十羊分其九牧維爬梳之極慮必出侵牟而節省之深心易流纖嗇資爾正學佐以精思要使正德厚生逺凌貫粟朽紅之盛庶幾阜財解愠上賡卿景爛熳之歌左春坊左諭德兼翰林院侍講姚希孟制曰國家甚親儒臣以為由其道則可以專氣而致大是故天下之廣塗高載莫不與之矣今以為其居至靜可以柔持埏鎔其德必歸於亂國可容平世亦無所自見是天下之大遁史鰌王嘉則不為也爾具官某學廣識尊搴而健立孤岸逺物莫能緣者時值京貫朋奸羣邪醜正求剚爾腹則有百端夫小人之心以為致之不可得致舍之則將乘時得輿以大返其道憎主人而騎虎不得脫爾是用譴逐示端網箝日出當此之時爾猶鹿也走於山林命懸庖廚嗟乎使爾得事朕今日豈非天哉朕既開昌世局妙簡宫寮維爾精能風道彌揭用晉爾階奉直大夫今天下如木顛初蘖未可嘻怡笑歌求之也朕實寶百爾憂患之心以其才智所出可使世大治則無如爾動忍者抑古人夷山而險垤爾其曰臣無忘堂阜即一日旁求朕喜得爾矣妻制曰今天下狂然以求富貴富貴之物使天下自賊而相讎天下之好趨非其所與冒然而從之非其所與冒然而從之則相逐而敗矣故道之可守莫如其貧賤之心人之可交而難忘莫如其往夙夫婦亦然爾具官某妻贈孺人馮氏昔者禦冬視夜申警陳規使樂羊去而不歸許升由之坐進斯已難矣今杜羔既第荀粲彌傷雖富穀可偕而困藜早據牧犢朝飛之怨川魚中拆之吟循覽前人並同斯愾兹用加贈爾為宜人百年之歎有綣遺簪七日而還母嗟喪茀繼妻制曰朕觀漢臣王章妻呵章使不泣牛衣何其壯也及章既貴顯欲上書奏彈大將軍鳳而妻顧又情語呢呢使章用其言者沒矣若爾具官某繼妻封孺人某氏天或釐之是誠女士跡其食貧徂爾恐懼惟豫規切明星勗成霄漢逮夫釁開北寺獄搆同文爾夫以士譽君宗禍同李杜雖風波湯火日益侵尋而簧翿房敖相將自得斯於王章之妻抑有進焉者乎兹用晉封爾為宜人冀當子紱我佩之時彌存士旦女雞之意右春坊右贊善兼翰林院簡討顧錫疇敕曰文學之臣不使言事而使之靜治其文章使之靜治其文章是使之無不言也天下之論議歸諸皂囊猶束海水歸諸盎耳文章之心則無所不入是故儒臣之盡忠也上規禹臯下循工瞽盛世由其道而不知時危道傾則蓬勃而見爾具官某含吐劉邢攀提史汲當閹氛火烈黨禍飈興棒起撞郎令行逐客入地滿萇宏之血美新盛揚雄之文愚夫首濡智者舌噤而爾獨義形於色情見乎辭發䇿詢時譏切不避搜才考議蹇諤者良美厥青緗居然白簡而科第風漢發士良之呵燕麥𤣥都促連州之駕褫衣不已爇鼎以須當此之時其危至矣今朕即位除凶顯忠擢爾宫寮以風百爾而爾益宏棐迪彌著聲華用授爾階儒林郎夫人氣立則能見子大夫有其任矣尚益廣識沈幾以通天下之故朕望爾羮醴舟川詎矜矯自見則已乎父敕曰人父之教譬諸原泉霏霏吐流雖旋折致殊而不匱其德爾原任元城縣知縣封翰林院簡討顧允忠乃具官某之父剖竹百里飛花兩城禁令所施歸於氣道樂只之意蒸為神明遂使璫暴戢蹤盜首授首銅塘之山保其地脈萑苻之澤化為天都又且抗豪藩於翼虎之時牿權貴於童牛之日嬰凶捍患節晶道光以彼窮威視令猶蟣斧肉承利觸手能糜烏知亦有挺脊戴頭伉然而出者乎爾教在躬固宜有子用是加爾如爾子官大書建奮父子之良彌章暾毅剛方之種太常寺少卿沈維柄制曰夫為治不本禮樂猶燭幽不以火也今天下大發其朝氣功利富强茁然而欲見王霸道雜與治日逺朕誠欲建中和之極使夫幽明洞疏神人之和若傳烽可召則至治已有能為朕夷夔者乎具官某昔以健令搴壯梧垣蹇諤能言彊直自遂而釁生於破柱禍極於沈河猿亡致延弓失忌得意存覆楚勢欲乾池矧爾亢貴君宗示難鵠的繒繳之及固其宜矣今者莧陸既決碩果僅存召首諸垣俾弊羣吏而爾法辨荃葹道和硝乳用使繁妖之氣化為明霞元黃之心消於砥矢朕嘉乃績擢二容臺昔堯顯寅清漢遴忠孝若其以爾精義出為駿奔達禋享之心和民神之意原本道德旁鬯文章將九敘坐歌三靈自順禮樂興舉詎須百年乎用授爾階中憲大夫嗚呼朕即左操天道右挈祖功四召鬼神之情伐鼓而號於有位不如使子奉璋而求之也爼豆之事勿曰嘗聞往而學焉苟通其故大治日出雖至於馘囚獻泮朕能知所由來舉而功子已父制曰朕觀古之帝王甚貴老而尚德故其詩曰酌以大斗以祈黃耉朕既肇舉臨雍乞言展禮而憲老無聞朕心甚愧若其有為搆獲疏奬室菑朱紱方來道固光於饋酳已爾封文林郎沈岱乃具官某之父以朕所聞非人能及蓋其不以酒肉明孝闤闠言交外務周施內存守嗇瓢攖風以為多事橰役水惡其機心而貽燕得賢握固取壽穀有後而豐下耋不嗟而缶歌茀祿爾康莫斯若矣用封爾某官嗚呼夷作秩宗洵聞詩禮壽如箕翼斯關治平幸勉加飱朕善養老母制曰蓋聞趙深嚴服而陳訓崔攽脫帽以導輿並以司常貴卿上承夀母殫酬暉草侈盛簪紳若乃蒼玉自華而魚銜已竭母兮鞠我詎不悲乎爾贈孺人楊氏乃具官某之母其子也才知母之德母德猶之天氣變物而不知子才譬若土膏領和而自動是故爾子昔抗封章由其倚閭而憂國恤今䖍俎豆本諸徙舍以依學宫夫尊美玉者貴陽田攬良材則思雞麓雖畜不卒何日忘之用贈爾恭人於戲奉璋攸宜以表峩操績何為而干怒疏榮明報尚祇承哉太僕寺少卿蔣允儀制曰朕觀古者命官冏伯以奉屬車糾繩格心則盡責之豈繄我圉且古之人主甚尊禮樂而輕富强是故禱差致吉攻同獻功吏自治而能其官其天子不以誡也朕師其道極選僕臣取諸履貞馬則不問爾具官某正學嚴節道亢君宗凡其升沈動關理亂昔者皇考膺圖悉徴舊德衣裳輪轂一夕四馳熹皇初年綏綬相結時則正人大奮道昌而光既一二年陽亢陰茁奸生於指鹿釁開於履虎一擊不中蟲鳥易形於是節甫操繩黼京握鋸批割朝士如刲豕羊悉以其餘投徼抵各其時君子名尊而禍烈矣逮朕即位除凶奬忠表血萇宏釋囚箕子蘭蕭既辨鞶帶知榮雖藐德何加而清明如滌嗟乎凡六七年滄桑三化而爾蠖伸生死其間亦云極矣固以治隆與隆道喪則喪取凶亂國受福明時爾所居身不言可見朕是以俾之大計吏其既效則於是乎有冏命而馬斯臧用是畀爾某階嗚呼念之哉伏莽升陵道可畏也見能絶過示不可乘本握其堅蟲亦不孽夫謹轡策則無敗轅有如不信盍視諸馬兵科給事中陶崇道敕曰朕除璫禍則有以大見天下之才者三夫抵權則其力徴燭微則其智效履險嬰患之心可與慮天下事此三者逐臣之能著於日火矣是故朕求廢如不及今朝夕納誨之臣什七取之黨籍而朕信其言若信寒暑也孔子曰信而後諫朕今日則又何疑焉具官某朗照不疲彊直自遂公穀之學裒舉南宮魯卓之能表著東海遂以異等擢於留垣中遘閔㷀積久淹蠖洎膺內命適與禍期時則京貫作朋應滂署黨權尊定䇿獄起同文維爾義鬚鬇鬡諫舌摩切竟逢彼怒因致汝遷仗馬一鳴京兆五日雖冥鴻之心適還寥廓而山鹿之命尚懸庖廚會朕膺圖除凶雪鯁召仍舊職冀來讜言而爾風節彌嚴諫書日上塗歸駮正岸然不阿雖復元素回天兼謨返詔孤忠鯁固未有踰斯者矣用授爾某階今將懦兵驕羽書蜂午庭圉交推幾於無䇿維爾職兵豈忘斯疚尚亦申討軍實畢智竭忠猶之未逺是用大諫正人之能斯不墜也南京吏部文選司郎中房可壯制曰朕觀往代諸賢罹於黨禁者漢如逝波不返宋為螢光明晦迭出若乃大昕中天不疑斗沫莫如今日矣雖凋榮靡齊而歸論致凝比於樞建是故數十年公忠之士用之至今猶未有殫者則朕甚恃其人哉爾具官某孤清自命彊直不回當逆豎矯䖍正人淪喪維爾剛腸嫉惡危論撓權遂錮膺滂幾從逢比會朕御籙召還中臺由其倔强如初小復淹疏於外陪京水鏡南國羽儀不以浮沈形其喜愠朕則嘉爾正色於前夷襟其後若以斯致方諸古人庶幾衣鑊從容茅焦之輕生死虎獶持執中黃之制貧窮者矣嗚呼昔在爾父逮事神皇掊牿柄臣間關遷客其義不墮為教之成如璃既晶注水逾映用授爾階奉政大夫頃復晉爾璽丞漸躋津顯今海宇騷然國靈未振以爾正氣純忠形為能事豈有難乎朕不能舍骨挺不二心之臣而外求矯虎則已明矣爾其厲須且有後命戶部尚書武英殿大學士周延儒制曰夫弼直斯休命有歸臣喜則叢脞不作故殷武以阿衡震其中葉軒皇以風后配乎上台國惟元臣道綜萬有苟或舉事即必歸功況撫衣冠弓劍之懷詎忘圭瓚川田之報爾具官某稽古多聞救時宏負當其大廷發䇿史局翹薪廣川舉首於天人沂國抑心於溫飽既嘗嶒􅗆畜氣勃窣鼓能然猶以處囊之心韜鋒華於不試時亦有應弦之智章尊爼之一班所以物莫測其所存朕獨明其有用力排衆論簡副民瞻方當烽火之頻驚急而求子何如司馬之入相聞者戒心而自爾升庸暨兹崇極咸宏棐迪卒殫租荼陰陽乖愆丙吉所懼邦國若否山甫能明至尊獨憂以為辜四郊多壘懷其耻蓋朕聞之任大則思深居高而道廣故先逺業而后小數者侯霸寬大之心無顧慕而有兼容者溫國公忠之德有相之道舍爾誰言若乃夙夜在公宏纖不罣勤身之至近世所稀夫燮理錢刑豈相兼之業斷謀文變非一氏之才詎有左右求逢方圓取畫如爾岸舉示其精能斯誠平勃所未聞雖復璟崇其曷貴矣屬以山陵告竣神人協和仰橋山之崇邱懷甘盤之舊德用晉爾某官錫之誥命於戲今廟算日勞疆圉未靖民力已竭士氣彌隳威勝法窮禮疏才絀惟余隕谷厪爾納溝尚冀肇敏戎功克紹乃辟以扶植人材為本計以斟酌元氣為上猷砥矢可以化荆榛禮樂可以治兵革苟交修罔棄無忘鹽梅酒醴之心庶相和以歌不迷卿景星雲之旦左都御史陳于廷制曰國家欲以法致治必求正人政事欲以察得情必求舊德惟正人道足勝物惟舊德心不近名趙堯以代周昌兒寬之屈褚大維斯之職萬寮所宗苟得其人一夔而足具官某正學有源强骨獨舉始由循令入為諫官汲黯居中必無曲說范滂治外必無澆風洊厯華卿旋臻小宰方資衡石忽罹網羅時則勢在北司禍同東漢人逆我之為惡蘭當門而必鋤惟爾祖謝同心以奬王室遂亦李杜駢首而竄黨碑禠逐見端刀鋸行及所幸天留碩果世轉元茅自朕纘服之初遂下賜環之詔始則陪京重地分南國以憩召公終以先朝直聲比宋宗之還唐介入臺未久下令如馳朕惟刑法者煩苦天下之具苟不端本則物不從紀綱者長養一世之源借以厲物則功不立繄爾道先克已令取和民持法法行震物物服清霜所厲元氣俱流雖景讓極威於泥樓范諷矯苛於橫梃寬嚴之則詎若爾宜者乎兹以功敘晉爾某階於戲朕欲區分邪正别白廉貪而所司奉行或出苛細小人乘間以侵善良斯非朕心適為治蠧冀爾正色彌勵初心毋謹雞而漏狼務祛莠以保菽必躋世正直平康之福庶章爾大儒元老之功都察院左副都御史高宏圖制曰夫汲黯升而悍藩起憚李勉列則衰庭改尊斯知正直者召功之符名賢者起世之藥所以衆鳥屈其纍百隱豹威於在山爾具官某神懷明審風節遒鶱當其筮列臺司值正士罹亢龍之悔及夫再參法從際凶閹形指鹿之奸而爾遇君子則道務相成琴瑟戒其專一待小人則義不少借枘鑿格於方圓喬松絶援清霜獨厲穀洛不鬭淄澠自分斯昭砥矢之觀足砭波茅之逐爾其攖鱗抗論强項撓權幾於對簿同文僅乃掛冠神武是有天幸殆為朕留洎夫見睍曰消如茅斯拔爰懷舊德召副中臺又能提振紀綱端肅內外蕭惠開之公亮奉法不阿李景讓之清剛正色無避詩有之曰價人惟藩斯言名德之藴干城尊爼之制萬里是故攬西臺之勝氣推元老之壯猷用晉爾某階錫之誥命頃復陟子司空俾佐邦事而爾營綜方始倔强如初尹卿之抑懷貞宋璟之拒思勗皆朕所尚咸爾之忠尚期畢竭爾能不回斯志能見則世益尊其氣志至而物莫撓其功邦其永孚民之攸塈倪文貞集卷一
