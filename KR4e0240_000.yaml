body:
  text: 御製題倪元璐撰王鐸制辭適閲四庫全書明倪元璐集制誥一册其為侍講王鐸制詞云追蹤洛下邁迹臨川決子鼎鉉則猶蓍莢是以王鐸為優於程頤王安石也又云朕既甌覆子名發且有日鬭而鑄錐則豈有及云云尤非君誥臣之體夫王鐸本明季大臣至我朝復為大學士其身事兩朝人品無足取乃元璐制詞以為優於程頤是何語耶元璐在明季本東林黨其從劉宗周黃道周逰尚能留心經濟奏疏多切中時務國朝定鼎時即賜諡文貞實明季諸臣中矯矯者而其制詞不免失體如此可見制誥之非美事也朕嘗題董其昌自書告身云虞廷咨命周室諸誥皆君誨臣之言無所褒貶自唐始有制誥至於宋而其權益重夫權者上之所操文字雖空言而邪正榮辱是非所繫綦重未可忽焉我國家一掃厯代陋習誠不可及文武各官制誥惟視其品之大小為髙下不過明訓數語而止無所謂黃麻金匱登臺持筆之事也即如宋之蘇軾責吕惠卿詞語人曰三十年作劊子今日方剮得一有肉漢吁是何言耶不幾以九重之絲綸為一身之報復乎且為人子者孰不欲榮其親今付權於知制誥入者主之出者奴之受榮者必感焉受辱者必憾焉即使正人君子知制誥尚不能無此弊而况苞苴諛墓門户於是乎别朋黨於是乎興為國家者亦何賴有此乎夫以萬乘之尊下譽匹夫匹婦之賤本非政體甚且意為褒貶顛倒是非其流弊至不可勝言向既於題董其昌告身深切著明言之兹復申明其旨益以見詞臣視草行詞之非美事而我國家一掃厯代陋習之為不可及也乾隆四十九年十一月欽定四庫全書集部六倪文貞集别集類五明提要臣等謹案倪文貞集十七卷續編三卷奏疏十二卷講編四卷詩集四卷明倪元璐撰元璐有兒易內外儀已著録初元璐官翰林時掌外制之詞文章典雅為館閣所宗其門人為刻代言選六卷長沙文震孟序之崇禎丙子以國子監祭酒歸里裒輯所作名曰鴻寶應本華亭陳子龍序之壬午起官兵部侍郎明年擢户部尚書時事已亟不復作應制文字間取舊本重為刋定付其子會鼎庋藏之乾隆壬辰其元孫安世復編次重刻即此本也元璐少師鄒元標長從劉宗周黃道周逰均以古人相期許而尤留心於經濟故其擘畫設施勾考兵食皆可見諸施行非經生空談浮議者可比其詩文雖不脫北地弇州之舊格至其奏疏則詳明剴切多軍國大計興亡治亂之所關尤為當世所推重然當天崇之時君子小人雜遝並進元黃水火恩怨相尋大抵置君國而爭門户元璐獨持論侃侃中立不阿故齟齬不得大用及壞亂已極始見委任而已無所措其手僅以身殉國以忠烈傳于世而已此世所以重其人彌重其文也詩集頗多散佚如聞朝鮮墮一城七言律詩一首同衆友范姬集白下避暑湖亭七言古詩一首又律句黃花古戌春難到枯樹嚴關雁不過獰石魏公偏嫵媚輕煙吕相不糊塗等句皆載在施男笻竹杖中集中俱未收入蓋偶未見男書歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀倪文貞集原序鴻寶官翰林知制誥凡若干年得文若干首鴻寶之於文章其天性也所為制辭無一靡語無一濫語蓋凛乎其王言焉復無一塵語無一勦語無一凡語又無一語不嚴且莊也海內想聞而欲見其全鴻寶靳然不出其門人王炳藜諸君堅請乃出之既又曰全則繁半則難為取舍余乃為選之評之欲使海內由一斑以窺全豹云爾而更敘次其目首恤忠教天下之為臣子也斬首陷胸而天日為昭斯制詞之所借光故以為冠也次賜環彰聖主風勵之大權也人生顯晦升沈有時命焉不失其正則君子之所自處也次功敘朝廷之所以昭勸酬也次恩覃國典也次考績國課也隨其職能而各有勸勉覽者亦於斯稽官守焉斯鴻寶之制詞匪絲綸是焕且經緯攸賴裁成輔相亦窺一斑何啻黼黻皇猷已哉因余所敘列而考其世定其品斯又當代人物之林矣賜進士及第禮部左侍郎兼東閣大學士長洲年友弟文震孟拜書修其文而不足以明天下則不若蓬卷而處修其質而不嫓於天則不如椎髻而舂臯傅之為文以視天下皆蓬卷而處夷施之為質以視天下皆椎髻而舂信其言則涇舟之側無有譽髦有嗿之田無有媚婦不信其言則貍斑與豹蔚爭坐隴廉與娵孟同宫是兩者説之無定者也亦有定説神農為帝不能使五穀貴於金玉堯禹佐之不能使疏冪尊於絺繡五穀貴於金玉疏冪尊於絺繡則土塊掬飯皆為鼎烹人脯鬼血雜揉於道矣故三家之子不能為金玉絺繡則必寶其粳核針錐寶其粳核針錐以為尊於金玉絺繡此亦恆情明主不誅必以為用其道可以治天下可使鉛松不御金玉齊價是則大呰明王之所惡也故仁義者精微之産也禮樂者奧博之致也奧博精微著於心貌而施於文章在生者之身猶是疏冪五穀也而少見者多怪多怪者重創明主亦因之以為必屏圭璧蕩金錫而後可為治於天下則是燧皇郤竈結繩復作也三家之子苟其才不至於作􅋆智不至於窺盜見人金玉絺繡則斂手屏氣正容郤立退而視粳核針錐雖無艷志亦有安色是石户之農所引避於庭堅涓成務光所霣心於莘野必使英娥挾刃以伺夷光胥靡感圖以譟版築則情慮不至古今絶類由斯而談豫見鴻寶則不復談文章亦不復談易豈為慢乎豫之蓬卷而椎髻固已久矣崇禎壬午十一月弟黃道周識於縠水舟中吾師鴻寶先生著述既富復集其單篇雜辭因人事酬對而為文者凡若干卷名之曰應本夫文之統系俶哉五經五經之中惟易禮春秋道專體一為聖賢之著書後世子史二部凡成一家言者皆源之至於詩書所載則觸物而生譏頌因事而成治忽篇非連類義以情生雖理致宏深要亦應世之作也若夫易之有序論禮之存銘誄春秋之記書檄讚傳成書之內時見散文乃知六經之書無多大半遇人事而作後世文人動皆有集按以經義未為離畔漢魏而降操觚之家著書日寡散文日繁蓋道簡而難言事煩而遞起勢使然也然未有如近世之蹖駮淫濫言不顧行者汗牛之文同於稿蘀識者悼之原其流弊失有三端一曰論人之失夫元晏之序太沖中郎之碑有道苟非其人文不虛立近世綴文不别流品西蜀富人陽翟賈客元黃所至緗素斐然故使筆舌日輕無徴弗信其失一也一曰記事之失夫馬班作史雖名公偉人紀其生平止書數事近世取悅家乘凡閭巷贅言井臼鄙語罔不飾彼蘧戚等於娵陽承祚伯起未至斯極其失二也一曰辨體之失夫序與論異旨志與傳殊科或簡或繁各歸典則近世惟務紛葩全無辨别序述文章而泛稱德行勒銘珉石而同於汗青其失三也此於古人矜好之意牆宇已墮何望其上應經旨而仰窺聖域乎先生以英朗天挺之才宏逺多識之學應期名世作時君宗修辭立誠乃其餘緒而奏對則轢董賈掌制則追典謨闡經則並遊夏執簡則儷南狐洵乎經緯之鴻裁也至於酬應之文尤非經意而辨雕所至已絶攀躡今觀集中所載投贈之雅莫非名德褒美所及不濫平流使被辭者榮於山龍銓品者信於金石其論人也不亦嚴而正乎所書之事或係典章或切風教苟非懿德無取連篇揚厲之中仍存直筆其記事也不亦簡而核乎圓規方矩因物異形南越北燕殊塗分軌能使口無當擇之言篇無可通之製其辨體也不亦整而明乎蓋先生之性博大易良推賢若不及奬拔後進不遺餘力故辭章遍於宇內然其為文也無溢美無虛譽所由與世之作者殊矣今天子以樞府召先生方將升之百揆授以大政自此以往機務煩積憂勤交贊即以暇日發為文章亦如臯謨説命姬文之七月召康之卷阿揚言人主而已恐交遊知舊欲求先生之文而不易得則凡兹集所列當先生一言之重者顧不足幸而子龍備吏於越得侍先生左右晨提夕命者且三載又豈易遇哉壬午至後一日華亭門下士陳子龍題於語亭舟次先公官翰林掌外制日久及門楊機部王二彌諸君刻卷軸鴻篇為代言選凡六卷一時館閣翕然宗之及崇禎丙子先公以司成歸里復裒輯生平酬應之篇都為一集曰應本其剞劂則陳黃門卧子任之刻甫竣而先公以佐樞環召旋管計務日夜鈎考兵食議節議生凡以碑志序記請者概謝絶弗答每顧語小子鼎大臣憂國之憂何暇以立言表暴乎然先公當退食時偶據几攤書則取舊刻點勘朱黃甲乙若以待異時刋削者鼎奉而庋諸篋衍殆戢戢如束筍無何劇盜躪都銅駝荆棘舉先人手澤之貽悉散佚於兵燹煨燼中其存者裁什之三四爾年來詮次遺書乃復取舊所藏者敬加參校釐正繕寫俟他日夀諸梓焉夫文章得失寸心自知朱晦翁謂廬陵環滁皆山起句本二十餘字後乃鍊為五字李商老謂少陵桃花欲共楊花語自以淡墨改三字蓋一言一字之間有老去漸細之境讀前人集者必求其晚年定本豈直為陶陰焉馬之訛已哉鈔成因識其緣起如此男會鼎恭述
