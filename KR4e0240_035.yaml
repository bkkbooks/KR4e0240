body:
  text: 倪文貞講編巻二明倪元璐撰日講王如施仁政於民省刑罰薄税歛深耕易耨壯者以暇日脩其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣此一節正言百里可王之理見我能操其必勝也刑是五刑罰是五罰税歛者以上取下之統名田賦而外若工商虞衡之入皆曰税又周禮天官太宰以九賦歛財賄是也孟子説道臣言百里而可王者何也王今者若施行仁政以及於民於刑罰則省之而用法以寛於税歛則薄之而取民有制使民得以安力農業春而深耕夏而易耨而民之壯者又以閒暇之時講明孝悌忠信之義入以此事其家之父兄出以此事其國之長上則是衣食既足禮讓又興百姓都有親上死長之心一遇有事必能出力報効雖以秦楚之堅甲利兵可使斬木為梃以撻之而取勝於萬全矣臣思人君圗治莫大乎重民之軀命惜民之脂膏我國家車書一統宜乎兵革永息矣然而今者各省盜賊所在披猖臣愚反覆思維盜賊本吾赤子也所以致亂者總由未能省刑薄歛故耳如考成之法所以治吏而吏急催科其勢必至鞭朴以戕民又如秦晋等區初以災荒致盗繼以干戈廢農死徙幾盡而賦額如初勢又必至驅民以從賊為今之計莫如愼選循吏以彰德化别求生節之䇿蠲除加𣲖使百姓歡然知有身家之樂則其心不離其氣必振可使賊反而為民亦可使民徃而殺賊流寇自底蕩平矣以此觀之省刑罰薄税歛此二語者仁義之談即是富强之策也孟子之言初非迂濶伏望皇上體察施行孟子見梁襄王出語人曰望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾對曰定于一孰能一之對曰不嗜殺人者能一之孟子仁義之道不行於惠王猶冀見用於嗣君及見襄王而又知其不足有為也出告人曰容貌辭氣乃德之符我今見王逺而望之不似諸侯之象近而就之不見可畏之威又且出言無章卒然問曰天下紛紛如何而后得底定乎我對曰今列國分爭民無專向所以紛紜直待悉主悉臣歸於一統則勢無兩大政不多門然後干戈可息而天下其定矣王又問曰今之諸侯孰是能一統天下者乎我又對曰天下非兵革之所能威智謀之所能結也惟有禀好生之德懷惻隱之心不好殺人者以仁心行仁政而四方歸命于是乎尺地莫非其有一民莫非其臣天下可得而一也此葢孟子以其時殺運相尋梁王新即位恐其習成殘忍草菅民命故切切然隨問提醒之如此臣嘗思堯舜之仁而有誅殛湯武之義而有征伐帝王馭宇豈能無殺人之事但要把這一㸃好生惡殺的念頭時時葆認葢觀大禹下車而泣罪人陽膚為士師曾子告之曰如得其情則哀矜而勿喜大禹未嘗曲赦罪人曾子亦非敎陽膚狥情廢法只是為人上者有此悲閔有罪不喜得情之念存諸胸中則必無深文故入之事躊蹰顧慮之下生全必多又觀夏書𦙍征之告曰火炎崑岡玉石俱焚宋史太祖之戒曹彬曰尅城之日愼母殺戮斯二者當赫怒奮威之時皆有愓然惟恐殺人之意所以師行民悦坐收寧定混一之功凡人主之一仁一暴繫於存心不可不省也臣聞程頤諫折柳懼傷生意宋宗盥潄而避行蟻於物且然何况人命乎皇上至仁如天臣愚敢以是言益堅聖德孰能與之對曰天下莫不與也王知夫苖乎七八月之間旱則苖稿矣天油然作雲沛然下雨則苖浡然興之矣其如是孰能禦之今夫天下之人牧未有不嗜殺人者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之猶水之就下沛然誰能禦之與是歸往周正建子其時七八月即今之五六月也孟子义述已與梁王問答之言説道王又問我曰今天下民各有主孰肯棄其主而來歸我乎我對曰天下之百姓莫不欲得所依歸趨向仁君者也王知夫苖乎當夫七八月之間亢暘苦旱則田禾枯槁天忽油然而作雲沛然而作雨將見解澤一施苖之枯者忽轉為榮浡然興起誰得而遏止之乎今天下之諸侯有牧養斯民之責者無不爭城爭地糜爛其民未見有不殺人者也如有不好殺人者出乎其間亦如大旱之時潤以甘雨天下之民皆延頸瞻望欲得之以為君矣心誠向之身將焉往將見民之歸趨之也猶水流之就下其勢沛然亦誰得而抑阻之哉葢饑渴之時易為飲食萬方嗷嗷仁主之資道固然也孟子所述告梁襄王之説如此臣按篇中人牧二字最是警醒動人葢未有以牧養為名而可以殺戮為事者也代天牧民者惟賴天子代天子牧民者惟賴守令臣竊謂守令之能全不在於武徤搏擊守令之所以守土禦寇者亦不徒恃保甲鄉兵但是愛民如子民心愛戴者其境内自無盜賊即有他盜來侵百姓亦自能為他効力死守如古者尹鐸之守晉陽至於沉竈産蛙民不叛去尹鐸未嘗知兵只是平日之政不以繭絲催科殺人故雖以智伯之强合三國之衆不能克之一方之牧如此元后作民父母者益可知矣大都政事之可以殺人者不止一端聖王之治天下無論寛嚴總歸於神武不殺葢此不嗜殺人之心即是天之生理在人身為元氣在宇宙為太和人主常存此心不惟盛德感人抑且以和召和凡天地間吉祥善事自然與之相㑹故曰元者善之長又曰作善降之百祥自古及今惟有仁勝不仁未聞以殺止殺後世人主有意勵俗但知亂國用重典激而用殺不知亂世之民偏不畏殺至于民不畏殺天下事尚可言哉倪文貞講編巻二
