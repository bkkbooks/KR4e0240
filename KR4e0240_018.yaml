body:
  text: 倪文貞集卷十八續編一明倪元璐撰書牘復朱公恆嶽燮元天啓甲子翁臺手擘蠶叢目籠鬼國私心所急者冀在斧戕告成衮衣入相而某進則公其北斗退則私其泰山斯大快也每辱台教一讀曉聆惟隆賜稠渥茲不可安翁臺每割肥以享士遺家而急公自髮膚以往無一有者而獨不能去某胸中郵漿驛饋直以郭大夫處陳無已不亦難乎某逢此百罹誦中林之詩有維谷之歎今者中朝振瑾之禍飈發蜂起本由博浪之椎一擊不中而今且京貫比連譬則攻癰不消內潰更甚北寺黃河之禍有不忍言者心之憂矣其何能淑乎方今之時無問疆事朝事一須才識誠望福五事兼備如翁臺者乃得為之蓋惟才可以應卒惟識可以察幾惟誠可以格幽惟望可以作氣惟福可以却凶苟非其人雖射隼彈梟聲忠鼓義猶為用罔耳其二奉台諭示以無法之治比參芪之殺人第思亂國用重典武侯之治蜀是也然非恩信素結剸割有方則亦何以成之哉烏喙雞毒自扁氏用之可以生人而專用之誤用之則皆腐腸之藥也瘡痍新定道在拊循且滇黔土風素稱椎陋恩威之互用有若轉圜惟願寬以濟猛猛以濟寬斯則純王之治耳膚功既奏簡在正隆翁臺將不免為彼西人留于信宿何乃欲賦遂初夫功成身退大臣自處則然而巖疆善後之䇿尤亟也役旋肅楮順候道履與黃石齋道周崇禎戊辰三年不見幼玄乃其文章風節則如在目前也幼玄作者俯瞰一切可以朝報左史腐賑馬遷百十年後當更無一人道王李矣琴和痛定宜興覲光之思伏惟夙駕主上極聖以堯之明而有四凶舜除四凶在五十之年今以沖齡遇之是昔之君子罹曹節王甫之凶而今之瑣人享唐堯虞舜之福乃尚欲使同文再獄元祐重碑賈誼復生真當痛哭弟不量螳斧犯此隆衝孤支作掌瘦肋承拳雖復形化骨銷不以為恨耳小疏及試録墨選共五件請正縑筆兩事具别狀以幼玄素􅎭已更將必大開文字之禁雖為微薄有其義存向者維揚風利割纜不作覼縷寄聲魚公嗣圗李報也其二壬申秋間匆遽言别每懷黯然聞留滯胥江已及數月何生羲兆輩方誅茅鋤土啓闢講堂二三友朋自是有所指授各以正學相鏃厲某即當遣家中子弟從遊杖履開其荒塞耳夫聖賢之道體用一原是故言性命者學也言事功者何莫非學當國家多故農田水利之原邊防厄塞之要錢賦之出入制作之沿革吾黨所宜講求者非止一端若夫浚羲文之畫轉濓溪之圈托拾禮樂塗改詩書曾足以盡學乎年兄奧衍深邃之才博綜掌故洞曉機宜其所以成就後學者在於樹人才而紓國恤不止以剖析鵝鹿疑義抗懷有宋諸儒已也其三自兄去弟彌涼颯山中七日世上千年益知朝市山林有仙凡之辨也近者會推一閧咄咄怪事不圗天下有此夔睢非主上聖明大事去矣盈廷多敢言然只是枝葉此魅與某相共歡比周財神智鬼百事皆全此豈吾黨正人唇舌之功所能撑拒弟蛙腹脹破頃于講筵連發二義直刺揆地藪姦遂為當軸兩公側目前二十日講罷上以邊事召政府諸公某相遂中傷弟然上亦小薄之跽奏移時默然不應顧左右言他而止不然禍且烈矣智必取遲勇必取早弟當審所處耳其四每讀大疏神思豁然得所論慎喜怒以回天心者知兄正心之學蓋喜怒慎而好惡弗涉於一偏刑賞悉歸于至當推而致之即中和位育之理也然尤願在廷諸臣精白一心弗營金錢之窟弗徇情靣之私弗沽聲譽而昧國家之緩急弗標名節而忘君父之焦勞存虛公正直之心具明允篤誠之器而後可以集事趙忠毅云臣不過欲與大小臣工各以其良心為社稷蒼生計而已此言誠今日之要劑也世波顛踊譬彼跛人東突西張無有是處年見持議侃侃知聖明必前宣室之席耳復劉是菴相國一燝戊辰某自公車已知瞻慕明光奉為斗極竊謂老先生之大業近方有宋大都如王子明之名通而歸于峻整有韓稚圭之堅定而運以精詳日者平臺三召英武驚人使以老先生當之知可大出條侯之對不發令狐之汗也然而大猷方張元氣未固熙豐之伏莽繁自彼徒洛蜀之微芽萌于我類又主上方綜核名實鋭心富強或恐以王成德儒之一事盡疑百爾之心因而遂有宏羊惠卿之小人大興言利之説一瑕偶見百釁俱開非夫價人不能早定所謂正君心以正朝廷正朝廷以正百官者於老先生手額尤切也某猶鬋髳其細已甚惟是金門氷署槖筆侍從者第雍容以文墨相髙至於世道之消長人材之邪正偶有建白輒以侵官為譏彼誠不知詞林固論思之官耳復范質公吏部景文戊辰弟正如鶡一毛偶斑見而愛之者遂誤謂之鳯非惟不知鳯亦不知鶡也蘭吹三至每荷溫文知往日山公啓事之心至今激熱然終是誤鶡為鳯也弟謂翁兄愛我不如直題之為鶡蓋恐大美之名天下疑其非分形見勢移於是遂有怪之為蒼鷹老鶻挾彈而驅之者其時翁兄雖百喙能解乎今者離照日章英察相遇重雺苦霧化為明霞來教徹底澄清是大藥王手人病邪結狂發未有硝黃未下而可驟進參苓者也然而日來爬梳將無小混如賈浮弋自有勝處乙丑出山一疏雖語多支離其苦心自存髙硜齋太僕卓然人豪更出賈上而今巫山一炬芝蕭並焚此則弟所大慮也又弟謂今日論及崔魏一案只當就其中分疏洗剔如乾兒義子生祠頌德之徒不必言矣其次則其委蛇取容安享富貴者又次雖未甚討便宜而曾向彼伸寃訴屈作可憐之色者於此廓除一畨儘足昭回日月若其從前意見元黃議論牛李雖甚頗謬而總於汚濁無所沾濡則盡可收之一室之馨冒以九州之被庶顛波不作大道可遊弟持此説甚堅昨已面啓閣中諸公矣翁兄亦以為是乎翁兄大節千人共見耿中丞誠知人也制誥二軸合弟書恐鴉蚓之迹上辱龍文無已或將原稿檢來聊試為之少文兄弟十年盟友今之人龍弟誠無可輕重然使軾轍不與鴻詞則蓬山可拆矣方病杜門潦率抒報庶見素冠何時可吉耶其二時范公官南司馬邇者楚盜暫紆秦寇復熾而玄黃之廟戰奔莧之墉興覩茲百端不知所效某濫厠侍從無補啓沃然惟有以不敢自欺之忱盡因事獻納之職而已昔伊川先生謂今之經筵實古保傅之任欲使內臣十人供侍左右倘人君出一言舉一事食一果實必使經筵知之今雖事勢萬萬不敢出此而聖主虛懷謙受稍有一得皆蒙霽顔則講席敷陳正儒臣所以效忠者惟自慚識陋而言略尚藉教提開其荒塞耳向委蚓縈金石之事誠不敢率爾謀之耽延至今今又管城告竭旦晚南鴻有來或得伸紙如志便能報命也瑟彼玉瓚安得黃流與相侔副驚承明賜徒有醉心附去玉導一枝綾綢一匹惟衣裳在笥天子之所圗也朋盍簪勿疑吾黨能無意乎答曹珍宇于汴戊辰邪正才分元神未固其望價人之來比於望歲者非徒鎮靜之謂也憲府肅清則百僚振厲靖蜩螳沸羮之氣而布紀綱法度之司惟台臺定􅋵定識始足副聖主側席之思耳某歷落疏間本無足重頃與家仲論劾魏顧二輔來教許為直言又疑璫禍方熾脂韋容恱者不獨此輩然逆竪威福自擅之初挈其柄以授之者南樂也綸扉之地靦顔就列者固尚有人而昆山為最今摘其穢迹數事亦使居鼎鉉者共知惕息毋貽覆餗之耻耳惟是賈生痛哭取忌當時世或遂有集矢而驅之者得失之念某蓋久置於度外矣孟平事兆祥敝榜中龍象也雲臺髙議亟需此人台臺誼在同升即不得引嫌里井程明道首薦二士即其弟伊川表弟張載也史稱知人願台臺毅然持之復錢昭自士晉戊辰某最駑鈍辱翁臺注存攣攣况又申之奬飾寵象人以綈錦乎台諭為世道之憂而不肖亦正有杞人之見方今聖人秉極天下為公決不當復存聲氣之私存門户之見頃者孟浪一疏非欲為東林標榜也正以東林不盡君子而正多君子其非東林者原有小人而亦不盡小人若付之不皂不白則是非邪正之辨不明矣即如三案中若兄翁所論梃擊一案本是絶無可翻之局蓋論事則處分只有此法論人則彼氏原非清流此較之紅丸移宫最為堅定然而其中佐議之輩豈盡僉壬此際用人之時理應區别倘今日欲沈人以定案則後日必且翻案以伸人理有固然勢所必至此非具大識力不能神明其用也膚識巵言業蒙嚴旨且彈射四起矣然區區之愚竟不可易也他日必有思不肖之言者不識兄翁以為何如其二時錢公為滇撫遙欽雄問心眉並飛我瞻四方蹙蹙靡所騁而金馬碧雞之秀獨號神臯豈非漢用孔明唐崇忠武是使南人戢心於營陳六詔歸命於地圗耶流寇至震橋丘中都蜩沸陜洛之間並又蠢動廟堂猶且悠悠未有定䇿杞人憂天不知所底惟兄翁綏靖巖疆飭勵頺陀猝有緩急亦可提師應之弗以一隅稍安而忘天下之全局也與吕豫石維褀戊辰天子不忘涑水之舊人在翁臺豈得守東山之敝履乎某羊鹿小門歸誠龍象間者不量螳斧結怨隆衝冀力破門户之見區區之心徒以堯舜在上節甫已除百爾靖獻止期以大法小廉襄升平之治又何容更作標題妄分畛域乎且某更有説者生平於邪正之介辨之甚嚴而待之不惡未嘗欲索瘢於小人亦不肯苟同於君子若夫雞肋一官棄猶土飯久矣答王季木象春戊辰神交二十餘年即不能知面廣狹而夢中可尋七載顛波龍蛇走陸清霜皎月罣于妖虹今則大昕既出明霞四飛豈非渾蒙之又霽儀象所重陳乎弟偶以蛙怒腹脹發其詹詹然而處此昌辰數理並會雖使千夫塞默如蓄栗紅灰勢無不爆來教侈啁嘈於節足非其質矣蒲輪朝下英州夕還所恃巨靈下開生界要使熙寧紹述無往復之憂鐘乳芒硝有循環之用則堯壤坐擊周器無欹衛士兒童共此手額耳扇頭詩絶唱有辭鶡探驪之愧新刻便中望多多寄教也其二己巳又得衷言彌益氣義山阮神交未有踰於此者也世灰大滌器界重新長沙前席足使痛憤化為謳吟主上綜核名實英武莫倫而微窺睿意尚似尊富強於仁義之上則亦未有人委曲陳明者今使六韜左列七䇿右陳苟不得公望夷吾而用之亦何益乎浮翁硜老人有一箭雙雕之嘆然事既至此只合從容計之恐磯激則又成穴鬪也答孫愷陽相國承宗己巳伏承明教惄然思深蓋以闢門籲俊而為綱紀四方之計翁臺之言及此國家之福也然以天子聖明道兼離巽既不同神皇末載之軟熟喑聾亦已大反熹廟七年之喧豗漰湃惟願朝端省一議論則宇內多一事功間者詹詹之言殊慙多事然以息羣囂而䇿羣力則有不然者乎其二邪正必當分明而氣類不相依附溷溷于前嘊嘊于後皆足為世道之大憂况今𬈑濛大霽聖明方厲精更始諸君子正宜乘時奮績為君國計久安長治之方為百姓講休養生息之術不獨竿牘苞苴力當杜絶即立名樹節之心近於激烈而入於偏畸台教中立之論誠為度世之針可以入告一人可以出咨百爾者也某偶作蛙鳴非敢蜩沸雞肋付之度外鶴夢清而可安知台臺道義相期不以為念耳匆遽率復臨啓依依與李懋明邦華己巳新命頻頒八方手額丈人貞律之望司馬克詰之功延頸喁喁佇觀大業比於菜色之跂參苓也昔楊誠齋以斟酌元氣稱頌溫公本朝自承平以來文恬武嬉習為故事雖有紀綱法度之布正人君子之名而閭閻之凋敝府藏之空虛有日甚一日者譬則萬間廣厦即丹艧一新塗蔇如故乃欂櫨榱桷間木蠧叢生而楹礎有岌岌難安之勢蓋元氣之耗久矣夫盜至辱行也然不可曰聊救飢而為之今之言加𣲖者是也人家失火急則益宜心定分署其子弟僮僕引沃器隨之此上䇿也神魄駭散而號呼於市召不知誰何之人其雄者劫資以去尫者望煙反走忠勇而赴救者又迷不知所向今之言召募言征調者是也台臺職任中樞正宜亟加釐剔練固有之兵核固有之餉提掇舉朝精神使各知公忠體國外固疆圉內輕徭賦斯可恢復國家之元氣耳與錢大鶴允鯨己巳南兵駕司之有馬快船也戊子以前大壞極敝凡各繇軍户幾無孑遺矣自先君子起而更張之改僉差為雇役竭五年之力而後報成於是四十八衛數十萬人慶若更生凡留都之所以安堵至今四十八衛之身命生全至今者皆先君子之功也然此法之行甚不便于衛辨何者往者僉差則三年編審之權皆衛辨為政平時之魚肉臨事之需索無所不至報充則賣富差貧督逋則敲肌剝髓故凡三年一運之間賣妻變産者不可勝數而衛辨之權重于泰山自雇役之法行而官徴官役於軍無涉矣差與軍無涉則軍與辨無涉矣始軍之視辨也如虎而今之視辨如途人以此衛軍之生理日茂而衛辨之署如氷軍之尸祝先君至今日盛而姦辨之積恨而思欲變之者自戊子至今五十年中未嘗一日忘也從前凡遇駕郎到任必起一畨簧説其明而賢者必痛懲而力持之矣間有不明者或為其所中而不肖者又為其所餌動起絲紛旋來鼎沸究竟無敝之法不可得更徒賈萬餘人一畨揭竿之象耳今從彼軍復有此謀而當事微為所惑雖事必無成然當今飢卒呼庚之候萬一勢起揭竿雖食姦辨之肉亦何益乎根本重地年兄急須留意奉上船政新書一部冀垂省覽并乞進彼中故老襟紳假以清燕使一悉其所以然彼必能縷縷道之也答梅長公之焕庚午日以杜門不及申自崖之致良用歉愧今日中朝之士擬有二端其一者贊歎芒硝取其下滯不知中氣垂竭此台教所云去乘前取勢不顧後悔者其一則駭濾擬瞀莫知所措又畏棒太甚益務繭收蝟縮結舌癡視奕家先手呼盧家清盆遂無一人識者是可痛也大都天下之勢不患無議論而患無事功不患無風節而患無經濟惟須定識沉幾之一二人持之讀來教存元氣搜人才二語窺其靜定也某眉贅股隨何所輕重而硜硜自持誠不欲使委街閴巷推重要離耳答吳鹿友甡辛未伏承眀教適慰所思秦晉之事廟堂俱未有得其要領者厝火不救漸致燎原合數萬荷戈之衆曾不能剪烏合之寇而猶藉口於武備之單虛夫水至柔也以竹承其流竅而呼之則騰激可十丈善用兵者能以忠義勵兵斯勇氣百倍不待金鼓以聲也台臺繡斧西巡函關搴壯聲忠鼓義俾閭閻有敵愾同仇之心但知殺賊而不肯從賊則𠞰易為力矣至於撫則猶有可言者當此斗米四錢之日度現在之十五萬金必不能盡人而給惟在附近州縣稍稱豐稔之區擇賢守令設法糴買運至近賊地方盡心賑濟給耕種輯流亡民於是知有農桑之樂而相戒斧鑕之威斯從賊者亦化為民所謂撫民不撫賊者此也大范老子豈復猶人方今名將鋭卒雲集還鎮惟提掇精神振勵頺陀則壁壘改其故觀將使惠文冠采大揚兜胄之威執法星光坐掃欃槍之色矣使旋肅復惟祈專意致功上慰宵旰麟閣勳名果儒者意中事耳倪文貞集卷十八
