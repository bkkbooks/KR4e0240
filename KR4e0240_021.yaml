body:
  text: 原序禹有禹謨皋陶有皋陶謨益稷有益稷伊尹有伊訓太甲咸有一徳傅説有説命召公有召誥周公有無逸立政諸葛亮有出師表此八聖一賢未有不陳言者也今治不尚於繩學不尚於畫而曰弗陳言奚其宜哉此高徳之所以逃俗儔之所以絶夫國家立之史也而使其地得以近不爭事其近不若逺其詞得以直不爭事其直不若枉使其位得以高不爭事其高不若卑使其人得以親不爭事其親不若疏故凡史爭非論諫也通春秋也必立天下之所是而不詭之是謂君子羅倫抱修之素儒也舒芬執徳之奥宿也爭於方直劉球指事之善言也爭於守死楊慎文章之後進者也憑於典故爭於大禮此四人者擅理矜節之士也今非徒稱於擅理矜節也由此為天下顯人大臣以昌其名當時今世聞而敬之此得之於爭事也凡爭事必守本樞心則内清斥營交稽讜聞畏綱法閑大體袐精念不外泄求交驩師所獲是之若虚否之無惕務明其見小事寧裕寧裕之道恕人為本大事振厲振厲之道恭國為宜此所以陳言也惜才節疾讒説忻有道敦經訓放淫佚端辯論在朝廷道仁聖禮義之序燕處聽雅頌之音此所以陳言也毋苟得質疑言内君子務擇定逺小人必寛舒善辭命務簡要必諦聴和威儀正起步觀顔色必勞謙此所以陳言也君子之事其君也致身必培力以凝績議事必耑氣以昭宣議事不耑氣命之曰懦致身不培力命之曰尸懦夫尸官聖王不臣賢人不友故讓也者禮之從者也爭也者勢之反者也禮之從者莫大於恭和恭和莫大於讓勢之反者莫大於執兢執兢莫大於爭執兢則當惽時反闇而知矣當賊臣反佞而經矣當亂世反危而强矣昔孔子曰事君不下達不尚辭非其人弗自小雅曰靖共爾位正直是與神之聴之式穀以女其謂是乎天子設鞀鐸祭先王燕羣臣則使嘗為射者抗侯所以令爭事與陳言也倪公陳言凡論斷方隅二奏躋正閑邪也毁私書一奏將有信於後也釋纍一奏赦𤯝也畱學行一奏惜賢達也上制虚制實十六策有所反覆凡六奏立言條務秉道不回也宼禍一奏固民也學宫墜事一奏勤也八議成人而進之也求事親六奏易退也孝也崇禎丙子夏五穀日宋玟文玉甫撰
