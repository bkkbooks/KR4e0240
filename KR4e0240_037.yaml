body:
  text: 倪文貞講編卷四明倪元璐撰日講子之燕居申申如也夭夭如也這是聖人有道氣象於閒居見其一端而記者從旁模擬之如此造化一闢一翕大道一張一弛人事一作一息易曰君子以向晦入宴息聖人當閒居之時乃天德入寧之㑹其愼獨之學問于此益嚴洗心之工夫于此益密不顯亦臨恭默思道之意念于此益深但其見諸形色者與時偕行時既燕閒則外無因應之煩內無朋從之擾自然有心廣體胖官止神行的氣象呈現出來凡反覆以暢達其義曰申孔子此時四體舒暢恰像是申申一般少好而其容可悅曰夭孔子此時容貌和悅恰像是夭夭一般然此非有意為之也孔子處嚴肅之地未嘗拘謹而人自見其踧踖戰色其處燕居亦未嘗快適而自見其申申夭夭就如天運流行在晝不加震厲而人自見其動蕩在夜不加舒緩而人自見其靜安孔子一天德天德一王道也臣按帝舜以聽政之暇鼓琴而歌南薰召公陳卷阿之詩曰泮渙爾游矣優游爾休矣古之帝王雖極宵旰必有泳游藏息之時蓋非徒調適情性以致極其中和亦欲節嗇精神以敦厚其功用譬四時有春夏則有秋冬人知秋冬主收藏不知萬物化育之機正在這收藏時節保合得多醞釀得厚所以一到春夏發生無窮是故君心在于無逸而主術貴其不勞既無繁瑣自無倦怠君德日益清明君身亦日益彊固矣臣愚敢以是為聖明存心凝命之助子曰甚矣吾衰也久矣吾不復夢見周公此是孔子周流至老而道不行付諸歎息的意思堯舜之道自禹湯文武遞傳以至於周公周公之後繼以孔子此一脉淵源原自親切又且周公為昭代開天之輔禮樂制度之具于周官者其則不逺尤周之子孫臣庶所當憲章孔子欲振周衰則必行周公之道所以一生羮牆夢寐獨注周公及轍環幾遍而道大莫容孔子度世無用我之人東周無可興之日于是慨然歎曰甚矣吾老而衰也吾盛時嘗夢見周公而今久不復然矣竊意孔子的精神志氣塞天地而貫今古何有盛衰孔子之盛衰天下之泰否也其詞微而其志可悲已臣愚思帝王圗治總以精神為主未有精神到而功化不出者高宗夢帝賚以良弼而得傅說是已臣又因孔子之志欲以周公之法振周之衰而深悟今者起敝扶衰之道莫善于率循舊章欲循舊章務得祖宗精意之所在如一官制也昔何以特設此官而得其官之用今何以仍是此官而雖有若無一法度也昔何以特立此法而見其法之良今何以仍是此法而其弊百出以至宫府上下之間刑賞勸懲所在察其至理詳其深意斟酌寬嚴不務更張如是則祖宗在天之靈必有默相啓迪者詩曰帝謂文王又曰陟降庭止蓋恍然如聞其語若覩其人豈特夢見之哉臣愚敬以是言發明皇上率祖攸行之至意子曰志於道據於德依於仁游於藝此孔子示人學問之全功欲人隨境體驗自入門以至究竟淺深本末一以貫之蓋學必先於立志而惟恐所志者非其可行學又必期於有守而惟恐所守者非其可恃勉强不如自然而惟恐其誤以私便為安宅拘攣不如活潑而惟恐其謬認物纍為天機若夫道者乃事務當然之則聖凡共由之路就如為臣當忠為子當孝這個道理乃千人共曉萬古不易者所宜一意向往念兹在兹譬人立心要到某處地方時刻算計定有走到的日子這叫做志德者即是我心中所志的道理因我求之專切忽有透悟理㑹之處向之懸想無屬者今乃有得於心此時實見得是即當謹持勿失譬如大家的土宇我一旦取而有之時常管守即是我傳世的家業矣這叫做據仁者乃道德從出之原天理元氣團結所在此須與之相習不離譬如衣服與體相附親切貼合絶無一毫苦難隔礙的意思這叫做依至於藝者乃道德仁之見於形器者六藝之類是也末學之所共習亦聖人之所不遺要惟涉獵涵泳使其心有寄而不滯如善泳水者但浮于其上而不溺其中得水之趣而無其害這叫做游修此四者庶學者之精神無不用而學問之事畢矣臣觀孔子所言乃內聖外王之學用之一身則治一身用之天下則治天下就如仁育義正乃帝王治天下之本道誠志在此必不苟且以圗小康書曰允懷於兹道積於厥躬義曰從欲而治是也臣恭覩皇上御極以來勤政愛民好學無倦不邇聲色不殖貨財凡此已行之善政所謂行道而有得于心者即是德也要須守之不失日新義新書之言執中詩之稱執競是也帝王之治天下法不妨于威嚴而心必存乎惻隱惻隱之心仁之端也須要培養純熟觸處逢原無論生殺豫奪風雨露雷悉本天心總歸忠厚易曰體仁足以長人是也帝王天縱于藝何所不能要當攝藝歸道用資治理如虞帝鼓琴而曰阜財解慍意在安民作歌而曰股肱喜起意在興事周王矢詩而曰藹藹吉士藹藹吉人意在求才習射而曰序賔以賢序賔以不侮意在考德皆為借此通彼涉而不留禮曰不興其藝不能樂學書曰不作無益害有益功乃成是也太平盛業備于四端區區之愚伏幸聖明采擇今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也今王田獵于此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與民同樂也今王與百姓同樂則王矣聖賢之論每每正反相明孟子既言獨樂之失民心矣若不更將君民一體親愛歡欣的景象設一形容則不足以歆動齊王所以又說道今王鼓樂於此鐘鼓之聲管籥之音非有異也而百姓之聞之者皆欣欣然有歡喜之色而相告說吾王庶幾身其康强而無疾病歟不然何以能鼓樂也若惟恐其不鼓樂者今王田獵於此車馬之音羽旄之美亦非有異也而百姓之聞且見者皆欣欣然有歡喜之色而相告說吾王庶幾身其康强而無疾病歟不然何以能田獵也若惟恐其不田獵者夫均此鼓樂均此田獵亦均此百姓而歡呼頓異豈有他哉良由王能公樂於民恩無不遍此時百姓胸中先有無窮樂趣是以見聞所觸不覺歡欣踴躍如此是故王而欲王不必他求也但推此好樂之心公之百姓使之入有父母妻子之娛出有閭井農桑之適四海歸心即以齊王猶反手矣好樂至此斯謂之甚齊其庶幾豈不然哉此是孟子深明樂理實在于宣和導豫平情感人如堯之大章通於擊壤舜之九韶本諸解阜誠制樂之本論非徒為引君之術也臣嘗縱觀往代蓋有其君流連荒亡而民不樂者亦有其君憂勤愓勵而民仍不樂夫憂勤愓勵而其民不樂蓋由治之無法耳治之無法于是有明知厲民而迫于無可奈何又有以救民之心而反成厲民之事者就如理財無法則必出於重斂禁非無法則必出于嚴刑剔弊無法則本為民祛蠧而民之苦政更甚于苦蠧馭兵無法則本為民除賊而民之苦兵更甚于苦賊凡以權宜之謀救亂事事足以殃民又如近者邊疆大吏忽興採礦之謀幸䝉聖鍳不行否則亂將益大臣聞古之善治兵者必有足餉之法羊祜杜預是也善理財者必以安民為先劉晏是也未聞損下可以益上瘠民可以强民又未聞有以賊弭賊以亂定亂者庸才誤國皆此之類伏願皇上軫念邦本推求亂源苛政必盡蠲除恩詔無成文具又乞申敕中外諸臣務為長慮却顧悉智竭能誠懷命脉之深憂豈至急標而遺本誠得康阜之長䇿自不剜肉以醫瘡脫民于湯火之中於是兵革不試禮樂可興矣臣愚不勝厚望齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之曰若是其大乎曰民猶以為小也曰寡人之囿方四十里民猶以為大何也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎古者天子諸侯俱各有囿所以畜禽獸供宗廟祭祀又或以講武事戒不虞而已後世乃務為田獵游觀勞民之力故雖同一囿也而公私大異矣書曰文王不敢盤遊于田度無廣大苑囿之事齊宣王欲借以自蓋乃問孟子曰吾聞文王之囿方廣七十里不識有諸孟子姑應以紀傳所稱果有此證王乃曰何若是其大乎孟子又復抑揚其辭而曰民猶嫌其小也拈一民字此是孟子警醒齊王處王猶不晤而曰寡人之囿僅廣四十里民猶以為大何也孟子于是正告之曰文王之囿雖有七十里之廣而未嘗以為已私囿中之草木聽民樵採凡取草取薪者皆往焉囿中之禽獸聽民射獵凡逐雉逐兔者皆往焉舉凡囿中所有無一不與百姓同之是以一國之民共此七十里之囿其以為小不亦宜乎此孟子引君之妙亦見古之聖王必無私利易稱渙王居春秋譏築蛇淵囿義亦猶此蓋臣聞先儒云王者以天下為一家此言從無事時觀之猶以為迂及至四海困窮人心思亂取小利于民而即釀大害吝小利于上而即致大費損則俱損得不償失當此之際雖欲分君民為兩家豈可得哉今公私並竭兩利之術誠有甚難以臣愚見惟有一意利民而利國之道已盡蓋有三議有見謂久始得利而不知朝行夕利者屯田是也開墾之初官給牛種官給耕植而不徴其稅似為無利不知流亡即于此招集土著即于此羈縻人心亦安兵氣亦壯及其後輸賦足餉又不必言此當亟講者一也有不必問其有利無利而無有不利者鼓鑄是也地方鼓鑄所在即小民食力所在凡趨役受餼者皆游閒無業之窮民即使司農以此數出以此數入無錙銖之息而所惠養窮民收拾游民者利已十倍矣况又必有微息之入乎此當廣行者二也有見為利之所在而必不可多取不多取之即是利者鹽法是也鹽者天地自然之利衆庶之所爭趨多取之則商困商困則散商散則國用益詘而窮人無所歸命盜賊又起惟商樂民聚即是富强此宜力持者三也三者以公百姓之心行利國之䇿臣愚以為甚便敬竭涓涘臣始至於境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪則是方四十里為阱於國中民以為大不亦宜乎國外百里為郊郊外為關孟子又言王囿之所以獨見其大者以文王無禁而王有禁文王之民樂文王之囿而王之民畏王之囿也臣始至齊境必先問國之大禁知所避忌然後敢入臣意以國之禁令必為宜民而設而所聞于齊民驚相告誡者則云郊關之內有囿方四十里禁民之入如有入而殺其麋鹿者罪與殺人等由此言之則是四十里之囿非囿也乃當國中而為之陷阱以致民于死陷阱而有四十里民以為大不亦宜乎然則囿之大小豈在形制哉臣觀齊王能憫牛之就死而欲易以羊獨不憫民之就死而以抵麋鹿此其所以不能保民而王也臣于是而有感於刑獄之事也殺禽獸而此於殺人此是比例也犯王囿之物極而至論死此是加等也比例則任意加等則亂法民命至重不可不慎也皇上好生恤刑近承恩詔釋滯理寃然臣見向者所司不循正律不據本罪每有比例加等之議臣心竊有未安雖曰律無正條何以但聞比重不聞比輕若云法可意變何又但聞加等不聞減等蓋此即漢人所譏竒請他比不可為訓並宜禁除臣又聞三代之制夏曰夏臺商曰羑里周曰囹圄獄一而已而今兩獄並設各俱填滿塞積愁怨之氣足干天和尤望聖慈軫念體髙皇帝悉焚錦衣刑具歸併法司之德意以撤除詔獄遵文皇帝用法貴在體情特寬初犯之訓辭以矜原詿誤小過必宥罪疑惟輕要使國中之民不以福堂為陷阱斯堯仁極于如天禹德深于泣罪矣倪文貞講編卷四
