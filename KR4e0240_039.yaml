body:
  text: 倪文貞詩集卷下明倪元璐撰七律九日登山使得一天紅葉飛青山略較白雲肥更無寫意圖如此豈有登髙賦者非招五大夫松共飲敕六從事酒無歸醉來不覺身為蝶去與黃花打一圍題友人文稿不能一日廢操觚穴口為關𣙜鼠鬚有鐵自為朱亥用無人可當赤丁呼試看鹿逐誰真主始信蛙淫盡小巫此腕借來剛草載未曾還得長公蘇出門萬歷庚戌出門竟不使春知怕有看花人作詩釜為章邯徒破耳劍當雷煥未逢時真因有字呵風子更取何人作小兒怪底光榮徒一飽憑他二鳥喚昌黎其二喉頭一縷氣如篪自去春明門外吹祇是蛛絲張作網不圖猧子敗吾棋輸他眼底滕王閣哭向河邊漂母祠骨是英雄應有淚幾人能讀孟郊詩奕罷謝顧子真偶爾雲梯墮汝墉素心原不喜輸攻澠池盆缶急求報西市琵琶各有宗請與君盟刑白鷸更如我犯罰黃龍因思世局須泥塊佛與天尊已不容九日山行便謁禹廟茅屋人家紅葉飛天將枯去晚煙肥好呼九日風為孟誰賦黃花歌示韋樹有異形石勒相山無一縫白登圍怕人疑作防風氏急向禹王祠下歸白下集王太學園中卜得鍾山是好鄰東西分署白雲囷較花似較三吳士留月如留千里賔接木有胎為弱晉鳴禽無字不先秦學來五桞先生醉酒氣夤緣上葛巾徐爾從謁選水部捧出新銜疾馬蹄婦當廟見女離閨郎官寒得冬為署天澤沾多水作題恰有樓須憶五鳳安知河不立三犀賀君尺五雲霄近珍重周生到月梯壽閔心宇八十道逢四五著青裙競策雲間處士勳安邑獨高閔仲叔丹臺蚤署紫陽君開筵饌有麒麟脯舞綵人皆鸑鷟文共道春當十月小八千春大可知聞出春明作萬歷癸丑自疑麟篆久塵埃豈亦曾經蔥肆來明是無人解鬼語妄云此子不仙才去從鵑借三更月幻作龍拿一部雷天定未忘三債却好煩鐵研為相催代董監之贈長安賀生逢君燕市魯山眉洵是沅江九肋竒骨亦黃金臺下買名于白馬寺前知賀家從古能投佩董子於今已下帷政合與君刑白鷸圖他戴笠路逢時菊飲為友人壽開如妙錦列如麻小可酬他酒一車絶界仙無壽者相深更天散飲人衙半年腐眼秋方韻一夜顛喉曉愈譁不是前身陶靖節生時那得遇黃花宿靈鷲大峯如杵細如芒看即圖屏枕即牀耄石雛花巡佛案瘦雲肥雨裹禪房翻經背寫遊山記引衲頭鈔種樹方曾道逢僧間半日到來三日為他忙贈祝華封更號東岱叟是愚溪尹是關姓名隨意點人間須知異日當為嶽可與同稱只此山試看猴呼聼我應是他鼠竊到今還因思置子華山上十丈蓮花正可攀其二豪襟似欲叩天關呼我何堪住世間乍識更生名是向因知元結字為山此時申甫藩宣降他日云亭封禪還一自華封三祝後髙山遮矣逈難攀其三聞名蚤已意相關不在爐峯鏡水間人棄家雞憐野鶩天容越士到南關應煩鬼換紗籠字才有僧看蕊榜還千古岱山今著姓地靈原是欲相攀望廬山雲封其頂悵甚天風不下嶺雲蒸欲識廬山竟未能料是加冠延汲黯誰為發被寫薑肱見龍無首庸非吉食馬至肝元不應要已相逢通半面莫教胸本漏嘉陵按萬歷乙卯公至吉水問學於鄒公且為父瓊州公乞銘焉逮後為鄒公疏請易名云元標理學宗王文成而經濟稍遜鯁直類海忠介而寬大較優宜折衷二字以旌儒碩廷議諡忠介蓋論定由於公云初第同門集重五他家簫管我塤篪競渡人齊到曲池各出辟兵符一道散為續命縷千絲人如日旦寅方始節正天中午未移葵作臣心蒲作酒百年莫負看花時賦得御河新桞色閣試天孫春懶散機絲挂向章溝縷縷垂淺黛依微宜綴緑柔枝飄裊不勝衣殢人掌上千回舞臨本宫中十樣眉清蹕欲來須整態何如張緒少年時落花閣試極目紛紛總衆芳紛紅駭紫散文章照人無復當時艷作雨翻成别樣粧偶逐暗塵飄御陌間隨流水漾銀塘人間漫説封姨妬舞破山香有砑光高秋雁影閣試漾漾浮浮淡不過天光照出字無訛可容逺水蘆花見是得孤山雲意多華嶺逢龍俱花葉墨池曵隼有煙波想當不為更嬴下高到冥冥人奈何公成天啓壬戌進士座師為朱文恪公國祚忠節録謂公選庶常與孔公貞運陳公子壯文公震孟姚公希孟薑公曰廣蔣公德璟顧公錫疇陳公仁錫稱同志十友並負公輔重望靜志居詩話云詞臣無言責居無咎無譽之地需次待遷而已逮公與石齋先生入翰苑俱自任天下之重崇正去邪盡忠補過惜未竟其用為世惋惜焉壽劉景侯方伯八十胡麻飯美口生煙才見劉晨溪上旋萬目齊瞻山宰相一星方照地神仙藩宣有績身元嶽烹煉無砂骨已玄棠作清隂椿作樹人思人見八千年送唐宜之判鳳陽召來三月使西夷祇為相如作賦奇驛驛逢花團筆夢家家拗竹備兒騎帝陵秀又添龍護客路清惟有鶴隨想見鳳翔書判日子瞻不獨解吟詩題蟠桃圖為徐比部時甲子七月室後松紋繡有鱗斗南星氣爛如銀最竒此會天開子不小當年嶽降申塞上千金求諫草庭中七月下仙輪歲星是否東方朔只問蟠桃圖上人遊西山仰天大呌想天聞山只三分興十分春到寒潭開古雪僧尋好岫拂新雲光榮鳥蒞名花署跋扈風翻野蝶羣醉去偶然題碧落被人讀作絳州文其二也為尋春費百文好春只合與山分栁絲嬌織煙如錦槐火光燒石有紋來入幕風桓氏客不殘花雨嶽家軍松呼泉咽皆天樂世上爰居聞不聞沈易菴六十按沈以越人而𨽻吳籍旋棄儒冠吳有純鈎越有鋋一時最貴沈郎錢地靈奪客李供奉才子饒年白樂天袍以去青仙骨淨花因出紫壽杯妍不知南極星何意偏照人間處士筵題何孝廉荷墅圖卷似來香氣吳綃上可有錢塘十里無輞水雲煙呈别景新豐雞犬認歸途枕間宗炳遊山法客裏長房縮地符縱是湖光堪入畫不安君在豈成圖道經吳橋范質公吏部招飲瀾園月上泛舟却賦亦為數合解風煙得入名園似輞川刑鷸而盟范少伯騎鯨欲去李青蓮大儒俱出景州道清論如吟秋水篇想見山公能啓事竹林尚有驛招賢其二大略都如赤壁船又為秋夜又坡仙自關福享門當水儘著情央月上天遣嘯入雲淆鶴唳分清與荻美鷗眠無如諢語癡吟好喜聼人呼作水顛其三僑札推襟非素歡相逢不奈有雲肝世間幾士聞雞舞月下孤舟即雉壇除是求羊無客到並將李郭擬仙看請為文字三更飲並問鮎魚曽上竿其四為問盧敖意得不不逢若士豈成遊是風吹至滕王閣有月明如庾亮樓吟苦惟求遷醋甕别難寧使葬糟丘定無人得知斯樂明日之齊訊爽鳩自注云時有濟南之役其五想當無奈問竒何亭較玄亭玄又過竟醉留髠一石酒都忘入洛五噫歌愁豫最是秋宵賦罵世無如春夢婆寧作尊前雙劍影白虹紫電傲人多讀范月山先生家傳不似宣城説范門自鳴豐芑蓼莪恩大書盛德金銀管小吐幽光日月魂千載麥舟同父子一庭槐影詫兒孫五花為誥青為史任取何言報九原月山先生為文忠曾祖文忠父仁元先生公志其墓焉送成毖宇院長赴官留都是處紗籠護逺征薇光正照石頭城知登李白樓能醉去扣昭明甕有聲講席一時虛次仲台階千里隔然明到須急攬鍾山翠恐有沙堤人送行壽朱太夫人才見明綸木鳳傳又聞青鳥授玄編擕將有子西平頌唱向多賔北海筵絳縣人逢詢甲子藐姑山近昵神仙年年此月當春小不道春長五百年丙寅春日湖上偶成歸來萬喜脫􅌢纒不是頑仙即醉仙縱酒何曾虛酉日簡糧剛不少寅年但愁蝴蝶夢難熟真信鷓鴣行復旋畢竟湖中風雨細菟裘吾老志和船題馬騰仲大母顯貞録死節何難難立孤青閨容易到黃壚曷留老眼看孫子但不峩冠自丈夫仰德懷清臺是範陳情令伯表如圖九天褒詔千秋史博得泉塗一笑無家居即事間來自覺頗仙仙門外青山屋裏泉收七百秫已了酒賣三十餅不論錢攀花檻諫無春盡卧月轅留到曉前如此豪酣如此韻道人原不喜枯禪丙寅至日駿狼山上日來巢莫更忙過亥子交已敕閨人詳一線適占復卦得初爻物情北阮驕南阮仙力小茅敵大茅領取一冬元自享揚雄拋與世人嘲自注云時有以同郡勢人相稚者故四五及之寄奉聊城相國龍卧鴻遵事豈輕惜將獨樂著園名為山吐飯延雲物共水和羮燮月情仙宰書厨多脈望長安肉味少倉庚召公耉造今如此何日周郊聞鳥鳴昌化多山竒甚圍得都如垓下軍一峯峯起密於紋小酬好事謝康樂莫語耽眠宗少文九錫擬加溪上石七擒不縱嶺前雲上頭定有神仙宅隱約笙歌月下聞登老竹嶺喜不身如瓠子肥隨風吹上最峩巍峰俱九轉神仙藥雲只五銖天女衣若種梅花應有夢欲燒棧道示無歸倘容化作山頭鳥誓取環山不住飛壽閩泉鄭封公其鄉有秀才隄欲奏元靈曲一詞如君的的有仙姿遊逢若士邀為友夢領沂公下作兒舊築秀才隄被錦新生書帶草成芝世人但識龍章貴名在丹臺那得知里俗所稱王曾惜字之夢似嫌褻賢以沂公易宗聖名甚合集吳符逺潁山之規亭千承谷口有雲封盡擁山光入飲烽石寢將軍疑伏虎松翔老子信猶龍蔣生能徑杜陵道謝朓忽詩落雁峰只看亭身圓似此若猶方內那相逢遊雲巖贈休令黨子真盡日函關紫氣浮飛為快雨下新州相逢合坐三生石一望真驚百尺樓水水霞光明密界山山雷穴發輿謳何緣不共飛蝗去汗漫雲巖十日遊過滕縣時去妖亂六年矣六年聚不幾流離尚是沉瘥未起時鍾乳大須傾十斛春霖少亦與千犁許行有辨真妖首畢戰無能即賊師蚤使時賢知此意不教白骨滿潢池按天啓壬戌徐鴻儒以白蓮教倡亂至八月而始平新嘉驛壁次黃太稚韻只看松林盡日隂紅塵也合少回心搜花作蜜蜂元誤坐葉餐風蟬自深與世難言周士貴是官都怨隴人沉便宜無過鴟夷子又享湖光又鑄金夕馳兖州道即事夕陽飛下魯王宫剪剪追人麥子風一望白難分馬練千年青不了龜蒙夢中丹漆隨尼父坐上尊罍憶孔融俄見隔村晴氣好不知是月是流虹雨後行東阿道中如此風光便可圖不由雨不化醍醐小批花面塵三斗大展山前月一湖獰石魏公偏嫵媚輕煙吕相不糊塗還看遍畝明光錦此却應封阿大夫拜于文定公墓清才偉望冠前朝講幄儒臣羮已調牛李猜嫌元似雪玄黃戰鬬本如蜩龍鱗老幹披松檜馬鬛崇封奠荔椒為念安昌門下士來瞻遺直駐星軺東阿于文定公名慎行萬歷甲戌分校禮闈瓊州公為所取士同門如趙忠毅南星李淮撫三才其最著者也渤海道中喜雨是處呼天望啓封鬖鬖麥又渴于農不勝見彈求梟炙恰可傾瓶滴馬鬃天代耕耘驅鳥象地強河洛出龜龍堪名渤海隨車雨太守年來誰姓龔茌平道中長原浩浩暢如鋪可有培塿一個無剩欲千金購鳥語堪將萬馬擬松呼靈文杜甫防蔥肆朝服王戎負酒壚徒爾風塵徒爾老修人豈必勝侏儒茌平馬上大風大約顛顛盡紙鳶自將沉定守驢肩山雲偶避韓明府野火豈知焦孝然早悟紅塵能變髮莫言金馬坐成仙花花綺綺春前興漸可揚州夢十年丁卯奉使江西道經廬山有感風忙不改白雲間如此孤高詎可攀置我峰頭麋定喜告人溪外虎方頑可知慧逺僧何笑難教柴桑門不關大抵遊人無眼界廬山之內看廬山憑弔一隊湖山十萬師將軍無日不銜巵論文也合孫吳法講武偏宜王謝姿儒雅味如揚子水英雄淚盡嶽侯祠憑君欲弔周公瑾白下丰標赤壁詩與王芳洲令君一時齊望子猷舟地上人看百尺樓千乘有書遮越絶六州無鐵似吳鈎城如丸創宜遼弄口有碑經倉頡鏤從古興王多異賞蒲輪徵去徑封侯遊雞鳴山寺龍翔鳳舞萃雞鳴老剎精靈舍利明傳檄與魚供鶴俸開經有字記花庚山如得道同僧定石復何辜耐客黥可是梁皇成佛處鐘聲日日打臺城闕風閣小堪極目嶺東煙不道離城有許天好雨加松青一等深樓恣佛定多年名心已盡遙岑下春景最宜寒食前更進一溪真可住世人却滯買山錢雄州道中風聲怪得似鵂鶹大掠黃沙塑馬頭韓愈飽爭如二鳥謝丞渴又甚三騶偶遺一睫成深夢直聼雙眉作逺愁客路不知天近逺程程須築望京樓自笑千風吹不散梅酸端的頭陀現宰官太史公元牛馬走中黃伯作虎獶觀最平下筆偏趨險極怒逢山即轉歡世事方圓無是處從教八角磨為盤送吳朗公給諫頂門一下是陽剛七十諫書飛血光政事堂堪名偃月纍臣意不在飛霜遂精周易因羑里欲祭臯陶奈范滂的的君恩如海濶將人几肉放歸鄉送王漩觀侍御何鳥能為希有音通傳景祐四賢吟劉元城漢不慙鐵胡淡菴書大直金十古功名胥靡貴一生學問福堂深無將此事瞞朱陸自有鵝湖説到今送姚孟長前輩赴南中為説人生非聚麋長安道上戀何碁獨饒識具三毛頰不合時宜一肚皮文帝賈生時不見神宗蘇軾夲相知知君能看鍾山色一樣金門莫戒詩初吳給事執御王御史績燦言事被逮姚公希孟在講筵引魏徵致君堯舜語以為規會有摘公典試文義者遂左遷南少詹事賜麥餅宴百二十年如待今帝詒王舉道宏深珍竒大軫國中物神武滹沱河上心束賦順時推薄壯汜書教世當良金宋唐直作尋常事綾餡羅封義已淫其二九館羊龍貢食珠才隨脯箑下堯厨長房仙飯三山近福習神名萬野呼耐嚼周書無逸語如懸魯史有年圖固知此宴凌千載魚藻菁莪亦細娛按元制名不落夾宴嘉靖中改名舉行文鐵菴奉假歸彜陵出門遂有衡山雲到此邴原宜一醺杜宇鷓鴣訟不已桃人土偶道俄分自耽赤壁間為賦但纍紫薇忙屬文不曉青州倪若水送人何返羡班君病請至三不得許在任調治既小愈作乍似蛾穿出繭關慙人絲錦索癡頑不開後閣主投轄幾失藏舟天賜環多事角蹄占白黑罪言肘手訴朱殷拚將髀肉填鞍債耐看朝回馬上山小愈後吳淡人諸君移尊過齋作文字飲三分病去十分仙漸覺爰居布廣筵豈必姓名連沆瀣何煩酒食别崇宣尹夫人泣應由喜邊孝先嘲何敢眠擬益方書三品藥良朋淡酒月明天其二只作癡蠶繭自呼重陽又近小春酺老夫自避一頭地仙子羣移六甲厨處處白虹飛寶劍人人玄鶴舞明珠心知載酒齊來意其奈揚亭一字無送文長洲相國放歸只看波旬鬬麴多魔宫震動轉多魔暴公昔亦持三物陸子今方出一鵝中必疊雙真射手戲如格五小風波南園碑記秦城咏可及君家正氣歌其二帝能夜夢鬼朝歌其奈公超作霧何骨鯁魚頭稱參政眼光牛背耐修羅終南自放三彭走京兆豈容五日多歸去支公亭上望莫將霄鶴羡籠鵝送何香山相國放歸如何鼎耳雉飛鳴占曰台司怪事生纍日精思堂偃月一時坐失手調羮都如渭水分涇水寧有蠻兵報觸兵聞道橫琴山色好由他王氣屬秦城其二由來夢卜與人情總賴斯篇文送行難得青蠅為杜宇不聞檮杌食倉庚蘇公暴公各盟詛雷户崖户如踐更莫道香山無好伴文公遺迹在零丁時許都諫譽卿言事香山長洲與閣中某公爭票擬不合遂俱罷官寄商等軒冡宰鯤海蝸廬總莫論大都容得下琴樽欲將吏部長名榜比勘東林離垢園李下自無蹊徑在山公原有竹林存幽居也不宜籬棘多少禽魚望引援壽金在六繕部母夫人十年再進紫霞巵又向西華去獻詩啖到蔗頭如蜜境開猶桃子未花時有來拜舞茅容友是教鬚眉逸少師倘遇玉童須一問天門金母復為誰與治河使者張玉笥帝亦無如方割何山龍好與定顛波李尋賈讓豈無策瓠子宣房各有歌天老授書當濟洛支祁乞命保淮渦倘間好作河渠志彩筆玄圭總不磨送陳天甫督學嶺西有佛無佛安足論悉驅僧入辟支門圖書龍馬真開闢鐘鼓爰居亦引援五笥安眠邊教授千年交代桞宗元由來嶺外稱煙瘴今看春風何處溫集紅酣亭同凌駿甫閔園客賦不衫不履草亭臺隨意溪聲隨意苔花氣淡都如谷水雨珠肥不過青梅多安爐火深僧定故詭詩題鈍客才集似西園人更雅好將景物細圖來蒙賜佐樞環召别石齋兄兼懷諸公投林又復賦翩隼蠟屐東山未可為大有臯伊海內望敢云頗牧禁中知黃巾豕突如遊釡赤子飢驅亦弄池鼓枻中流需共濟卭須也恐辦裝遲送開美之關中獵獵秋髭霜滿顴未行先已挂秦煙無人能識騎牛氣有字須題落雁巔儒眼儘他酣百二客身總不入三千歸來莫道囊如洗定有雍州帖一船按公自佐樞管計後詩文僅見數首殆由時艱任重無心吮毫耶五七言絶句題畫早歲何處住髙人低茅水上貼江濶杳難尋過客指紅葉其二仙華學杜詩其詞拙而古如我寫蘭竹無媚有清苦示季弟華汝緑泛新醅酒紅添小火爐晚來天欲雪能飲一杯無訂石齋至董瑞生館煮泉以當醇採菊以為脯寄語十二郎慎毋忘十五題錢大鶴職方煙霞載舟名離離白鳳采滚滚赤蛟涎悉化為煙霞氤氲裝一船其二雷霆豈不聞蛟龍時亦過不愁眠不熟此不是風波題畫送江夏相公豫告竒石驕無奈髙秋淡不羣知須幾兩屐消受此山雲題松柏雙壽圖松柏歲寒節谷風夫婦心千年如有護為作老龍吟送徐水部奉使荆關自注云時方就婚豫即冰上人笙歌齊展畫旗開一具烏紗兩笑腮不問已知為楚使巫山雲氣逼人來其二灼眼霞光映彩舸一雙仙去竟如何樊夫人比劉綱妙法力才差半黍多其三商船如蟻客如鷥今日開關較昨遲底事郎官忙一曉未曽完得逺山眉其四楚風雄得似驚沙目送三湘貴客槎便過武溪人不訝使君舟上有桃花其五占天太史上星臺楚分嬃星逼上台召去君王如有問須言紅葉是良媒題畫贈王念生使君亦加紅葉亦微雲亦著髙人曵碧裙但説是秋都不信此中春氣正氤氲其二喚起山隂道上雲清溪可濯擬呼羣臨流自作三回想未必清溪似使君題畫贈王蔥嶽中丞山法雄深水意竒秋林霜皎月明時令公多是張防禦每得江南草木知其二上頭可有錦岡無一例風光列晝圖昨夜泰山雲氣美飛為快雨到西湖題畫送魏廓園被謫南還水有浮萍石有苴風霜一夜剪扶踈知消幾兩東山屐莫便逢人説遂初按是時忠節長吏垣宵人假會推晉撫謝應祥事并逐高趙楊左數公至次年乙丑而清流之難烈矣壽年友海陵令張湛虛一城春雨萬家煙處處涼飛太極泉人在揚州清似鶴不知是宰是神仙其二銅章墨綬赫聲華别有玄心飯赤霞可是茅州句曲長早衙押篆晚烹砂其三百尺樓頭又一層蝗遷禽擁詎稱能漢書載有張堪傳未必漁陽敵海陵其四治成竟霸十諸侯雨牧風官拜馬頭千里照天傳臘燭江都近日毁迷樓其五剛是屠蘇得歲時春新花雨滿城知只看今歲家家醉可少南山酒一巵其六御壁丹臺並有名上天玉局下專城風華日到尚書省盡道雙鳬入帝京吳長組徵詩為杜毅齋開酒禁糟風容易感沖龍各路諸侯望飲烽為報陶潛蓮社散生天豈及酒泉封其二盤石山頭止酒辭經年不到杜康祠於今更走東臯路為有無功是導師其三欲濡龍鬛展鯨喉可有麯車三百不已到天垣燒貫索七公為放酒星囚題劉湛六宛溪釣圖覺是秋光性可安豪襟小耐白虹丸若非千仞岡頭坐豈易清溪下釣竿題畫贈吳符逺雲合濃摹水淡臨濃為俠氣淡交心相逢已是林泉友儘寫秋光十里深其二山自跏趺水自嘶數株霜醉小亭西他時夢裏尋張敏但繞溪行定不迷花燭詞為祝羽翽自有蓬山會上緣藍橋先遇女神仙他年歸院金蓮燭悔不遲開合卺筵其二花閨並築讀書臺妙友新騎青鳳來只等畫眉人見靣索看一部吕東萊曕孟夫子廟先是為妖賊所殘摳衣肅謁浩然堂仰止髙山並素王嘆息千餘年廟貌巋然不及魯靈光鄒縣道中麥秋志喜前歲驅車出戰場去年驟馬突飛蝗今來不是能舒眼貪看連阡麥子黃馬上遇雨自來三日蒙頭雨無節無肢不似魚腹裏郝隆如晒得此回定濕治安書登張煉師三層閣髙閣明霞飛采繒時攙鶴下與人乘較勝句曲先生宅客亦容登最上層題畫送髙硜齋太僕東歸亦在迷濛杳靄間蒼苔不點石爛斑聞今正少桑林雨那遣煙雲歸泰山按膠州以戊辰豫飬是歲亢旱禱雨甚切張太公挽詞夷然觀化復何酸天想緱山降玉棺一副鐵肝與兒子請將七十諫書看題小桃源圖為韓寅仲先生松風忽過小溪灣長出仇池石一班不問已知天地别神仙自合享三山其二桃花流水隱雙鳬中有髙真徹曉呼人是右丞詩是畫袛應喚作輞川圖其三王維石室魯菟裘一日山居一日侯試到頑仙樓上看可知李白醉時不其四天上元靈曲奏來何因人世奬仙才正如渡口溪風便流出胡麻飯一杯其五時韓將赴官洛陽擕將琴鶴過夷門比勘溫公獨樂園聖世遭逢無避理不應題是小桃源題王覺斯石交圖為郭天門吏部千夫舁不上丹徒看有模稜物態無交盡世人惟得此資他風骨耐他粗題畫石送姚孟長前輩總欺學學與堯堯唤作天門第一橋待到中流人共曉莫將深淺問江潮送陳章侯南還暨陽自注云章侯為豫畫蕉石志别不堪雲亂雨長離凄絶蕉風夜動時此意自難將作賦江淹多是未曾知其二有我君何易别離酒濃詩釅夜深時可當一片韓陵石歸去逢人儘説知其三玉鞭在手眼迷離是寫芭蕉怪石時供作丹徒書院譜世間只有米顛知題畫石為羅萸江前輩自由體正見嶙峋端為滔滔現此身珍重好加爐火煉世間原有補天人題松石壽吳淡人母楊夫人驪山老母石長在華嶺玉薑松愈芬十二靈飛篇爛熟傳經偶爾號宣文洗兒詞為王季重笑到雙顴舞到眉桃花雪水洗兒時生金鑄就新孩子提向罡風一任吹題畫山情淡得似沙鷗又著松吟雨後秋無事倘來此靜坐不知真覺日長不其二晴山點不上多煙一味清幽淡逺天最愛長松松下水秋光都宿釣魚船其三宫鐘能亮野煙疏却好連村帶郭居欲借武昌樓上月一觀老子興何如其四天方白醉樹紅酣小著溪風淡著嵐山亦不深秋不淺最宜松下卓茅菴其五是聼秋聲作賦時秋風多在最髙枝溪山定不牽成格欲學王癡我更癡其六覺得山容不耐秋一山霜樹秃於鶖怕他誤入枯禪道喚起鐘聲出梵樓題畫送徐虞求京兆入覲千花萬卉中不妍千風萬波中不顛此是恆山大茂石天教飛到聖人前題松石為年友留鄴二仙按馮公元揚號留仙元颷號鄴仙爵以大夫呼曰丈挾貴挾長可如何要是天生雙介節我龍爾虎不差多題畫欲圖少室恍三分為有清光不點雲自結草亭深樹裏幽山淡水太玄文其二爾雅才疏六月箋緑隂長到十分天情知北户風猶好意在臨流不在眠其三才著雲山即有煙分明傳與畫中禪聰明無過戴安道曾把金針度范宣題馮禎卿畫石為磊齋都諫一班新秀出仇池暢可清霜欲下時傳與明時當諫草臣心原奉石為師賀文文起宫相舉子十洞神仙伏闕呼怯投鳳穴去為雛自關天上仙才劣玉局班中取大蘇其二勃窣煙樓撞却難乃翁自立盡頭竿也留一著輸兒子二十年來六品官送賞元亮之官天生彩筆列明霞行袐書厨三十車便到洛陽仍第一去冬先發牡丹花按賞先以明經廷試值牡丹冬榮遂邀特擢田戚畹奉詔禮補陀還薑宗伯傳册徵詩賦賡二絶玉節紛披妙鬘雲潮音端的是聲聞可知佛日輝如此海不揚波為聖君其二金馬碧雞事有無親臣銜命豈區區採風還報明天子總寫流民作一圖自注云時兩浙大飢杭嘉湖紹尤甚按田太保宏遇貴妃父也妃有寵于君田樂交賢士大夫時奉命報禖祥之慶祀岱嶽謁落迦公方居林下故以憂憫諷焉為門人王育蓍趙甸張嶧題陳章侯畫奉王雪肝郡守寫作龍山一抹煙才看春雨又秋天三年飲此桃溪水試問何如第二泉其二蘭亭林竹耶溪錢內史能文太守賢合鑄黃金松樹下龍鱗鶴羽共千年贈李襄城名國禎初以胄子師公上將星光依太微隆墀召虎拜稽時此來不是間鐘鼓為聼彤弓三奏詩題畫石容何岸草何芳二者離竒孰可降乞得米顛袍笏到還邀謝客咏池塘倪文貞詩集卷下
